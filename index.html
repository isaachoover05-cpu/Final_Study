<!-- ══════════════════════════════════════════════════════
     SECTION 7: SOLID PRINCIPLES
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s7&quot;>
  <div class=&quot;section-sub&quot;>Section 07</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>07</div>
    <div class=&quot;section-title&quot;>SOLID Principles</div>
  </div>

  <p>SOLID is an acronym for five principles of object-oriented software design. They guide you toward code that is flexible, maintainable, and extensible. Expect conceptual definition questions AND design questions on the final.</p>

  <div class=&quot;callout purple&quot;>
    <div class=&quot;callout-title&quot;>📚 SOLID Mnemonic</div>
    <strong>S</strong>ingle Responsibility · <strong>O</strong>pen/Closed · <strong>L</strong>iskov Substitution · <strong>I</strong>nterface Segregation · <strong>D</strong>ependency Inversion
  </div>

  <h2>S — Single Responsibility Principle (SRP)</h2>
  <p><em>&quot;A class should have only one reason to change.&quot;</em></p>
  <p>Each class should do exactly one thing. If you find yourself saying &quot;this class handles X <em>and</em> Y&quot;, that's two responsibilities.</p>
<pre><span class=&quot;cm&quot;>// ❌ Violates SRP — one class does too much</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>UserReport</span> {
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>generateReport</span>() {...}   <span class=&quot;cm&quot;>// report logic</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>saveToFile</span>() {...}       <span class=&quot;cm&quot;>// file I/O — different responsibility!</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>sendEmail</span>() {...}        <span class=&quot;cm&quot;>// networking — yet another!</span>
};

<span class=&quot;cm&quot;>// ✅ Follows SRP — each class has one job</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>ReportGenerator</span>  { <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>generate</span>(); };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>ReportSaver</span>      { <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>saveToFile</span>(); };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>ReportMailer</span>     { <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>sendEmail</span>(); };</pre>

  <h2>O — Open/Closed Principle (OCP)</h2>
  <p><em>&quot;Software should be open for extension, but closed for modification.&quot;</em></p>
  <p>Add new behavior by <em>extending</em> (new class), not by modifying existing code. The Duck example perfectly illustrates this — you add a new quack behavior by adding a new class, not by changing Duck.</p>
<pre><span class=&quot;cm&quot;>// ❌ Violates OCP — adding a discount type requires modifying existing code</span>
<span class=&quot;ty&quot;>double</span> <span class=&quot;fn&quot;>getDiscount</span>(<span class=&quot;ty&quot;>string</span> type) {
    <span class=&quot;kw&quot;>if</span>(type == <span class=&quot;st&quot;>&quot;student&quot;</span>) <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>0.10</span>;
    <span class=&quot;kw&quot;>if</span>(type == <span class=&quot;st&quot;>&quot;senior&quot;</span>)  <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>0.15</span>;
    <span class=&quot;cm&quot;>// Must edit this function to add &quot;employee&quot; discount!</span>
}

<span class=&quot;cm&quot;>// ✅ Follows OCP — add new discount by adding new class</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Discount</span> { <span class=&quot;kw&quot;>virtual</span> <span class=&quot;ty&quot;>double</span> <span class=&quot;fn&quot;>get</span>() = <span class=&quot;nm&quot;>0</span>; };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>StudentDiscount</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Discount</span> { <span class=&quot;ty&quot;>double</span> <span class=&quot;fn&quot;>get</span>() { <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>0.10</span>; } };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>SeniorDiscount</span>  : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Discount</span> { <span class=&quot;ty&quot;>double</span> <span class=&quot;fn&quot;>get</span>() { <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>0.15</span>; } };</pre>

  <h2>L — Liskov Substitution Principle (LSP)</h2>
  <p><em>&quot;Derived classes must be substitutable for their base classes.&quot;</em></p>
  <p>If S is a subtype of T, then objects of type T may be replaced with S without altering correctness. A derived class shouldn't weaken preconditions or strengthen postconditions.</p>
<pre><span class=&quot;cm&quot;>// ❌ Violates LSP — Square breaks Rectangle behavior</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Rectangle</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setWidth</span>(<span class=&quot;ty&quot;>int</span> w)  { _w = w; }
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setHeight</span>(<span class=&quot;ty&quot;>int</span> h) { _h = h; }
};
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Square</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Rectangle</span> { <span class=&quot;cm&quot;>// Square is NOT a proper Rectangle!</span>
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setWidth</span>(<span class=&quot;ty&quot;>int</span> w)  { _w = _h = w; }  <span class=&quot;cm&quot;>// changes height too — breaks contract!</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setHeight</span>(<span class=&quot;ty&quot;>int</span> h) { _w = _h = h; }
};</pre>

  <h2>I — Interface Segregation Principle (ISP)</h2>
  <p><em>&quot;Clients should not be forced to depend on interfaces they don't use.&quot;</em></p>
  <p>Prefer many small, specific interfaces over one large general interface.</p>
<pre><span class=&quot;cm&quot;>// ❌ Fat interface — forces all implementors to implement all methods</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>IWorker</span> {
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>work</span>() = <span class=&quot;nm&quot;>0</span>;
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>eat</span>() = <span class=&quot;nm&quot;>0</span>;   <span class=&quot;cm&quot;>// robots don't eat!</span>
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>sleep</span>() = <span class=&quot;nm&quot;>0</span>; <span class=&quot;cm&quot;>// robots don't sleep!</span>
};

<span class=&quot;cm&quot;>// ✅ Segregated interfaces</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>IWorkable</span> { <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>work</span>() = <span class=&quot;nm&quot;>0</span>; };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>IFeedable</span>  { <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>eat</span>()  = <span class=&quot;nm&quot;>0</span>; };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Human</span>      : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>IWorkable</span>, <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>IFeedable</span> { ... };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Robot</span>      : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>IWorkable</span> { ... }; <span class=&quot;cm&quot;>// no eat needed</span></pre>

  <h2>D — Dependency Inversion Principle (DIP)</h2>
  <p><em>&quot;Depend on abstractions, not concretions.&quot;</em></p>
  <p>High-level modules should not depend on low-level modules. Both should depend on abstractions (interfaces).</p>
<pre><span class=&quot;cm&quot;>// ❌ High-level depends on low-level concrete class</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Report</span> {
    <span class=&quot;ty&quot;>PDFPrinter</span>* _printer; <span class=&quot;cm&quot;>// tightly coupled to PDF!</span>
};

<span class=&quot;cm&quot;>// ✅ Depends on abstraction (interface)</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>IPrinter</span> { <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>print</span>() = <span class=&quot;nm&quot;>0</span>; };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Report</span>   { <span class=&quot;ty&quot;>IPrinter</span>* _printer; <span class=&quot;cm&quot;>// decoupled!</span> };</pre>

  <h2>Two Bonus Principles (Tested!)</h2>

  <h3>Program to an Interface</h3>
  <p>Write code using abstract types (interface pointers), not concrete types. This keeps code flexible and testable.</p>
<pre><span class=&quot;cm&quot;>// Program to an interface — use Duck*, not MallardDuck*</span>
<span class=&quot;ty&quot;>Duck</span>* d = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>MallardDuck</span>();  <span class=&quot;cm&quot;>// ✅ — d is a Duck* (interface type)</span></pre>

  <h3>Favor Composition Over Inheritance</h3>
  <p>Instead of inheriting behavior, <em>contain</em> an object that provides that behavior. This is what the Duck pattern does — Duck <em>has-a</em> QuackBehavior instead of inheriting quacking.</p>
<pre><span class=&quot;cm&quot;>// Composition: Duck HAS-A QuackBehavior (not IS-A)</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Duck</span> {
    <span class=&quot;ty&quot;>QuackBehavior</span>* _qb;  <span class=&quot;cm&quot;>// composition — behavior can be swapped at runtime!</span>
};</pre>

  <h2>Final Review Q16 — RockCairn Stack (Solved)</h2>
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>RockCairn</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>RockCairn</span>() {}

    <span class=&quot;ty&quot;>bool</span> <span class=&quot;fn&quot;>push</span>(<span class=&quot;ty&quot;>int</span> val) {
        <span class=&quot;cm&quot;>// Push only if stack is empty OR val &amp;lt; top value</span>
        <span class=&quot;kw&quot;>if</span>(_cairn.<span class=&quot;fn&quot;>size</span>() == <span class=&quot;nm&quot;>0</span> || val &amp;lt; _cairn.<span class=&quot;fn&quot;>peek</span>()) {
            _cairn.<span class=&quot;fn&quot;>push</span>(val);
            <span class=&quot;kw&quot;>return</span> <span class=&quot;kw&quot;>true</span>;
        }
        <span class=&quot;kw&quot;>return</span> <span class=&quot;kw&quot;>false</span>;
    }

<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>Stack</span> _cairn;  <span class=&quot;cm&quot;>// composition — RockCairn HAS-A Stack</span>
};</pre>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ SOLID QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>S — SRP</strong>One class = one reason to change</div>
      <div class=&quot;cheat-item&quot;><strong>O — OCP</strong>Extend (add class), don't modify existing</div>
      <div class=&quot;cheat-item&quot;><strong>L — LSP</strong>Derived must be safely substitutable for base</div>
      <div class=&quot;cheat-item&quot;><strong>I — ISP</strong>Small specific interfaces > one fat interface</div>
      <div class=&quot;cheat-item&quot;><strong>D — DIP</strong>Depend on abstract interface, not concrete class</div>
      <div class=&quot;cheat-item&quot;><strong>Prog. to Interface</strong>Use <code>Base*</code>, not <code>Derived*</code></div>
      <div class=&quot;cheat-item&quot;><strong>Composition > Inherit</strong>HAS-A more flexible than IS-A</div>
      <div class=&quot;cheat-item&quot;><strong>Duck example</strong>QuackBehavior = composition; can swap at runtime</div>
    </div>
  </div>
</div>

  <h2>Static vs Dynamic Arrays</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th></th><th>Static Array</th><th>Dynamic Array</th></tr></thead>
    <tbody>
      <tr><td><strong>Allocation</strong></td><td>Stack at compile time</td><td>Heap at runtime (<code>new</code>)</td></tr>
      <tr><td><strong>Size</strong></td><td>Fixed, known at compile time</td><td>Variable, known at runtime</td></tr>
      <tr><td><strong>Declaration</strong></td><td><code>int arr[100];</code></td><td><code>int* arr = new int[n];</code></td></tr>
      <tr><td><strong>Deallocation</strong></td><td>Automatic</td><td>Manual: <code>delete[] arr;</code></td></tr>
      <tr><td><strong>Access</strong></td><td><code>arr[i]</code></td><td><code>arr[i]</code> (same syntax)</td></tr>
    </tbody>
  </table>
  </div>

  <h2>Memory Layout Formula</h2>
  <p>Arrays are stored contiguously. For element at index <code>i</code>:</p>
  <div class=&quot;callout info&quot;>
    <div class=&quot;callout-title&quot;>📐 Address Formula</div>
    <code>address(arr[i]) = base_address + i × sizeof(element_type)</code><br><br>
    Example: <code>int arr[5]</code> at address 1000, sizeof(int)=4:<br>
    <code>arr[0]</code>=1000, <code>arr[1]</code>=1004, <code>arr[2]</code>=1008...
  </div>

  <h2>Final Review Q5 — populate_array (Solved)</h2>
<pre><span class=&quot;kw&quot;>const int</span> SIZE = <span class=&quot;nm&quot;>100</span>;

<span class=&quot;cm&quot;>// TODO 1: static integer array with 100 elements</span>
<span class=&quot;ty&quot;>int</span> arr[SIZE];

<span class=&quot;cm&quot;>// TODO 2: populate_array function</span>
<span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>populate_array</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> SIZE, <span class=&quot;ty&quot;>int</span> MOD_VALUE) {

}</pre>

  <h2>Final Review Q13 — Dynamic 2D Book Array (Solved)</h2>
<pre><span class=&quot;ty&quot;>int</span> r, c;
cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Enter rows and columns: &quot;</span>;
cin &amp;gt;&amp;gt; r &amp;gt;&amp;gt; c;

<span class=&quot;cm&quot;>// Allocate array of pointers (rows)</span>
<span class=&quot;ty&quot;>Book</span>** bookCase = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Book</span>*[r];

<span class=&quot;cm&quot;>// Allocate each row (columns)</span>
<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; r; i++) {
    bookCase[i] = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Book</span>[c];          <span class=&quot;cm&quot;>// uses default Book ctor → Stroustrup</span>

    <span class=&quot;kw&quot;>delete</span>[] bookCase[i];               <span class=&quot;cm&quot;>// delete each row first</span>
}
<span class=&quot;kw&quot;>delete</span>[] bookCase;                      <span class=&quot;cm&quot;>// then delete pointer array</span></pre>

<!-- ══════════════════════════════════════════════════════
     SECTION 9: LINKED LISTS
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s9&quot;>
  <div class=&quot;section-sub&quot;>Section 09</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>09</div>
    <div class=&quot;section-title&quot;>Linked Lists</div>
  </div>

  <p>A linked list stores elements in <em>nodes</em> scattered in memory, each pointing to the next. Unlike arrays, they support O(1) insertion/deletion at the head — but have O(n) random access.</p>

  <h2>Types of Linked Lists</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Type</th><th>Description</th><th>Memory per Node</th></tr></thead>
    <tbody>
      <tr><td><strong>Singly Linked</strong></td><td>Each node has <code>next</code> pointer only</td><td>value + 1 pointer</td></tr>
      <tr><td><strong>Doubly Linked</strong></td><td>Each node has <code>next</code> AND <code>prev</code> pointer</td><td>value + 2 pointers</td></tr>
      <tr><td><strong>Circular</strong></td><td>Last node's <code>next</code> points to head</td><td>value + 1 (or 2) pointer(s)</td></tr>
    </tbody>
  </table>
  </div>

  <h2>Complete Templated LinkedList Implementation</h2>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>struct</span> <span class=&quot;ty&quot;>Node</span> {
    <span class=&quot;ty&quot;>T</span>      value;
    <span class=&quot;ty&quot;>Node</span>*  next;
    <span class=&quot;fn&quot;>Node</span>(<span class=&quot;ty&quot;>T</span> v) : value(v), next(<span class=&quot;kw&quot;>nullptr</span>) {}
};

<span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>LinkedList</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>LinkedList</span>() : _head(<span class=&quot;kw&quot;>nullptr</span>), _size(<span class=&quot;nm&quot;>0</span>) {}

    <span class=&quot;cm&quot;>// ── Big Three ──────────────────────────────────</span>
    ~<span class=&quot;fn&quot;>LinkedList</span>() { <span class=&quot;fn&quot;>clear</span>(); }

    <span class=&quot;fn&quot;>LinkedList</span>(<span class=&quot;kw&quot;>const</span> <span class=&quot;ty&quot;>LinkedList</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;&amp;amp; rhs)
        : _head(<span class=&quot;kw&quot;>nullptr</span>), _size(<span class=&quot;nm&quot;>0</span>) {
        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* curr = rhs._head;
        <span class=&quot;kw&quot;>while</span>(curr) { <span class=&quot;fn&quot;>pushBack</span>(curr->value); curr = curr->next; }
    }

    <span class=&quot;ty&quot;>LinkedList</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;&amp;amp; <span class=&quot;kw&quot;>operator</span>=(<span class=&quot;kw&quot;>const</span> <span class=&quot;ty&quot;>LinkedList</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;&amp;amp; rhs) {
        <span class=&quot;kw&quot;>if</span>(<span class=&quot;kw&quot;>this</span> == &amp;amp;rhs) <span class=&quot;kw&quot;>return</span> *<span class=&quot;kw&quot;>this</span>;
        <span class=&quot;fn&quot;>clear</span>();
        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* curr = rhs._head;
        <span class=&quot;kw&quot;>while</span>(curr) { <span class=&quot;fn&quot;>pushBack</span>(curr->value); curr = curr->next; }
        <span class=&quot;kw&quot;>return</span> *<span class=&quot;kw&quot;>this</span>;
    }

    <span class=&quot;cm&quot;>// ── pushBack: O(n) without tail pointer ────────</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>pushBack</span>(<span class=&quot;ty&quot;>T</span> val) {
        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* newNode = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;(val);
        <span class=&quot;kw&quot;>if</span>(!_head) {
            _head = newNode;
        } <span class=&quot;kw&quot;>else</span> {
            <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* curr = _head;
            <span class=&quot;kw&quot;>while</span>(curr->next) curr = curr->next; <span class=&quot;cm&quot;>// walk to end</span>
            curr->next = newNode;
        }
        _size++;
    }

    <span class=&quot;cm&quot;>// ── pushFront: O(1) ────────────────────────────</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>pushFront</span>(<span class=&quot;ty&quot;>T</span> val) {
        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* newNode = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;(val);
        newNode->next = _head;
        _head = newNode;
        _size++;
    }

    <span class=&quot;cm&quot;>// ── remove: O(n) ───────────────────────────────</span>
    <span class=&quot;kw&quot;>bool</span> <span class=&quot;fn&quot;>remove</span>(<span class=&quot;ty&quot;>T</span> val) {
        <span class=&quot;kw&quot;>if</span>(!_head) <span class=&quot;kw&quot;>return</span> <span class=&quot;kw&quot;>false</span>;

        <span class=&quot;cm&quot;>// Special case: removing head</span>
        <span class=&quot;kw&quot;>if</span>(_head->value == val) {
            <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* toDelete = _head;
            _head = _head->next;
            <span class=&quot;kw&quot;>delete</span> toDelete;
            _size--;
            <span class=&quot;kw&quot;>return</span> <span class=&quot;kw&quot;>true</span>;
        }

        <span class=&quot;cm&quot;>// General case: walk until node before target</span>
        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* curr = _head;
        <span class=&quot;kw&quot;>while</span>(curr->next &amp;amp;&amp;amp; curr->next->value != val)
            curr = curr->next;

        <span class=&quot;kw&quot;>if</span>(!curr->next) <span class=&quot;kw&quot;>return</span> <span class=&quot;kw&quot;>false</span>; <span class=&quot;cm&quot;>// not found</span>

        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* toDelete = curr->next;
        curr->next = toDelete->next;    <span class=&quot;cm&quot;>// bypass the node</span>
        <span class=&quot;kw&quot;>delete</span> toDelete;
        _size--;
        <span class=&quot;kw&quot;>return</span> <span class=&quot;kw&quot;>true</span>;
    }

    <span class=&quot;cm&quot;>// ── clear: O(n) ────────────────────────────────</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>clear</span>() {
        <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* curr = _head;
        <span class=&quot;kw&quot;>while</span>(curr) {
            <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* next = curr->next;
            <span class=&quot;kw&quot;>delete</span> curr;
            curr = next;
        }
        _head = <span class=&quot;kw&quot;>nullptr</span>;
        _size = <span class=&quot;nm&quot;>0</span>;
    }

    <span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>size</span>() <span class=&quot;kw&quot;>const</span> { <span class=&quot;kw&quot;>return</span> _size; }

<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* _head;
    <span class=&quot;ty&quot;>int</span> _size;
};</pre>

  <h2>Stack and Queue Using Linked List</h2>
<pre><span class=&quot;cm&quot;>// Stack (LIFO) — push/pop from front: O(1)</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Stack</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>push</span>(<span class=&quot;ty&quot;>int</span> val) { _list.<span class=&quot;fn&quot;>pushFront</span>(val); }

    <span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>pop</span>() {
        <span class=&quot;ty&quot;>int</span> val = <span class=&quot;fn&quot;>peek</span>();
        _list.<span class=&quot;fn&quot;>remove</span>(val);
        <span class=&quot;kw&quot;>return</span> val;
    }

    <span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>peek</span>() <span class=&quot;kw&quot;>const</span> { <span class=&quot;kw&quot;>return</span> _list._head->value; } <span class=&quot;cm&quot;>// needs friend or accessor</span>
    <span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>size</span>() <span class=&quot;kw&quot;>const</span> { <span class=&quot;kw&quot;>return</span> _list.<span class=&quot;fn&quot;>size</span>(); }

<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>LinkedList</span>&amp;lt;<span class=&quot;ty&quot;>int</span>&amp;gt; _list;
};

<span class=&quot;cm&quot;>// Queue (FIFO) — enqueue at back (O(n)), dequeue from front (O(1))</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Queue</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>enqueue</span>(<span class=&quot;ty&quot;>int</span> val) { _list.<span class=&quot;fn&quot;>pushBack</span>(val); }
    <span class=&quot;ty&quot;>int</span>  <span class=&quot;fn&quot;>dequeue</span>() {
        <span class=&quot;ty&quot;>int</span> val = _list._head->value;
        _list.<span class=&quot;fn&quot;>remove</span>(val);
        <span class=&quot;kw&quot;>return</span> val;
    }
<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>LinkedList</span>&amp;lt;<span class=&quot;ty&quot;>int</span>&amp;gt; _list;
};</pre>

  <h2>Big-O Comparison</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Operation</th><th>Array</th><th>Singly Linked</th><th>Doubly Linked</th></tr></thead>
    <tbody>

      <tr><td>Search</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>
      <tr><td>Insert at head</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td></tr>
      <tr><td>Insert at tail</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)*</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span> w/ tail ptr</td></tr>
      <tr><td>Insert in middle</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>
      <tr><td>Delete at head</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td></tr>
      <tr><td>Delete at tail</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td></tr>
      <tr><td>Traversal</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>

<!-- ══════════════════════════════════════════════════════
     SECTION 10: EXCEPTION HANDLING
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s10&quot;>
  <div class=&quot;section-sub&quot;>Section 10</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>10</div>
    <div class=&quot;section-title&quot;>Exception Handling</div>
  </div>

  <p>Exception handling provides a structured way to detect and recover from error conditions at runtime. It separates error-handling code from normal logic.</p>

  <h2>The Try/Throw/Catch Structure</h2>
<pre><span class=&quot;kw&quot;>try</span> {
    <span class=&quot;cm&quot;>// Code that might fail</span>
    <span class=&quot;kw&quot;>if</span>(denominator == <span class=&quot;nm&quot;>0</span>)
        <span class=&quot;kw&quot;>throw</span> <span class=&quot;ty&quot;>runtime_error</span>(<span class=&quot;st&quot;>&quot;Division by zero!&quot;</span>); <span class=&quot;cm&quot;>// throw an exception</span>
    result = numerator / denominator;
}
<span class=&quot;kw&quot;>catch</span>(<span class=&quot;kw&quot;>const</span> <span class=&quot;ty&quot;>runtime_error</span>&amp;amp; e) { <span class=&quot;cm&quot;>// catch by CONST REFERENCE</span>
    cerr &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Error: &quot;</span> &amp;lt;&amp;lt; e.<span class=&quot;fn&quot;>what</span>() &amp;lt;&amp;lt; endl;
}
<span class=&quot;kw&quot;>catch</span>(...) {  <span class=&quot;cm&quot;>// catch-all (last resort)</span>
    cerr &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Unknown error&quot;</span> &amp;lt;&amp;lt; endl;
}</pre>

  <div class=&quot;callout info&quot;>
    <div class=&quot;callout-title&quot;>💡 Why Catch by Const Reference?</div>
    Catching by value slices the exception (same as object slicing). Catching by reference:
    <ul>
      <li>Prevents copying</li>
      <li>Preserves derived exception type info</li>
      <li>Allows accessing virtual functions</li>
    </ul>
  </div>

  <h2>Exception Hierarchy</h2>
  <p>Standard exceptions inherit from <code>std::exception</code>:</p>
  <ul>
    <li><code>std::exception</code> — base; has <code>.what()</code> method</li>
    <li><code>std::runtime_error</code> — runtime problems</li>
    <li><code>std::invalid_argument</code> — bad argument</li>
    <li><code>std::out_of_range</code> — index out of bounds</li>
    <li><code>std::bad_alloc</code> — new failed (out of memory)</li>
  </ul>

  <h2>Custom Exception Classes</h2>
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>StackEmptyException</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>runtime_error</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>StackEmptyException</span>() : <span class=&quot;fn&quot;>runtime_error</span>(<span class=&quot;st&quot;>&quot;Stack is empty!&quot;</span>) {}
};

<span class=&quot;cm&quot;>// Usage:</span>
<span class=&quot;kw&quot;>if</span>(_size == <span class=&quot;nm&quot;>0</span>) <span class=&quot;kw&quot;>throw</span> <span class=&quot;ty&quot;>StackEmptyException</span>();</pre>

  <h2>Exception Flow Rules</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Rule</th><th>Details</th></tr></thead>
    <tbody>
      <tr><td><strong>throw exits immediately</strong></td><td>Code after throw in the try block does NOT execute</td></tr>
      <tr><td><strong>catch order matters</strong></td><td>More derived exceptions must come BEFORE base exceptions</td></tr>
      <tr><td><strong>Re-throw</strong></td><td>Inside catch: <code>throw;</code> (no argument) re-throws current exception</td></tr>
      <tr><td><strong>Uncaught exception</strong></td><td>Calls <code>std::terminate()</code> → program crashes</td></tr>
      <tr><td><strong>Function signatures</strong></td><td>Prefer <code>noexcept</code> on functions that guarantee no exceptions</td></tr>
    </tbody>
  </table>
  </div>

  <div class=&quot;problem-box&quot;>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ EXCEPTION QUICK REFERENCE</div>

      <div class=&quot;cheat-item&quot;><strong>Throw</strong><code>throw ExceptionType(&quot;message&quot;);</code></div>
      <div class=&quot;cheat-item&quot;><strong>Catch by const ref</strong>Prevents slicing, no copy overhead</div>
      <div class=&quot;cheat-item&quot;><strong>Catch-all</strong><code>catch(...) {}</code> — must be last</div>
      <div class=&quot;cheat-item&quot;><strong>what() method</strong>Returns error message string</div>

     SECTION 11: SORTING ALGORITHMS
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s11&quot;>
  <div class=&quot;section-sub&quot;>Section 11</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>11</div>
    <div class=&quot;section-title&quot;>Sorting Algorithms</div>
  </div>

  <h2>Big-O Summary Table</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Algorithm</th><th>Best</th><th>Average</th><th>Worst</th><th>Stable?</th><th>Key Idea</th></tr></thead>
    <tbody>
      <tr>
        <td><strong>Selection Sort</strong></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td>❌</td>
        <td>Find min, swap to front</td>
      </tr>
      <tr>
        <td><strong>Insertion Sort</strong></td>
        <td><span class=&quot;complexity-badge on&quot;>O(n)</span></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td>✅</td>
        <td>Insert each into sorted portion</td>
      </tr>
      <tr>
        <td><strong>Bubble Sort</strong></td>
        <td><span class=&quot;complexity-badge on&quot;>O(n)</span></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td><span class=&quot;complexity-badge on2&quot;>O(n²)</span></td>
        <td>✅</td>
        <td>Swap adjacent if out of order</td>
      </tr>
      <tr>
        <td><strong>Merge Sort</strong></td>
        <td><span class=&quot;complexity-badge onlogn&quot;>O(n log n)</span></td>
        <td><span class=&quot;complexity-badge onlogn&quot;>O(n log n)</span></td>
        <td><span class=&quot;complexity-badge onlogn&quot;>O(n log n)</span></td>
        <td>✅</td>
        <td>Divide, sort halves, merge</td>
      </tr>
    </tbody>
  </table>
  </div>

  <h2>Selection Sort</h2>
  <p>Find the minimum in the unsorted portion and swap it to its correct position.</p>
<pre><span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>selectionSort</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> n) {
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n-<span class=&quot;nm&quot;>1</span>; i++) {
        <span class=&quot;ty&quot;>int</span> minIdx = i;
        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> j = i+<span class=&quot;nm&quot;>1</span>; j &amp;lt; n; j++) {
            <span class=&quot;kw&quot;>if</span>(arr[j] &amp;lt; arr[minIdx])
                minIdx = j;
        }
        <span class=&quot;kw&quot;>if</span>(minIdx != i)
            swap(arr[i], arr[minIdx]);
    }
}</pre>
  <p><strong>Trace:</strong> <code>[5, 2, 8, 1, 9]</code></p>
  <ul>
    <li>i=0: min=1 at idx 3 → swap → <code>[1, 2, 8, 5, 9]</code></li>
    <li>i=1: min=2 at idx 1 → no swap → <code>[1, 2, 8, 5, 9]</code></li>
    <li>i=2: min=5 at idx 3 → swap → <code>[1, 2, 5, 8, 9]</code></li>
    <li>Done!</li>
  </ul>

  <h2>Insertion Sort</h2>
  <p>Build sorted portion left-to-right, inserting each element into its correct position.</p>
<pre><span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>insertionSort</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> n) {
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>1</span>; i &amp;lt; n; i++) {
        <span class=&quot;ty&quot;>int</span> key = arr[i];
        <span class=&quot;ty&quot;>int</span> j = i - <span class=&quot;nm&quot;>1</span>;
        <span class=&quot;cm&quot;>// Shift elements right until correct position found</span>
        <span class=&quot;kw&quot;>while</span>(j &amp;gt;= <span class=&quot;nm&quot;>0</span> &amp;amp;&amp;amp; arr[j] &amp;gt; key) {
            arr[j+<span class=&quot;nm&quot;>1</span>] = arr[j];
            j--;
        }
        arr[j+<span class=&quot;nm&quot;>1</span>] = key;
    }
}</pre>
  <p><strong>Best case O(n):</strong> Already sorted — inner while never runs, just passes through once.</p>

  <h2>Bubble Sort</h2>
<pre><span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>bubbleSort</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> n) {
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n-<span class=&quot;nm&quot;>1</span>; i++) {
        <span class=&quot;bo&quot;>bool</span> swapped = <span class=&quot;kw&quot;>false</span>;
        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> j = <span class=&quot;nm&quot;>0</span>; j &amp;lt; n-i-<span class=&quot;nm&quot;>1</span>; j++) {
            <span class=&quot;kw&quot;>if</span>(arr[j] &amp;gt; arr[j+<span class=&quot;nm&quot;>1</span>]) {
                swap(arr[j], arr[j+<span class=&quot;nm&quot;>1</span>]);
                swapped = <span class=&quot;kw&quot;>true</span>;
            }
        }
        <span class=&quot;kw&quot;>if</span>(!swapped) <span class=&quot;kw&quot;>break</span>; <span class=&quot;cm&quot;>// optimization: early exit if sorted</span>
    }
}</pre>

  <h2>Swapping in Linked Lists vs Arrays</h2>
  <div class=&quot;callout warn&quot;>
    <div class=&quot;callout-title&quot;>⚠️ Key Difference: Linked List Swapping</div>
    For a linked list, <strong>swap the values</strong> stored in nodes, not the node pointers. Swapping pointers requires carefully updating many next/prev links and is error-prone. Swapping values is simpler and correct.
  </div>
<pre><span class=&quot;cm&quot;>// Swapping in array: swap pointer/index positions</span>
swap(arr[i], arr[j]);  <span class=&quot;cm&quot;>// straightforward</span>

<span class=&quot;cm&quot;>// Swapping in linked list: swap the VALUES in nodes</span>
swap(nodeA->value, nodeB->value);  <span class=&quot;cm&quot;>// much simpler than pointer surgery!</span></pre>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ SORTING QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Selection</strong>O(n²) always; find min, put at front</div>
      <div class=&quot;cheat-item&quot;><strong>Insertion</strong>O(n) best (sorted); shift &amp; insert key</div>
      <div class=&quot;cheat-item&quot;><strong>Bubble</strong>O(n) best (sorted); swap adjacent pairs</div>
      <div class=&quot;cheat-item&quot;><strong>Merge Sort</strong>O(n log n) always; divide &amp; conquer</div>
      <div class=&quot;cheat-item&quot;><strong>LL swap</strong>Swap VALUES in nodes, not node pointers</div>
      <div class=&quot;cheat-item&quot;><strong>Stable sort</strong>Insertion, Bubble, Merge are stable</div>
    </div>
  </div>
</div>

<div class=&quot;section&quot; id=&quot;s12&quot;>
  <div class=&quot;section-sub&quot;>Section 12</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>12</div>
    <div class=&quot;section-title&quot;>Recursion &amp;amp; Merge Sort</div>
  </div>

  <p>Recursion is when a function <em>calls itself</em> to solve a smaller version of the same problem. Every recursive function needs two things:</p>
  <ol>
    <li><strong>Base case</strong> — the stopping condition that doesn't recurse</li>
    <li><strong>Recursive case</strong> — calls itself with a smaller/simpler input, moving toward base case</li>
  </ol>

  <h2>Classic Examples</h2>
<pre><span class=&quot;cm&quot;>// Factorial: n! = n × (n-1)!</span>
<span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>factorial</span>(<span class=&quot;ty&quot;>int</span> n) {
    <span class=&quot;kw&quot;>if</span>(n &amp;lt;= <span class=&quot;nm&quot;>1</span>) <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>1</span>;   <span class=&quot;cm&quot;>// BASE CASE</span>
    <span class=&quot;kw&quot;>return</span> n * <span class=&quot;fn&quot;>factorial</span>(n-<span class=&quot;nm&quot;>1</span>); <span class=&quot;cm&quot;>// RECURSIVE CASE</span>
}
<span class=&quot;cm&quot;>// factorial(4): 4→3→2→1 → unwind: 1×2×3×4=24</span>

<span class=&quot;cm&quot;>// Fibonacci</span>
<span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>fib</span>(<span class=&quot;ty&quot;>int</span> n) {
    <span class=&quot;kw&quot;>if</span>(n &amp;lt;= <span class=&quot;nm&quot;>1</span>) <span class=&quot;kw&quot;>return</span> n;  <span class=&quot;cm&quot;>// base cases: fib(0)=0, fib(1)=1</span>
    <span class=&quot;kw&quot;>return</span> <span class=&quot;fn&quot;>fib</span>(n-<span class=&quot;nm&quot;>1</span>) + <span class=&quot;fn&quot;>fib</span>(n-<span class=&quot;nm&quot;>2</span>);
}</pre>

  <h2>Call Stack Trace: factorial(4)</h2>
<pre>factorial(4)
  factorial(3)
    factorial(2)
      factorial(1)  ← BASE CASE: returns 1
    returns 2×1=2
  returns 3×2=6
returns 4×6=24</pre>

  <h2>Merge Sort — Full Implementation</h2>
  <p>Merge sort: divide array in half, recursively sort each half, merge the sorted halves.</p>
<pre><span class=&quot;cm&quot;>// Merge two sorted halves back together</span>
<span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>merge</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> left, <span class=&quot;ty&quot;>int</span> mid, <span class=&quot;ty&quot;>int</span> right) {
    <span class=&quot;ty&quot;>int</span> n1 = mid - left + <span class=&quot;nm&quot;>1</span>;
    <span class=&quot;ty&quot;>int</span> n2 = right - mid;

    <span class=&quot;cm&quot;>// Temp arrays</span>
    <span class=&quot;ty&quot;>int</span>* L = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>int</span>[n1];
    <span class=&quot;ty&quot;>int</span>* R = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>int</span>[n2];
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n1; i++) L[i] = arr[left + i];
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> j = <span class=&quot;nm&quot;>0</span>; j &amp;lt; n2; j++) R[j] = arr[mid + <span class=&quot;nm&quot;>1</span> + j];

    <span class=&quot;cm&quot;>// Merge back in sorted order</span>
    <span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>, j = <span class=&quot;nm&quot;>0</span>, k = left;
    <span class=&quot;kw&quot;>while</span>(i &amp;lt; n1 &amp;amp;&amp;amp; j &amp;lt; n2) {
        <span class=&quot;kw&quot;>if</span>(L[i] &amp;lt;= R[j]) arr[k++] = L[i++];
        <span class=&quot;kw&quot;>else</span>              arr[k++] = R[j++];
    }
    <span class=&quot;kw&quot;>while</span>(i &amp;lt; n1) arr[k++] = L[i++];
    <span class=&quot;kw&quot;>while</span>(j &amp;lt; n2) arr[k++] = R[j++];

    <span class=&quot;kw&quot;>delete</span>[] L;
    <span class=&quot;kw&quot;>delete</span>[] R;
}

<span class=&quot;cm&quot;>// Recursive merge sort</span>
<span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>mergeSort</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> left, <span class=&quot;ty&quot;>int</span> right) {
    <span class=&quot;kw&quot;>if</span>(left &amp;gt;= right) <span class=&quot;kw&quot;>return</span>;  <span class=&quot;cm&quot;>// BASE CASE: 0 or 1 element</span>
    <span class=&quot;ty&quot;>int</span> mid = left + (right - left) / <span class=&quot;nm&quot;>2</span>;
    <span class=&quot;fn&quot;>mergeSort</span>(arr, left, mid);       <span class=&quot;cm&quot;>// sort left half</span>
    <span class=&quot;fn&quot;>mergeSort</span>(arr, mid+<span class=&quot;nm&quot;>1</span>, right);    <span class=&quot;cm&quot;>// sort right half</span>
    <span class=&quot;fn&quot;>merge</span>(arr, left, mid, right);    <span class=&quot;cm&quot;>// merge sorted halves</span>
}

<span class=&quot;cm&quot;>// Call: mergeSort(arr, 0, n-1);</span></pre>

  <h2>Linear Search — O(n)</h2>
  <p>Check every element in order. Works on any list, sorted or unsorted.</p>
<pre><span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>linearSearch</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> n, <span class=&quot;ty&quot;>int</span> target) {
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n; i++) {
        <span class=&quot;kw&quot;>if</span>(arr[i] == target)
            <span class=&quot;kw&quot;>return</span> i;  <span class=&quot;cm&quot;>// return index</span>
    }
    <span class=&quot;kw&quot;>return</span> -<span class=&quot;nm&quot;>1</span>;  <span class=&quot;cm&quot;>// not found</span>
}</pre>

  <h2>Binary Search — O(log n)</h2>
  <p><strong>Requires sorted input.</strong> Repeatedly halve the search space by comparing target to the middle element.</p>
<pre><span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>binarySearch</span>(<span class=&quot;ty&quot;>int</span> arr[], <span class=&quot;ty&quot;>int</span> n, <span class=&quot;ty&quot;>int</span> target) {
    <span class=&quot;ty&quot;>int</span> low = <span class=&quot;nm&quot;>0</span>, high = n - <span class=&quot;nm&quot;>1</span>;
    <span class=&quot;kw&quot;>while</span>(low &amp;lt;= high) {
        <span class=&quot;ty&quot;>int</span> mid = low + (high - low) / <span class=&quot;nm&quot;>2</span>; <span class=&quot;cm&quot;>// avoids overflow</span>
        <span class=&quot;kw&quot;>if</span>(arr[mid] == target) <span class=&quot;kw&quot;>return</span> mid;     <span class=&quot;cm&quot;>// found</span>
        <span class=&quot;kw&quot;>else if</span>(arr[mid] &amp;lt; target) low = mid + <span class=&quot;nm&quot;>1</span>; <span class=&quot;cm&quot;>// search right</span>
        <span class=&quot;kw&quot;>else</span>                       high = mid - <span class=&quot;nm&quot;>1</span>; <span class=&quot;cm&quot;>// search left</span>
    }
    <span class=&quot;kw&quot;>return</span> -<span class=&quot;nm&quot;>1</span>; <span class=&quot;cm&quot;>// not found</span>
}</pre>

  <h2>Binary Search Trace: target=7 in [1, 3, 5, 7, 9, 11]</h2>
<pre>low=0, high=5 → mid=2 → arr[2]=5 < 7 → low=3
low=3, high=5 → mid=4 → arr[4]=9 > 7 → high=3
low=3, high=3 → mid=3 → arr[3]=7 == 7 → return 3 ✓</pre>

<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> shelf = <span class=&quot;nm&quot;>0</span>; shelf &amp;lt; s &amp;amp;&amp;amp; !found; shelf++) {
    <span class=&quot;cm&quot;>// Binary search on this shelf (sorted alphabetically)</span>

<span class=&quot;kw&quot;>if</span>(!found) cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Book not found&quot;</span> &amp;lt;&amp;lt; endl;</pre>

  <h2>2D Array Memory Layout (Row-Major)</h2>
  <p>In C++, 2D arrays are stored in <em>row-major</em> order — all elements of row 0, then row 1, etc. This affects cache performance.</p>
  <div class=&quot;callout info&quot;>
    <div class=&quot;callout-title&quot;>📐 Address Formula for 2D Array</div>
    For <code>arr[r][c]</code> with <code>COLS</code> columns:<br>
    <code>address = base + (row × COLS + col) × sizeof(T)</code>
  </div>

  <h2>Static 2D Array — Final Review Q12</h2>
<pre><span class=&quot;cm&quot;>// Q12: Static 5×6 char array, initialized to spaces</span>
<span class=&quot;kw&quot;>const int</span> ROWS = <span class=&quot;nm&quot;>5</span>, COLS = <span class=&quot;nm&quot;>6</span>;
<span class=&quot;ty&quot;>char</span> grid[ROWS][COLS];

<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; ROWS; i++)
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> j = <span class=&quot;nm&quot;>0</span>; j &amp;lt; COLS; j++)
        grid[i][j] = <span class=&quot;st&quot;>' '</span>;</pre>

  <h2>BFS — Breadth-First Search (Uses Queue)</h2>
  <p>BFS visits all neighbors at the current &quot;depth&quot; before going deeper. Think of it as exploring a maze level by level.</p>
<pre><span class=&quot;cm&quot;>// BFS on a 2D grid (r×c)
// Explores all reachable cells level-by-level</span>
<span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>bfs</span>(<span class=&quot;ty&quot;>int</span> grid[][], <span class=&quot;ty&quot;>int</span> rows, <span class=&quot;ty&quot;>int</span> cols, <span class=&quot;ty&quot;>int</span> startR, <span class=&quot;ty&quot;>int</span> startC) {
    <span class=&quot;ty&quot;>bool</span> visited[rows][cols] = {<span class=&quot;kw&quot;>false</span>};
    <span class=&quot;ty&quot;>queue</span>&amp;lt;pair&amp;lt;<span class=&quot;ty&quot;>int</span>,<span class=&quot;ty&quot;>int</span>&amp;gt;&amp;gt; q;  <span class=&quot;cm&quot;>// ← QUEUE for BFS</span>

    q.<span class=&quot;fn&quot;>push</span>({startR, startC});
    visited[startR][startC] = <span class=&quot;kw&quot;>true</span>;

    <span class=&quot;ty&quot;>int</span> dr[] = {-<span class=&quot;nm&quot;>1</span>, <span class=&quot;nm&quot;>1</span>, <span class=&quot;nm&quot;>0</span>, <span class=&quot;nm&quot;>0</span>}; <span class=&quot;cm&quot;>// up, down, left, right</span>
    <span class=&quot;ty&quot;>int</span> dc[] = {<span class=&quot;nm&quot;>0</span>, <span class=&quot;nm&quot;>0</span>, -<span class=&quot;nm&quot;>1</span>, <span class=&quot;nm&quot;>1</span>};

    <span class=&quot;kw&quot;>while</span>(!q.<span class=&quot;fn&quot;>empty</span>()) {
        <span class=&quot;kw&quot;>auto</span> [r, c] = q.<span class=&quot;fn&quot;>front</span>(); q.<span class=&quot;fn&quot;>pop</span>();
        cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Visit (&quot;</span> &amp;lt;&amp;lt; r &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;,&quot;</span> &amp;lt;&amp;lt; c &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;)\n&quot;</span>;

        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> d = <span class=&quot;nm&quot;>0</span>; d &amp;lt; <span class=&quot;nm&quot;>4</span>; d++) {
            <span class=&quot;ty&quot;>int</span> nr = r + dr[d], nc = c + dc[d];
            <span class=&quot;kw&quot;>if</span>(nr &amp;gt;= <span class=&quot;nm&quot;>0</span> &amp;amp;&amp;amp; nr &amp;lt; rows &amp;amp;&amp;amp; nc &amp;gt;= <span class=&quot;nm&quot;>0</span> &amp;amp;&amp;amp; nc &amp;lt; cols
               &amp;amp;&amp;amp; !visited[nr][nc]) {
                visited[nr][nc] = <span class=&quot;kw&quot;>true</span>;
                q.<span class=&quot;fn&quot;>push</span>({nr, nc});
            }
        }
    }
}</pre>

  <h2>DFS — Depth-First Search (Uses Stack)</h2>
<pre><span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>dfs</span>(<span class=&quot;ty&quot;>int</span> grid[][], <span class=&quot;ty&quot;>int</span> rows, <span class=&quot;ty&quot;>int</span> cols, <span class=&quot;ty&quot;>int</span> startR, <span class=&quot;ty&quot;>int</span> startC) {
    <span class=&quot;ty&quot;>bool</span> visited[rows][cols] = {<span class=&quot;kw&quot;>false</span>};
    <span class=&quot;ty&quot;>stack</span>&amp;lt;pair&amp;lt;<span class=&quot;ty&quot;>int</span>,<span class=&quot;ty&quot;>int</span>&amp;gt;&amp;gt; s;  <span class=&quot;cm&quot;>// ← STACK for DFS</span>

    s.<span class=&quot;fn&quot;>push</span>({startR, startC});

    <span class=&quot;kw&quot;>while</span>(!s.<span class=&quot;fn&quot;>empty</span>()) {
        <span class=&quot;kw&quot;>auto</span> [r, c] = s.<span class=&quot;fn&quot;>top</span>(); s.<span class=&quot;fn&quot;>pop</span>();
        <span class=&quot;kw&quot;>if</span>(visited[r][c]) <span class=&quot;kw&quot;>continue</span>;
        visited[r][c] = <span class=&quot;kw&quot;>true</span>;
        cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Visit (&quot;</span> &amp;lt;&amp;lt; r &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;,&quot;</span> &amp;lt;&amp;lt; c &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;)\n&quot;</span>;
        <span class=&quot;cm&quot;>// Push neighbors onto stack</span>
        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> d = <span class=&quot;nm&quot;>0</span>; d &amp;lt; <span class=&quot;nm&quot;>4</span>; d++) {
            <span class=&quot;ty&quot;>int</span> nr = r + dr[d], nc = c + dc[d];
            <span class=&quot;kw&quot;>if</span>(nr &amp;gt;= <span class=&quot;nm&quot;>0</span> &amp;amp;&amp;amp; nr &amp;lt; rows &amp;amp;&amp;amp; nc &amp;gt;= <span class=&quot;nm&quot;>0</span> &amp;amp;&amp;amp; nc &amp;lt; cols
               &amp;amp;&amp;amp; !visited[nr][nc])
                s.<span class=&quot;fn&quot;>push</span>({nr, nc});
        }
    }
}</pre>

  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th></th><th>BFS</th><th>DFS</th></tr></thead>
    <tbody>
      <tr><td><strong>Data structure</strong></td><td>Queue (FIFO)</td><td>Stack (LIFO)</td></tr>
      <tr><td><strong>Order</strong></td><td>Level-by-level</td><td>One path deep before backtracking</td></tr>
      <tr><td><strong>Finds shortest path?</strong></td><td>✅ Yes (unweighted)</td><td>❌ Not necessarily</td></tr>
      <tr><td><strong>Memory</strong></td><td>More (wide graphs)</td><td>Less (narrow graphs)</td></tr>
      <tr><td><strong>Use case</strong></td><td>Shortest path, level order</td><td>Exploring all paths, topological sort</td></tr>
    </tbody>
  </table>
  </div>

  <div class=&quot;callout danger&quot;>
    <div class=&quot;callout-title&quot;>🚨 #1 BFS/DFS Exam Trap</div>
    Students CONSTANTLY swap these. Use this memory aid:<br>
    <strong>B</strong>FS = <strong>B</strong>road = <strong>B</strong>ucket (Queue, FIFO)<br>
    <strong>D</strong>FS = <strong>D</strong>eep = <strong>D</strong>ive (Stack, LIFO)
  </div>

  <div class=&quot;cheat-sheet&quot;>

     SECTION 15: FUNCTION POINTERS
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s15&quot;>
  <div class=&quot;section-sub&quot;>Section 15</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>15</div>
    <div class=&quot;section-title&quot;>Function Pointers</div>
  </div>

  <p>A function pointer stores the address of a function, allowing you to pass functions as arguments — enabling generic, reusable algorithms.</p>

  <h2>Syntax</h2>
<pre><span class=&quot;cm&quot;>// Declare a function pointer type:</span>
<span class=&quot;cm&quot;>// ReturnType (*pointerName)(Param1Type, Param2Type)</span>
<span class=&quot;ty&quot;>bool</span> (*<span class=&quot;fn&quot;>compare</span>)(<span class=&quot;ty&quot;>int</span>, <span class=&quot;ty&quot;>int</span>);

<span class=&quot;cm&quot;>// Define comparison functions</span>
<span class=&quot;ty&quot;>bool</span> <span class=&quot;fn&quot;>ascending</span>(<span class=&quot;ty&quot;>int</span> a, <span class=&quot;ty&quot;>int</span> b)  { <span class=&quot;kw&quot;>return</span> a &amp;lt; b; }
<span class=&quot;ty&quot;>bool</span> <span class=&quot;fn&quot;>descending</span>(<span class=&quot;ty&quot;>int</span> a, <span class=&quot;ty&quot;>int</span> b) { <span class=&quot;kw&quot;>return</span> a &amp;gt; b; }
<span class=&quot;ty&quot;>bool</span> <span class=&quot;fn&quot;>evensFirst</span>(<span class=&quot;ty&quot;>int</span> a, <span class=&quot;ty&quot;>int</span> b) {
    <span class=&quot;kw&quot;>if</span>((a%<span class=&quot;nm&quot;>2</span>==<span class=&quot;nm&quot;>0</span>) != (b%<span class=&quot;nm&quot;>2</span>==<span class=&quot;nm&quot;>0</span>)) <span class=&quot;kw&quot;>return</span> a%<span class=&quot;nm&quot;>2</span> == <span class=&quot;nm&quot;>0</span>;
    <span class=&quot;kw&quot;>return</span> a &amp;lt; b;
}

<span class=&quot;cm&quot;>// Assign and call:</span>
compare = ascending;
<span class=&quot;kw&quot;>if</span>(<span class=&quot;fn&quot;>compare</span>(<span class=&quot;nm&quot;>3</span>, <span class=&quot;nm&quot;>5</span>)) { ... }  <span class=&quot;cm&quot;>// true</span></pre>

  <h2>Templated Generic Sort with Function Pointer</h2>
<pre><span class=&quot;cm&quot;>// A generic sort that works for any type, any comparison</span>
<span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>genericSort</span>(<span class=&quot;ty&quot;>T</span> arr[], <span class=&quot;ty&quot;>int</span> n, <span class=&quot;ty&quot;>bool</span>(*<span class=&quot;fn&quot;>cmp</span>)(<span class=&quot;ty&quot;>T</span>, <span class=&quot;ty&quot;>T</span>)) {
    <span class=&quot;cm&quot;>// Bubble sort using the comparison function pointer</span>
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n-<span class=&quot;nm&quot;>1</span>; i++) {
        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> j = <span class=&quot;nm&quot;>0</span>; j &amp;lt; n-i-<span class=&quot;nm&quot;>1</span>; j++) {
            <span class=&quot;kw&quot;>if</span>(!<span class=&quot;fn&quot;>cmp</span>(arr[j], arr[j+<span class=&quot;nm&quot;>1</span>])) <span class=&quot;cm&quot;>// cmp returns false = out of order</span>
                swap(arr[j], arr[j+<span class=&quot;nm&quot;>1</span>]);
        }
    }
}

<span class=&quot;cm&quot;>// Usage:</span>
<span class=&quot;ty&quot;>int</span> arr[] = {<span class=&quot;nm&quot;>5</span>, <span class=&quot;nm&quot;>2</span>, <span class=&quot;nm&quot;>8</span>, <span class=&quot;nm&quot;>1</span>};
<span class=&quot;fn&quot;>genericSort</span>(arr, <span class=&quot;nm&quot;>4</span>, ascending);   <span class=&quot;cm&quot;>// [1, 2, 5, 8]</span>
<span class=&quot;fn&quot;>genericSort</span>(arr, <span class=&quot;nm&quot;>4</span>, descending);  <span class=&quot;cm&quot;>// [8, 5, 2, 1]</span></pre>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ FUNCTION POINTER QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Declaration</strong><code>RetType (*name)(P1, P2);</code></div>
      <div class=&quot;cheat-item&quot;><strong>Assign</strong><code>name = functionName;</code> (no &amp;amp; needed)</div>

      <div class=&quot;cheat-item&quot;><strong>As parameter</strong><code>void f(bool(*cmp)(int,int))</code></div>
      <div class=&quot;cheat-item&quot;><strong>Templated</strong><code>template&amp;lt;T&amp;gt; void f(bool(*cmp)(T,T))</code></div>

    </div>

<!-- ══════════════════════════════════════════════════════
     SECTION 16: BIG-O ANALYSIS
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s16&quot;>
  <div class=&quot;section-sub&quot;>Section 16</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>16</div>
    <div class=&quot;section-title&quot;>Big-O Analysis</div>
  </div>

  <p>Big-O notation describes how an algorithm's runtime (or space) grows as the input size n grows. It captures the <em>dominant</em> term, ignoring constants and lower-order terms.</p>

  <h2>Complexity Order (Slowest to Fastest Growth)</h2>
<pre>O(1) &amp;lt; O(log n) &amp;lt; O(n) &amp;lt; O(n log n) &amp;lt; O(n²) &amp;lt; O(2ⁿ) &amp;lt; O(n!)</pre>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Name</th><th>Example</th><th>n=100</th><th>n=1000</th></tr></thead>
    <tbody>
      <tr><td><span class=&quot;complexity-badge o1&quot;>O(1)</span> Constant</td><td>Array index access</td><td>1</td><td>1</td></tr>
      <tr><td><span class=&quot;complexity-badge ologn&quot;>O(log n)</span> Logarithmic</td><td>Binary search</td><td>7</td><td>10</td></tr>
      <tr><td><span class=&quot;complexity-badge on&quot;>O(n)</span> Linear</td><td>Linear search, traversal</td><td>100</td><td>1,000</td></tr>
      <tr><td><span class=&quot;complexity-badge onlogn&quot;>O(n log n)</span> Linearithmic</td><td>Merge sort</td><td>700</td><td>10,000</td></tr>
      <tr><td><span class=&quot;complexity-badge on2&quot;>O(n²)</span> Quadratic</td><td>Selection/Insertion/Bubble sort</td><td>10,000</td><td>1,000,000</td></tr>
    </tbody>
  </table>
  </div>

  <h2>Analysis Rules</h2>
  <ol>
    <li><strong>Drop constants:</strong> O(5n) → O(n)</li>
    <li><strong>Drop lower-order terms:</strong> O(n² + n) → O(n²)</li>
    <li><strong>Sequential steps add:</strong> O(n) + O(n) = O(n)</li>
    <li><strong>Nested loops multiply:</strong> O(n) × O(n) = O(n²)</li>
    <li><strong>Halving per step → log n:</strong> binary search, divide-and-conquer base step</li>
  </ol>

  <h2>Worked Analysis Examples</h2>
<pre><span class=&quot;cm&quot;>// O(n²): two nested loops</span>
<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n; i++)        <span class=&quot;cm&quot;>// O(n)</span>
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> j = <span class=&quot;nm&quot;>0</span>; j &amp;lt; n; j++)    <span class=&quot;cm&quot;>// O(n) for each i</span>
        cout &amp;lt;&amp;lt; i * j;              <span class=&quot;cm&quot;>// Total: O(n²)</span>

<span class=&quot;cm&quot;>// O(n): two sequential loops</span>
<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n; i++) { ... }  <span class=&quot;cm&quot;>// O(n)</span>
<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; n; i++) { ... }  <span class=&quot;cm&quot;>// O(n)</span>
<span class=&quot;cm&quot;>// Total: O(2n) = O(n)</span>

<span class=&quot;cm&quot;>// O(log n): halving each iteration</span>
<span class=&quot;ty&quot;>int</span> i = n;
<span class=&quot;kw&quot;>while</span>(i &amp;gt; <span class=&quot;nm&quot;>1</span>) { i /= <span class=&quot;nm&quot;>2</span>; }  <span class=&quot;cm&quot;>// O(log n)</span></pre>

  <h2>Complete Data Structure Operations Table</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Structure</th><th>Access</th><th>Search</th><th>Insert (head)</th><th>Insert (tail)</th><th>Delete</th></tr></thead>
    <tbody>
      <tr><td>Static Array</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>
      <tr><td>Dynamic Array</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)*</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>
      <tr><td>Singly Linked</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>
      <tr><td>Doubly Linked</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span></td><td><span class=&quot;complexity-badge on&quot;>O(n)</span></td></tr>
      <tr><td>Stack (via LL)</td><td>N/A</td><td>N/A</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span> push</td><td>—</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span> pop</td></tr>
      <tr><td>Queue (via LL)</td><td>N/A</td><td>N/A</td><td><span class=&quot;complexity-badge o1&quot;>O(1)</span> deq.</td><td><span class=&quot;complexity-badge on&quot;>O(n)</span> enq.</td><td>—</td></tr>
    </tbody>
  </table>
  </div>
  <p><em>*amortized O(1) for vector push_back</em></p>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ BIG-O QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Drop constants</strong>O(3n) → O(n)</div>
      <div class=&quot;cheat-item&quot;><strong>Drop low terms</strong>O(n² + n) → O(n²)</div>
      <div class=&quot;cheat-item&quot;><strong>Nested loops</strong>O(n) × O(n) = O(n²)</div>
      <div class=&quot;cheat-item&quot;><strong>Sequential loops</strong>O(n) + O(n) = O(n)</div>
      <div class=&quot;cheat-item&quot;><strong>Divide by 2 each step</strong>→ O(log n)</div>
      <div class=&quot;cheat-item&quot;><strong>Order</strong>O(1) &amp;lt; O(log n) &amp;lt; O(n) &amp;lt; O(n log n) &amp;lt; O(n²)</div>

     SECTION 17: EXAM STRATEGIES

<div class=&quot;section&quot; id=&quot;s17&quot;>
  <div class=&quot;section-sub&quot;>Section 17</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>17</div>
    <div class=&quot;section-title&quot;>Exam Strategies &amp;amp; Final Tips</div>
  </div>

  <h2>Before The Exam</h2>
  <ul class=&quot;check&quot;>
    <li>Review the Top 10 Exam Traps from Section 0 the night before</li>
    <li>Hand-write all four sorting algorithms once from memory</li>
    <li>Write the complete Big Three template from memory</li>
    <li>Draw the Duck Pond UML diagram and write all classes from memory</li>
    <li>Write all five SOLID definitions in one sentence each</li>
    <li>Practice the binary search loop boundary conditions (low ≤ high, mid = low + (high-low)/2)</li>
  </ul>

  <h2>During The Exam — Approach</h2>
  <ol>
    <li><strong>Read all questions first</strong> (2 min). Identify which are quick-wins and which are hard.</li>
    <li><strong>Answer easy questions first</strong> — build confidence and secure points.</li>
    <li><strong>For code questions:</strong> outline logic in comments first, then fill in code.</li>
    <li><strong>For &quot;what does this print?&quot; questions:</strong> trace step-by-step on scratch paper.</li>
    <li><strong>Check headers included:</strong> &amp;lt;iostream&amp;gt;, &amp;lt;string&amp;gt;, &amp;lt;cmath&amp;gt;, &amp;lt;vector&amp;gt;, etc.</li>
    <li><strong>Check memory management:</strong> every <code>new</code> has a corresponding <code>delete[]</code>.</li>
  </ol>

  <h2>Code Writing Checklist</h2>
  <ul class=&quot;check&quot;>
    <li>Semicolons after every struct/class closing brace</li>
    <li>Virtual destructor if any virtual methods present</li>
    <li>Self-assignment check in copy assignment: <code>if(this == &amp;amp;rhs) return *this;</code></li>
    <li><code>override</code> keyword on all overriding methods</li>
    <li><code>return *this;</code> at end of copy assignment operator</li>
    <li><code>nullptr</code> check before dereferencing pointers</li>
    <li>Delete inner rows before outer pointer array for 2D</li>
    <li>Binary search only on sorted input — state this assumption</li>
    <li>Base case in ALL recursive functions — first thing, before recursive case</li>
    <li><code>using namespace std;</code> or proper <code>std::</code> prefixes</li>
  </ul>

  <h2>Last-Minute Review Priority</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Priority</th><th>Topic</th><th>Key Thing to Remember</th></tr></thead>
    <tbody>
      <tr><td>🔥 1</td><td>Runtime Polymorphism</td><td>virtual + override + virtual dtor + abstract (=0)</td></tr>
      <tr><td>🔥 2</td><td>SOLID</td><td>SRP/OCP/LSP/ISP/DIP + Composition > Inheritance</td></tr>
      <tr><td>🔥 3</td><td>Linked List operations</td><td>pushFront O(1), pushBack O(n), clear loop</td></tr>

      <tr><td>⚡ 7</td><td>Binary search</td><td>Sorted only, low/high/mid loop</td></tr>
      <tr><td>⚡ 8</td><td>Recursion</td><td>Base case first, then recursive call with smaller n</td></tr>

  <h2>Mental Tips</h2>
  <div class=&quot;callout good&quot;>
    <div class=&quot;callout-title&quot;>🧠 Test-Day Mindset</div>
    <ul>
      <li><strong>Start with what you know.</strong> Build momentum on easy questions.</li>
      <li><strong>If you're stuck,</strong> move on and come back. Your brain keeps working subconsciously.</li>
      <li><strong>Show your work</strong> on partial credit questions. Even wrong code can earn points for correct structure.</li>
      <li><strong>Don't leave blanks.</strong> Write what you know — definitions, comments, structure.</li>
      <li><strong>For trace questions,</strong> be systematic. Write out every variable value at each step.</li>
      <li><strong>Breathe.</strong> You've studied this material. Trust the preparation.</li>
    </ul>
  </div>

  <h2>Partial Credit Strategy</h2>
  <p>For a code question where you don't remember exact syntax:</p>

  <h3>Common Exam Traps &amp;amp; Pitfalls</h3>
  <table>

    <tr><td>Wrong sign on KVL voltage drops</td><td>Always define a consistent traversal direction. Voltage rises are negative in the sum; drops are positive.</td></tr>

<section id=&quot;t1&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num&quot;>Topic 1</span>
    <h2>Circuit Variables &amp;amp; Fundamentals</h2>
  </div>

  <h3>Core Concepts</h3>
  <p>Every circuit problem begins with two fundamental quantities: <strong>voltage</strong> and <strong>current</strong>.</p>

  <table>
    <tr><th>Quantity</th><th>Symbol</th><th>Unit</th><th>Physical meaning</th></tr>
    <tr><td>Charge</td><td>$q$</td><td>Coulomb (C)</td><td>Amount of electric charge</td></tr>
    <tr><td>Current</td><td>$i$</td><td>Ampere (A)</td><td>Rate of charge flow: $i = dq/dt$</td></tr>
    <tr><td>Voltage</td><td>$v$</td><td>Volt (V)</td><td>Energy per unit charge: $v = dw/dq$</td></tr>
    <tr><td>Power</td><td>$p$</td><td>Watt (W)</td><td>Rate of energy transfer: $p = vi$</td></tr>
    <tr><td>Energy</td><td>$w$</td><td>Joule (J)</td><td>$w = \int p\,dt$</td></tr>
  </table>

  <h3>Passive Sign Convention (PSC)</h3>
  <div class=&quot;callout info&quot;>
    <strong>The Golden Rule</strong>
    Current enters the <strong>positive</strong> terminal of an element. Under PSC, $p = +vi$ means the element <strong>absorbs</strong> (dissipates) power. If $p &amp;lt; 0$, the element <strong>delivers</strong> power to the circuit.
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Passive Sign Convention</div>
    $$p = vi \quad \text{(element absorbs power if } p > 0\text{)}$$
    $$p = -vi \quad \text{(source convention: element delivers power if } p > 0\text{)}$$
  </div>

  <h3>Circuit Vocabulary</h3>
  <ul style=&quot;padding-left:24px;line-height:2&quot;>
    <li><strong>Node:</strong> Point where 2 or more elements connect. All points connected by ideal wire = same node.</li>
    <li><strong>Essential node:</strong> Node where 3 or more elements connect.</li>
    <li><strong>Branch:</strong> A single circuit element between two nodes.</li>
    <li><strong>Loop:</strong> Any closed path in the circuit.</li>
    <li><strong>Mesh:</strong> A loop with no other loops inside it (smallest window of the circuit).</li>
  </ul>

  <h3>Worked Example 1 — Power Calculation</h3>
  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 1.1: Determine absorbed/delivered power <span class=&quot;diff&quot;>Easy</span></div>
    <div class=&quot;example-body&quot;>
      <p>A circuit element has voltage $v = 5\,\text{V}$ (+ at top) and current $i = 3\,\text{A}$ flowing <em>into</em> the + terminal.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Current enters + terminal → this is the passive sign convention.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$p = vi = (5)(3) = 15\,\text{W}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$p > 0$ → element <strong>absorbs</strong> 15 W.</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 1.2: Mixed polarities <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>A source has $v = 12\,\text{V}$ and current $i = 2\,\text{A}$ flowing <em>out of</em> the + terminal. Is it delivering or absorbing power?</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Current leaves the + terminal → this violates PSC for a passive element. For a source, this is the active sign convention.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Under PSC: assign $i$ as entering $+$ terminal = $-2\,\text{A}$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$p = vi = (12)(-2) = -24\,\text{W}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$p &amp;lt; 0$ → element <strong>delivers</strong> 24 W to the rest of the circuit.</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 1 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Current</div>$i = dq/dt$ [A]</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Voltage</div>$v = dw/dq$ [V]</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Power</div>$p = vi$ [W] (+absorb, −deliver)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Energy</div>$w = \int p\,dt$ [J]</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>PSC</div>Current IN to + terminal</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Conservation</div>$\sum p_{delivered} = \sum p_{absorbed}$</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 2 ══════════════════════════ -->
<section id=&quot;t2&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t2&quot;>Topic 2</span>
    <h2>Circuit Elements &amp;amp; Ohm's Law</h2>
  </div>

  <h3>Independent Sources</h3>
  <p>An <strong>independent voltage source</strong> maintains a specified voltage regardless of current. An <strong>independent current source</strong> maintains a specified current regardless of voltage. They are the &quot;engines&quot; of circuits.</p>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ Invalid Source Connections</strong>
    <ul style=&quot;padding-left:20px&quot;>
      <li>Two voltage sources in parallel with <em>different</em> values → contradiction (violates KVL).</li>
      <li>Two current sources in series with <em>different</em> values → contradiction (violates KCL).</li>
      <li>Short-circuiting an ideal voltage source → infinite current.</li>
    </ul>
  </div>

  <h3>Dependent (Controlled) Sources</h3>
  <p>Dependent sources produce a voltage or current that is proportional to some other voltage or current in the circuit. They are represented by a <strong>diamond (◇) shape</strong>.</p>
  <table>
    <tr><th>Type</th><th>Symbol</th><th>Equation</th></tr>
    <tr><td>VCVS (voltage-controlled voltage source)</td><td>◇</td><td>$v_s = \mu v_x$</td></tr>
    <tr><td>CCVS (current-controlled voltage source)</td><td>◇</td><td>$v_s = r\, i_x$</td></tr>
    <tr><td>VCCS (voltage-controlled current source)</td><td>◇</td><td>$i_s = g\, v_x$</td></tr>
    <tr><td>CCCS (current-controlled current source)</td><td>◇</td><td>$i_s = \beta\, i_x$</td></tr>
  </table>
  <div class=&quot;callout danger&quot;>
    <strong>⚠ Critical Rule</strong>
    Dependent sources are <strong>NEVER deactivated</strong> during Thévenin/Norton analysis (Technique 2) or superposition. Only independent sources are deactivated.
  </div>

  <h3>Ohm's Law &amp;amp; Resistors</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Ohm's Law (PSC)</div>
    $$v = iR \quad \Leftrightarrow \quad i = \frac{v}{R} = Gv$$
    $$\text{Conductance: } G = \frac{1}{R} \text{ [Siemens, S]}$$
    $$\text{Power dissipated in resistor: } p = vi = i^2R = \frac{v^2}{R} \geq 0$$
  </div>

  <div class=&quot;callout tip&quot;>
    <strong>💡 Physical intuition</strong>
    A resistor always <em>dissipates</em> power — it can never generate it. So $p_R \geq 0$ always. If you compute negative power for a resistor, you have a sign error.
  </div>

  <h3>Worked Example — Dependent Source Circuit</h3>
  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 2.1: Find power of voltage source with dependent element <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>A circuit has a 25 V independent source, a 5 Ω resistor, and a dependent current source $i_s = \alpha v_g$ where $v_g$ is the voltage across the 5 Ω resistor. The current out of the 25 V source is $i_g = 5\,\text{mA}$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>By PSC for the 25 V source (current out of +): $p_{source} = -(25)(0.005) = -0.125\,\text{W}$. The source delivers 0.125 W.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Find $v_g$ using Ohm's: $v_g = i_g \cdot R = 0.005 \times 5 = 25\,\text{mV}$. Wait — but this is a more complex circuit; let KCL give us the remaining unknowns.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Key check: all power in = all power out (conservation of energy).</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 2 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Ohm's Law</div>$v = iR$; $i = v/R$; $G = 1/R$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Power (resistor)</div>$p = i^2R = v^2/R \geq 0$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Ind. V-source</div>$v = $ const regardless of $i$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Ind. I-source</div>$i = $ const regardless of $v$</div>
