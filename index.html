  <div class=&quot;oc-section teal&quot; id=&quot;oc15&quot;>
    <div class=&quot;oc-number&quot;>Outcome 15</div>
    <h2>Eigenvalues, Eigenvectors &amp;amp; Diagonalization</h2>
    <p class=&quot;oc-goal&quot;>Find eigenvalues and eigenvectors using the characteristic equation. Determine if a matrix is diagonalizable and diagonalize it.</p>

    <h3>Definitions</h3>
    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Eigenvalue / Eigenvector</div>
      <p>$\lambda$ is an eigenvalue of $A$ and $\mathbf{v} \ne \mathbf{0}$ is a corresponding eigenvector if:</p>
      <p style=&quot;text-align:center;&quot;>$A\mathbf{v} = \lambda\mathbf{v}$</p>
      <p>Equivalently: $(A - \lambda I)\mathbf{v} = \mathbf{0}$ has a <em>non-trivial</em> solution, i.e., $A - \lambda I$ is <strong>not invertible</strong>.</p>
    </div>

    <h3>Finding Eigenvalues: The Characteristic Equation</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li><strong>Set up:</strong> $\det(A - \lambda I) = 0$. This is the characteristic polynomial.</li>
        <li><strong>Expand and solve</strong> for $\lambda$. Each solution is an eigenvalue.</li>
        <li><strong>Algebraic multiplicity:</strong> how many times $\lambda$ appears as a root.</li>
      </ol>
    </div>

    <div class=&quot;insight&quot;>
      <strong>Triangular matrix shortcut:</strong> If $A$ is triangular, the eigenvalues are the diagonal entries (Thm 1, Ch. 5). No computation needed!
    </div>

    <h3>Finding Eigenvectors (Eigenspaces)</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li>For each eigenvalue $\lambda$, form $A - \lambda I$.</li>
        <li>Row reduce $A - \lambda I$ to find $\operatorname{Nul}(A - \lambda I)$.</li>
        <li>The eigenspace $= \operatorname{Nul}(A - \lambda I)$. Write its basis.</li>
        <li><strong>Geometric multiplicity</strong> = $\dim(\operatorname{Nul}(A - \lambda I))$.</li>
      </ol>
    </div>

    <h3>Diagonalizability Decision Tree</h3>
    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Diagonalization Theorem (Thm 5, Ch. 5)</div>
      <p>$A$ ($n \times n$) is diagonalizable iff it has $n$ linearly independent eigenvectors.</p>
      <p>If so: $A = PDP^{-1}$ where columns of $P$ are eigenvectors and $D$ has corresponding eigenvalues on its diagonal.</p>
    </div>

    <p><strong>When does diagonalizability fail?</strong></p>
    <ul>
      <li>If algebraic multiplicity of some $\lambda > $ geometric multiplicity of $\lambda$.</li>
      <li>Example: $\begin{pmatrix}2&amp;1\\0&amp;2\end{pmatrix}$ has $\lambda = 2$ twice (alg. mult. 2) but eigenspace has dim 1 (geom. mult. 1) → NOT diagonalizable.</li>
    </ul>
    <div class=&quot;insight&quot;>
      <strong>Easy diagonalizability check:</strong> If $A$ ($n \times n$) has $n$ <em>distinct</em> eigenvalues, it is automatically diagonalizable (Thm 6, Ch. 5). No further work needed.
    </div>

    <h3>Practice Problems</h3>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 15.1 — From Your Assessment</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Let $A = \begin{pmatrix}1&amp;2&amp;2\\0&amp;3&amp;1\\0&amp;-1&amp;1\end{pmatrix}$. $A$ has eigenvalues $1, 2, 2$.</p>
        <p>(a) Verify that $\lambda = 2$ is an eigenvalue.</p>
        <p>(b) Compute a basis for the eigenspace corresponding to $\lambda = 2$.</p>
        <p>(c) Given that an eigenvector for the smallest eigenvalue $\lambda=1$ is $\begin{pmatrix}1\\0\\0\end{pmatrix}$, is $A$ diagonalizable? If so, give $P$ and $D$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>(a) Verify $\lambda = 2$:</strong><br>
        Compute $\det(A - 2I)$:</p>
        <p>$$A - 2I = \begin{pmatrix}-1&amp;2&amp;2\\0&amp;1&amp;1\\0&amp;-1&amp;-1\end{pmatrix}$$</p>
        <p>Row 2 and Row 3 are negatives of each other → after row operations row 3 becomes $\mathbf{0}$, so the matrix is singular → $\det = 0$ ✓. So $\lambda = 2$ is an eigenvalue.</p>

        <p><strong>(b) Eigenspace for $\lambda = 2$:</strong><br>
        Row reduce $A - 2I$:</p>
        <p>$$\begin{pmatrix}-1&amp;2&amp;2\\0&amp;1&amp;1\\0&amp;-1&amp;-1\end{pmatrix} \sim \begin{pmatrix}1&amp;0&amp;0\\0&amp;1&amp;1\\0&amp;0&amp;0\end{pmatrix}$$</p>
        <p>Free variable: $x_3 = t$. Back-substitute: $x_2 = -t$, $x_1 = 0$.</p>
        <p>Basis for eigenspace: $\left\{\begin{pmatrix}0\\-1\\1\end{pmatrix}\right\}$. Geometric multiplicity = 1.</p>

        <p><strong>(c) Diagonalizability:</strong><br>
        $\lambda = 2$ has algebraic multiplicity 2 but geometric multiplicity 1. Since $2 > 1$, <strong>$A$ is NOT diagonalizable</strong>.</p>
        <p>We cannot find 3 linearly independent eigenvectors (only 2: one for $\lambda=1$, one for $\lambda=2$).</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 15.2 — Full Diagonalization</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Find eigenvalues, eigenvectors, and diagonalize $B = \begin{pmatrix}-5&amp;2\\-7&amp;4\end{pmatrix}$ (write $B = PDP^{-1}$; you do not need $P^{-1}$).</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Characteristic equation:</strong></p>
        <p>$$\det(B - \lambda I) = (-5-\lambda)(4-\lambda) - (2)(-7) = \lambda^2 + \lambda - 6 = (\lambda-2)(\lambda+3) = 0$$</p>
        <p>Eigenvalues: $\lambda_1 = 2$, $\lambda_2 = -3$. Two distinct eigenvalues → $B$ is diagonalizable.</p>
        <p><strong>Eigenvector for $\lambda = 2$:</strong> Row reduce $B - 2I = \begin{pmatrix}-7&amp;2\\-7&amp;2\end{pmatrix} \sim \begin{pmatrix}7&amp;-2\\0&amp;0\end{pmatrix}$. Free variable $x_2 = t$, $x_1 = \frac{2}{7}t$. Take $t=7$: $v_1 = \begin{pmatrix}2\\7\end{pmatrix}$.</p>
        <p><strong>Eigenvector for $\lambda = -3$:</strong> Row reduce $B+3I = \begin{pmatrix}-2&amp;2\\-7&amp;7\end{pmatrix} \sim \begin{pmatrix}1&amp;-1\\0&amp;0\end{pmatrix}$. Free variable $x_2=t$, $x_1=t$. Take $t=1$: $v_2 = \begin{pmatrix}1\\1\end{pmatrix}$.</p>
        <p>$$P = \begin{pmatrix}2&amp;1\\7&amp;1\end{pmatrix}, \quad D = \begin{pmatrix}2&amp;0\\0&amp;-3\end{pmatrix}$$</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 15.3 — Extra Problem</span>
        <span class=&quot;diff hard&quot;>HARD</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>$A$ has eigenvalues $5$ and $10$. A basis for $\operatorname{Nul}(A - 5I)$ is $\left\{\begin{pmatrix}2\\-2\\4\end{pmatrix}\right\}$. After row-reducing $(A - 10I)$, you find the free variable is $x_3$. A basis for $\operatorname{Nul}(A-10I)$ is $\left\{\begin{pmatrix}1\\3\\0\end{pmatrix}\right\}$. Write $P$ and $D$ such that $A = PDP^{-1}$. What is the size of $A$?</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>Each eigenspace has basis of 1 vector, so we have 2 linearly independent eigenvectors total. Since $A$ is diagonalizable with exactly 2 eigenvectors, $A$ must be $2 \times 2$... but that contradicts 3-component vectors. This means the eigenvalue $10$ must have algebraic multiplicity $\ge 2$ and geom. mult. = 1, or $A$ is $3\times3$ with repeated eigenvalues.</p>
        <p>Actually with 3-component eigenvectors, $A$ is $3 \times 3$. It has 2 total lin. indep. eigenvectors — not enough for diagonalizability (need 3). So $A$ is <strong>NOT diagonalizable</strong> in general.</p>
        <p>However, if we are told $A$ has eigenvalues 5 and 10 and a 3rd linearly independent eigenvector exists, then $P = \begin{pmatrix}2&amp;\cdots&amp;1\\-2&amp;\cdots&amp;3\\4&amp;\cdots&amp;0\end{pmatrix}$ and $D = \begin{pmatrix}5&amp;0&amp;0\\0&amp;\cdots&amp;0\\0&amp;0&amp;10\end{pmatrix}$.</p>
      </div>
    </div>

  </div><!-- /OC15 -->

  ════════════════════════════════════════════════════════ -->
  <div class=&quot;oc-section&quot; id=&quot;oc16&quot;>
    <div class=&quot;oc-number&quot;>Outcome 16</div>
    <h2>Properties of Related Matrices</h2>
    <p class=&quot;oc-goal&quot;>Use eigenvalue definitions to determine eigenvalues/eigenvectors of related matrices ($f(A)$, $A^k$, $A^{-1}$, etc.) and interpret eigenvalue relationships geometrically.</p>

    <h3>The Core Engine: The Eigenvalue Algebra</h3>
    <p>This outcome is entirely about <strong>leveraging</strong> the equation $A\mathbf{v} = \lambda\mathbf{v}$ to find eigenvalues of functions of $A$ — without ever recomputing a determinant.</p>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Eigenvalue Rules for Related Matrices</div>
      <p>If $A\mathbf{v} = \lambda\mathbf{v}$ ($\lambda$ is eigenvalue, $\mathbf{v}$ is eigenvector), then:</p>
      <table>
        <tr><th>Matrix</th><th>Eigenvalue</th><th>Eigenvector</th></tr>
        <tr><td>$A^k$</td><td>$\lambda^k$</td><td>$\mathbf{v}$ (same)</td></tr>
        <tr><td>$cA$</td><td>$c\lambda$</td><td>$\mathbf{v}$ (same)</td></tr>
        <tr><td>$A + cI$</td><td>$\lambda + c$</td><td>$\mathbf{v}$ (same)</td></tr>
        <tr><td>$A^{-1}$ (if exists)</td><td>$1/\lambda$</td><td>$\mathbf{v}$ (same)</td></tr>
        <tr><td>$p(A)$ (polynomial in $A$)</td><td>$p(\lambda)$</td><td>$\mathbf{v}$ (same)</td></tr>
      </table>
      <p style=&quot;margin-top:10px;font-size:13.5px;font-style:italic;&quot;>For all of these, the eigenvector $\mathbf{v}$ is always the same. Only the eigenvalue changes!</p>
    </div>

    <h3>The Similarity Rule (Key for this Outcome)</h3>
    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Similar Matrices Share Eigenvalues</div>
      <p>If $A = PBP^{-1}$, then $A$ and $B$ have the <strong>same eigenvalues</strong>. The eigenvectors of $A$ are $P$ times the eigenvectors of $B$.</p>
      <p>Specifically: if $B\mathbf{u} = \lambda\mathbf{u}$, then $A(P\mathbf{u}) = \lambda(P\mathbf{u})$.</p>
    </div>

    <div class=&quot;insight&quot;>
      <strong>How to find eigenvalues of $A$ when $A = PBP^{-1}$ and $B$ is diagonal:</strong> The eigenvalues of $A$ are exactly the diagonal entries of $B$, since $B$ is already diagonal (its eigenvalues are its diagonal entries).
    </div>

    <h3>Step-by-Step: Polynomial in $A$</h3>
    <p>Given: eigenvalue $\lambda$ of $A$. Find the eigenvalue of $f(A) = 2A^3 - I$.</p>
    <div class=&quot;steps&quot;>
      <ol>
        <li>$A\mathbf{v} = \lambda\mathbf{v}$ is given.</li>
        <li>Compute $A^3\mathbf{v} = \lambda^3\mathbf{v}$.</li>
        <li>Compute $(2A^3)\mathbf{v} = 2\lambda^3\mathbf{v}$.</li>
        <li>Compute $(2A^3 - I)\mathbf{v} = 2\lambda^3\mathbf{v} - \mathbf{v} = (2\lambda^3 - 1)\mathbf{v}$.</li>
        <li>So the eigenvalue of $f(A) = 2A^3 - I$ is $f(\lambda) = 2\lambda^3 - 1$, with the <em>same eigenvector</em> $\mathbf{v}$.</li>
      </ol>
    </div>

    <h3>Practice Problems</h3>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 16.1 — From Your Assessment</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>For $A$ a matrix with eigenvalue $\lambda = 2$ and corresponding eigenvector $\mathbf{v} = \begin{pmatrix}-1\\\sqrt{3}\\5\end{pmatrix}$, determine an eigenvalue-eigenvector pair for $2A^3 - I$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>Since $A\mathbf{v} = 2\mathbf{v}$:</p>
        <p>$(2A^3 - I)\mathbf{v} = 2A^3\mathbf{v} - I\mathbf{v} = 2(2^3)\mathbf{v} - \mathbf{v} = 16\mathbf{v} - \mathbf{v} = 15\mathbf{v}$</p>
        <p>Therefore: <strong>eigenvalue $= 15$</strong>, eigenvector $= \begin{pmatrix}-1\\\sqrt{3}\\5\end{pmatrix}$ (unchanged).</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 16.2 — From Your Practice Problem</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Suppose $A = PBP^{-1}$ where $P$ is some invertible matrix and $B = \begin{pmatrix}5&amp;0&amp;0\\0&amp;2&amp;0\\0&amp;0&amp;6\end{pmatrix}$. Find an eigenvalue of $A^2 + A$. Briefly justify your answer.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>Since $A = PBP^{-1}$, $A$ and $B$ are similar, so they share the same eigenvalues. The eigenvalues of $B$ (diagonal) are $5, 2, 6$.</p>
        <p>So the eigenvalues of $A$ are $5, 2, 6$.</p>
        <p>Using the polynomial rule, if $\lambda$ is an eigenvalue of $A$ then $\lambda^2 + \lambda$ is an eigenvalue of $A^2 + A$:</p>
        <ul>
          <li>$\lambda = 5$: $25 + 5 = 30$</li>
          <li>$\lambda = 2$: $4 + 2 = 6$</li>
          <li>$\lambda = 6$: $36 + 6 = 42$</li>
        </ul>
        <p>Any of $\{30, 6, 42\}$ is a valid eigenvalue of $A^2 + A$.</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 16.3 — Invertibility via Eigenvalues</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Suppose $A$ has eigenvalues $3, 0, -1$. Is $A$ invertible? Is $A + I$ invertible?</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>$A$ invertible?</strong> By the IMT, $A$ is invertible iff $0$ is NOT an eigenvalue. Since $0$ IS an eigenvalue, <strong>$A$ is not invertible</strong>.</p>
        <p><strong>$A + I$ invertible?</strong> The eigenvalues of $A + I$ are $\{3+1, 0+1, -1+1\} = \{4, 1, 0\}$. Since $0$ is still an eigenvalue, <strong>$A + I$ is also not invertible</strong>.</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 16.4 — Geometric Interpretation</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Suppose $A$ is a $2 \times 2$ matrix with eigenvalue $\lambda = 1$ and eigenvector $\mathbf{v} = \begin{pmatrix}1\\0\end{pmatrix}$, and eigenvalue $\lambda = -1$ and eigenvector $\mathbf{w} = \begin{pmatrix}0\\1\end{pmatrix}$. Describe geometrically what $A$ does to vectors in $\mathbb{R}^2$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>$A\mathbf{v} = \mathbf{v}$ (the $x$-axis direction is unchanged) and $A\mathbf{w} = -\mathbf{w}$ (the $y$-axis direction is flipped).</p>
        <p>$A$ performs a <strong>reflection across the $x$-axis</strong>. Geometrically: eigenvalue 1 = direction is preserved; eigenvalue −1 = direction is reversed; eigenvalue with $|\lambda|>1$ = stretching; $|\lambda|<1$ = compression.</p>
      </div>
    </div>

  </div><!-- /OC16 -->

  <div class=&quot;oc-section gold&quot; id=&quot;oc18&quot;>
    <div class=&quot;oc-number&quot;>Outcome 18</div>
    <h2>Norms &amp;amp; Inner Products</h2>
    <p class=&quot;oc-goal&quot;>Compute norms and inner products of vectors, relate the norm to an inner product, and determine properties of norms and inner products.</p>

    <h3>Definitions &amp;amp; Formulas</h3>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Dot Product (Inner Product on ℝⁿ)</div>
      <p>$$\mathbf{u} \cdot \mathbf{v} = u_1 v_1 + u_2 v_2 + \cdots + u_n v_n = \mathbf{u}^T \mathbf{v}$$</p>
    </div>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Norm</div>
      <p>$$\|\mathbf{u}\| = \sqrt{\mathbf{u} \cdot \mathbf{u}} = \sqrt{u_1^2 + u_2^2 + \cdots + u_n^2}$$</p>
      <p>Important: $\|\mathbf{u}\|^2 = \mathbf{u} \cdot \mathbf{u}$</p>
    </div>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Orthogonality</div>
      <p>$\mathbf{u} \perp \mathbf{v}$ (orthogonal) iff $\mathbf{u} \cdot \mathbf{v} = 0$.</p>
    </div>

    <h3>The Key Algebraic Identities — Know These Cold</h3>
    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Expanding Norms of Sums</div>
      <p>$$\|\mathbf{u} + \mathbf{w}\|^2 = \|\mathbf{u}\|^2 + 2(\mathbf{u} \cdot \mathbf{w}) + \|\mathbf{w}\|^2$$</p>
      <p>$$\|\mathbf{u} - \mathbf{w}\|^2 = \|\mathbf{u}\|^2 - 2(\mathbf{u} \cdot \mathbf{w}) + \|\mathbf{w}\|^2$$$$\|\mathbf{u} + \mathbf{v}\|^2 + \|\mathbf{u} - \mathbf{v}\|^2 = 2\|\mathbf{u}\|^2 + 2\|\mathbf{v}\|^2 \quad \text{(Parallelogram Law)}$$</p>
    </div>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Cauchy-Schwarz &amp;amp; Parallel Vectors</div>
      <p>$$|\mathbf{u} \cdot \mathbf{v}| \le \|\mathbf{u}\|\|\mathbf{v}\|$$</p>
      <p>Equality holds iff $\mathbf{u}$ and $\mathbf{v}$ are <strong>parallel</strong> (one is a scalar multiple of the other).</p>
      <p>If $\mathbf{u} = c\mathbf{v}$ with $c > 0$: $\mathbf{u} \cdot \mathbf{v} = +\|\mathbf{u}\|\|\mathbf{v}\|$.</p>
      <p>If $\mathbf{u} = c\mathbf{v}$ with $c < 0$: $\mathbf{u} \cdot \mathbf{v} = -\|\mathbf{u}\|\|\mathbf{v}\|$.</p>
    </div>

    <h3>Step-by-Step: $\|\mathbf{u} + \mathbf{w}\|$ given a unit vector</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li>Identify: $\mathbf{w}$ is a unit vector, so $\|\mathbf{w}\| = 1 \Rightarrow \|\mathbf{w}\|^2 = 1$.</li>
        <li>Expand: $\|\mathbf{u}+\mathbf{w}\|^2 = \|\mathbf{u}\|^2 + 2(\mathbf{u}\cdot\mathbf{w}) + \|\mathbf{w}\|^2$.</li>
        <li>Plug in known values of $\|\mathbf{u}\|^2$ and $\mathbf{u}\cdot\mathbf{w}$.</li>
        <li>Take the square root.</li>
      </ol>
    </div>

    <h3>Practice Problems</h3>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 18.1 — From Your Assessment</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Given that $\mathbf{u}, \mathbf{v} \in \mathbb{R}^n$ are <strong>parallel</strong> vectors with $\|\mathbf{u}\| = \|\mathbf{v}\| = 5$, determine all possible values of $\mathbf{u} \cdot \mathbf{v}$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>Parallel means $\mathbf{u} = c\mathbf{v}$ for some scalar $c \ne 0$.</p>
        <p>$\mathbf{u} \cdot \mathbf{v} = \|\mathbf{u}\|\|\mathbf{v}\|\cos\theta$ where $\theta$ is the angle between them.</p>
        <p>Parallel means $\theta = 0°$ or $\theta = 180°$, so $\cos\theta = \pm 1$.</p>
        <p>Therefore: $\mathbf{u} \cdot \mathbf{v} = \pm (5)(5) = \pm 25$.</p>
        <p><strong>Possible values: $25$ or $-25$.</strong></p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 18.2 — From Your Practice Problem</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Suppose $\mathbf{u} = \begin{pmatrix}2\\-1\\1\end{pmatrix}$ and $\mathbf{v} = \begin{pmatrix}1\\-1\\-3\end{pmatrix}$.</p>
        <ol>
          <li>Are $\mathbf{u}$ and $\mathbf{v}$ orthogonal? Justify.</li>
          <li>Suppose $\mathbf{w}$ is a unit vector with $\mathbf{u} \cdot \mathbf{w} = \frac{1}{2}$. Compute $\|\mathbf{u} + \mathbf{w}\|$.</li>
        </ol>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>1. Orthogonality:</strong></p>
        <p>$\mathbf{u} \cdot \mathbf{v} = (2)(1) + (-1)(-1) + (1)(-3) = 2 + 1 - 3 = 0$.</p>
        <p>Since $\mathbf{u} \cdot \mathbf{v} = 0$, yes, $\mathbf{u}$ and $\mathbf{v}$ are <strong>orthogonal</strong>.</p>
        <p><strong>2. Compute $\|\mathbf{u}+\mathbf{w}\|$:</strong></p>
        <p>First: $\|\mathbf{u}\|^2 = 4 + 1 + 1 = 6$.</p>
        <p>$\mathbf{w}$ is a unit vector so $\|\mathbf{w}\|^2 = 1$.</p>
        <p>$\|\mathbf{u}+\mathbf{w}\|^2 = \|\mathbf{u}\|^2 + 2(\mathbf{u}\cdot\mathbf{w}) + \|\mathbf{w}\|^2 = 6 + 2\left(\frac{1}{2}\right) + 1 = 6 + 1 + 1 = 8$.</p>
        <p>$\|\mathbf{u}+\mathbf{w}\| = \sqrt{8} = 2\sqrt{2}$.</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 18.3 — Norm Algebra</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Let $\mathbf{u}$ and $\mathbf{v}$ be orthogonal vectors with $\|\mathbf{u}\| = 3$ and $\|\mathbf{v}\| = 4$. Find $\|\mathbf{u} + \mathbf{v}\|$ and $\|\mathbf{u} - \mathbf{v}\|$. Interpret geometrically.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>Since $\mathbf{u} \perp \mathbf{v}$, $\mathbf{u} \cdot \mathbf{v} = 0$.</p>
        <p>$\|\mathbf{u}+\mathbf{v}\|^2 = 9 + 0 + 16 = 25 \Rightarrow \|\mathbf{u}+\mathbf{v}\| = 5$.</p>
        <p>$\|\mathbf{u}-\mathbf{v}\|^2 = 9 - 0 + 16 = 25 \Rightarrow \|\mathbf{u}-\mathbf{v}\| = 5$.</p>
        <p>This is the Pythagorean Theorem: a right triangle with legs 3 and 4 has hypotenuse 5. ✓</p>
      </div>
    </div>

  </div><!-- /OC18 -->

  <div class=&quot;oc-section teal&quot; id=&quot;oc20&quot;>
    <div class=&quot;oc-number&quot;>Outcome 20</div>
    <h2>Gram-Schmidt Process</h2>
    <p class=&quot;oc-goal&quot;>Create an orthonormal basis from a given basis using the Gram-Schmidt process.</p>

    <h3>The Process</h3>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Gram-Schmidt (Thm 11, Ch. 6)</div>
      <p>Given a basis $\{x_1, x_2, \ldots, x_p\}$ for a subspace $W$, define:</p>
      <p>$$v_1 = x_1$$</p>
      <p>$$v_2 = x_2 - \frac{x_2 \cdot v_1}{v_1 \cdot v_1}v_1$$</p>
      <p>$$v_3 = x_3 - \frac{x_3 \cdot v_1}{v_1 \cdot v_1}v_1 - \frac{x_3 \cdot v_2}{v_2 \cdot v_2}v_2$$</p>
      <p>$$\vdots$$</p>
      <p>Then $\{v_1, v_2, \ldots, v_p\}$ is an <strong>orthogonal</strong> basis for $W$.</p>
      <p>To get an <strong>orthonormal</strong> basis: divide each by its norm: $u_k = \dfrac{v_k}{\|v_k\|}$.</p>
    </div>

    <h3>Step-by-Step Gram-Schmidt</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li>Set $v_1 = x_1$. (First vector is unchanged.)</li>
        <li>Compute $v_2 = x_2 - \text{proj}_{v_1} x_2$ where $\text{proj}_{v_1} x_2 = \frac{x_2 \cdot v_1}{v_1 \cdot v_1}v_1$.</li>
        <li>Verify $v_1 \cdot v_2 = 0$ as a check.</li>
        <li>If 3 vectors: $v_3 = x_3 - \frac{x_3 \cdot v_1}{v_1 \cdot v_1}v_1 - \frac{x_3 \cdot v_2}{v_2 \cdot v_2}v_2$.</li>
        <li>To normalize: $u_k = v_k / \|v_k\|$.</li>
      </ol>
    </div>

    <div class=&quot;insight&quot;>
      <strong>Geometric interpretation:</strong> At each step, $v_k$ is $x_k$ with its component in the direction of all previous $v_i$'s &quot;subtracted off&quot; — leaving only what's genuinely new/orthogonal.
    </div>

    <h3>Practice Problems</h3>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 20.1 — From Your Practice Problem</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Use the Gram-Schmidt process to find an orthogonal basis for the subspace $W$ with basis:
        $$x_1 = \begin{pmatrix}5\\3\\2\\-5\end{pmatrix}, \quad x_2 = \begin{pmatrix}-1\\-6\\-1\\1\end{pmatrix}$$</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Step 1:</strong> $v_1 = x_1 = \begin{pmatrix}5\\3\\2\\-5\end{pmatrix}$</p>
        <p><strong>Step 2:</strong> Compute the projection coefficient:</p>
        <p>$x_2 \cdot v_1 = (-1)(5) + (-6)(3) + (-1)(2) + (1)(-5) = -5 - 18 - 2 - 5 = -30$</p>
        <p>$v_1 \cdot v_1 = 25 + 9 + 4 + 25 = 63$</p>
        <p>$$v_2 = x_2 - \frac{-30}{63}v_1 = x_2 + \frac{10}{21}v_1$$</p>
        <p>$$v_2 = \begin{pmatrix}-1\\-6\\-1\\1\end{pmatrix} + \frac{10}{21}\begin{pmatrix}5\\3\\2\\-5\end{pmatrix} = \begin{pmatrix}-1+50/21\\-6+30/21\\-1+20/21\\1-50/21\end{pmatrix} = \begin{pmatrix}29/21\\-96/21\\-1/21\\-29/21\end{pmatrix}$$</p>
        <p>Multiply by 21: $v_2 = \begin{pmatrix}29\\-96\\-1\\-29\end{pmatrix}$ (scaling doesn't affect orthogonality).</p>
        <p><strong>Orthogonal basis:</strong> $\left\{\begin{pmatrix}5\\3\\2\\-5\end{pmatrix},\ \begin{pmatrix}29\\-96\\-1\\-29\end{pmatrix}\right\}$</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 20.2 — Full 3D Gram-Schmidt</span>
        <span class=&quot;diff hard&quot;>HARD</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Apply Gram-Schmidt to:
        $$x_1 = \begin{pmatrix}1\\1\\0\end{pmatrix},\quad x_2 = \begin{pmatrix}1\\0\\1\end{pmatrix},\quad x_3 = \begin{pmatrix}0\\1\\1\end{pmatrix}$$
        Then normalize to get an orthonormal basis.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>$v_1 = x_1 = \begin{pmatrix}1\\1\\0\end{pmatrix}$</strong>, $\|v_1\|^2 = 2$.</p>
        <p><strong>$v_2$:</strong> $x_2 \cdot v_1 = 1+0+0 = 1$. $v_2 = \begin{pmatrix}1\\0\\1\end{pmatrix} - \frac{1}{2}\begin{pmatrix}1\\1\\0\end{pmatrix} = \begin{pmatrix}1/2\\-1/2\\1\end{pmatrix}$. $\|v_2\|^2 = 1/4+1/4+1 = 3/2$.</p>
        <p><strong>$v_3$:</strong> 
        $x_3 \cdot v_1 = 0+1+0 = 1$. $x_3 \cdot v_2 = 0(-1/2)+(1)(-1/2)+(1)(1) = 1/2$.
        $$v_3 = \begin{pmatrix}0\\1\\1\end{pmatrix} - \frac{1}{2}\begin{pmatrix}1\\1\\0\end{pmatrix} - \frac{1/2}{3/2}\begin{pmatrix}1/2\\-1/2\\1\end{pmatrix} = \begin{pmatrix}0\\1\\1\end{pmatrix} - \begin{pmatrix}1/2\\1/2\\0\end{pmatrix} - \begin{pmatrix}1/6\\-1/6\\1/3\end{pmatrix} = \begin{pmatrix}-2/3\\2/3\\2/3\end{pmatrix}$$</p>
        <p><strong>Orthonormal:</strong> $u_1 = \frac{1}{\sqrt{2}}\begin{pmatrix}1\\1\\0\end{pmatrix}$, $u_2 = \sqrt{\frac{2}{3}}\begin{pmatrix}1/2\\-1/2\\1\end{pmatrix}$, $u_3 = \frac{1}{\sqrt{4/3}}\begin{pmatrix}-2/3\\2/3\\2/3\end{pmatrix} = \frac{1}{\sqrt{3}}\begin{pmatrix}-1\\1\\1\end{pmatrix}$.</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 20.3 — Conceptual (From Your Problem)</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Three vectors $x_1, x_2, x_3$ are given. In the Gram-Schmidt process, $v_1 = x_1$ and $v_2 = x_2 - \text{proj}_{v_1} x_2$. Describe geometrically what $v_3$ should look like relative to $v_1$ and $v_2$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>$v_3$ must be orthogonal to both $v_1$ and $v_2$. Geometrically, if $v_1$ and $v_2$ lie in a plane, then $v_3$ points <strong>perpendicular to that plane</strong> — it is the component of $x_3$ that is orthogonal to the span of $\{v_1, v_2\}$.</p>
        <p>In 3D space, this means $v_3$ would point &quot;out of the page&quot; relative to $v_1$ and $v_2$ drawn in the $xy$-plane.</p>
      </div>
    </div>

  </div><!-- /OC20 -->

  <hr class=&quot;section-div&quot;>

  <!-- ═══════════════════════════════════════════════════════
       OC 21
  ════════════════════════════════════════════════════════ -->
  <div class=&quot;oc-section&quot; id=&quot;oc21&quot;>
    <div class=&quot;oc-number&quot;>Outcome 21</div>
    <h2>Least Squares</h2>
    <p class=&quot;oc-goal&quot;>Solve least-squares problems, including finding the line of best fit and computing the least-squares error.</p>

    <h3>Why Least Squares?</h3>
    <p>If $Ax = b$ is <em>inconsistent</em> (overdetermined — more equations than unknowns), there's no exact solution. Instead, we find $\hat{x}$ that minimizes $\|b - Ax\|$, i.e., the &quot;closest&quot; solution.</p>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Normal Equations (Thm 13, Ch. 6)</div>
      <p>The least-squares solution $\hat{x}$ satisfies:
      $$A^T A\hat{x} = A^T b$$
      Any solution $\hat{x}$ to this system is a least-squares solution.</p>
    </div>

    <h3>Line of Best Fit: Setup</h3>
    <p>For data points $(x_1, y_1), \ldots, (x_m, y_m)$, we want $y = \beta_0 + \beta_1 x$. Set up:</p>
    <p>$$A = \begin{pmatrix}1&amp;x_1\\1&amp;x_2\\\vdots&amp;\vdots\\1&amp;x_m\end{pmatrix}, \quad x = \begin{pmatrix}\beta_0\\\beta_1\end{pmatrix}, \quad b = \begin{pmatrix}y_1\\y_2\\\vdots\\y_m\end{pmatrix}$$</p>
    <p>Then solve the normal equations $A^TA\hat{x} = A^Tb$.</p>

    <h3>Least-Squares Error</h3>
    <p>$$\text{Error} = \|b - A\hat{x}\|$$
    This is the distance from $b$ to the column space of $A$ — the &quot;residual.&quot;</p>

    <h3>Step-by-Step: Line of Best Fit</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li>Build $A$ (column of 1's, column of $x$-values) and $b$ (column of $y$-values).</li>
        <li>Compute $A^TA$ and $A^Tb$.</li>
        <li>Solve $A^TA\hat{x} = A^Tb$ by row reduction.</li>
        <li>$\hat{x} = \begin{pmatrix}\beta_0\\\beta_1\end{pmatrix}$ gives line $y = \beta_0 + \beta_1 x$.</li>
        <li>Compute residual $b - A\hat{x}$ and find $\|b - A\hat{x}\|$ for error.</li>
      </ol>
    </div>

    <h3>Practice Problems</h3>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 21.1 — From Your Practice Problem</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Use the method of least squares to find the line of best fit for the points $(3, 5)$, $(-1, 1)$, $(1, 0)$. What is the least-squares error?</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Step 1: Build $A$ and $b$:</strong></p>
        <p>$$A = \begin{pmatrix}1&amp;3\\1&amp;-1\\1&amp;1\end{pmatrix}, \quad b = \begin{pmatrix}5\\1\\0\end{pmatrix}$$</p>
        <p><strong>Step 2: Compute $A^TA$ and $A^Tb$:</strong></p>
        <p>$$A^TA = \begin{pmatrix}1&amp;1&amp;1\\3&amp;-1&amp;1\end{pmatrix}\begin{pmatrix}1&amp;3\\1&amp;-1\\1&amp;1\end{pmatrix} = \begin{pmatrix}3&amp;3\\3&amp;11\end{pmatrix}$$</p>
        <p>$$A^Tb = \begin{pmatrix}1&amp;1&amp;1\\3&amp;-1&amp;1\end{pmatrix}\begin{pmatrix}5\\1\\0\end{pmatrix} = \begin{pmatrix}6\\14\end{pmatrix}$$</p>
        <p><strong>Step 3: Solve $\begin{pmatrix}3&amp;3\\3&amp;11\end{pmatrix}\begin{pmatrix}\beta_0\\\beta_1\end{pmatrix} = \begin{pmatrix}6\\14\end{pmatrix}$:</strong></p>
        <p>Augmented matrix: $\begin{pmatrix}3&amp;3&amp;6\\3&amp;11&amp;14\end{pmatrix} \to \begin{pmatrix}3&amp;3&amp;6\\0&amp;8&amp;8\end{pmatrix} \to \begin{pmatrix}1&amp;0&amp;1\\0&amp;1&amp;1\end{pmatrix}$</p>
        <p>$\beta_0 = 1$, $\beta_1 = 1$. <strong>Line of best fit: $y = 1 + x$.</strong></p>
        <p><strong>Step 4: Compute error:</strong></p>
        <p>$A\hat{x} = \begin{pmatrix}1+3\\1-1\\1+1\end{pmatrix} = \begin{pmatrix}4\\0\\2\end{pmatrix}$. Residual: $b - A\hat{x} = \begin{pmatrix}1\\1\\-2\end{pmatrix}$.</p>
        <p>Error $= \sqrt{1+1+4} = \sqrt{6}$.</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 21.2 — New Problem</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Find the least-squares line through $(0, 1)$, $(1, 3)$, $(2, 4)$, $(3, 4)$. Compute the least-squares error.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>$A = \begin{pmatrix}1&amp;0\\1&amp;1\\1&amp;2\\1&amp;3\end{pmatrix}$, $b = \begin{pmatrix}1\\3\\4\\4\end{pmatrix}$.</p>
        <p>$A^TA = \begin{pmatrix}4&amp;6\\6&amp;14\end{pmatrix}$, $A^Tb = \begin{pmatrix}12\\23\end{pmatrix}$.</p>
        <p>Solve: $\det(A^TA) = 56-36=20$. By Cramer's or row reduction:</p>
        <p>$\beta_1 = (4\cdot23 - 6\cdot12)/20 = (92-72)/20 = 1$, $\beta_0 = (12-6\cdot1)/4 = 6/4 = 3/2$.</p>
        <p><strong>Line: $y = \frac{3}{2} + x$.</strong></p>
        <p>$A\hat{x} = \begin{pmatrix}3/2\\5/2\\7/2\\9/2\end{pmatrix}$. Residual $= \begin{pmatrix}-1/2\\1/2\\1/2\\-1/2\end{pmatrix}$. Error $= \sqrt{4\cdot1/4} = 1$.</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 21.3 — Conceptual</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Explain in your own words why $A\hat{x} = \hat{b}$ (the orthogonal projection of $b$ onto $\operatorname{Col}(A)$) is the closest point in $\operatorname{Col}(A)$ to $b$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>By the Best Approximation Theorem (Thm 9, Ch. 6): the orthogonal projection $\hat{b} = A\hat{x}$ is the <em>unique</em> closest point in $\operatorname{Col}(A)$ to $b$, because the error vector $b - \hat{b}$ is perpendicular to $\operatorname{Col}(A)$. Any other vector $Ax$ in $\operatorname{Col}(A)$ satisfies $\|b - Ax\| > \|b - \hat{b}\|$ by the Pythagorean theorem applied to the right triangle formed.</p>
      </div>
    </div>

  </div><!-- /OC21 -->

  <!-- ═══════════════════════════════════════════════════════
       OC 22
  ════════════════════════════════════════════════════════ -->
  <div class=&quot;oc-section gold&quot; id=&quot;oc22&quot;>
    <div class=&quot;oc-number&quot;>Outcome 22</div>
    <h2>Orthogonal Diagonalization</h2>
    <p class=&quot;oc-goal&quot;>Recognize when a matrix can be orthogonally diagonalized and orthogonally diagonalize it using the Spectral Theorem.</p>

    <h3>Key Theorem</h3>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Spectral Theorem / Orthogonal Diagonalizability (Thm 2 &amp;amp; 3, Ch. 7)</div>
      <p>$A$ is orthogonally diagonalizable if and only if $A$ is <strong>symmetric</strong> ($A = A^T$).</p>
      <p>If $A$ is symmetric $n \times n$:</p>
      <ol>
        <li>$A$ has $n$ real eigenvalues (counting multiplicity).</li>
        <li>Eigenspaces are mutually orthogonal.</li>
        <li>$\dim$ of eigenspace for each $\lambda$ = algebraic multiplicity of $\lambda$.</li>
        <li>$A = PDP^T$ where $P$ is orthogonal ($P^{-1} = P^T$) and $D$ is diagonal.</li>
      </ol>
    </div>

    <h3>Orthogonal vs. Regular Diagonalization</h3>
    <table>
      <tr><th></th><th>Regular ($A = PDP^{-1}$)</th><th>Orthogonal ($A = PDP^T$)</th></tr>
      <tr><td>Condition</td><td>$A$ has $n$ lin. indep. eigenvectors</td><td>$A$ is symmetric</td></tr>
      <tr><td>$P$ columns</td><td>Any eigenvectors</td><td>Orthonormal eigenvectors</td></tr>
      <tr><td>$P^{-1}$</td><td>Must compute</td><td>$P^{-1} = P^T$ (free!)</td></tr>
    </table>

    <h3>Step-by-Step: Orthogonal Diagonalization</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li>Verify $A = A^T$ (check it's symmetric). If not, it cannot be orthogonally diagonalized.</li>
        <li>Find eigenvalues via $\det(A - \lambda I) = 0$.</li>
        <li>For each eigenvalue, find an orthonormal basis for the eigenspace (use Gram-Schmidt if needed).</li>
        <li>Collect all orthonormal eigenvectors as columns of $P$.</li>
        <li>Write $D$ with eigenvalues on the diagonal in same order as $P$'s columns.</li>
        <li>Answer: $A = PDP^T$.</li>
      </ol>
    </div>

    <div class=&quot;insight&quot;>
      <strong>Key shortcut:</strong> For symmetric matrices, eigenvectors from <em>different</em> eigenspaces are automatically orthogonal (guaranteed by Spectral Theorem). You only need Gram-Schmidt within a single repeated eigenspace.
    </div>

    <h3>Practice Problems</h3>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 22.1 — From Your Practice Problem</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Orthogonally diagonalize $A = \begin{pmatrix}1&amp;1\\1&amp;1\end{pmatrix}$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Step 1:</strong> Check symmetry: $A^T = \begin{pmatrix}1&amp;1\\1&amp;1\end{pmatrix} = A$ ✓</p>
        <p><strong>Step 2:</strong> Eigenvalues: $\det(A - \lambda I) = (1-\lambda)^2 - 1 = \lambda^2 - 2\lambda = \lambda(\lambda-2) = 0$. So $\lambda_1 = 0$, $\lambda_2 = 2$.</p>
        <p><strong>Step 3: Eigenspace for $\lambda = 0$:</strong> $A - 0I = A = \begin{pmatrix}1&amp;1\\1&amp;1\end{pmatrix} \sim \begin{pmatrix}1&amp;1\\0&amp;0\end{pmatrix}$. Free variable $x_2$, $x_1 = -x_2$. Eigenvector: $\begin{pmatrix}1\\-1\end{pmatrix}$. Normalized: $u_1 = \frac{1}{\sqrt{2}}\begin{pmatrix}1\\-1\end{pmatrix}$.</p>
        <p><strong>Step 4: Eigenspace for $\lambda = 2$:</strong> $A - 2I = \begin{pmatrix}-1&amp;1\\1&amp;-1\end{pmatrix} \sim \begin{pmatrix}1&amp;-1\\0&amp;0\end{pmatrix}$. $x_1 = x_2$. Eigenvector: $\begin{pmatrix}1\\1\end{pmatrix}$. Normalized: $u_2 = \frac{1}{\sqrt{2}}\begin{pmatrix}1\\1\end{pmatrix}$.</p>
        <p><strong>Result:</strong>
        $$P = \frac{1}{\sqrt{2}}\begin{pmatrix}1&amp;1\\-1&amp;1\end{pmatrix}, \quad D = \begin{pmatrix}0&amp;0\\0&amp;2\end{pmatrix}, \quad A = PDP^T$$</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 22.2 — What qualifies?</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>(a) Give an example of a $3 \times 3$ matrix that can be orthogonally diagonalized.</p>
        <p>(b) Give an example of a $3 \times 3$ matrix that is diagonalizable but cannot be orthogonally diagonalized.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>(a)</strong> Any symmetric matrix works. The simplest: $I_3 = \begin{pmatrix}1&amp;0&amp;0\\0&amp;1&amp;0\\0&amp;0&amp;1\end{pmatrix}$ or $\begin{pmatrix}1&amp;0&amp;0\\0&amp;2&amp;0\\0&amp;0&amp;3\end{pmatrix}$ or any diagonal matrix.</p>
        <p>A more interesting example: $\begin{pmatrix}2&amp;1&amp;0\\1&amp;2&amp;0\\0&amp;0&amp;3\end{pmatrix}$. It's symmetric ($A = A^T$), so it qualifies.</p>
        <p><strong>(b)</strong> Must be diagonalizable but NOT symmetric. Example: $\begin{pmatrix}1&amp;1&amp;0\\0&amp;2&amp;0\\0&amp;0&amp;3\end{pmatrix}$ (upper triangular with 3 distinct eigenvalues, so diagonalizable; but not symmetric since $a_{12} \ne a_{21}$).</p>
      </div>
    </div>

    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 22.3 — Larger Symmetric Matrix</span>
        <span class=&quot;diff hard&quot;>HARD</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Orthogonally diagonalize $B = \begin{pmatrix}3&amp;1\\1&amp;3\end{pmatrix}$.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Check symmetry:</strong> $B = B^T$ ✓</p>
        <p><strong>Eigenvalues:</strong> $\det(B - \lambda I) = (3-\lambda)^2 - 1 = \lambda^2 - 6\lambda + 8 = (\lambda-2)(\lambda-4) = 0$.</p>
        <p>$\lambda_1 = 2$, $\lambda_2 = 4$.</p>
        <p><strong>Eigenvector $\lambda=2$:</strong> $B-2I = \begin{pmatrix}1&amp;1\\1&amp;1\end{pmatrix} \sim \begin{pmatrix}1&amp;1\\0&amp;0\end{pmatrix}$. $v_1 = \begin{pmatrix}1\\-1\end{pmatrix}$. Normalized: $u_1 = \frac{1}{\sqrt{2}}\begin{pmatrix}1\\-1\end{pmatrix}$.</p>
        <p><strong>Eigenvector $\lambda=4$:</strong> $B-4I = \begin{pmatrix}-1&amp;1\\1&amp;-1\end{pmatrix} \sim \begin{pmatrix}1&amp;-1\\0&amp;0\end{pmatrix}$. $v_2 = \begin{pmatrix}1\\1\end{pmatrix}$. Normalized: $u_2 = \frac{1}{\sqrt{2}}\begin{pmatrix}1\\1\end{pmatrix}$.</p>
        <p>$$P = \frac{1}{\sqrt{2}}\begin{pmatrix}1&amp;1\\-1&amp;1\end{pmatrix}, \quad D = \begin{pmatrix}2&amp;0\\0&amp;4\end{pmatrix}$$</p>
        <p>Check: $u_1 \cdot u_2 = \frac{1}{2}(1\cdot1 + (-1)\cdot1) = 0$ ✓ (different eigenvalues → guaranteed orthogonal by Spectral Thm.)</p>
      </div>
    </div>

  </div><!-- /OC22 -->

      <tr><td>OC14</td><td>Spans $\Rightarrow \dim \le p$; &amp;nbsp; Lin. Indep. $\Rightarrow \dim \ge p$; &amp;nbsp; Dependent $\Rightarrow$ nothing</td></tr>
      <tr><td>OC15</td><td>Eigenvalues: $\det(A-\lambda I)=0$; &amp;nbsp; Eigenvectors: $\operatorname{Nul}(A-\lambda I)$</td></tr>
      <tr><td>OC15</td><td>Diagonalizable iff $\sum \text{geom. mult.} = n$; need $n$ lin. indep. eigenvectors</td></tr>
      <tr><td>OC16</td><td>If $A\mathbf{v}=\lambda\mathbf{v}$ then $p(A)\mathbf{v} = p(\lambda)\mathbf{v}$</td></tr>

      <tr><td>OC18</td><td>$\|\mathbf{u}+\mathbf{w}\|^2 = \|\mathbf{u}\|^2 + 2(\mathbf{u}\cdot\mathbf{w}) + \|\mathbf{w}\|^2$</td></tr>
      <tr><td>OC18</td><td>Parallel: $\mathbf{u}\cdot\mathbf{v} = \pm\|\mathbf{u}\|\|\mathbf{v}\|$; &amp;nbsp; Orthogonal: $\mathbf{u}\cdot\mathbf{v}=0$</td></tr>
      <tr><td>OC20</td><td>$v_k = x_k - \sum_{j=1}^{k-1}\frac{x_k\cdot v_j}{v_j\cdot v_j}v_j$</td></tr>
      <tr><td>OC21</td><td>Normal equations: $A^TA\hat{x} = A^Tb$; Error $= \|b - A\hat{x}\|$</td></tr>
      <tr><td>OC22</td><td>Orthogonally diagonalizable $\Leftrightarrow$ symmetric; $A=PDP^T$, $P^{-1}=P^T$</td></tr>
    </table>
