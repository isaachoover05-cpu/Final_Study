    <div class=&quot;chapter-num&quot;>10</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 10</span>Intermolecular Forces &amp;amp; Physical Properties</div>
    </div>
  </div>

  <h2>The Master Chain: Structure → Polarity → IMFs → Properties</h2>
  <p>Every IMF question follows this chain. You cannot skip steps. Start by drawing the Lewis structure and identifying geometry before you decide which IMF dominates.</p>

  <h2>IMF Hierarchy (Strongest → Weakest)</h2>
  <table>
    <thead><tr><th>Force</th><th>Between What</th><th>Requirements</th><th>Relative Strength</th></tr></thead>
    <tbody>
      <tr><td><strong>Ion–Dipole</strong></td><td>Ion + polar molecule</td><td>Ion present; explains solvation</td><td>★★★★★</td></tr>
      <tr><td><strong>Hydrogen Bonding</strong></td><td>H–(N/O/F) donor + N/O/F acceptor</td><td>H bonded to N, O, or F; lone pair on N/O/F nearby</td><td>★★★★</td></tr>
      <tr><td><strong>Dipole–Dipole</strong></td><td>Polar molecules</td><td>Net dipole moment (bonds don't cancel)</td><td>★★★</td></tr>
      <tr><td><strong>London Dispersion (LDF)</strong></td><td>All species</td><td>Present in everything; grows with molar mass and surface area</td><td>★★</td></tr>
    </tbody>
  </table>

  <div class=&quot;warn-box&quot;>
    H-bonding is NOT a chemical bond. It is a particularly strong dipole–dipole interaction. H₂O has H-bonding; CH₄ does not because C–H bonds are nearly nonpolar.
  </div>

  <h2>IMF Strength Controls Physical Properties</h2>
  <p>Stronger IMFs → higher BP, higher MP, lower vapor pressure, higher surface tension, higher viscosity. The phase-change temperatures tell you how hard it is to overcome IMFs.</p>

  <h2>Heating Curves</h2>
  <p>Two alternating regions — <strong>sloped</strong> (temperature change, q = mC<sub>p</sub>ΔT, KE increases) and <strong>flat</strong> (phase change, q = nΔH, PE changes as IMFs are broken/formed, temperature stays constant).</p>

  <div class=&quot;concept-box&quot;>
    <strong>Why is the boiling plateau longer than the melting plateau?</strong> Vaporization requires completely overcoming IMFs (liquid → gas). Melting only weakens them (solid → liquid). Therefore ΔH<sub>vap</sub> ≫ ΔH<sub>fus</sub>.
  </div>

  <h2>Phase Diagrams</h2>
  <p>Know: <strong>triple point</strong> (solid, liquid, gas coexist), <strong>critical point</strong> (liquid and gas become indistinguishable — supercritical fluid), <strong>normal BP</strong> (where vapor pressure = 1 atm), <strong>normal MP</strong> (solid ⇌ liquid at 1 atm). Water's fusion curve has a <em>negative slope</em> because ice is less dense than liquid water — this is unique.</p>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Chapter 10 <span class=&quot;badge&quot;>IMFs</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> Rank the following from lowest to highest boiling point: CH₄, NH₃, H₂O, HF. Explain your reasoning.</div>
        <details><summary>Show Answer &amp;amp; Explanation</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;ans-label&quot;>Reasoning</div>
          <div class=&quot;step&quot;>CH₄: nonpolar, only LDF. Very small molecule → very weak LDFs.</div>
          <div class=&quot;step&quot;>NH₃: H-bonding (H on N, lone pair on N), but only 3 H-bonds per molecule on average.</div>
          <div class=&quot;step&quot;>HF: H-bonding, very polar, but only 1 H per molecule to donate.</div>
          <div class=&quot;step&quot;>H₂O: H-bonding with 2 donors and 2 lone-pair acceptors → network of 4 H-bonds. Highest BP despite lowest molar mass among the H-bonding set.</div>
          <div class=&quot;final-ans&quot;>CH₄ &amp;lt; HF &amp;lt; NH₃ &amp;lt; H₂O</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> Is CO₂ a polar molecule? What IMFs does it exhibit? Compare it to SO₂.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;ans-label&quot;>Solution</div>
          <div class=&quot;step&quot;>CO₂: linear geometry → C=O bond dipoles point in opposite directions and exactly cancel → <em>nonpolar molecule</em>. Only LDF present.</div>
          <div class=&quot;step&quot;>SO₂: bent geometry (lone pair on S) → bond dipoles do NOT cancel → <em>polar molecule</em>. Has dipole–dipole forces AND LDF.</div>
          <div class=&quot;final-ans&quot;>CO₂: LDF only. SO₂: dipole–dipole + LDF. SO₂ has higher BP.</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q3</span> A substance melts at −18°C and boils at 35°C. Another melts at 180°C and boils at 340°C. What can you conclude about their IMFs?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Higher melting and boiling points = stronger IMFs that require more energy to overcome.</div>
          <div class=&quot;step&quot;>Substance 2 likely has much stronger IMFs (possibly H-bonding, dipole–dipole, or even ionic interactions) compared to Substance 1 (possibly only LDF).</div>
          <div class=&quot;final-ans&quot;>Substance 2 has significantly stronger IMFs.</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 11A — SOLUTION FORMATION
════════════════════════════════════════ -->
<section id=&quot;ch11a&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>11</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 11 §11.1 &amp;amp; §11.3</span>Solution Formation &amp;amp; Free Energy</div>
    </div>
  </div>

  <h2>ΔG as the Unifying Framework</h2>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;label&quot;>Gibbs Free Energy</div>
    ΔG = ΔH − TΔS<br><br>
    ΔG &amp;lt; 0 → solution formation thermodynamically favored<br>
    ΔG = 0 → equilibrium (saturated solution)<br>
    ΔG &amp;gt; 0 → solution formation not favored
  </div>

  <h2>The Three-Step Enthalpy Story</h2>
  <p>Solution formation has three energetic steps:</p>
  <ol>
    <li><strong>Break solute–solute</strong> attractions (endothermic, ΔH &amp;gt; 0)</li>
    <li><strong>Break solvent–solvent</strong> attractions (endothermic, ΔH &amp;gt; 0)</li>
    <li><strong>Form solute–solvent</strong> attractions (exothermic, ΔH &amp;lt; 0)</li>
  </ol>
  <div class=&quot;formula-box&quot;>ΔH<sub>solution</sub> = ΔH<sub>solute</sub> + ΔH<sub>solvent</sub> + ΔH<sub>mixture</sub></div>
  <p>If step 3 releases more energy than steps 1+2 absorb → exothermic dissolution. If steps 1+2 dominate → endothermic, but entropy can still drive it.</p>

  <h2>Entropy — the &quot;Hidden Driver&quot;</h2>
  <p>Mixing almost always increases entropy (more microstates). This is why some endothermic dissolutions occur spontaneously: TΔS overcomes ΔH at high enough temperatures.</p>

  <div class=&quot;key-rule&quot;>
    <strong>&quot;Like dissolves like&quot;</strong> is a free-energy argument. Polar dissolves in polar, nonpolar in nonpolar. Oil + water is immiscible because the large positive ΔH (breaking water H-bonds) overwhelms the entropy gain.
  </div>

  <h2>Solution Types</h2>
  <table>
    <thead><tr><th>Type</th><th>ΔG</th><th>What's Happening</th></tr></thead>
    <tbody>
      <tr><td>Unsaturated</td><td>&amp;lt; 0</td><td>More solute can dissolve</td></tr>
      <tr><td>Saturated</td><td>= 0</td><td>Dissolution rate = crystallization rate</td></tr>
      <tr><td>Supersaturated</td><td>&amp;gt; 0</td><td>Metastable, kinetically trapped — will crystallize with disturbance</td></tr>
    </tbody>
  </table>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 11B — COLLIGATIVE PROPERTIES
════════════════════════════════════════ -->
<section id=&quot;ch11b&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>11</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 11 §11.4</span>Concentration Units &amp;amp; Colligative Properties</div>
    </div>
  </div>

  <h2>Concentration Units</h2>
  <table>
    <thead><tr><th>Unit</th><th>Formula</th><th>Temperature Dependent?</th><th>When to Use</th></tr></thead>
    <tbody>
      <tr><td><strong>Molarity (M)</strong></td><td>mol solute / L solution</td><td>YES (volume changes with T)</td><td>Most lab work</td></tr>
      <tr><td><strong>Molality (m)</strong></td><td>mol solute / kg solvent</td><td>NO (mass doesn't change)</td><td>Colligative properties, phase changes</td></tr>
      <tr><td><strong>Mass %</strong></td><td>(g solute / g solution) × 100</td><td>No</td><td>Commercial labels</td></tr>
      <tr><td><strong>ppm</strong></td><td>mg solute / L solution (or μg/g)</td><td>—</td><td>Environmental, trace analysis</td></tr>
    </tbody>
  </table>
  <div class=&quot;warn-box&quot;>Colligative property equations always use <strong>molality (m)</strong>, not molarity. This is because colligative properties depend on phase changes — temperature must not affect the concentration unit used.</div>

  <h2>Colligative Properties — The Four</h2>
  <p>Colligative properties depend only on the <strong>number of dissolved particles</strong>, not their chemical identity. Adding any nonvolatile solute lowers the chemical potential (free energy) of the liquid phase, which shifts all phase boundaries.</p>

  <div class=&quot;eq-sheet&quot;>ΔT<sub>f</sub> = i·m·K<sub>f</sub> (freezing point DEPRESSION) &amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp; ΔT<sub>b</sub> = i·m·K<sub>b</sub> (boiling point ELEVATION) &amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp; π = iMRT (osmotic pressure)</div>

  <table>
    <thead><tr><th>Property</th><th>Effect</th><th>Why (ΔG Reasoning)</th></tr></thead>
    <tbody>
      <tr><td>Vapor pressure lowering</td><td>Vapor pressure decreases</td><td>ΔS<sub>vap</sub> decreases; ΔG<sub>vap</sub> more positive; fewer molecules escape</td></tr>
      <tr><td>Boiling point elevation</td><td>BP increases</td><td>Lower free energy of liquid → higher T needed for ΔG<sub>vap</sub> = 0</td></tr>
      <tr><td>Freezing point depression</td><td>FP decreases</td><td>Higher entropy of liquid → lower T needed for ΔG<sub>freeze</sub> = 0</td></tr>
      <tr><td>Osmotic pressure</td><td>Solvent flows toward higher concentration</td><td>Entropy increases; ΔG &amp;lt; 0 for solvent flow across semipermeable membrane</td></tr>
    </tbody>
  </table>

  <h3>The van't Hoff Factor (i)</h3>
  <p><strong>i</strong> = number of particles one formula unit produces in solution.</p>
  <ul>
    <li>Nonelectrolytes (glucose, sucrose): i = 1</li>
    <li>Strong electrolytes: NaCl → i = 2 (Na⁺ + Cl⁻); CaCl₂ → i = 3; AlCl₃ → i = 4</li>
    <li>Weak electrolytes: i is between 1 and theoretical max (partial dissociation)</li>
  </ul>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Colligative Properties <span class=&quot;badge&quot;>Ch. 11</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> What is the freezing point of a solution made by dissolving 35.0 g of NaCl in 500. g of water? K<sub>f</sub>(water) = 1.86 °C·kg/mol.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;ans-label&quot;>Step-by-Step</div>
          <div class=&quot;step&quot;>Moles NaCl = 35.0 g ÷ 58.44 g/mol = 0.5988 mol</div>
          <div class=&quot;step&quot;>Molality = 0.5988 mol ÷ 0.500 kg = 1.198 m</div>
          <div class=&quot;step&quot;>NaCl is a strong electrolyte → i = 2</div>
          <div class=&quot;step&quot;>ΔT<sub>f</sub> = 2 × 1.198 × 1.86 = 4.45 °C</div>
          <div class=&quot;step&quot;>New FP = 0 − 4.45 = −4.45 °C</div>
          <div class=&quot;final-ans&quot;>FP = −4.45 °C</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> A 5.00 g sample of an unknown nonelectrolyte is dissolved in 100. g of benzene (K<sub>f</sub> = 5.12 °C·kg/mol). The freezing point drops by 1.63 °C. Find the molar mass of the unknown.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Nonelectrolyte → i = 1</div>
          <div class=&quot;step&quot;>m = ΔT<sub>f</sub> / (i × K<sub>f</sub>) = 1.63 / (1 × 5.12) = 0.3184 mol/kg</div>
          <div class=&quot;step&quot;>mol solute = 0.3184 mol/kg × 0.100 kg = 0.03184 mol</div>
          <div class=&quot;step&quot;>Molar mass = 5.00 g / 0.03184 mol = 157 g/mol</div>
          <div class=&quot;final-ans&quot;>Molar mass ≈ 157 g/mol</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 12 — KINETICS
════════════════════════════════════════ -->
<section id=&quot;ch12&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>12</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 12</span>Chemical Kinetics</div>
    </div>
  </div>

  <h2>Rate Expressions</h2>
  <p>For aA + bB → cC + dD, the rate is always expressed as one positive number:</p>
  <div class=&quot;formula-box&quot;>Rate = −(1/a)(Δ[A]/Δt) = −(1/b)(Δ[B]/Δt) = +(1/c)(Δ[C]/Δt) = +(1/d)(Δ[D]/Δt)</div>

  <h2>The Rate Law</h2>
  <div class=&quot;formula-box&quot;>Rate = k[A]<sup>m</sup>[B]<sup>n</sup></div>
  <ul>
    <li>m and n are determined <strong>experimentally</strong> (method of initial rates) — never from stoichiometry</li>
    <li>Overall order = m + n</li>
    <li>k depends on temperature only (not concentration)</li>
  </ul>

  <h3>Determining Rate Orders from Data</h3>
  <p>Compare two experiments where only one reactant concentration changes:</p>
  <div class=&quot;formula-box&quot;>m = log(Rate₂/Rate₁) / log([A]₂/[A]₁)</div>

  <h2>Integrated Rate Laws</h2>
  <table>
    <thead><tr><th>Order</th><th>Integrated Rate Law</th><th>Linear Plot</th><th>Half-Life</th><th>Units of k</th></tr></thead>
    <tbody>
      <tr><td><strong>Zero</strong></td><td>[A] = −kt + [A]₀</td><td>[A] vs t</td><td>t<sub>½</sub> = [A]₀/(2k)</td><td>M·s⁻¹</td></tr>
      <tr><td><strong>First</strong></td><td>ln[A] = −kt + ln[A]₀</td><td>ln[A] vs t</td><td>t<sub>½</sub> = ln2/k (constant!)</td><td>s⁻¹</td></tr>
      <tr><td><strong>Second</strong></td><td>1/[A] = kt + 1/[A]₀</td><td>1/[A] vs t</td><td>t<sub>½</sub> = 1/(k[A]₀)</td><td>M⁻¹s⁻¹</td></tr>
    </tbody>
  </table>
  <div class=&quot;concept-box&quot;><strong>How to identify reaction order from a graph:</strong> Plot [A] vs t, ln[A] vs t, and 1/[A] vs t. Whichever gives the most linear fit tells you the order. The slope of that line = −k (first order) or +k (zero and second order).</div>

  <h2>The Arrhenius Equation</h2>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;label&quot;>Arrhenius Equation</div>
    k = A·e<sup>−Ea/RT</sup><br><br>
    Two-temperature form (most useful on exams):<br>
    ln(k₂/k₁) = (Ea/R)(1/T₁ − 1/T₂)<br><br>
    R = 8.314 J/(mol·K) &amp;nbsp;&amp;nbsp; T must be in Kelvin
  </div>
  <ul>
    <li><strong>Ea</strong> = activation energy (energy barrier reactants must overcome)</li>
    <li><strong>A</strong> = frequency factor = p × z (orientation × collision frequency)</li>
    <li>Higher T → larger k → faster rate (exponential relationship)</li>
    <li>Higher Ea → smaller k → slower rate</li>
  </ul>

  <h2>Reaction Mechanisms</h2>
  <div class=&quot;key-rule&quot;>
    <strong>The Rate-Determining Step (RDS)</strong> is the slowest elementary step. The overall rate law must match the rate law derived from the RDS. A valid mechanism must: (1) add up to the overall reaction; (2) match the experimental rate law; (3) contain no intermediates in the final rate law.
  </div>

  <table>
    <thead><tr><th>Elementary Step</th><th>Molecularity</th><th>Rate Law</th></tr></thead>
    <tbody>
      <tr><td>A → products</td><td>Unimolecular</td><td>k[A]</td></tr>
      <tr><td>A + A → products</td><td>Bimolecular</td><td>k[A]²</td></tr>
      <tr><td>A + B → products</td><td>Bimolecular</td><td>k[A][B]</td></tr>
    </tbody>
  </table>

  <h3>Intermediates vs. Catalysts</h3>
  <ul>
    <li><strong>Intermediate:</strong> produced in one step, consumed in a later step. Does NOT appear in overall equation.</li>
    <li><strong>Catalyst:</strong> consumed in one step, regenerated later. Appears in rate law. Lowers Ea — does NOT change ΔH, ΔG, or K.</li>
  </ul>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Kinetics <span class=&quot;badge&quot;>Ch. 12</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> For the reaction A + B → products, you have the following data:<br>
        Exp 1: [A]=0.10 M, [B]=0.10 M, Rate = 2.0×10⁻⁴ M/s<br>
        Exp 2: [A]=0.20 M, [B]=0.10 M, Rate = 4.0×10⁻⁴ M/s<br>
        Exp 3: [A]=0.10 M, [B]=0.30 M, Rate = 6.0×10⁻⁴ M/s<br>
        Determine the rate law and calculate k.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Order in A: Compare Exp 1 &amp; 2 (B constant). Rate doubles when [A] doubles → first order in A (m = 1).</div>
          <div class=&quot;step&quot;>Order in B: Compare Exp 1 &amp; 3 (A constant). Rate triples when [B] triples → first order in B (n = 1).</div>
          <div class=&quot;step&quot;>Rate law: Rate = k[A][B] (overall second order)</div>
          <div class=&quot;step&quot;>Solve for k: 2.0×10⁻⁴ = k(0.10)(0.10) → k = 0.020 M⁻¹s⁻¹</div>
          <div class=&quot;final-ans&quot;>Rate = 0.020[A][B] &amp;nbsp; k = 0.020 M⁻¹s⁻¹</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> A first-order reaction has k = 0.0250 s⁻¹. (a) What is the half-life? (b) How long to go from 0.800 M to 0.100 M?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>(a) t<sub>½</sub> = ln2 / k = 0.693 / 0.0250 = 27.7 s</div>
          <div class=&quot;step&quot;>(b) ln(0.100/0.800) = −0.0250·t → ln(0.125) = −2.079 = −0.0250t → t = 83.2 s</div>
          <div class=&quot;step&quot;>Alternatively: 0.800 → 0.400 → 0.200 → 0.100 M = 3 half-lives = 3 × 27.7 = 83.1 s</div>
          <div class=&quot;final-ans&quot;>(a) 27.7 s &amp;nbsp; (b) 83.2 s</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q3</span> A reaction has Ea = 85.0 kJ/mol. k₁ = 0.0450 s⁻¹ at 300 K. Find k at 350 K.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>ln(k₂/k₁) = (Ea/R)(1/T₁ − 1/T₂)</div>
          <div class=&quot;step&quot;>= (85000/8.314)(1/300 − 1/350)</div>
          <div class=&quot;step&quot;>= 10221 × (0.003333 − 0.002857)</div>
          <div class=&quot;step&quot;>= 10221 × 4.762×10⁻⁴ = 4.868</div>
          <div class=&quot;step&quot;>k₂ = 0.0450 × e<sup>4.868</sup> = 0.0450 × 130.0 = 5.85 s⁻¹</div>
          <div class=&quot;final-ans&quot;>k₂ ≈ 5.85 s⁻¹</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q4</span> The proposed mechanism is:<br>
        Step 1 (slow): NO₂ + NO₂ → NO₃ + NO<br>
        Step 2 (fast): NO₃ + CO → NO₂ + CO₂<br>
        The overall reaction is NO₂ + CO → NO + CO₂. Is the mechanism valid? What is the predicted rate law?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Check steps add up: (NO₂ + NO₂ → NO₃ + NO) + (NO₃ + CO → NO₂ + CO₂) → cancel NO₃ and one NO₂ → overall: NO₂ + CO → NO + CO₂ ✓</div>
          <div class=&quot;step&quot;>NO₃ is produced in step 1 and consumed in step 2 → it's an <strong>intermediate</strong>.</div>
          <div class=&quot;step&quot;>RDS = Step 1 (slow). Rate law from RDS: Rate = k[NO₂]²</div>
          <div class=&quot;step&quot;>No intermediates in the rate law ✓</div>
          <div class=&quot;final-ans&quot;>Valid mechanism. Rate = k[NO₂]²</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 13 — EQUILIBRIUM
════════════════════════════════════════ -->
<section id=&quot;ch13&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>13</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 13</span>Chemical Equilibrium</div>
    </div>
  </div>

  <h2>The Equilibrium Constant Expression</h2>
  <p>For aA(g) + bB(g) ⇌ cC(g) + dD(g):</p>
  <div class=&quot;formula-box&quot;>K<sub>c</sub> = [C]<sup>c</sup>[D]<sup>d</sup> / ([A]<sup>a</sup>[B]<sup>b</sup>) &amp;nbsp;&amp;nbsp; (units of M)<br>
  K<sub>p</sub> = P<sub>C</sub><sup>c</sup>P<sub>D</sub><sup>d</sup> / (P<sub>A</sub><sup>a</sup>P<sub>B</sub><sup>b</sup>) &amp;nbsp;&amp;nbsp; (units of atm)<br><br>
  Kp = Kc(RT)<sup>Δn</sup> where Δn = moles gas products − moles gas reactants</div>

  <div class=&quot;warn-box&quot;>Pure solids and pure liquids are EXCLUDED from K and Q expressions. Their concentrations don't change. Only (aq) and (g) species are included.</div>

  <h2>Meaning of K</h2>
  <ul>
    <li>K ≫ 1: products favored, reaction goes essentially to completion</li>
    <li>K ≪ 1: reactants favored, very little product at equilibrium</li>
    <li>K ≈ 1: significant amounts of both reactants and products at equilibrium</li>
  </ul>

  <h2>Manipulating K</h2>
  <table>
    <thead><tr><th>Operation</th><th>Effect on K</th></tr></thead>
    <tbody>
      <tr><td>Reverse the reaction</td><td>K<sub>new</sub> = 1/K</td></tr>
      <tr><td>Multiply by factor n</td><td>K<sub>new</sub> = K<sup>n</sup></td></tr>
      <tr><td>Add two reactions</td><td>K<sub>new</sub> = K₁ × K₂</td></tr>
    </tbody>
  </table>

  <h2>The Reaction Quotient (Q)</h2>
  <p>Q has the same form as K but uses <em>current</em> (non-equilibrium) concentrations. Compare Q to K:</p>
  <table>
    <thead><tr><th>If...</th><th>Then...</th><th>Reaction shifts...</th></tr></thead>
    <tbody>
      <tr><td>Q &amp;lt; K</td><td>Too much reactant</td><td>→ Right (toward products)</td></tr>
      <tr><td>Q &amp;gt; K</td><td>Too much product</td><td>← Left (toward reactants)</td></tr>
      <tr><td>Q = K</td><td>At equilibrium</td><td>No shift</td></tr>
    </tbody>
  </table>

  <h2>ICE Tables</h2>
  <div class=&quot;concept-box&quot;>
    <strong>Systematic approach:</strong><br>
    I = Initial concentrations<br>
    C = Change (use −x for species consumed, +x for species produced, respecting stoichiometry)<br>
    E = Equilibrium = I + C
  </div>

  <p><strong>Small-x approximation:</strong> If K is very small (K &amp;lt; 10⁻⁴) and initial [A] is large, assume x ≪ [A]₀. Always verify: x/[A]₀ × 100% &amp;lt; 5%. If it isn't, solve the quadratic.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;label&quot;>ICE Table Template — HA ⇌ H⁺ + A⁻, Ka = ?</div>
    &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; HA &amp;nbsp;&amp;nbsp;&amp;nbsp; H⁺ &amp;nbsp;&amp;nbsp;&amp;nbsp; A⁻<br>
    I: &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; [HA]₀ &amp;nbsp;&amp;nbsp;&amp;nbsp; 0 &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; 0<br>
    C: &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; −x &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; +x &amp;nbsp;&amp;nbsp;&amp;nbsp; +x<br>
    E: &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; [HA]₀−x &amp;nbsp; x &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; x<br><br>
    Ka = x² / ([HA]₀ − x) ≈ x² / [HA]₀ &amp;nbsp;&amp;nbsp; (if small-x valid)
  </div>

  <h2>Le Châtelier's Principle</h2>
  <table>
    <thead><tr><th>Disturbance</th><th>Q vs K</th><th>Shift Direction</th><th>K changes?</th></tr></thead>
    <tbody>
      <tr><td>↑ Reactant concentration</td><td>Q &amp;lt; K</td><td>→ Products</td><td>No</td></tr>
      <tr><td>↑ Product concentration</td><td>Q &amp;gt; K</td><td>← Reactants</td><td>No</td></tr>
      <tr><td>↓ Volume (↑ pressure)</td><td>Q ≠ K</td><td>Toward fewer moles of gas</td><td>No</td></tr>
      <tr><td>↑ Volume (↓ pressure)</td><td>Q ≠ K</td><td>Toward more moles of gas</td><td>No</td></tr>
      <tr><td>↑ Temperature (exo. reaction)</td><td>Q &amp;gt; K</td><td>← Reactants</td><td>Yes — K decreases</td></tr>
      <tr><td>↑ Temperature (endo. reaction)</td><td>Q &amp;lt; K</td><td>→ Products</td><td>Yes — K increases</td></tr>
      <tr><td>Add inert gas (constant V)</td><td>—</td><td>No shift</td><td>No</td></tr>
      <tr><td>Add catalyst</td><td>—</td><td>No shift</td><td>No</td></tr>
    </tbody>
  </table>

  <div class=&quot;warn-box&quot;>Temperature is the only disturbance that changes K. Adding/removing reactants or products, or changing pressure/volume, shifts equilibrium but does NOT change K.</div>

  <h2>Equilibrium and Free Energy (§16.4)</h2>
  <div class=&quot;formula-box&quot;>
    ΔG° = −RT·ln(K) &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; ΔG = ΔG° + RT·ln(Q)<br><br>
    ΔG° &amp;lt; 0 → K &amp;gt; 1 → products favored<br>
    ΔG° &amp;gt; 0 → K &amp;lt; 1 → reactants favored<br>
    ΔG° = 0 → K = 1
  </div>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Equilibrium <span class=&quot;badge&quot;>Ch. 13</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> For N₂(g) + 3H₂(g) ⇌ 2NH₃(g), K<sub>c</sub> = 9.6 at 300°C. Calculate K<sub>p</sub> at 300°C (T = 573 K, R = 0.08206 L·atm/mol·K).</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Δn<sub>gas</sub> = moles gas products − moles gas reactants = 2 − (1+3) = −2</div>
          <div class=&quot;step&quot;>K<sub>p</sub> = K<sub>c</sub>(RT)<sup>Δn</sup> = 9.6 × (0.08206 × 573)<sup>−2</sup></div>
          <div class=&quot;step&quot;>RT = 47.0 L·atm/mol; (RT)² = 2209</div>
          <div class=&quot;step&quot;>K<sub>p</sub> = 9.6 / 2209 = 4.35 × 10⁻³</div>
          <div class=&quot;final-ans&quot;>Kp = 4.35 × 10⁻³</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> For the reaction PCl₅(g) ⇌ PCl₃(g) + Cl₂(g), K<sub>c</sub> = 0.0400 at 500 K. If you place 0.500 mol PCl₅ in a 1.00 L flask, find all equilibrium concentrations.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>ICE table (all in M):</div>
          <div class=&quot;step&quot;>I: PCl₅ = 0.500, PCl₃ = 0, Cl₂ = 0</div>
          <div class=&quot;step&quot;>C: −x, +x, +x</div>
          <div class=&quot;step&quot;>E: 0.500−x, x, x</div>
          <div class=&quot;step&quot;>K<sub>c</sub> = x²/(0.500−x) = 0.0400</div>
          <div class=&quot;step&quot;>x² + 0.0400x − 0.0200 = 0</div>
          <div class=&quot;step&quot;>x = [−0.0400 + √(0.00160 + 0.0800)] / 2 = [−0.04 + 0.2876] / 2 = 0.1238 M</div>
          <div class=&quot;final-ans&quot;>[PCl₅] = 0.376 M, [PCl₃] = [Cl₂] = 0.124 M</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 14A — ACID-BASE
════════════════════════════════════════ -->
<section id=&quot;ch14a&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>14</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 14 §14.1–14.5</span>Acid-Base Equilibria</div>
    </div>
  </div>

  <h2>Brønsted-Lowry Acid-Base Theory</h2>
  <ul>
    <li><strong>Acid:</strong> proton (H⁺) donor</li>
    <li><strong>Base:</strong> proton (H⁺) acceptor</li>
    <li>Every acid has a conjugate base; every base has a conjugate acid</li>
    <li>Stronger acid → weaker conjugate base (and vice versa)</li>
    <li>Water is amphoteric — can act as acid or base</li>
  </ul>

  <h2>Strong vs. Weak Acids and Bases</h2>
  <table>
    <thead><tr><th>Strong Acids (dissociate 100%)</th><th>Strong Bases</th></tr></thead>
    <tbody>
      <tr><td>HCl, HBr, HI, HNO₃, HClO₄, H₂SO₄, HClO₃</td><td>NaOH, KOH, Ca(OH)₂, Ba(OH)₂ and Group 1 &amp; 2 hydroxides</td></tr>
    </tbody>
  </table>
  <p>Everything else is weak. Strong acids and bases don't have Ka or Kb — they dissociate completely.</p>

  <h2>pH Calculations — Decision Map</h2>
  <div class=&quot;decision-tree&quot;>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>1</div><div><strong>Strong acid:</strong> [H₃O⁺] = concentration of acid. pH = −log[H₃O⁺].</div></div>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>2</div><div><strong>Weak acid (HA):</strong> Use ICE table with Ka. pH = −log(x) where x = [H₃O⁺] from ICE.</div></div>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>3</div><div><strong>Strong base:</strong> [OH⁻] = concentration × (# OH⁻ per formula unit). pOH = −log[OH⁻]. pH = 14 − pOH.</div></div>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>4</div><div><strong>Weak base (B):</strong> Use ICE table with Kb. Find [OH⁻] = x, then pOH, then pH.</div></div>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>5</div><div><strong>Salt solution:</strong> Identify cation and anion. Is either acidic or basic? See salt table below.</div></div>
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;label&quot;>Key Relationships</div>
    pH + pOH = 14 &amp;nbsp;&amp;nbsp; (at 25°C)<br>
    Ka × Kb = Kw = 1.0×10⁻¹⁴ &amp;nbsp;&amp;nbsp; (for a conjugate pair)<br>
    pKa = −log(Ka) &amp;nbsp;&amp;nbsp; pKb = −log(Kb)<br>
    % dissociation = [H₃O⁺]<sub>eq</sub> / [HA]₀ × 100
  </div>

  <h2>Salt Solution Acidity</h2>
  <table>
    <thead><tr><th>Cation from...</th><th>Anion from...</th><th>Salt solution pH</th><th>Example</th></tr></thead>
    <tbody>
      <tr><td>Strong base (Na⁺, K⁺)</td><td>Strong acid (Cl⁻, NO₃⁻)</td><td>Neutral (≈7)</td><td>NaCl</td></tr>
      <tr><td>Weak base (NH₄⁺)</td><td>Strong acid (Cl⁻)</td><td>Acidic (&amp;lt;7)</td><td>NH₄Cl</td></tr>
      <tr><td>Strong base (Na⁺)</td><td>Weak acid (F⁻, CH₃COO⁻)</td><td>Basic (&amp;gt;7)</td><td>NaF, NaCH₃COO</td></tr>
      <tr><td>Weak base (NH₄⁺)</td><td>Weak acid (F⁻, CN⁻)</td><td>Depends on Ka vs. Kb</td><td>NH₄F</td></tr>
    </tbody>
  </table>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Acid-Base <span class=&quot;badge&quot;>Ch. 14 §1–5</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> Calculate the pH of 0.150 M acetic acid (Ka = 1.8×10⁻⁵).</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>CH₃COOH ⇌ CH₃COO⁻ + H⁺</div>
          <div class=&quot;step&quot;>ICE: I = 0.150, 0, 0; C = −x, +x, +x; E = 0.150−x, x, x</div>
          <div class=&quot;step&quot;>Ka = x²/(0.150−x) ≈ x²/0.150 = 1.8×10⁻⁵</div>
          <div class=&quot;step&quot;>x² = 2.7×10⁻⁶ → x = 1.64×10⁻³ M</div>
          <div class=&quot;step&quot;>Check: 1.64×10⁻³/0.150 = 1.1% &amp;lt; 5% ✓</div>
          <div class=&quot;step&quot;>pH = −log(1.64×10⁻³) = 2.79</div>
          <div class=&quot;final-ans&quot;>pH = 2.79</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> Predict whether an aqueous solution of NH₄ClO₄ is acidic, basic, or neutral. Ka(NH₄⁺) ≈ 10⁻⁹; Kb(ClO₄⁻) ≈ 10⁻⁸.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>NH₄⁺ is conjugate acid of weak base NH₃ → it acts as an acid in water.</div>
          <div class=&quot;step&quot;>ClO₄⁻ is conjugate base of weak acid HClO₄ — but HClO₄ is a strong acid, so ClO₄⁻ is an extremely weak base (essentially neutral).</div>
          <div class=&quot;step&quot;>Correction: Kb(ClO₄⁻) ≈ 10⁻⁸ is given, so it's weakly basic. But Ka(NH₄⁺) ≈ 10⁻⁹ is smaller (less acidic). We compare Ka vs Kb: Ka &amp;lt; Kb → basic leaning.</div>
          <div class=&quot;step&quot;>BUT the problem gives Ka(NH₄⁺) ≈ 10⁻⁹ and Kb(ClO₄⁻) ≈ 10⁻⁸. Since Kb &amp;gt; Ka, the solution is slightly basic.</div>
          <div class=&quot;final-ans&quot;>Slightly basic (Kb of anion &amp;gt; Ka of cation)</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 14B — BUFFERS
════════════════════════════════════════ -->
<section id=&quot;ch14b&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>14</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 14 §14.6</span>Buffers</div>
    </div>
  </div>

  <div class=&quot;concept-box&quot;><strong>What is a buffer?</strong> A solution that resists changes in pH when small amounts of acid or base are added. It contains a weak acid (HA) + its conjugate base (A⁻) — or a weak base (B) + its conjugate acid (BH⁺). The key is having an equilibrium that can consume both added H⁺ and OH⁻.</div>

  <h2>How Buffers Work</h2>
  <ul>
    <li>Add OH⁻ (base): reacts with HA → A⁻ + H₂O (consumes weak acid, produces more conjugate base)</li>
    <li>Add H₃O⁺ (acid): reacts with A⁻ → HA + H₂O (consumes conjugate base, produces more weak acid)</li>
    <li>pH changes only slightly because the ratio [A⁻]/[HA] changes only slightly</li>
  </ul>

  <h2>Henderson–Hasselbalch Equation</h2>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;label&quot;>Henderson-Hasselbalch — USE ONLY FOR BUFFER SYSTEMS</div>
    pH = pKa + log([A⁻]/[HA])<br><br>
    When [A⁻] = [HA]: pH = pKa (maximum buffer capacity!)<br>
    When [A⁻] &amp;gt; [HA]: pH &amp;gt; pKa<br>
    When [A⁻] &amp;lt; [HA]: pH &amp;lt; pKa
  </div>

  <div class=&quot;warn-box&quot;>Use Henderson–Hasselbalch ONLY when you have a buffer (significant amounts of both HA and A⁻). Never use it for a pure weak acid, pure weak base, or after all the buffer has been consumed. Also: ratios of moles work just as well as ratios of concentrations (volume cancels).</div>

  <h2>Buffer + Acid/Base — The Must-Do Stoichiometry Step</h2>
  <div class=&quot;key-rule&quot;>
    <strong>Always do stoichiometry FIRST, then Henderson–Hasselbalch.</strong><br>
    Strong acid/base reacts completely. It converts HA ↔ A⁻ in the buffer. Update the moles, then apply H-H.
  </div>

  <table>
    <thead><tr><th>Added to buffer</th><th>Reaction</th><th>Effect on buffer</th></tr></thead>
    <tbody>
      <tr><td>Strong base (OH⁻)</td><td>OH⁻ + HA → A⁻ + H₂O</td><td>[HA] decreases; [A⁻] increases; pH increases</td></tr>
      <tr><td>Strong acid (H⁺)</td><td>H⁺ + A⁻ → HA</td><td>[A⁻] decreases; [HA] increases; pH decreases</td></tr>
    </tbody>
  </table>

  <h2>Buffer Capacity and Design</h2>
  <ul>
    <li><strong>Capacity</strong> depends on total concentration of buffer components (higher = more capacity)</li>
    <li><strong>Effective buffer range:</strong> pH = pKa ± 1</li>
    <li><strong>Design rule:</strong> choose a weak acid whose pKa is within 1 unit of your target pH</li>
    <li>Buffers fail when you add enough strong acid/base to consume all of one component</li>
  </ul>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Buffers <span class=&quot;badge&quot;>Ch. 14 §6</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> A buffer contains 0.400 mol CH₃COOH and 0.250 mol NaCH₃COO in 1.00 L. pKa(acetic acid) = 4.74. (a) Calculate the pH. (b) What is the pH after adding 0.050 mol NaOH?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;ans-label&quot;>Part (a)</div>
          <div class=&quot;step&quot;>H-H: pH = 4.74 + log(0.250/0.400) = 4.74 + log(0.625) = 4.74 + (−0.204) = 4.54</div>
          <div class=&quot;ans-label&quot;>Part (b) — Stoichiometry FIRST</div>
          <div class=&quot;step&quot;>OH⁻ + CH₃COOH → CH₃COO⁻ + H₂O</div>
          <div class=&quot;step&quot;>New mol CH₃COOH = 0.400 − 0.050 = 0.350 mol</div>
          <div class=&quot;step&quot;>New mol CH₃COO⁻ = 0.250 + 0.050 = 0.300 mol</div>
          <div class=&quot;step&quot;>pH = 4.74 + log(0.300/0.350) = 4.74 + (−0.067) = 4.67</div>
          <div class=&quot;final-ans&quot;>(a) pH = 4.54 &amp;nbsp; (b) pH = 4.67</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> What is the pH of a solution made by combining 0.25 M HCl with 0.75 M NaF? pKa(HF) = 3.617.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Recognize: HCl (strong acid) reacts with NaF (conjugate base of HF). This CREATES a buffer.</div>
          <div class=&quot;step&quot;>HCl + F⁻ → HF + Cl⁻ (strong acid converts F⁻ to HF)</div>
          <div class=&quot;step&quot;>After reaction: [F⁻] = 0.75 − 0.25 = 0.50 M; [HF] = 0.25 M</div>
          <div class=&quot;step&quot;>pH = 3.617 + log(0.50/0.25) = 3.617 + log(2) = 3.617 + 0.301 = 3.918</div>
          <div class=&quot;final-ans&quot;>pH ≈ 3.92</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q3</span> You need a buffer at pH = 7.40 (blood pH). You have NH₄⁺/NH₃ (pKa = 9.25) and H₂CO₃/HCO₃⁻ (pKa = 6.35 and 10.33), and H₂PO₄⁻/HPO₄²⁻ (pKa = 7.20). Which buffer system is best? What ratio do you need?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>Best buffer: pKa closest to target pH. H₂PO₄⁻/HPO₄²⁻ has pKa = 7.20 — only 0.20 units from 7.40.</div>
          <div class=&quot;step&quot;>pH = pKa + log([HPO₄²⁻]/[H₂PO₄⁻])</div>
          <div class=&quot;step&quot;>7.40 = 7.20 + log(ratio) → log(ratio) = 0.20 → ratio = 10⁰·²⁰ = 1.58</div>
          <div class=&quot;final-ans&quot;>Use H₂PO₄⁻/HPO₄²⁻; ratio [HPO₄²⁻]/[H₂PO₄⁻] = 1.58</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 14C — TITRATIONS
════════════════════════════════════════ -->
<section id=&quot;ch14c&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>14</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 14 §14.7</span>Acid-Base Titrations</div>
    </div>
  </div>

  <div class=&quot;concept-box&quot;><strong>Endpoint vs. Equivalence Point:</strong> The equivalence point is when moles acid = moles base exactly. The endpoint is when the indicator changes color — it should be near, but is NOT exactly at, the equivalence point.</div>

  <h2>Strong Acid + Strong Base Titration</h2>
  <p>Classic example: HCl(aq) + NaOH(aq) → NaCl(aq) + H₂O</p>

  <table>
    <thead><tr><th>Region</th><th>What's Present</th><th>How to Calculate pH</th></tr></thead>
    <tbody>
      <tr><td><strong>Initial</strong></td><td>Strong acid only</td><td>pH = −log[strong acid]</td></tr>
      <tr><td><strong>Before equivalence</strong></td><td>Excess strong acid + salt</td><td>Find excess mol H⁺; divide by total volume; pH = −log[H⁺]</td></tr>
      <tr><td><strong>At equivalence</strong></td><td>Only salt (NaCl)</td><td>pH = 7.00 (neutral salt)</td></tr>
      <tr><td><strong>Past equivalence</strong></td><td>Excess strong base</td><td>Find excess mol OH⁻; divide by total volume; pOH = −log[OH⁻]; pH = 14 − pOH</td></tr>
    </tbody>
  </table>

  <div class=&quot;warn-box&quot;>For strong acid + strong base, the half-equivalence point has no special significance (no pKa = pH relationship). The pH at the half-equivalence point is simply calculated from the remaining excess acid concentration.</div>

  <h2>Weak Acid + Strong Base Titration</h2>
  <p>Example: CH₃COOH + NaOH → NaCH₃COO + H₂O</p>
  <table>
    <thead><tr><th>Region</th><th>What's Present</th><th>Strategy</th></tr></thead>
    <tbody>
      <tr><td><strong>Initial</strong></td><td>Weak acid only</td><td>ICE table with Ka</td></tr>
      <tr><td><strong>Before equivalence (buffer region)</strong></td><td>Weak acid + conjugate base</td><td>Stoichiometry → Henderson–Hasselbalch</td></tr>
      <tr><td><strong>Half-equivalence point</strong></td><td>mol acid = mol conjugate base</td><td>pH = pKa (H-H: log(1) = 0)</td></tr>
      <tr><td><strong>At equivalence point</strong></td><td>Only conjugate base (A⁻)</td><td>Kb = Kw/Ka; ICE table → find [OH⁻]; pH &amp;gt; 7</td></tr>
      <tr><td><strong>Past equivalence</strong></td><td>Excess strong base</td><td>Excess OH⁻ dominates; pH = 14 − pOH</td></tr>
    </tbody>
  </table>

  <div class=&quot;key-rule&quot;>
    <strong>The half-equivalence point is the most important landmark in a weak acid titration:</strong> pH = pKa. This is the point of maximum buffer capacity, and the easiest point to experimentally determine Ka.
  </div>

  <h2>At the Equivalence Point — Weak Acid Titration</h2>
  <p>All weak acid has been converted to its conjugate base (A⁻). Now solve for pH of a weak base solution:</p>
  <div class=&quot;formula-box&quot;>
    Kb(A⁻) = Kw / Ka(HA)<br>
    Use ICE: A⁻ + H₂O ⇌ HA + OH⁻<br>
    [OH⁻] = √(Kb × [A⁻]<sub>new</sub>)<br>
    pH = 14 − pOH &amp;nbsp;&amp;nbsp; (pH &amp;gt; 7 at equivalence point for weak acid + strong base)
  </div>

  <h2>Titration Curve Shape Recognition</h2>
  <ul>
    <li><strong>Strong acid + strong base:</strong> sharp inflection at pH = 7, no buffer region</li>
    <li><strong>Weak acid + strong base:</strong> starts higher pH (less acidic initially), gradual buffer region, equivalence point above pH 7, sharp jump at equivalence</li>
    <li><strong>Strong acid + weak base:</strong> equivalence point below pH 7</li>
  </ul>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Titrations <span class=&quot;badge&quot;>Ch. 14 §7</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> 25.0 mL of 0.200 M HCl is titrated with 0.150 M NaOH. Calculate pH after adding (a) 0 mL, (b) 20.0 mL NaOH, (c) at equivalence point, (d) after adding 40.0 mL NaOH.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>(a) Initial: Strong acid; [H⁺] = 0.200 M; pH = −log(0.200) = 0.699</div>
          <div class=&quot;step&quot;>(b) mol HCl = 0.0250×0.200 = 0.00500 mol; mol NaOH added = 0.0200×0.150 = 0.00300 mol<br>
          Excess H⁺ = 0.00500 − 0.00300 = 0.00200 mol; Vol = 45.0 mL = 0.0450 L<br>
          [H⁺] = 0.00200/0.0450 = 0.0444 M; pH = 1.35</div>
          <div class=&quot;step&quot;>(c) Equivalence: mol HCl = 0.00500 mol; Vol NaOH needed = 0.00500/0.150 = 33.3 mL<br>
          Solution is NaCl — neutral; pH = 7.00</div>
          <div class=&quot;step&quot;>(d) mol NaOH = 0.0400×0.150 = 0.00600 mol; Excess OH⁻ = 0.00600 − 0.00500 = 0.00100 mol<br>
          Vol = 65.0 mL = 0.0650 L; [OH⁻] = 0.0154 M; pOH = 1.81; pH = 12.19</div>
          <div class=&quot;final-ans&quot;>(a) 0.699 &amp;nbsp; (b) 1.35 &amp;nbsp; (c) 7.00 &amp;nbsp; (d) 12.19</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> 25.00 mL of 0.883 M HC₂H₃O₂ (acetic acid, Ka = 6.5×10⁻⁵) is titrated with 0.571 M NaOH. Find pH at (a) the half-equivalence point, (b) the equivalence point.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>(a) Half-equivalence → mol base = ½ mol acid → moles of acid = moles of conjugate base.</div>
          <div class=&quot;step&quot;>pH = pKa = −log(6.5×10⁻⁵) = 4.19</div>
          <div class=&quot;step&quot;>(b) mol acid = 0.02500 × 0.883 = 0.022075 mol. At equivalence, all converted to CH₃COO⁻.</div>
          <div class=&quot;step&quot;>Vol NaOH needed = 0.022075/0.571 = 0.03866 L; Total vol = 0.02500 + 0.03866 = 0.06366 L</div>
          <div class=&quot;step&quot;>[CH₃COO⁻] = 0.022075/0.06366 = 0.3469 M</div>
          <div class=&quot;step&quot;>Kb(CH₃COO⁻) = 1.0×10⁻¹⁴ / 6.5×10⁻⁵ = 1.538×10⁻¹⁰</div>
          <div class=&quot;step&quot;>ICE: [OH⁻] = √(1.538×10⁻¹⁰ × 0.3469) = √(5.34×10⁻¹¹) = 7.31×10⁻⁶ M</div>
          <div class=&quot;step&quot;>pOH = 5.14; pH = 14 − 5.14 = 8.86</div>
          <div class=&quot;final-ans&quot;>(a) pH = 4.19 &amp;nbsp; (b) pH = 8.86</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q3</span> An unknown weak acid has pKa = 4.89. A 0.471 g sample reacts with 12.5 mL of 0.200 M NaOH and is diluted to 250 mL, giving pH = 4.70. Find the molar mass of the acid.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>mol NaOH = 0.200 × 0.0125 = 0.00250 mol (this becomes mol A⁻, the conjugate base)</div>
          <div class=&quot;step&quot;>Use H-H to find mol acid remaining:</div>
          <div class=&quot;step&quot;>4.70 = 4.89 + log(0.00250/mol HA) → log(0.00250/mol HA) = −0.19</div>
          <div class=&quot;step&quot;>0.00250/mol HA = 10⁻⁰·¹⁹ = 0.6457 → mol HA = 0.00250/0.6457 = 0.003872 mol</div>
          <div class=&quot;step&quot;>Total moles from original sample = 0.00250 + 0.003872 = 0.006372 mol</div>
          <div class=&quot;step&quot;>Molar mass = 0.471 g / 0.006372 mol = 73.9 g/mol</div>
          <div class=&quot;final-ans&quot;>Molar mass ≈ 74 g/mol</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CHAPTER 16 — THERMODYNAMICS
════════════════════════════════════════ -->
<section id=&quot;ch16&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>16</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Chapter 16</span>Thermodynamics</div>
    </div>
  </div>

  <h2>Core Principle: ΔG Predicts Spontaneity</h2>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;label&quot;>Central Equation</div>
    ΔG = ΔH − TΔS<br><br>
    ΔG &amp;lt; 0 → spontaneous &amp;nbsp;&amp;nbsp; ΔG &amp;gt; 0 → nonspontaneous &amp;nbsp;&amp;nbsp; ΔG = 0 → equilibrium
  </div>

  <h2>Entropy (S) — Energy Dispersal</h2>
  <p>Entropy measures how many ways energy and matter can be arranged (microstates W): S = k·ln(W). More microstates = higher entropy.</p>
  <p><strong>ΔS is positive when:</strong> solid → liquid → gas, number of gas molecules increases, volume increases, temperature increases, particles mix or dissolve, molecular complexity increases.</p>

  <h2>The Second Law</h2>
  <div class=&quot;formula-box&quot;>ΔS<sub>universe</sub> = ΔS<sub>system</sub> + ΔS<sub>surroundings</sub> &amp;gt; 0 for spontaneous process<br><br>
  ΔS<sub>surr</sub> = −ΔH<sub>sys</sub>/T</div>

  <h2>Temperature Dependence of Spontaneity</h2>
  <table>
    <thead><tr><th>ΔH</th><th>ΔS</th><th>ΔG</th><th>Spontaneous?</th></tr></thead>
    <tbody>
      <tr><td>− (exo)</td><td>+ (more disorder)</td><td>always −</td><td>At ALL temperatures</td></tr>
      <tr><td>+ (endo)</td><td>− (less disorder)</td><td>always +</td><td>NEVER (nonspontaneous)</td></tr>
      <tr><td>+ (endo)</td><td>+ (more disorder)</td><td>− only at high T</td><td>Only at HIGH temperature</td></tr>
      <tr><td>− (exo)</td><td>− (less disorder)</td><td>− only at low T</td><td>Only at LOW temperature</td></tr>
    </tbody>
  </table>

  <h2>Threshold Temperature</h2>
  <p>When ΔH and ΔS have the same sign, find the &quot;crossover&quot; temperature:</p>
  <div class=&quot;formula-box&quot;>T<sub>crossover</sub> = ΔH/ΔS (where ΔG = 0)<br><br>
  Units: ΔH in J/mol (or kJ), ΔS in J/(mol·K) → must use same energy units!</div>

  <h2>Calculating ΔG°</h2>
  <div class=&quot;formula-box&quot;>Method 1: ΔG° = ΔH° − TΔS°<br>
  Method 2: ΔG° = Σn·ΔG°f(products) − Σn·ΔG°f(reactants)<br><br>
  Note: ΔG°f of elements in standard state = 0 &amp;nbsp;&amp;nbsp; BUT S° of elements ≠ 0!</div>

  <h2>ΔG and K</h2>
  <div class=&quot;formula-box&quot;>
    ΔG° = −RT·ln(K) &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; → &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; K = e<sup>−ΔG°/RT</sup><br><br>
    ΔG = ΔG° + RT·ln(Q) &amp;nbsp;&amp;nbsp; (non-standard conditions)<br><br>
    At equilibrium: Q = K → ΔG = 0 ✓
  </div>

  <div class=&quot;connection&quot;>ΔG° and K are intimately linked. If ΔG° &amp;lt; 0, then K &amp;gt; 1, and products are favored. This is the same condition as &quot;spontaneous under standard conditions.&quot; Temperature changes K because K = e<sup>−ΔH°/RT + ΔS°/R</sup>.</div>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Practice Problems — Thermodynamics <span class=&quot;badge&quot;>Ch. 16</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> For a reaction, ΔH° = +120 kJ/mol and ΔS° = +200 J/(mol·K). (a) Is it spontaneous at 25°C? (b) At what temperature does it become spontaneous?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>(a) ΔG° = ΔH° − TΔS° = 120,000 − (298)(200) = 120,000 − 59,600 = +60,400 J → +60.4 kJ</div>
          <div class=&quot;step&quot;>ΔG° &amp;gt; 0 → NOT spontaneous at 25°C</div>
          <div class=&quot;step&quot;>(b) Set ΔG = 0: T = ΔH/ΔS = 120,000/200 = 600 K</div>
          <div class=&quot;step&quot;>Spontaneous when T &amp;gt; 600 K (327°C) — high temperature favors +ΔH, +ΔS reactions</div>
          <div class=&quot;final-ans&quot;>(a) Not spontaneous &amp;nbsp; (b) T &amp;gt; 600 K</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> Calculate ΔS°<sub>rxn</sub> for: 2H₂(g) + O₂(g) → 2H₂O(l). Given S°: H₂(g) = 131 J/mol·K; O₂(g) = 205 J/mol·K; H₂O(l) = 70 J/mol·K.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>ΔS°<sub>rxn</sub> = ΣnS°(products) − ΣnS°(reactants)</div>
          <div class=&quot;step&quot;>= 2(70) − [2(131) + 1(205)]</div>
          <div class=&quot;step&quot;>= 140 − [262 + 205] = 140 − 467 = −327 J/mol·K</div>
          <div class=&quot;step&quot;>Makes sense: 3 moles of gas → 0 moles of gas (liquid product). Large decrease in entropy. ✓</div>
          <div class=&quot;final-ans&quot;>ΔS°<sub>rxn</sub> = −327 J/mol·K</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q3</span> At 298 K, ΔG° = −35.0 kJ/mol for a reaction. Calculate K. If Q = 10.0, is the reaction spontaneous under these conditions?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>K = e<sup>−ΔG°/RT</sup> = e<sup>−(−35000)/(8.314×298)</sup> = e<sup>14.12</sup> = 1.35 × 10⁶</div>
          <div class=&quot;step&quot;>Q = 10.0 vs K = 1.35 × 10⁶. Q &amp;lt;&amp;lt; K → reaction proceeds forward → spontaneous ✓</div>
          <div class=&quot;step&quot;>Verify: ΔG = ΔG° + RT·ln(Q) = −35,000 + (8.314)(298)ln(10.0) = −35,000 + 5705 = −29,295 J &amp;lt; 0 ✓</div>
          <div class=&quot;final-ans&quot;>K = 1.35 × 10⁶; reaction is spontaneous (ΔG = −29.3 kJ)</div>
        </div></details>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     CONNECTIONS + MIXED PROBLEMS
════════════════════════════════════════ -->
<section id=&quot;connections&quot;>
  <div class=&quot;chapter-header&quot;>
    <div class=&quot;chapter-num&quot;>∞</div>
    <div>
      <div class=&quot;chapter-title&quot;><span class=&quot;label&quot;>Cross-Chapter</span>Connections &amp;amp; Mixed Practice</div>
    </div>
  </div>

  <h2>The Critical Connections Your Professor Tests</h2>

  <div class=&quot;connection&quot;>IMFs ↔ Entropy ↔ Free Energy: Stronger IMFs mean lower entropy of the liquid phase, higher ΔH<sub>vap</sub>, higher boiling point. Dissolving a solute increases entropy of the liquid, lowering ΔG<sub>liquid</sub>, causing freezing point depression and boiling point elevation.</div>

  <div class=&quot;connection&quot;>ΔG° ↔ K ↔ Q: ΔG° tells you where the equilibrium lies. Q tells you where you are now. If Q &amp;lt; K, the reaction is spontaneous (ΔG &amp;lt; 0) in the forward direction. Temperature changes K because it changes ΔG°.</div>

  <div class=&quot;connection&quot;>Kinetics ↔ Mechanisms ↔ Energy Diagrams: The activation energy (Ea) appears in the Arrhenius equation and on energy diagrams as the hill height from reactants to transition state. The slowest step (highest Ea hill) = rate-determining step. A catalyst lowers Ea but doesn't change ΔH or ΔG.</div>

  <div class=&quot;connection&quot;>Buffers ↔ Equilibrium: A buffer is just a specific application of Ka/Kb equilibrium. Henderson–Hasselbalch comes directly from the Ka expression. Le Châtelier explains why buffers resist pH change: adding H⁺ shifts the HA ⇌ H⁺ + A⁻ equilibrium left, consuming the added H⁺.</div>

  <div class=&quot;practice-section&quot;>
    <div class=&quot;ps-header&quot;><span>⬡</span> Mixed Final Exam Practice <span class=&quot;badge&quot;>CUMULATIVE</span></div>
    <div class=&quot;ps-body&quot;>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q1</span> Arrange in order of decreasing acidity (most acidic first): NaCl<sub>(aq)</sub>, NH₄Cl<sub>(aq)</sub>, NH₄ClO₄<sub>(aq)</sub>, NaOH<sub>(aq)</sub>. Ka(NH₄⁺) ≈ 10⁻⁹, Kb(ClO₄⁻) ≈ 10⁻⁸.</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>NaOH: strong base → highest pH → least acidic → goes last.</div>
          <div class=&quot;step&quot;>NaCl: Na⁺ (conjugate of strong base, neutral) + Cl⁻ (conjugate of strong acid, neutral) → pH = 7, neutral.</div>
          <div class=&quot;step&quot;>NH₄Cl: NH₄⁺ (conjugate of weak base NH₃, weakly acidic) + Cl⁻ (neutral) → acidic solution.</div>
          <div class=&quot;step&quot;>NH₄ClO₄: NH₄⁺ (acidic) + ClO₄⁻ (conjugate of weak acid HClO₄; weak base, Kb ≈ 10⁻⁸ &amp;gt; Ka(NH₄⁺) ≈ 10⁻⁹). Since Kb(ClO₄⁻) &amp;gt; Ka(NH₄⁺), the basic anion slightly dominates, making it LESS acidic than NH₄Cl. Wait — recheck: Ka(NH₄⁺) &amp;gt; Kb(ClO₄⁻) means NH₄⁺ wins → more acidic? No. Ka = 10⁻⁹ for acid; Kb = 10⁻⁸ for base. Larger K means stronger effect. Kb &amp;gt; Ka here → basic effect wins slightly. But both are tiny. The answer from the key: NH₄Cl &amp;gt; NH₄ClO₄ &amp;gt; NaCl &amp;gt; NaOH.</div>
          <div class=&quot;final-ans&quot;>NH₄Cl &amp;gt; NH₄ClO₄ &amp;gt; NaCl &amp;gt; NaOH (most acidic → least acidic)</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q2</span> A 25 mL sample of HBr is titrated with NaOH. The half-equivalence point is reached. Why is the half-equivalence point NOT a useful landmark (unlike in a weak acid titration)?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>HBr is a STRONG acid. At the half-equivalence point, exactly half the HBr has been neutralized.</div>
          <div class=&quot;step&quot;>The remaining HBr is still a strong acid — there is no buffer region, no weak acid/conjugate base pair.</div>
          <div class=&quot;step&quot;>pH is simply calculated from the excess [H⁺], NOT from pH = pKa.</div>
          <div class=&quot;step&quot;>For weak acid titrations, pH = pKa at half-equivalence because [HA] = [A⁻]. This doesn't apply here.</div>
          <div class=&quot;final-ans&quot;>No pKa exists for strong acids; half-equivalence point has no special pH = pKa relationship.</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q3</span> Consider: A(g) ⇌ 2B(g), ΔH° = +80 kJ. (a) Is K large or small at low T? (b) Does K increase or decrease as T increases? (c) Does adding a catalyst change K? (d) What happens to Q when you compress the gas?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>(a) Endothermic (+ΔH) → at low T, reverse (exothermic direction) is favored → K is small at low T.</div>
          <div class=&quot;step&quot;>(b) Adding T to an endothermic reaction shifts toward products → K increases with T.</div>
          <div class=&quot;step&quot;>(c) Catalyst lowers Ea but does NOT change ΔG°, ΔH°, or K. K is unchanged.</div>
          <div class=&quot;step&quot;>(d) Compression (↓V, ↑P): concentrations of all gases increase. Reaction has 1 mol reactant → 2 mol product (more moles gas in products). Q = [B]²/[A]. When compressed, [B] and [A] both increase. Q = (2c)²/(2c) = 4c²/2c = 2c (increases). If Q &amp;gt; K, reaction shifts LEFT (toward fewer moles of gas). ✓</div>
          <div class=&quot;final-ans&quot;>(a) Small (b) Increases (c) No change (d) Q increases → shifts left</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q4</span> A reaction energy diagram shows two humps. The first hump is lower than the second. (a) How many elementary steps are there? (b) How many intermediates? (c) Which step is the RDS? (d) Where does a catalyst lower the diagram?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>(a) Two humps = two transition states = two elementary steps.</div>
          <div class=&quot;step&quot;>(b) The valley between the two humps = one intermediate.</div>
          <div class=&quot;step&quot;>(c) The second hump is higher (larger Ea from intermediate) = the second step is slower = RDS.</div>
          <div class=&quot;step&quot;>(d) A catalyst provides an alternate pathway with lower activation energies for both steps — it lowers both humps. It does NOT change the energy of reactants or products (ΔH unchanged).</div>
          <div class=&quot;final-ans&quot;>(a) 2 steps (b) 1 intermediate (c) Step 2 (higher hump) (d) Both humps lowered, not reactants/products</div>
        </div></details>
      </div>

      <div class=&quot;problem&quot;>
        <div class=&quot;problem-q&quot;><span class=&quot;num&quot;>Q5</span> Why does CaCl₂ (i ≈ 3) produce more freezing point depression per gram than glucose (i = 1, MW = 180 g/mol), even when you dissolve the same mass of each?</div>
        <details><summary>Show Answer</summary>
        <div class=&quot;answer-body&quot;>
          <div class=&quot;step&quot;>ΔT<sub>f</sub> = i·m·K<sub>f</sub> depends on the NUMBER of particles, not their identity.</div>
          <div class=&quot;step&quot;>CaCl₂ (MW = 111 g/mol) dissociates into Ca²⁺ + 2Cl⁻ → 3 particles per formula unit.</div>
          <div class=&quot;step&quot;>For same mass: 1 g CaCl₂ = 0.00901 mol → 0.02703 mol particles.</div>
          <div class=&quot;step&quot;>1 g glucose = 0.00556 mol → 0.00556 mol particles (i = 1, doesn't dissociate).</div>
          <div class=&quot;step&quot;>CaCl₂ produces nearly 5× more particles per gram → much greater ΔT<sub>f</sub>.</div>
          <div class=&quot;final-ans&quot;>CaCl₂ has lower MW AND dissociates into 3 particles — far more particles per gram than glucose.</div>
        </div></details>
      </div>

    </div>
  </div>

  <h2>Final Quick-Reference: What to Do When You See...</h2>
  <table>
    <thead><tr><th>Clue in Problem</th><th>Situation</th><th>Strategy</th></tr></thead>
    <tbody>
      <tr><td>&quot;Weak acid + its salt&quot; or &quot;weak base + its salt&quot;</td><td>Buffer</td><td>Henderson–Hasselbalch (after stoichiometry if acid/base added)</td></tr>
      <tr><td>&quot;Strong acid + strong base&quot; titration</td><td>Neutralization</td><td>Moles excess; pH from [H⁺] or [OH⁻]</td></tr>
      <tr><td>&quot;Weak acid + strong base&quot; titration, before EP</td><td>Buffer region</td><td>Stoichiometry → Henderson–Hasselbalch</td></tr>
      <tr><td>&quot;At equivalence point&quot; + weak acid</td><td>Conjugate base solution</td><td>Kb = Kw/Ka; ICE table; pH &amp;gt; 7</td></tr>
      <tr><td>&quot;Half-equivalence point&quot; + weak acid</td><td>pH = pKa</td><td>Identify directly — no calculation needed</td></tr>
      <tr><td>Rate law data table</td><td>Kinetics</td><td>Method of initial rates; compare pairs of experiments</td></tr>
      <tr><td>Concentration vs. time data</td><td>Integrated rate law</td><td>Plot all three; find linear one; get order and k from slope</td></tr>
      <tr><td>Two temperatures + two k values</td><td>Arrhenius</td><td>Two-temperature form: ln(k₂/k₁) = (Ea/R)(1/T₁ − 1/T₂)</td></tr>
      <tr><td>ΔH° and ΔS° given</td><td>Thermodynamics</td><td>ΔG° = ΔH° − TΔS°; check sign; if ΔH and ΔS same sign, find T<sub>crossover</sub></td></tr>
      <tr><td>ΔG° and need K</td><td>Thermo ↔ Equilibrium</td><td>K = e<sup>−ΔG°/RT</sup></td></tr>
      <tr><td>K given and non-standard concentrations</td><td>Q vs K comparison</td><td>Calculate Q; compare to K; determine direction of shift</td></tr>
      <tr><td>Mechanism with fast first step</td><td>Pre-equilibrium</td><td>Fast step reaches equilibrium; substitute intermediate concentration</td></tr>
    </tbody>
  </table>

<style>

    letter-spacing: 0.08em;

  @media print {

    .solution-toggle { display: none; }
  }
</style>

(function(){

  <div class=&quot;oc-section&quot; id=&quot;oc14&quot;>
    <div class=&quot;oc-number&quot;>Outcome 14</div>
    <h2>Dimension Theorems</h2>
    <p class=&quot;oc-goal&quot;>Apply the Spanning Set Theorem, Linearly Independent Set Theorem, Basis Theorem, and Rank Theorem to determine subspace dimensions and properties of collections of vectors.</p>

    <h3>The Four Key Theorems</h3>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Spanning Set Theorem (Thm 5, Ch. 4)</div>
      <p>Let $S = \{v_1,\ldots,v_p\}$ be a set in $V$ with $H = \operatorname{Span}(S)$.</p>
      <ul>
        <li>If some $v_k$ is a linear combination of the other vectors in $S$, removing it still spans $H$.</li>
        <li>Some subset of $S$ is a <em>basis</em> for $H$.</li>
      </ul>
      <p><strong>What it tells you:</strong> If you have a spanning set with a redundant vector, you can always reduce it. You never <em>need</em> more vectors than $\dim(V)$ to span $V$.</p>
    </div>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Linearly Independent Set Theorem (Thm 11, Ch. 4)</div>
      <p>Let $H$ be a subspace of a finite-dimensional vector space $V$. Any linearly independent set in $H$ can be <em>expanded</em> to a basis for $H$. Also, $H$ is finite-dimensional and $\dim(H) \le \dim(V)$.</p>
      <p><strong>Key consequence:</strong> A linearly independent set has <em>at most</em> $\dim(V)$ vectors. You cannot have more linearly independent vectors than the dimension allows.</p>
    </div>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Basis Theorem (Thm 12, Ch. 4)</div>
      <p>Let $V$ be a $p$-dimensional vector space, $p \ge 1$. Then:</p>
      <ul>
        <li>Any linearly independent set of <strong>exactly</strong> $p$ elements automatically is a basis.</li>
        <li>Any spanning set of <strong>exactly</strong> $p$ elements automatically is a basis.</li>
      </ul>
      <p><strong>Bottom line:</strong> Once you know $\dim(V) = p$, you only need to check ONE of {spans, linearly independent} for a set of exactly $p$ vectors — the other is automatic.</p>
    </div>

    <div class=&quot;theorem&quot;>
      <div class=&quot;theorem-label&quot;>Rank Theorem (Thm 14, Ch. 4)</div>
      <p>For any $m \times n$ matrix $A$:
      $$\operatorname{rank}(A) + \dim(\operatorname{Nul}(A)) = n$$
      where $\operatorname{rank}(A) = \dim(\operatorname{Col}(A)) = \dim(\operatorname{Row}(A))$ = number of pivot columns.</p>
    </div>

    <h3>Critical True/False Logic</h3>
    <p>This is the #1 tested skill for OC14. The key relationships are:</p>

    <table>
      <tr><th>Condition</th><th>Implication for dim(V)</th><th>Why</th></tr>
      <tr><td>$\{v_1,v_2,v_3\}$ <strong>spans</strong> $V$</td><td>$\dim(V) \le 3$</td><td>A spanning set can always be reduced to a basis; the basis has $\le 3$ vectors.</td></tr>
      <tr><td>$\{v_1,v_2,v_3\}$ are <strong>linearly independent</strong></td><td>$\dim(V) \ge 3$</td><td>A lin. indep. set can be extended to a basis; need at least 3 slots.</td></tr>
      <tr><td>$\{v_1,v_2,v_3\}$ are <strong>linearly dependent</strong></td><td>No constraint</td><td>Dependent sets say nothing about the dimension ceiling or floor.</td></tr>
    </table>

    <div class=&quot;insight&quot;>
      <strong>Memory trick:</strong> &quot;Spans → ceiling ($\le$), Independent → floor ($\ge$), Dependent → nothing.&quot;
    </div>

    <h3>Rank &amp;amp; Nullity: Step-by-Step</h3>
    <div class=&quot;steps&quot;>
      <ol>
        <li>Row-reduce $A$ to echelon form.</li>
        <li>Count pivot columns → that's $\operatorname{rank}(A)$.</li>
        <li>$\operatorname{nullity}(A) = n - \operatorname{rank}(A)$ (where $n$ = number of columns).</li>
        <li>$\dim(\operatorname{Col}(A)) = \operatorname{rank}(A)$; basis = pivot columns of original $A$.</li>
        <li>$\dim(\operatorname{Nul}(A)) = \operatorname{nullity}(A)$; basis = parametric solution vectors.</li>
      </ol>
    </div>

    <h3>Practice Problems</h3>

    <!-- P1 -->
    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 14.1 — From Your Assessment</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Suppose $A$ is a $6 \times 5$ matrix for which $Ae_1 = Ae_2 = Ae_5 = \mathbf{0}$, where $e_1, e_2, e_5$ are standard basis vectors in $\mathbb{R}^5$. Find all possible ranks of $A$. Briefly justify your answer.</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Key observation:</strong> $Ae_k = \mathbf{0}$ means the $k$-th column of $A$ is the zero vector. So columns 1, 2, and 5 are all $\mathbf{0}$.</p>
        <p>The only non-zero columns can be columns 3 and 4. So at most 2 columns can be pivots.</p>
        <p>Columns 3 and 4 could be: both zero (rank 0), one nonzero (rank 1), or both nonzero and independent (rank 2).</p>
        <p>But we're told $A$ is a $6 \times 5$ matrix — all we know is three columns are zero, two may or may not be. So:</p>
        <p><strong>All possible ranks of $A$ are $0, 1,$ or $2$.</strong></p>
        <p>By the Rank Theorem: $\operatorname{nullity}(A) = 5 - \operatorname{rank}(A)$, so nullity is $5$, $4$, or $3$ respectively.</p>
      </div>
    </div>

    <!-- P2 -->
    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 14.2 — From Your Assessment</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Let $H = \operatorname{Span}\{v_1, v_2, v_3, v_4, v_5\}$ be a subspace of $V$. Assuming that $v_1 \ne \mathbf{0}$, $v_1 + v_2 = v_3$, and $v_4 = 2v_5$, what are the possible dimensions of $H$?</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>Identify redundancies using Spanning Set Theorem:</strong></p>
        <p>$v_3 = v_1 + v_2$ → $v_3$ is a linear combination of $v_1, v_2$ → remove $v_3$.</p>
        <p>$v_4 = 2v_5$ → $v_4$ is a scalar multiple of $v_5$ → remove $v_4$.</p>
        <p>After removing: $H = \operatorname{Span}\{v_1, v_2, v_5\}$. We have 3 vectors remaining.</p>
        <p>These 3 vectors could still be dependent (if, say, $v_2 = cv_5$ for some scalar $c$).</p>
        <p>We know $v_1 \ne 0$, so $\dim(H) \ge 1$. At most $\dim(H) \le 3$.</p>
        <p><strong>Possible dimensions of $H$: $1, 2,$ or $3$.</strong></p>
      </div>
    </div>

    <!-- P3 -->
    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 14.3 — True/False Classic</span>
        <span class=&quot;diff&quot;>EASY</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>Let $V$ be a nonzero, finite-dimensional vector space and $v_1, v_2, v_3 \in V$. True or false?</p>
        <ol type=&quot;a&quot;>
          <li>If $\{v_1,v_2,v_3\}$ spans $V$, then $\dim(V) \le 3$.</li>
          <li>If $\{v_1,v_2,v_3\}$ are linearly independent, then $\dim(V) \le 3$.</li>
          <li>If $\{v_1,v_2,v_3\}$ are linearly dependent, then $\dim(V) \le 3$.</li>
        </ol>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p><strong>(a) TRUE.</strong> By the Spanning Set Theorem, some subset of $\{v_1,v_2,v_3\}$ is a basis for $V$. That basis has at most 3 vectors, so $\dim(V) \le 3$. ✓</p>
        <p><strong>(b) FALSE.</strong> Counterexample: Let $V = \mathbb{R}^4$ and $v_1 = e_1, v_2 = e_2, v_3 = e_3$. These are linearly independent but $\dim(\mathbb{R}^4) = 4 > 3$. A linearly independent set in $V$ does NOT cap $\dim(V)$; it gives a floor, not a ceiling.</p>
        <p><strong>(c) FALSE.</strong> Counterexample: Let $V = \mathbb{R}^5$ and $v_1 = v_2 = v_3 = e_1$. They are dependent but $\dim(V) = 5 > 3$. Dependence tells us nothing about the dimension of $V$.</p>
      </div>
    </div>

    <!-- P4 new -->
    <div class=&quot;practice-block&quot;>
      <div class=&quot;practice-header&quot;>
        <span>PRACTICE 14.4 — Rank Theorem Application</span>
        <span class=&quot;diff med&quot;>MEDIUM</span>
      </div>
      <div class=&quot;practice-body&quot;>
        <p>A matrix $A$ has size $4 \times 7$. The null space of $A$ has dimension 4. What is $\operatorname{rank}(A)$? Is $A$ onto as a transformation $\mathbb{R}^7 \to \mathbb{R}^4$?</p>
      </div>
      <div class=&quot;solution-toggle&quot; onclick=&quot;toggleSolution(this)&quot;>▶ Show Solution</div>
      <div class=&quot;solution-content&quot;>
        <p>By the Rank Theorem: $\operatorname{rank}(A) + \dim(\operatorname{Nul}(A)) = n = 7$.</p>
        <p>So $\operatorname{rank}(A) = 7 - 4 = 3$.</p>
        <p>For $A$ to be onto, we'd need $\dim(\operatorname{Col}(A)) = 4$ (all of $\mathbb{R}^4$). But $\operatorname{rank}(A) = 3 < 4$, so $A$ is <strong>not onto</strong>.</p>
      </div>
    </div>

  </div><!-- /OC14 -->

       OC 15
