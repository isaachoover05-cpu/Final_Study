      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Initial guess for \(g=e^{2x}\): try \(y_p = Ae^{2x}\). But \(e^{2x}\) is already in \(y_h\)! Apply modification rule: multiply by \(x\).<br>
        Modified guess: \(y_p = Axe^{2x}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Compute: \(y_p' = Ae^{2x}+2Axe^{2x}\), \(y_p'' = 4Ae^{2x}+4Axe^{2x}\).<br>
        Substitute: \((4Ae^{2x}+4Axe^{2x}) - 3(Ae^{2x}+2Axe^{2x}) + 2Axe^{2x}\)<br>
        \(= (4A-3A)e^{2x} + (4A-6A+2A)xe^{2x} = Ae^{2x} + 0 = Ae^{2x}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>Set equal to \(e^{2x}\): \(A=1\). So \(y_p = xe^{2x}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y = C_1e^x + C_2e^{2x} + xe^{2x}\)</div>
    </div>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 9.4 — MUC with Trig Forcing
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Find a particular solution of \(y'' + 4y = 3\sin(2x)\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Char. eq.: \(r^2+4=0 \Rightarrow r=\pm 2i\).<br>
        \(y_h = C_1\cos(2x)+C_2\sin(2x)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Guess for \(3\sin(2x)\): Initial guess \(A\cos(2x)+B\sin(2x)\). But both terms are in \(y_h\)! Multiply by \(x\): \(y_p = x(A\cos(2x)+B\sin(2x))\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Differentiate: \(y_p' = (A\cos 2x+B\sin 2x)+x(-2A\sin 2x+2B\cos 2x)\).<br>
        \(y_p'' = (-2A\sin 2x+2B\cos 2x)+(-2A\sin 2x+2B\cos 2x)+x(-4A\cos 2x-4B\sin 2x)\)<br>
        \(= -4A\sin 2x+4B\cos 2x - 4x(A\cos 2x+B\sin 2x)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>\(y_p''+4y_p = -4A\sin 2x+4B\cos 2x - 4x(\ldots)+4x(\ldots)\). The \(x\) terms cancel!<br>
        \(= -4A\sin 2x+4B\cos 2x = 3\sin(2x)\).<br>
        So \(4B=0 \Rightarrow B=0\) and \(-4A=3 \Rightarrow A=-\frac{3}{4}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y_p = -\dfrac{3}{4}x\cos(2x)\)</div>
    </div>
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 9.1</div>
      <p>Find the general solution: \(y''' - y'' - y' + y = 0\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(r^3-r^2-r+1=0\). Factor: \(r^2(r-1)-(r-1)=0\) → \((r^2-1)(r-1)=(r-1)^2(r+1)=0\).<br>
          Roots: \(r=1\) (mult 2), \(r=-1\) (simple).<br>
          \(y=C_1e^x+C_2xe^x+C_3e^{-x}\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 9.2</div>
      <p>Find \(y_p\) for \(y'' + 2y' + y = xe^{-x}\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(r^2+2r+1=(r+1)^2=0\) → \(r=-1\) (mult 2). \(y_h=(C_1+C_2x)e^{-x}\).<br>
          Guess: \(xe^{-x}\) would be absorbed by \(y_h\). Standard guess for \(xe^{-x}\): \((Ax+B)e^{-x}\), but both terms are in \(y_h\). Multiply by \(x^2\): \(y_p=x^2(Ax+B)e^{-x}=(Ax^3+Bx^2)e^{-x}\).<br>
          After substituting and matching: \(y_p = \frac{x^3}{6}e^{-x}\cdot \frac{1}{1}\) ... Working out: \(y_p'' + 2y_p' + y_p = 6Ae^{-x} \cdot \frac{1}{6} \cdot 6... \)<br>
          Full calculation gives \(6A=1 \Rightarrow A=\frac{1}{6}\), \(2B=0 \Rightarrow B=0\). Answer: \(y_p=\frac{1}{6}x^3e^{-x}\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 9.3</div>
      <p>Solve the IVP: \(y'' + y = \sec x\) ... wait, this requires variation of parameters, not MUC! Solve \(y'' - 4y' + 3y = 2e^{3x}\), \(y(0)=1\), \(y'(0)=0\) instead.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Char. eq.: \(r^2-4r+3=(r-1)(r-3)=0\) → \(r=1,3\). \(y_h=C_1e^x+C_2e^{3x}\).<br>
          \(e^{3x}\) is in \(y_h\); modify guess: \(y_p=Axe^{3x}\).<br>
          \(y_p'=Ae^{3x}+3Axe^{3x}\), \(y_p''=6Ae^{3x}+9Axe^{3x}\).<br>
          Sub: \((6A+9Ax)e^{3x}-4(A+3Ax)e^{3x}+3Axe^{3x}=(6A-4A)e^{3x}+(9A-12A+3A)xe^{3x}=2Ae^{3x}=2e^{3x}\).<br>
          \(A=1\), \(y_p=xe^{3x}\).<br>
          General: \(y=C_1e^x+C_2e^{3x}+xe^{3x}\).<br>
          ICs: \(y(0)=C_1+C_2=1\); \(y'=C_1e^x+3C_2e^{3x}+e^{3x}+3xe^{3x}\), \(y'(0)=C_1+3C_2+1=0\).<br>
          System: \(C_1+C_2=1\), \(C_1+3C_2=-1\) → \(2C_2=-2\) → \(C_2=-1\), \(C_1=2\).<br>
          \(\boxed{y=2e^x-e^{3x}+xe^{3x}}\)
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Higher-Order DEs — Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>CASE 1: REAL DISTINCT</span>
        \(y_h = C_1e^{r_1x}+C_2e^{r_2x}\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>CASE 2: REPEATED ROOT \(r\)</span>
        \(y_h = (C_1+C_2x)e^{rx}\) — never forget the \(x\)!
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>CASE 3: COMPLEX \(\alpha\pm\beta i\)</span>
        \(y_h = e^{\alpha x}(C_1\cos\beta x+C_2\sin\beta x)\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>MUC MODIFICATION RULE</span>
        Guess duplicates \(y_h\)? Multiply by \(x\). Still duplicates? Multiply by \(x^2\). And so on.
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 10: SPRING MASS -->
<div id=&quot;spring-mass&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>10</div>
  Spring-Mass Systems (Chapter 5)
</div>

<div class=&quot;topic-section&quot;>
  <h2>10. Spring-Mass Systems</h2>

  <h3>10.1 The Fundamental IVP</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>EQUATION OF MOTION (Newton's 2nd Law)</strong>
    \[mx'' + \beta x' + kx = f(t)\]
    \(m\) = mass (kg), \(\beta\) = damping coefficient (\(\beta \geq 0\)), \(k\) = spring constant,<br>
    \(f(t)\) = external force, \(x\) = displacement from equilibrium (positive = downward by convention)
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ SIGN CONVENTION — Read Carefully!</strong>
    The standard convention used in MATH 225 is: <strong>positive displacement is downward</strong>. When setting up from a word problem, state this explicitly. A mass &quot;released from rest 3 cm above equilibrium&quot; has \(x(0) = -0.03\) m (negative = above), \(x'(0) = 0\).
  </div>

  <h3>10.2 Free Undamped Motion (\(\beta = 0\), \(f=0\))</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>FREE UNDAMPED</strong>
    \[mx'' + kx = 0 \quad\Longrightarrow\quad x'' + \omega^2 x = 0, \quad \omega = \sqrt{k/m}\]
    Solution: \(x(t) = C_1\cos(\omega t)+C_2\sin(\omega t) = A\sin(\omega t + \phi)\)<br>
    Period: \(T = \dfrac{2\pi}{\omega}\), &amp;nbsp; Amplitude: \(A = \sqrt{C_1^2+C_2^2}$, &amp;nbsp; Phase: \(\tan\phi = C_1/C_2\)
  </div>

  <h3>10.3 Free Damped Motion (\(\beta > 0\), \(f=0\))</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>DAMPING CLASSIFICATION</strong>
    Discriminant: \(\Delta = \beta^2 - 4mk\)<br>
    <strong>Overdamped</strong> (\(\Delta > 0\)): two real distinct roots → system returns slowly, no oscillation<br>
    \[x(t) = C_1e^{r_1t}+C_2e^{r_2t} \quad (r_1,r_2 < 0)\]
    <strong>Critically Damped</strong> (\(\Delta = 0\)): repeated root \(r = -\beta/(2m)\) → fastest return without oscillation<br>
    \[x(t) = (C_1+C_2t)e^{-(\beta/2m)t}\]
    <strong>Underdamped</strong> (\(\Delta < 0\)): complex roots → oscillation with decay<br>
    \[x(t) = e^{-(\beta/2m)t}\bigl(C_1\cos(\gamma t)+C_2\sin(\gamma t)\bigr), \quad \gamma = \sqrt{\tfrac{4mk-\beta^2}{4m^2}}\]
  </div>

  <table>
    <tr><th>Type</th><th>\(\Delta\)</th><th>Behavior</th><th>Recognizable on a Graph?</th></tr>
    <tr><td>Overdamped</td><td>\(>0\)</td><td>Exponential decay, no oscillation</td><td>Smooth curve → 0</td></tr>
    <tr><td>Critically Damped</td><td>\(=0\)</td><td>Fastest non-oscillatory decay</td><td>Smooth, slightly faster than overdamped</td></tr>
    <tr><td>Underdamped</td><td>\(<0\)</td><td>Decaying oscillation (envelope)</td><td>Wiggling curve within a decaying envelope</td></tr>
  </table>

  <h3>10.4 Forced (Driven) Motion</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>FORCED UNDAMPED</strong>
    \[mx'' + kx = F_0\cos(\gamma t)\]
    <strong>Case 1: \(\gamma \neq \omega\)</strong> (non-resonance):
    \[x_p = \frac{F_0}{m(\omega^2-\gamma^2)}\cos(\gamma t)\]
    <strong>Case 2: \(\gamma = \omega\)</strong> (pure resonance):
    \[x_p = \frac{F_0}{2m\omega}t\sin(\omega t)\]
    The amplitude grows without bound — system tears itself apart!
  </div>

  <h3>10.5 Beats</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>BEATS (when \(\gamma \approx \omega\) but \(\gamma \neq \omega\))</strong>
    The solution has the form of a sinusoid with a slowly-varying envelope:<br>
    \[x(t) = \frac{F_0}{m(\omega^2-\gamma^2)}\left[\cos(\gamma t)-\cos(\omega t)\right]\]
    Using product-to-sum: \[\cos A - \cos B = -2\sin\!\left(\frac{A+B}{2}\right)\sin\!\left(\frac{A-B}{2}\right)\]
    This produces a &quot;throbbing&quot; pattern — the amplitude oscillates periodically. This is <strong>beats</strong>, not resonance.
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ BEATS vs. RESONANCE — Know the Difference!</strong>
    <strong>Beats:</strong> \(\gamma \neq \omega\) — amplitude oscillates but stays bounded. Graph: envelope waxes and wanes.<br>
    <strong>Resonance:</strong> \(\gamma = \omega\) exactly — amplitude grows <em>linearly without bound</em>. The factor \(t\) multiplies the sine. The exam always tests this distinction.
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 10.1 — Full Spring-Mass IVP (F25 Exam 2, Problem 4)
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Mass 2 kg, spring constant 8 N/m, undamped, force \(f(t)=4\cos(2t)\), released from rest at equilibrium.</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>Write IVP:</strong> \(2x'' + 8x = 4\cos(2t)\) → \(x''+4x = 2\cos(2t)\), \(x(0)=0, x'(0)=0\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>Identify \(\omega\):</strong> \(\omega=\sqrt{4}=2\). Forcing frequency \(\gamma=2\). So \(\gamma=\omega\) → <strong>pure resonance!</strong></div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>Homogeneous:</strong> \(x_h = C_1\cos(2t)+C_2\sin(2t)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;><strong>Particular (resonance formula):</strong> \(x_p = \dfrac{F_0}{2m\omega}t\sin(\omega t) = \dfrac{2}{2\cdot2\cdot2}t\sin(2t) = \dfrac{1}{4}t\sin(2t)\).<br>
        Alternatively, guess \(x_p = t(A\cos 2t+B\sin 2t)\) and plug in.</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;><strong>Apply ICs:</strong> \(x = C_1\cos2t+C_2\sin2t+\frac{t}{4}\sin2t\).<br>
        \(x(0)=C_1=0\). \(x'=(-2C_1\sin2t+2C_2\cos2t)+\frac{1}{4}\sin2t+\frac{t}{2}\cos2t\).<br>
        \(x'(0)=2C_2=0 \Rightarrow C_2=0\).</div>
      </div>
      <div class=&quot;answer&quot;>\(x(t) = \dfrac{t}{4}\sin(2t)\) — resonance, amplitude grows without bound!</div>
    </div>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 10.2 — Classification from Characteristic Equation
      <span class=&quot;difficulty&quot;>EASY</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>For \(y''+3y'+2y=0\) with \(y(0)=1, y'(0)=-2\): classify the motion type.</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Char. eq.: \(r^2+3r+2=(r+1)(r+2)=0\) → \(r=-1,-2\). Real distinct negative roots.</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>\(\Delta = 9-8=1>0\) → <strong>overdamped</strong>.</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>\(y=C_1e^{-t}+C_2e^{-2t}\). ICs: \(C_1+C_2=1\), \(-C_1-2C_2=-2\) → \(C_1=0, C_2=1\). So \(y=e^{-2t}\).</div>
      </div>
      <div class=&quot;answer&quot;>Overdamped free motion; \(y=e^{-2t}\)</div>
    </div>
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 10.1</div>
      <p>A 4-lb weight stretches a spring 2 ft. At \(t=0\), weight is pulled down 1/2 ft and released. Undamped. Find the equation of motion. (Use \(g=32\) ft/s²)</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Weight 4 lb → mass \(m=4/32=1/8\) slug. Spring constant: \(k=4\text{ lb}/2\text{ ft}=2\) lb/ft.<br>
          \(\omega^2=k/m=2/(1/8)=16\) → \(\omega=4\) rad/s.<br>
          IVP: \(x''+16x=0\), \(x(0)=1/2, x'(0)=0\).<br>
          \(x=C_1\cos 4t+C_2\sin 4t\). ICs: \(C_1=1/2, 4C_2=0\) → \(C_2=0\).<br>
          \(\boxed{x(t)=\frac{1}{2}\cos(4t)}\) ft.
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 10.2</div>
      <p>For \(y''+2y'+10y=U(t-6)\sin(t-6)\), \(y(0)=1, y'(0)=0\): classify the free motion (ignore the forcing for classification).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          For the free (homogeneous) part: \(y''+2y'+10y=0\). Char. eq.: \(r^2+2r+10=0\).<br>
          \(\Delta = 4-40 = -36 < 0\) → <strong>underdamped</strong>.<br>
          Roots: \(r = -1\pm3i\). Free solution decays oscillatorily.<br>
          The forcing \(U(t-6)\sin(t-6)\) turns on at \(t=6\): driven underdamped motion.
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Spring-Mass Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>NATURAL FREQUENCY</span>
        \(\omega_0 = \sqrt{k/m}\) (rad/s), period \(T=2\pi/\omega_0\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>DAMPING CHECK</span>
        \(\Delta=\beta^2-4mk\): \(>0\) over, \(=0\) critical, \(<0\) under
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>RESONANCE CONDITION</span>
        \(\gamma = \omega_0\) → \(x_p\) gets factor of \(t\), amplitude → \(\infty\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>BEATS</span>
        \(\gamma \approx \omega_0\) but \(\neq\) → bounded, oscillating amplitude
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 11: LAPLACE -->
<div id=&quot;laplace&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>11</div>
  Laplace Transforms (Chapter 7)
</div>

<div class=&quot;topic-section&quot;>
  <h2>11. Laplace Transforms</h2>

  <h3>11.1 The Definition</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>DEFINITION</strong>
    \[\mathcal{L}\{f(t)\} = F(s) = \int_0^\infty e^{-st}f(t)\,dt\]
    Requires: \(f\) piecewise continuous on \([0,\infty)\) and of exponential order.
  </div>

  <h3>11.2 The Master Laplace Table (KNOW THIS COLD)</h3>
  <table class=&quot;lt-table&quot;>
    <tr><th>#</th><th>Time Function \(f(t)\)</th><th>Laplace Transform \(F(s)\)</th><th>Notes/Conditions</th></tr>
    <tr><td>1</td><td>\(1\)</td><td>\(\dfrac{1}{s}\)</td><td>\(s>0\)</td></tr>
    <tr><td>2</td><td>\(t\)</td><td>\(\dfrac{1}{s^2}\)</td><td>\(s>0\)</td></tr>
    <tr><td>3</td><td>\(t^n\)</td><td>\(\dfrac{n!}{s^{n+1}}\)</td><td>\(s>0\), \(n=0,1,2,\ldots\)</td></tr>
    <tr><td>4</td><td>\(e^{at}\)</td><td>\(\dfrac{1}{s-a}\)</td><td>\(s>a\)</td></tr>
    <tr><td>5</td><td>\(t^n e^{at}\)</td><td>\(\dfrac{n!}{(s-a)^{n+1}}\)</td><td>\(s>a\)</td></tr>
    <tr><td>6</td><td>\(\sin(kt)\)</td><td>\(\dfrac{k}{s^2+k^2}\)</td><td>\(s>0\)</td></tr>
    <tr><td>7</td><td>\(\cos(kt)\)</td><td>\(\dfrac{s}{s^2+k^2}\)</td><td>\(s>0\)</td></tr>
    <tr><td>8</td><td>\(\sinh(kt)\)</td><td>\(\dfrac{k}{s^2-k^2}\)</td><td>\(s>|k|\)</td></tr>
    <tr><td>9</td><td>\(\cosh(kt)\)</td><td>\(\dfrac{s}{s^2-k^2}\)</td><td>\(s>|k|\)</td></tr>
    <tr><td>10</td><td>\(e^{at}\sin(kt)\)</td><td>\(\dfrac{k}{(s-a)^2+k^2}\)</td><td>\(s>a\)</td></tr>
    <tr><td>11</td><td>\(e^{at}\cos(kt)\)</td><td>\(\dfrac{s-a}{(s-a)^2+k^2}\)</td><td>\(s>a\)</td></tr>
    <tr><td>12</td><td>\(f'(t)\)</td><td>\(sF(s)-f(0)\)</td><td>First derivative</td></tr>
    <tr><td>13</td><td>\(f''(t)\)</td><td>\(s^2F(s)-sf(0)-f'(0)\)</td><td>Second derivative</td></tr>
    <tr><td>14</td><td>\(t^nf(t)\)</td><td>\((-1)^n F^{(n)}(s)\)</td><td>Multiply by \(t\) → differentiate \(F\)</td></tr>
    <tr><td>15</td><td>\(U(t-a)\)</td><td>\(\dfrac{e^{-as}}{s}\)</td><td>Heaviside step function</td></tr>
    <tr><td>16</td><td>\(U(t-a)f(t-a)\)</td><td>\(e^{-as}F(s)\)</td><td>Second translation theorem</td></tr>
    <tr><td>17</td><td>\(\delta(t-a)\)</td><td>\(e^{-as}\)</td><td>Dirac delta</td></tr>
    <tr><td>18</td><td>\(e^{at}f(t)\)</td><td>\(F(s-a)\)</td><td>First translation theorem</td></tr>
  </table>

  <h3>11.3 Solving IVPs with Laplace</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>THE LAPLACE METHOD — 4 STEPS</strong>
    <strong>Step 1:</strong> Take \(\mathcal{L}\) of both sides of the ODE. Use ICs immediately.<br>
    <strong>Step 2:</strong> Solve algebraically for \(Y(s) = \mathcal{L}\{y(t)\}\).<br>
    <strong>Step 3:</strong> Decompose \(Y(s)\) using partial fractions and/or completing the square.<br>
    <strong>Step 4:</strong> Take \(\mathcal{L}^{-1}\) of each term using the table.
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 11.1 — Standard 2nd-Order IVP via Laplace
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y'' - 3y' + 2y = e^{4t}\), \(y(0)=0\), \(y'(0)=-1\) using Laplace transforms.</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>Transform:</strong> \(\mathcal{L}\{y''\}-3\mathcal{L}\{y'\}+2\mathcal{L}\{y\}=\mathcal{L}\{e^{4t}\}\).<br>
        \((s^2Y-s\cdot0-(-1))-3(sY-0)+2Y=\dfrac{1}{s-4}\).<br>
        \((s^2-3s+2)Y + 1 = \dfrac{1}{s-4}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>Solve for \(Y\):</strong> \(Y = \dfrac{-1}{s^2-3s+2}+\dfrac{1}{(s-4)(s^2-3s+2)}\).<br>
        Factor: \(s^2-3s+2=(s-1)(s-2)\).<br>
        \(Y = \dfrac{-1}{(s-1)(s-2)}+\dfrac{1}{(s-4)(s-1)(s-2)}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>Partial fractions on \(\frac{-1}{(s-1)(s-2)}\):</strong><br>
        \(\dfrac{-1}{(s-1)(s-2)}=\dfrac{A}{s-1}+\dfrac{B}{s-2}\).<br>
        \(A=-1\cdot(-1)=1,\ B=-1\cdot1=-1\) (cover-up method): \(A=\frac{-1}{1-2}=1\), \(B=\frac{-1}{2-1}=-1\).<br>
        → \(\dfrac{1}{s-1}-\dfrac{1}{s-2}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;><strong>Partial fractions on \(\frac{1}{(s-4)(s-1)(s-2)}\):</strong><br>
        \(\frac{1}{(s-4)(s-1)(s-2)}=\frac{A}{s-4}+\frac{B}{s-1}+\frac{C}{s-2}\).<br>
        Cover-up: \(A=\frac{1}{(4-1)(4-2)}=\frac{1}{6}\), \(B=\frac{1}{(1-4)(1-2)}=\frac{1}{3}\), \(C=\frac{1}{(2-4)(2-1)}=\frac{-1}{2}\).<br>
        So full \(Y = \left(1+\frac{1}{3}\right)\frac{1}{s-1}+\left(-1-\frac{1}{2}\right)\frac{1}{s-2}+\frac{1/6}{s-4}\).<br>
        \(= \dfrac{4/3}{s-1} - \dfrac{3/2}{s-2}+\dfrac{1/6}{s-4}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;><strong>Invert:</strong> \(y=\dfrac{4}{3}e^t - \dfrac{3}{2}e^{2t}+\dfrac{1}{6}e^{4t}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = \dfrac{4}{3}e^t - \dfrac{3}{2}e^{2t}+\dfrac{1}{6}e^{4t}\)</div>
    </div>
  </div>

  <h3>11.4 Inverse Laplace — Completing the Square</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>COMPLETING THE SQUARE — TEMPLATE</strong>
    Goal: rewrite \(s^2 + bs + c\) as \((s-a)^2 + k^2\) to match entries 10 or 11.<br><br>
    \(s^2 + bs + c = \left(s + \frac{b}{2}\right)^2 + \left(c - \frac{b^2}{4}\right)\)<br><br>
    So \(a = -b/2\) and \(k^2 = c - b^2/4\).<br><br>
    <strong>Then:</strong> \(\dfrac{1}{(s-a)^2+k^2} = \dfrac{1}{k}\cdot\dfrac{k}{(s-a)^2+k^2}\) → table entry 10 (sine)<br>
    And \(\dfrac{s-a}{(s-a)^2+k^2}\) → table entry 11 (cosine)
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 11.2 — Inverse Laplace with Completing the Square (F25 Final, Problem 6a)
      <span class=&quot;difficulty&quot;>MEDIUM-HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Find \(\mathcal{L}^{-1}\!\left\{\dfrac{3s+3}{s^2-4s+20}\right\}\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>Complete the square</strong> in denominator: \(s^2-4s+20=(s-2)^2+16=(s-2)^2+4^2\). So \(a=2, k=4\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>Rewrite numerator</strong> to match \((s-a)\) and constant:<br>
        \(3s+3 = 3(s-2) + 6+3 = 3(s-2)+9\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>Split:</strong> \(\dfrac{3s+3}{(s-2)^2+16} = \dfrac{3(s-2)}{(s-2)^2+16}+\dfrac{9}{(s-2)^2+16}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;><strong>Match table entries:</strong><br>
        First term: \(3\cdot\dfrac{s-2}{(s-2)^2+4^2}\) → \(3e^{2t}\cos(4t)\) (entry 11)<br>
        Second term: \(\dfrac{9}{(s-2)^2+4^2} = \dfrac{9}{4}\cdot\dfrac{4}{(s-2)^2+4^2}\) → \(\dfrac{9}{4}e^{2t}\sin(4t)\) (entry 10)</div>
      </div>
      <div class=&quot;answer&quot;>\(f(t) = 3e^{2t}\cos(4t)+\dfrac{9}{4}e^{2t}\sin(4t)\)</div>
    </div>
  </div>

  <h3>11.5 Partial Fractions Review</h3>
  <table>
    <tr><th>Denominator factor</th><th>PF Terms</th></tr>
    <tr><td>\((s-a)\)</td><td>\(\dfrac{A}{s-a}\)</td></tr>
    <tr><td>\((s-a)^n\)</td><td>\(\dfrac{A_1}{s-a}+\dfrac{A_2}{(s-a)^2}+\cdots+\dfrac{A_n}{(s-a)^n}\)</td></tr>
    <tr><td>\((s^2+k^2)\)</td><td>\(\dfrac{As+B}{s^2+k^2}\)</td></tr>
    <tr><td>\(((s-a)^2+k^2)\)</td><td>\(\dfrac{A(s-a)+Bk}{(s-a)^2+k^2}\)</td></tr>
  </table>

  <div class=&quot;box box-tip&quot;>
    <strong class=&quot;box-label&quot;>✦ COVER-UP METHOD (Heaviside Method)</strong>
    For simple roots only: to find \(A_i\) for \(\dfrac{A_i}{s-r_i}\), plug \(s=r_i\) into the numerator divided by all <em>other</em> denominator factors.<br>
    Example: \(\dfrac{1}{(s-1)(s-3)} = \dfrac{A}{s-1}+\dfrac{B}{s-3}\).<br>
    \(A = \dfrac{1}{1-3} = -\dfrac{1}{2}\), \(B = \dfrac{1}{3-1} = \dfrac{1}{2}\).
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 11.1</div>
      <p>Find \(\mathcal{L}^{-1}\!\left\{\dfrac{2s-1}{s^2+2s+5}\right\}\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Complete the square: \(s^2+2s+5=(s+1)^2+4=(s+1)^2+2^2\). \(a=-1, k=2\).<br>
          Numerator: \(2s-1=2(s+1)-3\).<br>
          \(\dfrac{2(s+1)-3}{(s+1)^2+4}=\dfrac{2(s+1)}{(s+1)^2+4}-\dfrac{3}{(s+1)^2+4}=2\cdot\dfrac{(s+1)}{(s+1)^2+4}-\dfrac{3}{2}\cdot\dfrac{2}{(s+1)^2+4}\).<br>
          \(\mathcal{L}^{-1}: 2e^{-t}\cos(2t)-\dfrac{3}{2}e^{-t}\sin(2t)\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 11.2</div>
      <p>Solve \(y''-4y=e^{3t}\), \(y(0)=0\), \(y'(0)=0\) using Laplace transforms.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(\mathcal{L}\): \((s^2-4)Y = \dfrac{1}{s-3}\) → \(Y=\dfrac{1}{(s-3)(s^2-4)}=\dfrac{1}{(s-3)(s-2)(s+2)}\).<br>
          PF: \(\frac{A}{s-3}+\frac{B}{s-2}+\frac{C}{s+2}\). \(A=\frac{1}{(1)(-5)}... \) wait: \(A=\frac{1}{(3-2)(3+2)}=\frac{1}{5}\), \(B=\frac{1}{(2-3)(2+2)}=\frac{-1}{4}\), \(C=\frac{1}{(-2-3)(-2-2)}=\frac{1}{20}\).<br>
          \(y=\frac{1}{5}e^{3t}-\frac{1}{4}e^{2t}+\frac{1}{20}e^{-2t}\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 11.3 — Laplace Matching (like F25 Problem 5)</div>
      <p>Match: (a) \(f(t)=e^{2t}\sinh(t)\), (b) \(f(t)=e^{2t}\sin(t)\) to their Laplace transforms.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          (a) \(e^{2t}\sinh t\): Use first-shift theorem. \(\mathcal{L}\{\sinh t\}=\frac{1}{s^2-1}\). Shift \(s\to s-2\): \(F(s)=\dfrac{1}{(s-2)^2-1}\). This equals \(\dfrac{1}{s^2-4s+3}\).<br>
          (b) \(e^{2t}\sin t\): \(\mathcal{L}\{\sin t\}=\frac{1}{s^2+1}\). Shift: \(F(s)=\dfrac{1}{(s-2)^2+1}=\dfrac{1}{s^2-4s+5}\). But multiplied by 3? Check the problem. In the exam, coefficient is 3: \(3e^{2t}\sin(t) \to \frac{3}{(s-2)^2+1}\).
        </div>
      </details>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 12: UNIT STEP &amp; DELTA -->
<div id=&quot;unit-step&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>12</div>
  Unit Step Function &amp;amp; Dirac Delta
</div>

<div class=&quot;topic-section&quot;>
  <h2>12. Unit Step, Piecewise Functions, and Dirac Delta</h2>

  <h3>12.1 Heaviside Unit Step Function</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>UNIT STEP FUNCTION</strong>
    \[U(t-a) = \mathcal{U}(t-a) = \begin{cases} 0 &amp; t < a \\ 1 &amp; t \geq a \end{cases}\]
    <strong>Laplace:</strong> \(\mathcal{L}\{U(t-a)\} = \dfrac{e^{-as}}{s}\), \(s > 0\)
  </div>

  <h3>12.2 Second Translation Theorem (The Key Theorem)</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>SECOND TRANSLATION THEOREM</strong>
    \[\mathcal{L}\{U(t-a)f(t-a)\} = e^{-as}F(s)\]
    \[\mathcal{L}^{-1}\{e^{-as}F(s)\} = U(t-a)f(t-a)\]
    The \(e^{-as}\) in the \(s\)-domain corresponds to a <strong>delay of \(a\)</strong> in the time domain.
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ THE MOST COMMON MISTAKE</strong>
    The theorem requires \(f(t-a)\), not \(f(t)\)! If your time-domain function is \(f(t)\) (not already shifted), you must rewrite: \(f(t) = g(t-a)\) for some \(g\), or use the more general form:<br>
    \[\mathcal{L}\{U(t-a)f(t)\} = e^{-as}\mathcal{L}\{f(t+a)\}\]
    This is the form you'll need when the function isn't pre-shifted.
  </div>

  <h3>12.3 Writing Piecewise Functions with Unit Step</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>PIECEWISE TO UNIT STEP</strong>
    A function that is \(g(t)\) for \(0 \leq t < a\) and \(h(t)\) for \(t \geq a\):<br>
    \[f(t) = g(t) + [h(t)-g(t)]U(t-a)\]
    A function with three pieces \(g_1\) for \([0,a)\), \(g_2\) for \([a,b)\), \(g_3\) for \([b,\infty)\):<br>
    \[f(t) = g_1(t) + (g_2(t)-g_1(t))U(t-a) + (g_3(t)-g_2(t))U(t-b)\]
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 12.1 — Piecewise to Unit Step
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Write \(f(t)=\begin{cases}1 &amp; 0\leq t<3\\ 0 &amp; t\geq 3\end{cases}\) using unit step functions and find \(\mathcal{L}\{f(t)\}\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>\(f(t) = 1 \cdot [1-U(t-3)] = 1 - U(t-3)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>\(\mathcal{L}\{f\} = \mathcal{L}\{1\} - \mathcal{L}\{U(t-3)\} = \dfrac{1}{s} - \dfrac{e^{-3s}}{s} = \dfrac{1-e^{-3s}}{s}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(F(s) = \dfrac{1-e^{-3s}}{s}\)</div>
    </div>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 12.2 — Inverse with Unit Step (F25 Final, Problem 6b)
      <span class=&quot;difficulty&quot;>HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Find \(\mathcal{L}^{-1}\!\left\{e^{-s}\!\left(\dfrac{1}{4} - \dfrac{2}{(s-4)^3}\right)\right\}=g(t)\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>Identify the delay:</strong> The factor \(e^{-s}\) means delay by \(a=1\). The theorem says: \(\mathcal{L}^{-1}\{e^{-as}F(s)\}=U(t-a)f(t-a)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>Find the inverse of \(F(s)=\frac{1}{4}-\frac{2}{(s-4)^3}\) first:</strong><br>
        \(\mathcal{L}^{-1}\!\left\{\dfrac{1}{4}\right\}\) — wait, \(1/4\) is a constant, not a Laplace transform of a function with finite jump. Actually: \(\frac{1}{s}\to 1\), not \(\frac{1}{4}\to\) anything standard. Re-read: \(\frac{1}{4}\) should be \(\frac{1}{s^4}\)? Checking the exam: the problem is \(\frac{1}{s^4}-\frac{2}{(s-4)^3}\) scaled. Let's take the problem at face value: \(\frac{1}{4}\) in the exam context is \(\frac{1}{s}\cdot\frac{1}{4}\)... Actually from the F25 exam it appears as \(\frac{1}{s^4}\):<br>
        Let \(F(s)=\frac{1}{s^4}-\frac{2}{(s-4)^3}\) (interpreting the exam formatting).<br>
        Then \(f(t)=\mathcal{L}^{-1}\!\left\{\frac{1}{s^4}\right\}-\mathcal{L}^{-1}\!\left\{\frac{2}{(s-4)^3}\right\}\).<br>
        \(\frac{1}{s^4}=\frac{3!}{6}\cdot\frac{1}{s^4}=\frac{1}{6}\cdot\frac{3!}{s^4}\) → \(\frac{t^3}{6}\).<br>
        \(\frac{2}{(s-4)^3}=\frac{2}{2}\cdot\frac{2!}{(s-4)^3}\) → wait: \(\frac{n!}{(s-a)^{n+1}}\leftrightarrow t^ne^{at}\). For \(n=2\): \(\frac{2!}{(s-4)^3}=\frac{2}{(s-4)^3}\) → \(t^2e^{4t}\). So \(\frac{2}{(s-4)^3}=\frac{2}{2}\cdot\frac{2}{(s-4)^3}\to t^2e^{4t}\).<br>
        Therefore \(f(t)=\frac{t^3}{6}-t^2e^{4t}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>Apply the delay:</strong> \(g(t)=U(t-1)f(t-1)=U(t-1)\left[\dfrac{(t-1)^3}{6}-(t-1)^2e^{4(t-1)}\right]\).</div>
      </div>
      <div class=&quot;answer&quot;>\(g(t) = U(t-1)\left[\dfrac{(t-1)^3}{6}-(t-1)^2e^{4(t-1)}\right]\)</div>
    </div>
  </div>

  <h3>12.4 The Dirac Delta Function</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>DIRAC DELTA \(\delta(t-a)\)</strong>
    An idealized &quot;impulse&quot; at \(t=a\): zero everywhere except at \(t=a\), with total integral 1.<br>
    \[\int_{-\infty}^\infty f(t)\delta(t-a)\,dt = f(a) \quad \text{(sifting property)}\]
    <strong>Laplace transform:</strong> \(\mathcal{L}\{\delta(t-a)\} = e^{-as}\), \(a \geq 0\)<br>
    Special case: \(\mathcal{L}\{\delta(t)\} = 1\)
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 12.3 — IVP with Dirac Delta
      <span class=&quot;difficulty&quot;>HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y'' + 4y = \delta(t-\pi)\), \(y(0)=0\), \(y'(0)=0\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Take Laplace: \((s^2+4)Y = e^{-\pi s}\).<br>
        \(Y = \dfrac{e^{-\pi s}}{s^2+4} = e^{-\pi s}\cdot\dfrac{1}{s^2+4}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Recognize \(\mathcal{L}^{-1}\!\left\{\dfrac{1}{s^2+4}\right\} = \dfrac{1}{2}\sin(2t)\).<br>
        Let \(f(t)=\frac{1}{2}\sin(2t)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Apply second translation: \(y = U(t-\pi)\cdot\dfrac{1}{2}\sin(2(t-\pi)) = U(t-\pi)\cdot\dfrac{1}{2}\sin(2t-2\pi) = \dfrac{1}{2}U(t-\pi)\sin(2t)\).<br>
        (Since \(\sin(2t-2\pi)=\sin(2t)\).)</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = \dfrac{1}{2}U(t-\pi)\sin(2t)\) — zero before \(t=\pi\), then oscillates!</div>
    </div>
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 12.1</div>
      <p>Write using unit steps and find the Laplace transform of: \(f(t)=\begin{cases}t+1 &amp; 0\leq t<2\\ 0 &amp; t\geq 2\end{cases}\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(f(t)=(t+1)(1-U(t-2))=(t+1)-( t+1)U(t-2)\).<br>
          \(\mathcal{L}\{t+1\}=\frac{1}{s^2}+\frac{1}{s}\).<br>
          For \((t+1)U(t-2)\): write \(t+1=(t-2)+3\), so \((t+1)U(t-2)=[(t-2)+3]U(t-2)\).<br>
          \(\mathcal{L}\{(t-2)U(t-2)\}=e^{-2s}\cdot\frac{1}{s^2}\). \(\mathcal{L}\{3U(t-2)\}=\frac{3e^{-2s}}{s}\).<br>
          Total: \(F(s)=\frac{1}{s^2}+\frac{1}{s}-e^{-2s}\left(\frac{1}{s^2}+\frac{3}{s}\right)\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 12.2</div>
      <p>Find \(\mathcal{L}^{-1}\!\left\{e^{-3s}\cdot\dfrac{s+1}{s^2+6s+10}\right\}\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          First invert \(G(s)=\frac{s+1}{s^2+6s+10}\). Complete square: \(s^2+6s+10=(s+3)^2+1\). Numerator: \(s+1=(s+3)-2\).<br>
          \(G(s)=\frac{(s+3)-2}{(s+3)^2+1}=\frac{s+3}{(s+3)^2+1}-\frac{2}{(s+3)^2+1}\).<br>
          \(g(t)=e^{-3t}\cos t - 2e^{-3t}\sin t\).<br>
          With the \(e^{-3s}\): \(\mathcal{L}^{-1}=U(t-3)g(t-3)=U(t-3)[e^{-3(t-3)}\cos(t-3)-2e^{-3(t-3)}\sin(t-3)]\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 12.3</div>
      <p>Solve \(y'+y=\delta(t-2)\), \(y(0)=0\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Laplace: \(sY+Y=e^{-2s}\) → \(Y=\dfrac{e^{-2s}}{s+1}\).<br>
          \(\mathcal{L}^{-1}\!\left\{\frac{1}{s+1}\right\}=e^{-t}\).<br>
          \(y=U(t-2)e^{-(t-2)}\). For \(t<2\): \(y=0\); for \(t\geq2\): \(y=e^{-(t-2)}\).
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Laplace / Unit Step / Delta — Master Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SHIFT THEOREM 1 (multiply by \(e^{at}\))</span>
        \(\mathcal{L}\{e^{at}f(t)\}=F(s-a)\) ↔ shift \(s\) right by \(a\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SHIFT THEOREM 2 (unit step delay)</span>
        \(\mathcal{L}\{U(t-a)f(t-a)\}=e^{-as}F(s)\) ↔ multiply \(F\) by \(e^{-as}\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>COMPLETE-THE-SQUARE STEP</span>
        \(s^2+bs+c=(s+b/2)^2+(c-b^2/4)\). Then match to \((s-a)^2+k^2\).
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>DERIVATIVES OF TRANSFORMS</span>
        \(\mathcal{L}\{tf(t)\}=-F'(s)\), \(\mathcal{L}\{t^2f(t)\}=F''(s)\), etc.
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>DIRAC DELTA KEY FACT</span>
        \(\mathcal{L}\{\delta(t-a)\}=e^{-as}\) (no denominator — it's just an exponential)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>INVERSE WORKFLOW</span>
        1. Factor denominator. 2. PF decompose. 3. Complete square in irreducible quadratics. 4. Match table. 5. Write answer.
      </div>
    </div>
  </div>
</div>

<div class=&quot;part-header&quot; id=&quot;systems-odes&quot;>
  <div class=&quot;part-num&quot;>15</div>
  Systems of Linear ODEs &amp;amp; Phase Portraits
</div>

<div class=&quot;topic-section&quot;>

  <!-- ─── 15.0 WHY SYSTEMS? ─────────────────────────── -->
  <h2>§15.0 Why We Need Systems</h2>

  <p>
    Any <strong>n-th order linear ODE</strong> can be rewritten as a first-order system by introducing new variables for each derivative. This lets us analyze spring-mass, RLC circuits, and population models with a unified matrix toolkit.
  </p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>CONVERSION RECIPE — 2nd order → first-order system</strong>
    <p>Given \( ay'' + by' + cy = 0 \), let \( \mathbf{x}_1 = y \) and \( \mathbf{x}_2 = y' \). Then:</p>
    \[
      \frac{d}{dt}\begin{pmatrix}x_1 \\ x_2\end{pmatrix}
      = \begin{pmatrix}0 &amp; 1 \\ -c/a &amp; -b/a\end{pmatrix}
        \begin{pmatrix}x_1 \\ x_2\end{pmatrix}
    \]
    <p>The companion matrix has the characteristic equation \( a\lambda^2 + b\lambda + c = 0 \) — the same as the original ODE.</p>
  </div>

  <!-- ─── 15.1 GENERAL SOLUTION ────────────────────── -->
  <h2>§15.1 General Solution of \(\mathbf{X}' = A\mathbf{X}\)</h2>

  <h3>The Eigenvalue Method</h3>
  <p>
    For a 2×2 constant-coefficient homogeneous system, the solution strategy depends entirely on the eigenvalues of \(A\).
  </p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>STEP-BY-STEP: Eigenvalue Method</strong>
    <ol style=&quot;padding-left:1.2rem; line-height:2&quot;>
      <li>Compute \(\det(A - \lambda I) = 0\) → solve for eigenvalues \(\lambda_1, \lambda_2\).</li>
      <li>For each \(\lambda_k\), solve \((A - \lambda_k I)\mathbf{v} = \mathbf{0}\) → eigenvector \(\mathbf{v}_k\).</li>
      <li>Assemble: \(\mathbf{X}(t) = c_1 e^{\lambda_1 t}\mathbf{v}_1 + c_2 e^{\lambda_2 t}\mathbf{v}_2\) (for distinct real eigenvalues).</li>
    </ol>
  </div>

  <h3>Case Table</h3>
  <table>
    <thead>
      <tr>
        <th>Eigenvalue type</th>
        <th>General solution form</th>
        <th>Equilibrium classification</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Two real, distinct \(\lambda_1 \neq \lambda_2\)</td>
        <td>\(c_1 e^{\lambda_1 t}\mathbf{v}_1 + c_2 e^{\lambda_2 t}\mathbf{v}_2\)</td>
        <td>See §15.2</td>
      </tr>
      <tr>
        <td>Repeated real \(\lambda_1 = \lambda_2 = \lambda\)</td>
        <td>\(c_1 e^{\lambda t}\mathbf{v} + c_2 e^{\lambda t}(t\mathbf{v} + \mathbf{w})\), where \((A-\lambda I)\mathbf{w} = \mathbf{v}\)</td>
        <td>Improper / degenerate node</td>
      </tr>
      <tr>
        <td>Complex \(\lambda = \alpha \pm \beta i\)</td>
        <td>\(e^{\alpha t}(c_1 \mathbf{B}_1 \cos\beta t - c_2 \mathbf{B}_2 \sin\beta t)\) <br><small>where \(\mathbf{B}_1, \mathbf{B}_2\) come from the real/imaginary parts of one complex eigenvector</small></td>
        <td>Spiral or Center</td>
      </tr>
    </tbody>
  </table>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ COMMON MISTAKE: Complex Eigenvalue Form</strong>
    <p>When \(\lambda = \alpha \pm \beta i\), you only need <em>one</em> complex eigenvector. Split it into real and imaginary parts — those give your two real solutions. Do <strong>not</strong> try to find two separate eigenvectors.</p>
  </div>

  <!-- ─── 15.2 CLASSIFYING EQUILIBRIA ─────────────── -->
  <h2>§15.2 Classifying the Equilibrium Point (0, 0)</h2>

  <p>
    The type and stability of the origin is determined by the signs and types of the eigenvalues of \(A\).
    Use \(\text{tr}(A) = \lambda_1 + \lambda_2\) and \(\det(A) = \lambda_1 \lambda_2\) as shortcuts.
  </p>

  <table>
    <thead>
      <tr>
        <th>Eigenvalues</th>
        <th>Classification</th>
        <th>Stability</th>
        <th>Phase portrait shape</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>\(\lambda_1 < \lambda_2 < 0\)</td>
        <td><strong>Stable node</strong></td>
        <td>Asymptotically stable</td>
        <td>Trajectories curve into origin along eigenvectors</td>
      </tr>
      <tr>
        <td>\(0 < \lambda_1 < \lambda_2\)</td>
        <td><strong>Unstable node</strong></td>
        <td>Unstable</td>
        <td>Trajectories spiral out from origin</td>
      </tr>
      <tr>
        <td>\(\lambda_1 < 0 < \lambda_2\)</td>
        <td><strong>Saddle point</strong></td>
        <td>Unstable</td>
        <td>Two straight-line solutions: one into, one out of origin</td>
      </tr>
      <tr>
        <td>\(\lambda = \alpha \pm \beta i,\ \alpha < 0\)</td>
        <td><strong>Stable spiral</strong></td>
        <td>Asymptotically stable</td>
        <td>Trajectories spiral inward</td>
      </tr>
      <tr>
        <td>\(\lambda = \alpha \pm \beta i,\ \alpha > 0\)</td>
        <td><strong>Unstable spiral</strong></td>
        <td>Unstable</td>
        <td>Trajectories spiral outward</td>
      </tr>
      <tr>
        <td>\(\lambda = \pm \beta i\ (\alpha = 0)\)</td>
        <td><strong>Center</strong></td>
        <td>Stable (not asymptotically)</td>
        <td>Closed elliptical orbits around origin</td>
      </tr>
    </tbody>
  </table>

  <div class=&quot;box box-tip&quot;>
    <strong class=&quot;box-label&quot;>✦ QUICK DETERMINANT SHORTCUT</strong>
    <p>
      \(\det(A) < 0\) → eigenvalues have <em>opposite signs</em> → guaranteed <strong>saddle</strong>.<br>
      \(\det(A) > 0\) and \(\text{tr}(A) = 0\) → eigenvalues are <em>pure imaginary</em> → guaranteed <strong>center</strong>.<br>
      \(\text{tr}(A) < 0\) and \(\det(A) > 0\) → real parts negative → <strong>stable</strong> (node or spiral).
    </p>
  </div>

  <!-- ─── 15.3 PHASE PORTRAITS ─────────────────────── -->
  <h2>§15.3 Sketching Phase Portraits</h2>

  <p>A phase portrait plots trajectories \((x(t), y(t))\) in the \(xy\)-plane without showing time explicitly. The key features to draw:</p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>PHASE PORTRAIT CHECKLIST</strong>
    <ol style=&quot;padding-left:1.2rem; line-height:2&quot;>
      <li><strong>Straight-line solutions</strong>: Along each real eigenvector direction. If \(\lambda < 0\), arrows point <em>toward</em> origin; if \(\lambda > 0\), arrows point <em>away</em>.</li>
      <li><strong>General trajectory shape</strong>: Curves approach the straight-line solution corresponding to the dominant eigenvalue (more negative λ → faster decay, less negative λ → slower, so trajectories become tangent to the slower eigenvector at origin).</li>
      <li><strong>At least 2–3 additional trajectories</strong>: One in each quadrant between the eigenvector lines.</li>
      <li><strong>Arrow direction</strong>: Pick a test point and evaluate \(A\mathbf{x}\) to determine if the velocity points left/right/up/down.</li>
    </ol>
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ EXAM WARNING: Draw the eigenvectors first</strong>
    <p>Your grader is looking for the straight-line (eigendirection) solutions explicitly. These are the lines through the origin in the direction of \(\mathbf{v}_1\) and \(\mathbf{v}_2\). Always draw these first, then curve your other trajectories around them.</p>
  </div>

  <!-- ─── 15.4 SPRING-MASS AS A SYSTEM ─────────────── -->
  <h2>§15.4 Spring-Mass Systems as First-Order Systems</h2>

  <p>
    The spring-mass ODE \(m y'' + b y' + k y = 0\) converts to the companion system with \(x_1 = y\) (position) and \(x_2 = y'\) (velocity):
  </p>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>COMPANION SYSTEM</strong>
    \[
      \frac{d\mathbf{X}}{dt}
      = \begin{pmatrix} 0 &amp; 1 \\ -k/m &amp; -b/m \end{pmatrix}\mathbf{X}
    \]
    <p>The characteristic equation is \(m\lambda^2 + b\lambda + k = 0\).</p>
  </div>

  <table>
    <thead>
      <tr><th>Discriminant \(\Delta = b^2 - 4mk\)</th><th>Motion type</th><th>Equilibrium type</th></tr>
    </thead>
    <tbody>
      <tr><td>\(\Delta > 0\)</td><td>Overdamped (two negative real λ)</td><td>Stable node</td></tr>
      <tr><td>\(\Delta = 0\)</td><td>Critically damped (repeated negative λ)</td><td>Stable improper node</td></tr>
      <tr><td>\(\Delta < 0,\ b > 0\)</td><td>Underdamped (complex λ, negative real part)</td><td>Stable spiral</td></tr>
      <tr><td>\(\Delta < 0,\ b = 0\)</td><td>Undamped / simple harmonic</td><td>Center</td></tr>
    </tbody>
  </table>

  <!-- ─── 15.5 WORKED EXAMPLES ─────────────────────── -->
  <h2>§15.5 Worked Examples</h2>

  <!-- WORKED EXAMPLE 1: Saddle Point -->
  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      <span>WORKED EXAMPLE 1 — Saddle Point (F20 WS12 #1)</span>
      <span class=&quot;difficulty&quot;>★★☆ Medium</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <p class=&quot;problem&quot;>
        Given \(\mathbf{X}' = \begin{pmatrix}1 &amp; 4 \\ 2 &amp; -1\end{pmatrix}\mathbf{X}\), write the general solution and classify the equilibrium at the origin.
      </p>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>
          <strong>Find eigenvalues.</strong>
          \[
            \det(A - \lambda I)
            = (1-\lambda)(-1-\lambda) - (4)(2)
            = \lambda^2 - 1 - 8
            = \lambda^2 - 9 = 0
          \]
          So \(\lambda_1 = 3,\ \lambda_2 = -3\).
          <div class=&quot;step-why&quot;>Opposite signs → saddle point immediately confirmed.</div>
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>
          <strong>Find eigenvectors.</strong><br>
          For \(\lambda_1 = 3\): \((A - 3I)\mathbf{v} = 0\) → \(\begin{pmatrix}-2 &amp; 4 \\ 2 &amp; -4\end{pmatrix}\mathbf{v} = 0\) → \(v_1 = 2, v_2 = 1\) → \(\mathbf{v}_1 = \begin{pmatrix}2\\1\end{pmatrix}\).<br><br>
          For \(\lambda_2 = -3\): \((A + 3I)\mathbf{v} = 0\) → \(\begin{pmatrix}4 &amp; 4 \\ 2 &amp; 2\end{pmatrix}\mathbf{v} = 0\) → \(v_1 = -1, v_2 = 1\) → \(\mathbf{v}_2 = \begin{pmatrix}-1\\1\end{pmatrix}\).
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>
          <strong>Write general solution.</strong>
          \[
            \mathbf{X}(t) = c_1 e^{3t}\begin{pmatrix}2\\1\end{pmatrix} + c_2 e^{-3t}\begin{pmatrix}-1\\1\end{pmatrix}
          \]
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>
          <strong>Classify.</strong> \(\lambda_1 = 3 > 0\) and \(\lambda_2 = -3 < 0\). The origin is a <strong>saddle point</strong> — unstable. Phase portrait: trajectories enter along \(\mathbf{v}_2\) direction and exit along \(\mathbf{v}_1\) direction.
        </div>
      </div>

      <div class=&quot;answer&quot;>✓ General solution above. Equilibrium: unstable saddle point at (0, 0).</div>
    </div>
  </div>

  <!-- WORKED EXAMPLE 2: Stable Spiral -->
  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      <span>WORKED EXAMPLE 2 — Stable Spiral / Complex Eigenvalues (F18 WS12 #2)</span>
      <span class=&quot;difficulty&quot;>★★★ Hard</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <p class=&quot;problem&quot;>
        Given \(\mathbf{X}' = \begin{pmatrix}-1 &amp; -2 \\ 4 &amp; 3\end{pmatrix}\mathbf{X}\), write the general solution and classify the equilibrium.
      </p>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>
          <strong>Find eigenvalues.</strong>
          \[
            \det(A - \lambda I) = (-1-\lambda)(3-\lambda) + 8 = \lambda^2 - 2\lambda + 5 = 0
          \]
          \[
            \lambda = \frac{2 \pm \sqrt{4 - 20}}{2} = 1 \pm 2i
          \]
          <div class=&quot;step-why&quot;>Complex eigenvalues with positive real part \(\alpha = 1 > 0\) → unstable spiral.</div>
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>
          <strong>Find one complex eigenvector</strong> for \(\lambda = 1 + 2i\):
          \[
            (A - (1+2i)I)\mathbf{v} = \begin{pmatrix}-2-2i &amp; -2 \\ 4 &amp; 2-2i\end{pmatrix}\mathbf{v} = 0
          \]
          Row 1: \((-2-2i)v_1 - 2v_2 = 0\) → \(v_2 = (-1-i)v_1\). Let \(v_1 = 1\):
          \[
            \mathbf{v} = \begin{pmatrix}1\\-1-i\end{pmatrix} = \underbrace{\begin{pmatrix}1\\-1\end{pmatrix}}_{\mathbf{B}_1} + i\underbrace{\begin{pmatrix}0\\-1\end{pmatrix}}_{\mathbf{B}_2}
          \]
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>
          <strong>Write two real solutions</strong> using \(e^{\alpha t}(\mathbf{B}_1\cos\beta t - \mathbf{B}_2 \sin\beta t)\) and \(e^{\alpha t}(\mathbf{B}_2\cos\beta t + \mathbf{B}_1\sin\beta t)\):
          \[
            \mathbf{X}(t) = c_1 e^{t}\left[\begin{pmatrix}1\\-1\end{pmatrix}\cos 2t - \begin{pmatrix}0\\-1\end{pmatrix}\sin 2t\right]
            + c_2 e^{t}\left[\begin{pmatrix}0\\-1\end{pmatrix}\cos 2t + \begin{pmatrix}1\\-1\end{pmatrix}\sin 2t\right]
          \]
        </div>
      </div>

      <div class=&quot;answer&quot;>✓ Equilibrium: <strong>unstable spiral</strong> at (0, 0) — trajectories wind outward.</div>
    </div>
  </div>

  <!-- WORKED EXAMPLE 3: Spring-Mass System -->
  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      <span>WORKED EXAMPLE 3 — Spring-Mass as a System (S18 WS13 #1)</span>
      <span class=&quot;difficulty&quot;>★★☆ Medium</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <p class=&quot;problem&quot;>
        A 1 kg mass is attached to a spring with constant \(k = 6\) N/m, submerged in a liquid with damping force \(4v\). Write the ODE, convert to a system, classify the equilibrium, and identify the motion type.
      </p>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>
          <strong>Write the ODE.</strong> Newton's second law with damping:
          \[ y'' + 4y' + 6y = 0 \]
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>
          <strong>Convert to system.</strong> Let \(x_1 = y\) (position), \(x_2 = y'\) (velocity):
          \[
            \frac{d\mathbf{X}}{dt} = \begin{pmatrix}0 &amp; 1 \\ -6 &amp; -4\end{pmatrix}\mathbf{X}
          \]
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>
          <strong>Find eigenvalues.</strong>
          \[
            \lambda^2 + 4\lambda + 6 = 0 \implies \lambda = \frac{-4 \pm \sqrt{16-24}}{2} = -2 \pm i
          \]
          Real part \(\alpha = -2 < 0\), imaginary part \(\beta = 1\).
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>
          <strong>Classify.</strong> Complex eigenvalues with negative real part → <strong>stable spiral</strong>. Motion type: <strong>free underdamped (oscillatory)</strong>. Trajectories spiral inward to origin.
        </div>
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;>
          <strong>IVP solution</strong> (if \(\mathbf{X}(0) = (1, 0)^T\)): Find eigenvector for \(\lambda = -2+i\):
          \((A - (-2+i)I)\mathbf{v} = 0\) → \(\begin{pmatrix}2-i &amp; 1 \\ -6 &amp; 2-i\end{pmatrix}\mathbf{v} = 0\)<br>
          Row 1: \(v_2 = -(2-i)v_1\). Let \(v_1 = 1\): \(\mathbf{v} = \binom{1}{-(2-i)} = \binom{1}{-2} + i\binom{0}{1}\).<br><br>
          General solution:
          \[
            \mathbf{X}(t) = c_1 e^{-2t}\left[\binom{1}{-2}\cos t - \binom{0}{1}\sin t\right]
            + c_2 e^{-2t}\left[\binom{0}{1}\cos t + \binom{1}{-2}\sin t\right]
          \]
          Apply \(\mathbf{X}(0) = (1, 0)^T\): \(c_1\binom{1}{-2} + c_2\binom{0}{1} = \binom{1}{0}\) → \(c_1 = 1,\ c_2 = 2\).
        </div>
      </div>

      <div class=&quot;answer&quot;>✓ Stable spiral. Underdamped motion. \(\mathbf{X}(t) = e^{-2t}\Big[\binom{1}{-2}\cos t - \binom{0}{1}\sin t\Big] + 2e^{-2t}\Big[\binom{0}{1}\cos t + \binom{1}{-2}\sin t\Big]\)</div>
    </div>
  </div>

  <h3>Group A — Real Distinct Eigenvalues</h3>
  <div class=&quot;practice-grid&quot;>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-F19 #1 · ★★☆</div>
      <p>Given the system \(\mathbf{X}' = \begin{pmatrix}3 &amp; 4 \\ 1 &amp; 0\end{pmatrix}\mathbf{X}\):</p>
      <p>(a) Find the general solution.&amp;ensp; (b) Classify the equilibrium at (0, 0).&amp;ensp; (c) Describe the phase portrait including eigendirection lines.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>(a) Eigenvalues:</strong>
          \(\det(A-\lambda I) = (3-\lambda)(0-\lambda)-4 = \lambda^2 - 3\lambda - 4 = (\lambda-4)(\lambda+1) = 0\)<br>
          \(\lambda_1 = 4,\quad \lambda_2 = -1\).<br><br>
          <strong>Eigenvectors:</strong><br>
          \(\lambda_1=4\): \((A-4I)\mathbf{v}=0\) → \(\begin{pmatrix}-1&amp;4\\1&amp;-4\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_1=\begin{pmatrix}4\\1\end{pmatrix}\).<br>
          \(\lambda_2=-1\): \((A+I)\mathbf{v}=0\) → \(\begin{pmatrix}4&amp;4\\1&amp;1\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_2=\begin{pmatrix}-1\\1\end{pmatrix}\).<br><br>
          \[\mathbf{X}(t) = c_1 e^{4t}\begin{pmatrix}4\\1\end{pmatrix} + c_2 e^{-t}\begin{pmatrix}-1\\1\end{pmatrix}\]
          <strong>(b)</strong> \(\lambda_1=4>0\) and \(\lambda_2=-1<0\): <strong>Saddle point</strong> — unstable.<br>
          <strong>(c)</strong> Two straight-line solutions: trajectories along \(\mathbf{v}_2 = (-1,1)^T\) flow <em>into</em> the origin; along \(\mathbf{v}_1=(4,1)^T\) flow <em>away</em>. All other trajectories approach the unstable manifold (\(\mathbf{v}_1\) direction) as \(t\to\infty\).
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-F19 #2 · ★★☆</div>
      <p>Given \(\dfrac{dx}{dt} = -5x - 2y,\quad \dfrac{dy}{dt} = -x - 4y\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait description.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Matrix:</strong> \(A = \begin{pmatrix}-5&amp;-2\\-1&amp;-4\end{pmatrix}\).<br>
          <strong>Eigenvalues:</strong> \(\det(A-\lambda I) = (-5-\lambda)(-4-\lambda)-2 = \lambda^2+9\lambda+18 = (\lambda+3)(\lambda+6) = 0\)<br>
          \(\lambda_1 = -3,\quad \lambda_2 = -6\).<br><br>
          <strong>Eigenvectors:</strong><br>
          \(\lambda_1=-3\): \(\begin{pmatrix}-2&amp;-2\\-1&amp;-1\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_1=\begin{pmatrix}-1\\1\end{pmatrix}\).<br>
          \(\lambda_2=-6\): \(\begin{pmatrix}1&amp;-2\\-1&amp;2\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_2=\begin{pmatrix}2\\1\end{pmatrix}\).<br><br>
          \[\mathbf{X}(t) = c_1 e^{-3t}\begin{pmatrix}-1\\1\end{pmatrix} + c_2 e^{-6t}\begin{pmatrix}2\\1\end{pmatrix}\]
          <strong>(b)</strong> Both eigenvalues negative: <strong>stable node</strong> — asymptotically stable.<br>
          <strong>(c)</strong> All trajectories flow toward origin. As \(t\to\infty\) the \(e^{-6t}\) term vanishes faster, so trajectories become tangent to \(\mathbf{v}_1 = (-1,1)^T\) (the slower eigenvector) at the origin.
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-S14 #1 · ★★☆</div>
      <p>Given \(\dfrac{dx}{dt} = -x + y,\quad \dfrac{dy}{dt} = 8x + y\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \(\det\begin{pmatrix}-1-\lambda&amp;1\\8&amp;1-\lambda\end{pmatrix} = (-1-\lambda)(1-\lambda)-8 = \lambda^2 - 9 = 0\)<br>
          \(\lambda_1=3,\quad \lambda_2=-3\).<br><br>
          <strong>Eigenvectors:</strong><br>
          \(\lambda_1=3\): \(\begin{pmatrix}-4&amp;1\\8&amp;-2\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_1=\begin{pmatrix}1\\4\end{pmatrix}\).<br>
          \(\lambda_2=-3\): \(\begin{pmatrix}2&amp;1\\8&amp;4\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_2=\begin{pmatrix}-1\\2\end{pmatrix}\).<br><br>
          \[\mathbf{X}(t)=c_1e^{3t}\begin{pmatrix}1\\4\end{pmatrix}+c_2e^{-3t}\begin{pmatrix}-1\\2\end{pmatrix}\]
          <strong>(b)</strong> Opposite sign eigenvalues: <strong>saddle point</strong> — unstable.<br>
          <strong>(c)</strong> Trajectories enter along \(\mathbf{v}_2\) (stable manifold) and exit along \(\mathbf{v}_1\) (unstable manifold).
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-S14 #2 · ★★☆</div>
      <p>Given \(\dfrac{dx}{dt} = -2x + y,\quad \dfrac{dy}{dt} = x - 2y\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \(\det\begin{pmatrix}-2-\lambda&amp;1\\1&amp;-2-\lambda\end{pmatrix} = (-2-\lambda)^2 - 1 = \lambda^2+4\lambda+3 = (\lambda+1)(\lambda+3) = 0\)<br>
          \(\lambda_1=-1,\quad\lambda_2=-3\).<br><br>
          <strong>Eigenvectors:</strong><br>
          \(\lambda_1=-1\): \(\begin{pmatrix}-1&amp;1\\1&amp;-1\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_1=\begin{pmatrix}1\\1\end{pmatrix}\).<br>
          \(\lambda_2=-3\): \(\begin{pmatrix}1&amp;1\\1&amp;1\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_2=\begin{pmatrix}1\\-1\end{pmatrix}\).<br><br>
          \[\mathbf{X}(t)=c_1e^{-t}\begin{pmatrix}1\\1\end{pmatrix}+c_2e^{-3t}\begin{pmatrix}1\\-1\end{pmatrix}\]
          <strong>(b)</strong> Both eigenvalues negative (\(-1\) and \(-3\)): <strong>stable node</strong> — asymptotically stable.<br>
          <strong>(c)</strong> All trajectories flow into the origin; tangent to \(\mathbf{v}_1=(1,1)^T\) (slower, \(\lambda=-1\)) as \(t\to\infty\).
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS11-S15 #2 · ★★☆</div>
      <p>Given \(\dfrac{dx}{dt} = -8x + 3y,\quad \dfrac{dy}{dt} = 2x - 13y\):</p>
      <p>(a) Find the general solution.&amp;ensp; (b) Find the specific solution with \((x(0),y(0))=(6,2)\).&amp;ensp; (c) Classify equilibrium.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \(A=\begin{pmatrix}-8&amp;3\\2&amp;-13\end{pmatrix}\)<br>
          \(\lambda^2+21\lambda+(104-6)=\lambda^2+21\lambda+98=(\lambda+7)(\lambda+14)=0\)<br>
          \(\lambda_1=-7,\quad\lambda_2=-14\).<br><br>
          <strong>Eigenvectors:</strong><br>
          \(\lambda_1=-7\): \(\begin{pmatrix}-1&amp;3\\2&amp;-6\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_1=\begin{pmatrix}3\\1\end{pmatrix}\).<br>
          \(\lambda_2=-14\): \(\begin{pmatrix}6&amp;3\\2&amp;1\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_2=\begin{pmatrix}-1\\2\end{pmatrix}\).<br><br>
          <strong>(a)</strong> \(\mathbf{X}(t)=c_1e^{-7t}\begin{pmatrix}3\\1\end{pmatrix}+c_2e^{-14t}\begin{pmatrix}-1\\2\end{pmatrix}\)<br><br>
          <strong>(b) IVP:</strong> At \(t=0\): \(3c_1-c_2=6\) and \(c_1+2c_2=2\).<br>
          From second: \(c_1=2-2c_2\). Sub into first: \(3(2-2c_2)-c_2=6\) → \(6-7c_2=6\) → \(c_2=0,\ c_1=2\).<br>
          \[\mathbf{X}(t)=2e^{-7t}\begin{pmatrix}3\\1\end{pmatrix}\]
          <strong>(c)</strong> Both eigenvalues negative: <strong>stable node</strong> — asymptotically stable.
        </div>
      </details>
    </div>

  <h3>Group B — Complex Eigenvalues (Spirals &amp;amp; Centers)</h3>
  <div class=&quot;practice-grid&quot;>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-S14 #3 · ★★★</div>
      <p>Given \(\mathbf{X}' = \begin{pmatrix}0 &amp; -1 \\ 1 &amp; 0\end{pmatrix}\mathbf{X}\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \(\det(A-\lambda I)=\lambda^2+1=0\) → \(\lambda=\pm i\).<br>
          Pure imaginary, \(\alpha=0\) → <strong>center</strong>.<br><br>
          <strong>Eigenvector for \(\lambda=i\):</strong>
          \(\begin{pmatrix}-i&amp;-1\\1&amp;-i\end{pmatrix}\mathbf{v}=0\) → \(v_2=-iv_1\). Let \(v_1=1\):
          \(\mathbf{v}=\begin{pmatrix}1\\-i\end{pmatrix}=\begin{pmatrix}1\\0\end{pmatrix}+i\begin{pmatrix}0\\-1\end{pmatrix}\).<br><br>
          <strong>General solution</strong> (\(\alpha=0,\ \beta=1\)):
          \[\mathbf{X}(t) = c_1\begin{pmatrix}\cos t\\\sin t\end{pmatrix} + c_2\begin{pmatrix}-\sin t\\\cos t\end{pmatrix}\]
          <strong>(b)</strong> Center — stable (but not asymptotically stable).<br>
          <strong>(c)</strong> Phase portrait: closed elliptical (here, circular) orbits around the origin. No spiraling.
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-F19 #3 · ★★★</div>
      <p>Given \(\mathbf{X}' = \begin{pmatrix}0 &amp; 1 \\ -\tfrac{4}{3} &amp; 0\end{pmatrix}\mathbf{X}\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \(\det(A-\lambda I)=\lambda^2+\tfrac{4}{3}=0\) → \(\lambda=\pm\tfrac{2}{\sqrt{3}}i=\pm\tfrac{2\sqrt{3}}{3}i\).<br>
          Pure imaginary → <strong>center</strong>.<br><br>
          <strong>Eigenvector for \(\lambda=\tfrac{2\sqrt{3}}{3}i\):</strong><br>
          \(\begin{pmatrix}-\lambda &amp; 1\\-\tfrac{4}{3}&amp;-\lambda\end{pmatrix}\mathbf{v}=0\) → \(v_2=\lambda v_1\). Let \(v_1=1\):
          \(\mathbf{v}=\begin{pmatrix}1\\\tfrac{2\sqrt{3}}{3}i\end{pmatrix}=\begin{pmatrix}1\\0\end{pmatrix}+i\begin{pmatrix}0\\\tfrac{2\sqrt{3}}{3}\end{pmatrix}\).<br><br>
          Let \(\beta=\tfrac{2\sqrt{3}}{3}\):
          \[\mathbf{X}(t)=c_1\begin{pmatrix}\cos\beta t\\-\beta\sin\beta t\end{pmatrix}+c_2\begin{pmatrix}-\sin\beta t\\\beta\cos\beta t\end{pmatrix} \cdot \frac{1}{\beta}\]
          <em>(Simplify by using general form with \(\mathbf{B}_1=(1,0)^T\), \(\mathbf{B}_2=(0,\beta)^T\).)</em><br><br>
          <strong>(b)</strong> Center — stable, not asymptotically stable.<br>
          <strong>(c)</strong> Closed ellipses (not circles since the matrix is not antisymmetric) around origin.
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-F18 #2 · ★★★</div>
      <p>Given \(\mathbf{X}' = \begin{pmatrix}-1 &amp; -2 \\ 4 &amp; 3\end{pmatrix}\mathbf{X}\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          (This is Worked Example 2 above — see full solution there.)<br><br>
          <strong>Summary:</strong> \(\lambda = 1\pm 2i\), \(\alpha=1>0\) → <strong>unstable spiral</strong>. Trajectories wind outward counterclockwise.
        </div>
      </details>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-F18 #3 · ★★★</div>
      <p>Given \(\dfrac{d\mathbf{X}}{dt} = \begin{pmatrix}-4 &amp; 10 \\ -4 &amp; -2\end{pmatrix}\mathbf{X}\):</p>
      <p>(a) General solution.&amp;ensp; (b) Classify equilibrium.&amp;ensp; (c) Phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \(\text{tr}=-6,\quad\det=(8+40)=48\)<br>
          \(\lambda^2+6\lambda+48=0\) → \(\lambda=\dfrac{-6\pm\sqrt{36-192}}{2}=-3\pm i\sqrt{39}\).<br>
          \(\alpha=-3<0\) → <strong>stable spiral</strong>.<br><br>
          <strong>Eigenvector for \(\lambda=-3+i\sqrt{39}\):</strong><br>
          \(\begin{pmatrix}-1-i\sqrt{39}&amp;10\\-4&amp;1-i\sqrt{39}\end{pmatrix}\mathbf{v}=0\)<br>
          Row 2: \(-4v_1+(1-i\sqrt{39})v_2=0\) → \(v_1=\tfrac{1-i\sqrt{39}}{4}v_2\). Let \(v_2=4\):<br>
          \(\mathbf{v}=\begin{pmatrix}1-i\sqrt{39}\\4\end{pmatrix}=\begin{pmatrix}1\\4\end{pmatrix}+i\begin{pmatrix}-\sqrt{39}\\0\end{pmatrix}\).<br><br>
          \[\mathbf{X}(t)=c_1e^{-3t}\left[\begin{pmatrix}1\\4\end{pmatrix}\cos(\sqrt{39}t)+\begin{pmatrix}\sqrt{39}\\0\end{pmatrix}\sin(\sqrt{39}t)\right]\]
          \[+c_2e^{-3t}\left[\begin{pmatrix}-\sqrt{39}\\0\end{pmatrix}\cos(\sqrt{39}t)+\begin{pmatrix}1\\4\end{pmatrix}\sin(\sqrt{39}t)\right]\]
          <strong>(b)</strong> Stable spiral — asymptotically stable.<br>
          <strong>(c)</strong> Trajectories spiral inward to origin.
        </div>
      </details>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS11-S20 #2 · ★★☆</div>
      <p>An unforced, undamped harmonic oscillator: \(m=1\) kg, \(k=64\) N/m.</p>
      <p>(a) Write the ODE.&amp;ensp; (b) Convert to a system.&amp;ensp; (c) Classify equilibrium.&amp;ensp; (d) Describe the phase portrait and motion type.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>(a)</strong> No damping (\(b=0\)): \(y'' + 64y = 0\).<br><br>
          <strong>(b)</strong> \(\dfrac{d\mathbf{X}}{dt}=\begin{pmatrix}0&amp;1\\-64&amp;0\end{pmatrix}\mathbf{X}\).<br><br>
          <strong>(c) Eigenvalues:</strong> \(\lambda^2+64=0\) → \(\lambda=\pm 8i\). Pure imaginary → <strong>center</strong> — stable, not asymptotically stable.<br><br>
          <strong>(d)</strong> Phase portrait: closed elliptical orbits around origin. For initial condition \((y(0),v(0))=(1,0)\), the trajectory is an ellipse passing through \((1,0)\). Motion type: <strong>free undamped (simple harmonic)</strong> with angular frequency \(\omega=8\) rad/s.
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS12-F18 #4 · ★★★</div>
      <p>A 1 kg mass is attached to a spring with \(k=13\) N/m, damping force \(=4v\).</p>
      <p>(a) Write the ODE.&amp;ensp; (b) Convert to a system.&amp;ensp; (c) Classify equilibrium at (0,0).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>(a)</strong> \(y'' + 4y' + 13y = 0\).<br><br>
          <strong>(b)</strong> \(\dfrac{d\mathbf{X}}{dt}=\begin{pmatrix}0&amp;1\\-13&amp;-4\end{pmatrix}\mathbf{X}\).<br><br>
          <strong>(c) Eigenvalues:</strong> \(\lambda^2+4\lambda+13=0\) → \(\lambda=\dfrac{-4\pm\sqrt{16-52}}{2}=-2\pm 3i\).<br>
          Real part \(\alpha=-2<0\) → <strong>stable spiral</strong>. Motion type: <strong>free underdamped (oscillatory)</strong> — decaying oscillations with angular frequency \(\beta=3\).
        </div>
      </details>
    </div>

  </div>

  <h3>Group D — IVP + General Solution Verification</h3>
  <div class=&quot;practice-grid&quot;>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS11-S15 #1 · ★★★</div>
      <p>Given \(\mathbf{X}' = \begin{pmatrix}-8&amp;3\\2&amp;-13\end{pmatrix}\mathbf{X}\), with \(\mathbf{X}_1(t)=e^{-14t}\begin{pmatrix}3\\-2\end{pmatrix}\) and \(\mathbf{X}_2(t)=e^{-7t}\begin{pmatrix}3\\1\end{pmatrix}\):</p>
      <p>(a) Verify these are solutions.&amp;ensp; (b) Verify they form a fundamental set.&amp;ensp; (c) Write the general solution.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>(a) Verify \(\mathbf{X}_1\):</strong><br>
          \(\mathbf{X}_1' = -14e^{-14t}\begin{pmatrix}3\\-2\end{pmatrix}\).<br>
          \(A\mathbf{X}_1 = e^{-14t}\begin{pmatrix}-8(3)+3(-2)\\2(3)+(-13)(-2)\end{pmatrix}=e^{-14t}\begin{pmatrix}-30\\32\end{pmatrix}\).<br>
          Hmm — let's check: \(-14\cdot 3=-42\neq -30\). The worksheet solution uses eigenvectors from eigenvalues \(-14\) and \(-7\). If eigenvector for \(-14\) is \((3,-2)^T\): \(A\mathbf{v}=(-24-6, 6+26)^T=(-30,32)^T\neq -14(3,-2)^T=(-42,28)^T\). Recalculate: eigenvalues of \(A=\begin{pmatrix}-8&amp;3\\2&amp;-13\end{pmatrix}\) are \(\lambda^2+21\lambda+98=(\lambda+7)(\lambda+14)=0\). Eigenvector for \(\lambda=-14\): \((A+14I)\mathbf{v}=\begin{pmatrix}6&amp;3\\2&amp;1\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}=\begin{pmatrix}1\\-2\end{pmatrix}\).<br><br>
          <strong>(b) Fundamental set:</strong> Compute Wronskian \(W = \det[\mathbf{X}_1|\mathbf{X}_2]\) at \(t=0\):<br>
          \(W(0)=\det\begin{pmatrix}1&amp;3\\-2&amp;1\end{pmatrix}=1+6=7\neq 0\) → linearly independent → forms a fundamental set on \((-\infty,\infty)\).<br><br>
          <strong>(c)</strong> \(\mathbf{X}(t)=c_1e^{-14t}\begin{pmatrix}1\\-2\end{pmatrix}+c_2e^{-7t}\begin{pmatrix}3\\1\end{pmatrix}\)
        </div>
      </details>
    </div>

    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>WS11-S20 #1 · ★★☆</div>
      <p>Given \(\dfrac{d\mathbf{X}}{dt}=\begin{pmatrix}1&amp;4\\2&amp;-1\end{pmatrix}\mathbf{X}\), with \(\mathbf{X}(0)=\begin{pmatrix}1\\2\end{pmatrix}\):</p>
      <p>(a) General solution.&amp;ensp; (b) IVP solution.&amp;ensp; (c) Classify equilibrium.&amp;ensp; (d) Describe phase portrait.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ Show Solution</summary>
        <div class=&quot;solution-body&quot;>
          <strong>Eigenvalues:</strong> \((1-\lambda)(-1-\lambda)-8=\lambda^2-9=0\) → \(\lambda_1=3,\ \lambda_2=-3\).<br>
          Opposite signs → saddle.<br><br>
          <strong>Eigenvectors:</strong><br>
          \(\lambda_1=3\): \(\begin{pmatrix}-2&amp;4\\2&amp;-4\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_1=\begin{pmatrix}2\\1\end{pmatrix}\).<br>
          \(\lambda_2=-3\): \(\begin{pmatrix}4&amp;4\\2&amp;2\end{pmatrix}\mathbf{v}=0\) → \(\mathbf{v}_2=\begin{pmatrix}-1\\1\end{pmatrix}\).<br><br>
          <strong>(a)</strong> \(\mathbf{X}(t)=c_1e^{3t}\begin{pmatrix}2\\1\end{pmatrix}+c_2e^{-3t}\begin{pmatrix}-1\\1\end{pmatrix}\)<br><br>
          <strong>(b) IVP:</strong> \(t=0\): \(2c_1-c_2=1\) and \(c_1+c_2=2\). Adding: \(3c_1=3\) → \(c_1=1,\ c_2=1\).<br>
          \[\mathbf{X}(t)=e^{3t}\begin{pmatrix}2\\1\end{pmatrix}+e^{-3t}\begin{pmatrix}-1\\1\end{pmatrix}\]
          <strong>(c)</strong> Saddle point — unstable.<br>
          <strong>(d)</strong> Two straight-line solutions along \(\mathbf{v}_1=(2,1)^T\) (unstable, arrows out) and \(\mathbf{v}_2=(-1,1)^T\) (stable, arrows in). All other trajectories curve away from origin.
        </div>
      </details>
    </div>

  <!-- ─── 15.7 QUICK REFERENCE ──────────────────────── -->
  <h2>§15.7 Quick-Reference Cheat Sheet</h2>

  <div class=&quot;cheatsheet&quot;>
    <h3>Systems of Linear ODEs — Key Facts</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>CHARACTERISTIC EQUATION (2×2)</span>
        \(\lambda^2 - \text{tr}(A)\lambda + \det(A) = 0\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SADDLE SHORTCUT</span>
        \(\det(A) < 0\) → eigenvalues have opposite signs → always a saddle
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>CENTER SHORTCUT</span>
        \(\det(A) > 0\) and \(\text{tr}(A) = 0\) → pure imaginary eigenvalues → center
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>STABILITY SHORTCUT</span>
        \(\text{tr}(A) < 0\) and \(\det(A) > 0\) → both eigenvalues have negative real parts → stable
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>COMPANION MATRIX (spring-mass)</span>
        \(my''+by'+ky=0\) → \(A=\begin{pmatrix}0&amp;1\\-k/m&amp;-b/m\end{pmatrix}\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>COMPLEX SOLUTION SHORTCUT</span>
        Get ONE complex eigenvector, split into \(\mathbf{B}_1+i\mathbf{B}_2\), write two real solutions using cos/sin with \(e^{\alpha t}\)
      </div>
    </div>
  </div>

  <p>Your professor is explicit: this is a <strong>decision-making exam</strong>, not a plug-and-chug exam. Every problem you encounter follows a five-step thinking process:</p>

  <div class=&quot;decision-tree&quot;>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>1</div><div><strong>Identify the situation.</strong> What type of system is this? Buffer? Titration? Equilibrium? Kinetics? Thermo? What species are present? What is reacting?</div></div>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>2</div><div><strong>Predict before calculating.</strong> Will pH increase or decrease? Is ΔG positive or negative? Does Q &amp;lt; K or Q &amp;gt; K? If you skip this, you are guessing even when the math is right.</div></div>
    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>3</div><div><strong>Select your strategy.</strong> Do I need stoichiometry? ICE table? Henderson–Hasselbalch? Arrhenius? Conceptual reasoning only?</div></div>

    <div class=&quot;dt-step&quot;><div class=&quot;dt-num&quot;>5</div><div><strong>Check your answer.</strong> Does it match your prediction? Is the magnitude reasonable? Are logs and units handled correctly?</div></div>
  </div>

  <div class=&quot;warn-box&quot;>
    The most common failure is jumping straight to an equation. Always identify the situation first. &quot;Is this a buffer?&quot; is the most important question on the final.
  </div>

  <div class=&quot;key-rule&quot;>
    <strong>The Big Idea:</strong> Everything is connected. Buffers ↔ Equilibrium (Ka/Kb/Le Châtelier). Titrations ↔ Stoichiometry + Equilibrium. IMFs ↔ Boiling point ↔ Entropy. ΔG ↔ K ↔ Q ↔ Spontaneity. Kinetics ↔ Mechanisms ↔ Energy diagrams.

════════════════════════════════════════ -->
<section id=&quot;ch10&quot;>
