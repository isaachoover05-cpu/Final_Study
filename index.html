      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Polar→Rect</div>$a=r\cos\theta$; $b=r\sin\theta$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Multiply</div>Polar: add angles, multiply magnitudes</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Euler</div>$e^{j\theta}=\cos\theta+j\sin\theta$</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 17 ══════════════════════════ -->
<section id=&quot;t17&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num&quot;>Topic 17</span>
    <h2>Phasors &amp;amp; Impedance</h2>
  </div>

  <h3>The Key Insight: Phasors Turn Calculus into Algebra</h3>
  <p>Instead of solving differential equations for every AC circuit, we represent sinusoids as complex numbers (phasors) and treat inductors/capacitors like complex resistors (impedances). Then all DC analysis techniques work in the AC domain.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Phasor Transform</div>
    $$v(t) = V_m\cos(\omega t + \phi) \xleftrightarrow{\mathcal{P}} \mathbf{V} = V_m\angle\phi$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>A phasor captures only amplitude and phase — frequency $\omega$ is implicit and must be the same for all sources in the circuit.</p>
  </div>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ Sine vs. Cosine</strong>
    Our textbook uses the <strong>cosine</strong> reference. If given $v(t) = V_m\sin(\omega t + \phi)$, convert: $\sin(\omega t+\phi) = \cos(\omega t+\phi-90°)$. Then phasor is $V_m\angle(\phi-90°)$.
  </div>

  <h3>Impedance of Circuit Elements</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Impedance $Z$ (complex &quot;resistance&quot; in phasor domain)</div>
    $$Z_R = R \qquad Z_L = j\omega L \qquad Z_C = \frac{1}{j\omega C} = \frac{-j}{\omega C}$$
    $$\mathbf{V} = Z\mathbf{I} \quad \text{(Ohm's law in phasor domain)}$$
  </div>

  <h3>Phase Relationships</h3>
  <table>
    <tr><th>Element</th><th>V-I relationship</th><th>Phase</th></tr>
    <tr><td>Resistor</td><td>$V = RI$</td><td>V and I in phase (0° difference)</td></tr>
    <tr><td>Inductor</td><td>$V = j\omega L\, I$</td><td>V leads I by 90° (ELI: voltage leads current in inductor)</td></tr>
    <tr><td>Capacitor</td><td>$V = \frac{I}{j\omega C}$</td><td>V lags I by 90° (ICE: current leads voltage in capacitor)</td></tr>
  </table>

  <div class=&quot;callout tip&quot;>
    <strong>💡 Memory: ELI the ICE man</strong>
    <strong>ELI:</strong> In an inductor (L), voltage (E) leads current (I).<br>
    <strong>ICE:</strong> In a capacitor (C), current (I) leads voltage (E).
  </div>

  <h3>Combining Impedances</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Impedance Combinations (same rules as resistance!)</div>
    $$Z_{series} = Z_1+Z_2+\cdots$$
    $$\frac{1}{Z_{parallel}} = \frac{1}{Z_1}+\frac{1}{Z_2}+\cdots$$
    $$\text{Admittance: }Y = \frac{1}{Z} = G + jB \quad \text{(G=conductance, B=susceptance [S])}$$
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 17.1: Series RLC impedance <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Series circuit: $R=90\,\Omega$, $L=32\,\text{mH}$, $C=5\,\mu\text{F}$, $\omega=5000\,\text{rad/s}$. Find $Z_{total}$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$Z_L = j\omega L = j(5000)(0.032) = j160\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$Z_C = 1/(j\omega C) = 1/(j \cdot 5000 \cdot 5\times10^{-6}) = 1/(j0.025) = -j40\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$Z_{total} = 90 + j160 - j40 = 90 + j120 = 150\angle 53.13°\,\Omega$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 17.2: Full AC circuit analysis with phasors <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>$v_s(t) = 750\cos(5000t+30°)\,\text{V}$. Series: $R=90\,\Omega$, $L=32\,\text{mH}$, $C=5\,\mu\text{F}$. Find $i(t)$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Phasor: $\mathbf{V}_s = 750\angle 30°\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$Z = 90+j120 = 150\angle 53.13°\,\Omega$ (from Example 17.1)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$\mathbf{I} = \mathbf{V}_s/Z = \frac{750\angle 30°}{150\angle 53.13°} = 5\angle(30°-53.13°) = 5\angle{-23.13°}\,\text{A}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$i(t) = 5\cos(5000t-23.13°)\,\text{A}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 17 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Phasor</div>$V_m\cos(\omega t+\phi) \leftrightarrow V_m\angle\phi$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$Z_R$</div>$R$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$Z_L$</div>$j\omega L$ (V leads I)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$Z_C$</div>$-j/(\omega C)$ (I leads V)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Ohm's law</div>$\mathbf{V} = Z\mathbf{I}$ (complex division)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>ELI the ICE man</div>L: V leads I; C: I leads V</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 18 ══════════════════════════ -->
<section id=&quot;t18&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t2&quot;>Topic 18</span>
    <h2>Frequency-Domain Analysis</h2>
  </div>

  <h3>The Complete Process</h3>
  <div class=&quot;callout info&quot;>
    <strong>📋 Phasor Method Procedure</strong>
    <ol style=&quot;padding-left:20px;line-height:2&quot;>
      <li>Convert all sources from time domain to phasor form.</li>
      <li>Convert all elements to impedance form ($Z_R=R$, $Z_L=j\omega L$, $Z_C=1/j\omega C$).</li>
      <li>Redraw circuit in frequency (phasor) domain.</li>
      <li>Apply <strong>all DC analysis techniques</strong> (node-voltage, mesh-current, Thévenin, superposition — they all work!) using complex arithmetic.</li>
      <li>Convert final answer back to time domain (magnitude and phase → $V_m\cos(\omega t+\phi)$).</li>
    </ol>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 18.1: Parallel circuit frequency domain analysis <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Three branches in parallel: $Z_1 = 3+j4\,\Omega$, $Z_2 = 16-j12\,\Omega$, $Z_3 = -j4\,\Omega$. Find equivalent admittance, conductance, susceptance.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$Y_1 = 1/(3+j4)$. Multiply by conjugate: $Y_1 = (3-j4)/((3)^2+(4)^2) = (3-j4)/25 = 0.12-j0.16\,\text{S}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$Y_2 = 1/(16-j12) = (16+j12)/(256+144) = (16+j12)/400 = 0.04+j0.03\,\text{S}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$Y_3 = 1/(-j4) = j/4 = j0.25\,\text{S}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$Y_{eq} = Y_1+Y_2+Y_3 = (0.12+0.04)+j(-0.16+0.03+0.25) = 0.16+j0.12\,\text{S}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>Conductance $G = 0.16\,\text{S}$; Susceptance $B = 0.12\,\text{S}$; $|Y_{eq}| = \sqrt{0.16^2+0.12^2} = 0.2\,\text{S}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 18 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>5-step method</div>Phasor sources → Z elements → redraw → analyze → inverse phasor</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Admittance</div>$Y = 1/Z = G+jB$ [S]</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Parallel Z</div>Use admittances: $Y_{eq}=\sum Y_k$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Dividers in phasor</div>Same formulas, use complex Z instead of real R</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>KVL/KCL</div>Still apply! $\sum \mathbf{V}=0$; $\sum \mathbf{I}=0$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Node/Mesh</div>Fully applies — same procedure, complex numbers</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 19 ══════════════════════════ -->
<section id=&quot;t19&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t3&quot;>Topic 19</span>
    <h2>Ideal Transformers</h2>
  </div>

  <h3>Ideal Transformer Equations</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Ideal Transformer (turns ratio $n = N_1/N_2$)</div>
    $$\frac{V_1}{V_2} = \frac{N_1}{N_2} = n \qquad \frac{I_1}{I_2} = \frac{N_2}{N_1} = \frac{1}{n}$$
    $$Z_{in} = n^2 Z_L \quad \text{(impedance transformation)}$$
  </div>

  <h3>Dot Convention for Transformers</h3>
  <div class=&quot;callout info&quot;>
    <strong>📋 Ideal Transformer Dot Rules</strong>
    <ul style=&quot;padding-left:20px;line-height:2&quot;>
      <li>If both V's are positive at dots (or both negative): $V_1/V_2 = +n$ (use + sign).</li>
      <li>If one is positive and other negative at dot: $V_1/V_2 = -n$ (use − sign).</li>
      <li>If both currents enter dots (or both leave): $I_1/I_2 = -1/n$ (use − sign).</li>
      <li>If one enters and other leaves the dot: $I_1/I_2 = +1/n$ (use + sign).</li>
    </ul>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 19.1: Impedance matching with transformer <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>An ideal transformer with $n = N_1/N_2 = 5$, load $Z_L = 200\angle{-45°}\,\Omega$. Find the impedance seen at the primary ($Z_{ab}$).</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$Z_{ab} = n^2 Z_L = 5^2 \times 200\angle{-45°} = 25 \times 200\angle{-45°} = 5000\angle{-45°}\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$Z_{ab} = 5000\cos(-45°) + j5000\sin(-45°) = 3536-j3536\,\Omega$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 19 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Voltage ratio</div>$V_1/V_2 = n = N_1/N_2$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Current ratio</div>$I_1/I_2 = 1/n = N_2/N_1$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Impedance xform</div>$Z_{in} = n^2 Z_L$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Power</div>$S_1 = S_2$ (no power loss in ideal xfmr)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Step-up</div>$n &amp;lt; 1$: $V_2 > V_1$; $I_2 &amp;lt; I_1$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Step-down</div>$n > 1$: $V_2 &amp;lt; V_1$; $I_2 > I_1$</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 20 ══════════════════════════ -->
<section id=&quot;t20&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t4&quot;>Topic 20</span>
    <h2>AC Steady-State Power</h2>
  </div>

  <h3>Instantaneous Power</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Instantaneous Power</div>
    $$p(t) = v(t)\cdot i(t)$$
    $$\text{For }v = V_m\cos(\omega t+\theta_v),\; i = I_m\cos(\omega t+\theta_i):$$
    $$p(t) = \frac{V_m I_m}{2}\cos(\theta_v-\theta_i) + \frac{V_m I_m}{2}\cos(2\omega t + \theta_v+\theta_i)$$
  </div>

  <p>The instantaneous power oscillates at twice the source frequency. The constant part is the <strong>real (average) power</strong>.</p>

  <h3>Real, Reactive, and Complex Power</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Power Definitions (using RMS values)</div>
    $$P = \frac{V_m I_m}{2}\cos(\theta_v-\theta_i) = V_{rms}I_{rms}\cos(\theta_v-\theta_i) \quad \text{[W]}$$
    $$Q = \frac{V_m I_m}{2}\sin(\theta_v-\theta_i) = V_{rms}I_{rms}\sin(\theta_v-\theta_i) \quad \text{[VAR]}$$
    $$\mathbf{S} = P + jQ = V_{rms}I_{rms}^* \quad \text{[VA]}$$
    $$|\mathbf{S}| = V_{rms}I_{rms} = \sqrt{P^2+Q^2} \quad \text{(apparent power [VA])}$$
    $$\text{Power factor: }pf = \cos(\theta_v-\theta_i) = P/|\mathbf{S}|$$
  </div>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ Complex Power Formula</strong>
    $\mathbf{S} = \mathbf{V}_{rms}\mathbf{I}_{rms}^*$ — note the <strong>conjugate on current</strong>, not voltage! If you use peak values: $\mathbf{S} = \frac{1}{2}\mathbf{V}\mathbf{I}^*$.
  </div>

  <h3>Power for Passive Elements</h3>
  <table>
    <tr><th>Element</th><th>$P$</th><th>$Q$</th><th>$pf$</th></tr>
    <tr><td>Resistor (R)</td><td>$I_{rms}^2 R = V_{rms}^2/R > 0$</td><td>0</td><td>1 (unity, in phase)</td></tr>
    <tr><td>Inductor (L)</td><td>0</td><td>$+Q > 0$ (absorbs VARs)</td><td>0 lagging</td></tr>
    <tr><td>Capacitor (C)</td><td>0</td><td>$-Q &amp;lt; 0$ (supplies VARs)</td><td>0 leading</td></tr>
  </table>

  <h3>Power Triangle</h3>
  <div class=&quot;callout tip&quot;>
    <strong>💡 The Power Triangle</strong>
    Draw a right triangle: horizontal leg = $P$ (real power), vertical leg = $Q$ (reactive power, up for inductive/lagging, down for capacitive/leading), hypotenuse = $|S|$ (apparent power). The angle at the origin is $\theta = \theta_v - \theta_i$ = power factor angle.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 20.1: Compute all power quantities from load impedance <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Load: $Z_L = 8+j6\,\Omega$. Source: $V_{rms} = 120\angle 0°\,\text{V}$. Find $P$, $Q$, $S$, $pf$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$\mathbf{I}_{rms} = V_{rms}/Z_L = \frac{120\angle 0°}{10\angle 36.87°} = 12\angle{-36.87°}\,\text{A}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$\mathbf{S} = \mathbf{V}_{rms}\mathbf{I}_{rms}^* = (120\angle 0°)(12\angle{+36.87°}) = 1440\angle 36.87°$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$P = 1440\cos(36.87°) = 1440 \times 0.8 = 1152\,\text{W}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$Q = 1440\sin(36.87°) = 1440 \times 0.6 = 864\,\text{VAR}$ (positive → inductive → lagging)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>$pf = \cos(36.87°) = 0.8$ lagging</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 20.2: Power from phasor domain load — no explicit Z given <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Circuit: $v_s(t) = 100\cos(1000t)\,\text{V}$. After frequency domain analysis: load current $\mathbf{I} = 4\angle{-30°}\,\text{A}$ (peak). Find $P$ and $Q$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$\theta_v = 0°$, $\theta_i = -30°$ → $\theta_v - \theta_i = 30°$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$P = \frac{V_m I_m}{2}\cos(30°) = \frac{100 \times 4}{2} \times 0.866 = 173.2\,\text{W}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$Q = \frac{100 \times 4}{2}\sin(30°) = 200 \times 0.5 = 100\,\text{VAR}$ (positive → inductive)</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 20.1</h4>
    <p>A load draws 5 kW at 0.8 lagging power factor from a 240 $V_{rms}$ source. Find: (a) apparent power $|S|$, (b) reactive power $Q$, (c) load current $I_{rms}$.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      (a) $|S| = P/pf = 5000/0.8 = 6250\,\text{VA}$.<br>
      (b) $\theta = \arccos(0.8) = 36.87°$. $Q = |S|\sin\theta = 6250 \times 0.6 = 3750\,\text{VAR}$.<br>
      (c) $|S| = V_{rms}I_{rms}$ → $I_{rms} = 6250/240 = 26.04\,\text{A}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 20 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Real power P</div>$V_{rms}I_{rms}\cos\theta$ [W]; always ≥ 0</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Reactive Q</div>$V_{rms}I_{rms}\sin\theta$ [VAR]; $+$=inductive, $-$=capacitive</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Apparent $|S|$</div>$V_{rms}I_{rms} = \sqrt{P^2+Q^2}$ [VA]</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Complex S</div>$\mathbf{S} = P+jQ = \mathbf{V}_{rms}\mathbf{I}_{rms}^*$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Power factor</div>$pf = \cos\theta = P/|S|$; lagging→inductive</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Resistor P</div>$I_{rms}^2 R$; Inductor/Capacitor P = 0</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 21 ══════════════════════════ -->
<section id=&quot;t21&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num&quot;>Topic 21</span>
    <h2>Power Factor Correction</h2>
  </div>

  <h3>Why Correct Power Factor?</h3>
  <p>A low power factor means the source must supply more apparent power to deliver the same real power. This wastes current in transmission lines, causing $I^2 R$ losses, voltage drops, and requires larger (more expensive) equipment.</p>

  <div class=&quot;callout info&quot;>
    <strong>💡 The Core Idea of PF Correction</strong>
    Most industrial loads are inductive (motors, transformers) → lagging PF. Adding a <strong>capacitor bank in parallel</strong> supplies reactive power locally, reducing $Q$ demanded from the source, raising $pf$ toward 1 — without changing the real power consumed.
  </div>

  <h3>PF Correction Formula</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Required Capacitance for PF Correction</div>
    $$Q_C = P(\tan\theta_{old} - \tan\theta_{new})$$
    $$C = \frac{Q_C}{\omega V_{rms}^2}$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>
    $\theta_{old}$ = original power factor angle, $\theta_{new}$ = desired power factor angle<br>
    $Q_C$ = reactive power to be supplied by capacitor (positive value)
    </p>
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>After adding capacitor (parallel)</div>
    $$Q_{new} = Q_{old} - Q_C \quad P_{new} = P_{old}$$
    $$|S_{new}| = \sqrt{P^2 + Q_{new}^2} \quad pf_{new} = P/|S_{new}|}$$
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 21.1: Power factor correction calculation <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Load: 125 kVA at 0.8 lagging PF. Source: 16 kV$_{rms}$, 60 Hz. Correct to 0.99 lagging PF. Find required $Q_C$ and $C$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$P = |S| \times pf = 125{,}000 \times 0.8 = 100\,\text{kW}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$\theta_{old} = \arccos(0.8) = 36.87°$; $\theta_{new} = \arccos(0.99) = 8.11°$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$Q_C = P(\tan\theta_{old}-\tan\theta_{new}) = 100{,}000(\tan 36.87° - \tan 8.11°)$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$= 100{,}000(0.75 - 0.1425) = 100{,}000 \times 0.6075 = 60.75\,\text{kVAR}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>$C = \frac{Q_C}{\omega V_{rms}^2} = \frac{60{,}750}{2\pi(60)(16{,}000)^2} = \frac{60{,}750}{96{,}509{,}294} \approx 0.63\,\text{nF}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>6</div><div class=&quot;step-content&quot;>Verify: new apparent power = $P/pf_{new} = 100{,}000/0.99 = 101\,\text{kVA}$ (reduced from 125 kVA ≈ 20% reduction).</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 21.1</h4>
    <p>A factory loads: 50 kW at 0.6 lagging PF from a 4160 V$_{rms}$, 60 Hz line. Correct to unity PF. Find $Q_C$ needed and capacitance.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      $\theta_{old} = \arccos(0.6) = 53.13°$; $\theta_{new} = \arccos(1) = 0°$.<br>
      $Q_C = P(\tan 53.13° - \tan 0°) = 50{,}000(1.333 - 0) = 66.65\,\text{kVAR}$.<br>
      $C = Q_C/(\omega V_{rms}^2) = 66{,}650/(2\pi \times 60 \times 4160^2)$<br>
      $= 66{,}650/(2\pi \times 60 \times 17{,}305{,}600) = 66{,}650/6{,}522{,}875{,}000 \approx 10.2\,\text{nF}$.
    </div>
  </div>

  <div class=&quot;practice&quot;>
    <h4>Practice 21.2 — Multi-load circuit</h4>
    <p>Two loads on a common 120 V$_{rms}$ bus: Load 1: $P_1 = 2\,\text{kW}$, $pf_1 = 0.9$ lagging. Load 2: $P_2 = 3\,\text{kW}$, $pf_2 = 0.6$ leading. Find total $P$, $Q$, $|S|$, and overall $pf$.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      Load 1: $\theta_1 = \arccos(0.9) = 25.84°$. $|S_1| = 2000/0.9 = 2222\,\text{VA}$. $Q_1 = 2222\sin(25.84°) = +968\,\text{VAR}$ (lagging → positive).<br><br>
      Load 2: $\theta_2 = \arccos(0.6) = 53.13°$. $|S_2| = 3000/0.6 = 5000\,\text{VA}$. $Q_2 = 5000\sin(-53.13°) = -4000\,\text{VAR}$ (leading → negative).<br><br>
      Total: $P = 2000+3000 = 5000\,\text{W}$. $Q = 968-4000 = -3032\,\text{VAR}$ (net capacitive/leading).<br>
      $|S| = \sqrt{5000^2+3032^2} = \sqrt{25{,}000{,}000+9{,}193{,}024} = \sqrt{34{,}193{,}024} = 5847\,\text{VA}$.<br>
      $pf = P/|S| = 5000/5847 = 0.855$ leading.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 21 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>PF correction</div>Add capacitor in parallel with inductive load</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$Q_C$ needed</div>$P(\tan\theta_{old} - \tan\theta_{new})$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Cap value</div>$C = Q_C/(\omega V_{rms}^2)$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>After correction</div>$P$ unchanged; $Q$ reduced; $|S|$ reduced</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Lagging</div>Inductive load → positive $Q$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Leading</div>Capacitive load → negative $Q$</div>
    </div>
  </div>
</section>

<section id=&quot;strategies&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num tg&quot;>Final Section</span>
    <h2>Exam Strategies &amp;amp; Final Tips</h2>
  </div>

  <h3>Time Management</h3>
  <table>
    <tr><th>Phase</th><th>Strategy</th></tr>
    <tr><td>First 3 minutes</td><td>Skim all questions. Identify point values. Note which topics appear.</td></tr>
    <tr><td>Easy problems first</td><td>Grab guaranteed points (Ohm's law, simple KCL/KVL, phasor conversions). Build momentum and confidence.</td></tr>
    <tr><td>Medium problems</td><td>Node/mesh analysis, Thévenin, first-order circuits — these are your biggest score opportunities.</td></tr>
    <tr><td>Hard problems</td><td>Leave 25–30% of your time for complex power/PF correction and RLC problems.</td></tr>
    <tr><td>Last 5 minutes</td><td>Check units, signs, and that you answered what was asked ($v_C$ vs $v_R$).</td></tr>
  </table>

  <h3>Topic-Specific Strategies</h3>
  <ul style=&quot;padding-left:24px;line-height:2.2&quot;>
    <li><strong>Node-voltage:</strong> Always write KCL as &quot;currents leaving = currents entering from sources.&quot; Be consistent. Check: number of equations = number of unknown nodes.</li>
    <li><strong>Mesh-current:</strong> Always assume clockwise mesh currents. Write shared resistor terms as $(i_k - i_{adj})$. Sign conventions become automatic with practice.</li>
    <li><strong>Thévenin:</strong> Label which technique you're using before starting. For Technique 2, explicitly state &quot;no dependent sources&quot; as your justification.</li>
    <li><strong>First-order transients:</strong> Write down all three quantities ($x_0$, $x_F$, $\tau$) before plugging into the formula. Verify by substituting $t=0$ and $t=\infty$.</li>
    <li><strong>Phasors:</strong> Keep the angle arithmetic clean — write out $\angle$ explicitly for every multiplication/division step. Don't shortcut the angle subtraction.</li>
    <li><strong>AC power:</strong> Write $P$, $Q$, $|S|$, and $pf$ in that order. Draw the power triangle — it's a 30-second investment that prevents errors.</li>
  </ul>

  <h3>Formula Sheet Strategy</h3>
  <p>You get one sheet (front and back). Organize it this way:</p>
  <div class=&quot;callout info&quot;>
    <strong>📋 Optimal Formula Sheet Layout</strong>
    <ul style=&quot;padding-left:20px;line-height:2&quot;>
      <li><strong>Section 1:</strong> Master formula for 1st-order circuits + RLC characteristic roots.</li>
      <li><strong>Section 2:</strong> Impedance table ($Z_R$, $Z_L$, $Z_C$) + Phasor transform rule.</li>
      <li><strong>Section 3:</strong> Power formulas ($P$, $Q$, $S$, $pf$) + PF correction formula.</li>
      <li><strong>Section 4:</strong> Thévenin/Norton relationships + Max power transfer.</li>
      <li><strong>Section 5:</strong> Delta-Wye formulas + Transformer equations.</li>
      <li><strong>Section 6:</strong> Op-amp gain formulas (non-inv, inv, summing, diff).</li>
    </ul>
  </div>

  <h3>Common Last-Minute Mistakes to Avoid</h3>
  <table>
    <tr><th>Mistake</th><th>Prevention</th></tr>
    <tr><td>Using peak values in power formulas</td><td>Write &quot;rms&quot; next to every power calculation. $P = V_{rms}I_{rms}\cos\theta$, not $V_m I_m\cos\theta$.</td></tr>
    <tr><td>Forgetting to take conjugate in $\mathbf{S} = \mathbf{V}\mathbf{I}^*$</td><td>Write the formula with the asterisk explicitly every single time.</td></tr>
    <tr><td>Wrong $R_{eq}$ for time constant</td><td>Draw the circuit with L/C removed, deactivate sources, find Thévenin resistance seen by the element.</td></tr>
    <tr><td>Applying Technique 2 with dependent sources</td><td>Before using Technique 2, ask yourself: &quot;Are there dependent sources?&quot; If yes, use Technique 1 or 3.</td></tr>
    <tr><td>Forgetting units / wrong units</td><td>Always carry units. Check dimensional consistency: e.g., $\tau = L/R$ should be H/Ω = s. ✓</td></tr>
  </table>

  <h3>Mental &amp;amp; Physical Performance</h3>
  <div class=&quot;callout tip&quot;>
    <strong>💡 Night Before &amp;amp; Day Of</strong>
    <ul style=&quot;padding-left:20px;line-height:2&quot;>
      <li>Review your formula sheet and the cheat sheets at the end of each section above — don't try to learn new material.</li>
      <li>Work 2–3 quick problems per major topic to stay warm (not re-learn).</li>
      <li>Sleep 7+ hours. Sleep consolidates memory far better than cramming.</li>
      <li>Morning of: eat protein, limit caffeine to your normal amount (avoid caffeine anxiety).</li>
      <li>During the exam: if you're stuck, write down what you <em>do</em> know (list known quantities, the formula you'd use) — this earns partial credit and sometimes unsticks you.</li>
      <li>Breathe. AC circuits problems are always solvable with a calm, systematic approach. You have all the tools.</li>
    </ul>
  </div>

  <h3>Last-Minute Review Priority List (Days Before Exam)</h3>
  <table>
    <tr><th>Priority</th><th>Topic</th><th>Key thing to practice</th></tr>
    <tr><td>★★★ HIGH</td><td>First-order transients (general formula)</td><td>3+ problems with different initial conditions and source configurations</td></tr>
    <tr><td>★★★ HIGH</td><td>Phasor analysis + impedance</td><td>Converting series/parallel RLC to impedance, finding currents</td></tr>
    <tr><td>★★★ HIGH</td><td>AC power (P, Q, S, pf)</td><td>Drawing power triangles, computing all 4 quantities</td></tr>
    <tr><td>★★★ HIGH</td><td>Thévenin/Norton</td><td>One problem each with: only ind. sources, with dep. source</td></tr>
    <tr><td>★★ MED</td><td>Node-voltage with supernode</td><td>One problem with supernode + one with dependent source</td></tr>
    <tr><td>★★ MED</td><td>Power factor correction</td><td>Full calculation from load specs to capacitor value</td></tr>
    <tr><td>★★ MED</td><td>Op-amp circuits</td><td>Non-inverting gain, summing amp output voltage</td></tr>
    <tr><td>★ LOW</td><td>Mesh with supermesh</td><td>One problem to stay fresh</td></tr>
    <tr><td>★ LOW</td><td>Δ–Y transform</td><td>Know the formula; recognize when to use it</td></tr>
  </table>

<!-- ════════════════════════════════════════════ SECTION 1: PICARD -->
<div id=&quot;picard&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>1</div>
  Picard's Theorem — Existence &amp;amp; Uniqueness
</div>

<div class=&quot;topic-section&quot;>
  <h2>1. Existence of a Unique Solution (Picard's Theorem)</h2>

  <h3>The Theorem, Stated Precisely</h3>
  <p>Consider the IVP:</p>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>IVP FORM</strong>
    \[\frac{dy}{dx} = f(x, y), \quad y(x_0) = y_0\]
  </div>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>PICARD'S THEOREM</strong>
    If both \(f(x,y)\) <strong>and</strong> \(\dfrac{\partial f}{\partial y}(x,y)\) are <strong>continuous</strong> in some open rectangular region \(R\) containing the point \((x_0, y_0)\), then there exists an interval \((x_0 - h,\; x_0 + h)\) on which a unique solution exists.
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ CRITICAL: Two Conditions, Not One</strong>
    You must check BOTH \(f\) AND \(\partial f/\partial y\). Many students only check \(f\). If either one fails to be continuous at \((x_0,y_0)\), the theorem gives no guarantee. It does NOT say a solution doesn't exist — only that this theorem doesn't guarantee one.
  </div>

  <h3>How to Apply It — Step by Step</h3>
  <ol>
    <li>Write the ODE as \(y' = f(x,y)\).</li>
    <li>Compute \(\partial f/\partial y\).</li>
    <li>Identify where each expression is <em>discontinuous</em> (division by zero, square roots of negatives, etc.).</li>
    <li>Ask: &quot;Is \((x_0, y_0)\) inside a rectangle where both are continuous?&quot; → <strong>TRUE</strong>. Is it on/inside the set of bad points? → <strong>FALSE</strong> (theorem gives no guarantee).</li>
  </ol>

  <h3>Standard Function Types and Their Discontinuities</h3>
  <table>
    <tr><th>Function</th><th>Discontinuous when</th></tr>
    <tr><td>\(\dfrac{g(y)}{h(y)}\)</td><td>\(h(y) = 0\)</td></tr>
    <tr><td>\(\sqrt{y}\)</td><td>\(y < 0\); \(\partial f/\partial y = \frac{1}{2\sqrt{y}}\) fails at \(y = 0\)</td></tr>
    <tr><td>\(|y|\)</td><td>\(\partial f/\partial y\) fails at \(y = 0\)</td></tr>
    <tr><td>Polynomials, \(e^y\), \(\sin y\), \(\cos y\)</td><td>Continuous everywhere</td></tr>
  </table>

  <!-- WORKED EXAMPLES -->
  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 1.1 — From Spring 2026 Exam 1
      <span class=&quot;difficulty&quot;>EASY</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Determine T/F for each IVP using Picard's Theorem:<br>
      (a) \(y' = \sqrt{y}\), \((x_0,y_0)=(0,2)\) &amp;nbsp;&amp;nbsp; (b) \(y' = \sqrt{y}\), \((x_0,y_0)=(0,0)\)<br>
      (c) \(y' = \frac{x}{2-y}\), \((x_0,y_0)=(0,0)\) &amp;nbsp;&amp;nbsp; (d) \(y' = \frac{x}{2-y}\), \((x_0,y_0)=(0,2)\)
      </div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>
          <strong>Part (a):</strong> \(f = \sqrt{y}\), \(\dfrac{\partial f}{\partial y} = \dfrac{1}{2\sqrt{y}}\).<br>
          At \((0,2)\): \(\sqrt{2}\) is defined ✓, \(\frac{1}{2\sqrt{2}}\) is defined ✓. Both continuous.
          <div class=&quot;step-why&quot;>Answer: <strong>TRUE</strong> — unique solution guaranteed.</div>
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>
          <strong>Part (b):</strong> At \((0,0)\): \(\sqrt{0} = 0\) ✓ but \(\dfrac{1}{2\sqrt{0}}\) is <strong>undefined</strong> ✗.
          <div class=&quot;step-why&quot;>Answer: <strong>FALSE</strong> — theorem gives no guarantee. (Infinitely many solutions actually exist through \((0,0)\): \(y=0\) and \(y=(x/2)^2\)!)</div>
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>
          <strong>Part (c):</strong> \(f = \dfrac{x}{2-y}\), \(\dfrac{\partial f}{\partial y} = \dfrac{x}{(2-y)^2}\).<br>
          Both undefined when \(y=2\). At \((0,0)\): \(y=0 \neq 2\), so both are continuous ✓.
          <div class=&quot;step-why&quot;>Answer: <strong>TRUE</strong> — unique solution guaranteed.</div>
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>
          <strong>Part (d):</strong> At \((0,2)\): denominator \(2-y = 2-2 = 0\). Both \(f\) and \(\partial f/\partial y\) blow up.
          <div class=&quot;step-why&quot;>Answer: <strong>FALSE</strong> — theorem gives no guarantee.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PRACTICE -->
  <h3>Practice Problems — Picard's Theorem</h3>
  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 1.1</div>
      <p>For \(y' = \dfrac{\ln y}{x-3}\), \((x_0,y_0) = (1, 1)\): is a unique solution guaranteed?</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(f = \ln y / (x-3)\). Discontinuous: \(\ln y\) requires \(y > 0\), and \(x = 3\) makes denominator 0.<br>
          \(\partial f/\partial y = \frac{1}{y(x-3)}\). Also needs \(y \neq 0\) and \(x \neq 3\).<br>
          At \((1,1)\): \(y=1>0\) ✓, \(x=1\neq 3\) ✓. Both continuous. <strong>TRUE — unique solution guaranteed.</strong>
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 1.2</div>
      <p>For \(y' = \dfrac{y^{1/3}}{x}\), \((x_0,y_0) = (0, 1)\): guaranteed?</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(f = y^{1/3}/x\). At \(x=0\): \(f\) is undefined (division by zero).<br>
          <strong>FALSE</strong> — theorem gives no guarantee at \((0,1)\) since \(f\) is not continuous there.
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 1.3</div>
      <p>For \(y' = y^2 - x\), \((x_0,y_0) = (2, -3)\): guaranteed?</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(f = y^2 - x\) is a polynomial in \(y\) and \(x\) — continuous everywhere.<br>
          \(\partial f/\partial y = 2y\) — also continuous everywhere.<br>
          <strong>TRUE</strong> — unique solution guaranteed at any point.
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Picard's Theorem — Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>THE TWO CONDITIONS</span>
        \(f(x,y)\) continuous at \((x_0,y_0)\)<br>AND \(\partial f/\partial y\) continuous at \((x_0,y_0)\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>OUTCOME</span>
        Both continuous → TRUE (guaranteed unique)<br>
        Either fails → FALSE (no guarantee from this theorem)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>DANGER ZONES</span>
        \(\sqrt{y}\): \(\partial f/\partial y\) blows up at \(y=0\)<br>
        \(\frac{1}{2-y}\): blows up at \(y=2\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>MNEMONIC</span>
        &quot;FALSE doesn't mean no solution exists — it means the theorem stays silent.&quot;
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 2: SLOPE FIELDS -->
<div id=&quot;slope-fields&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>2</div>
  Direction (Slope) Fields
</div>

<div class=&quot;topic-section&quot;>
  <h2>2. Direction Fields and Matching</h2>

  <h3>What is a Direction Field?</h3>
  <p>A direction field (slope field) is a visualization of \(y' = f(x,y)\) where at each point \((x,y)\) a short line segment is drawn with slope \(f(x,y)\). Solutions to the ODE are curves that are tangent to these segments at every point.</p>

  <h3>Key Matching Strategies</h3>
  <ul>
    <li><strong>Autonomous equations</strong> (\(y' = g(y)\) only): slopes depend only on \(y\), so horizontal &quot;slices&quot; have all the same slope. Isoclines are horizontal lines.</li>
    <li><strong>x-only equations</strong> (\(y' = h(x)\)): slopes depend only on \(x\), so vertical &quot;slices&quot; are uniform. Isoclines are vertical lines.</li>
    <li><strong>Mixed equations</strong>: slopes vary in both directions.</li>
    <li>Check: what is \(y'=0\) (flat lines)? What happens as \(y \to \pm\infty\)? Does \(y'\) change sign?</li>
  </ul>

  <div class=&quot;box box-example&quot;>
    <strong class=&quot;box-label&quot;>MATCHING TECHNIQUE (from S26 Exam 1)</strong>
    For \(y' = \cos(t) + y\): linear, both \(t\) and \(y\) appear → slopes vary in 2D. The &quot;\(+y\)&quot; term means slopes grow with \(y\).<br>
    For \(y' = \cos(y)\): autonomous — check where \(\cos(y) = 0\) (equilibria at \(y = \pi/2, 3\pi/2, \ldots\)) and where it's positive/negative.
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ EXAM TRAP: Autonomous vs. Non-Autonomous</strong>
    If \(f\) depends only on \(y\), horizontal lines of the slope field are <em>flat</em> (all the same slope). If you see a slope field where each row has identical slopes, the equation is autonomous.
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 3: PHASE LINES -->
<div id=&quot;phase-lines&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>3</div>
  Phase Lines &amp;amp; Equilibrium Analysis
</div>

<div class=&quot;topic-section&quot;>
  <h2>3. Phase Lines (1D Phase Portraits)</h2>

  <h3>What is a Phase Line?</h3>
  <p>For an autonomous equation \(y' = f(y)\), the <strong>phase line</strong> is the \(y\)-axis with arrows indicating where \(y\) is increasing (\(f(y)>0\)) or decreasing (\(f(y)<0\)), and dots at critical points (\(f(y)=0\)).</p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>EQUILIBRIUM CLASSIFICATION</strong>
    <strong>Stable (sink):</strong> arrows point toward the equilibrium from both sides<br>
    <strong>Unstable (source):</strong> arrows point away from both sides<br>
    <strong>Semi-stable:</strong> arrows point toward from one side, away from the other
  </div>

  <h3>How to Build a Phase Line</h3>
  <ol>
    <li>Set \(f(y) = 0\) and solve for critical points.</li>
    <li>Test the sign of \(f(y)\) in each interval between critical points.</li>
    <li>Draw arrows: \(f(y)>0\) → upward arrow; \(f(y)<0\) → downward arrow.</li>
    <li>Classify each critical point by the arrow pattern around it.</li>
  </ol>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 3.1 — Gompertz Equation (S26 Exam 1, Problem 5)
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Analyze \(\dfrac{dP}{dt} = P(1 - \ln P)\), \(P > 0\). Find critical points, classify, sketch phase line. Then solve with \(P(0)=e^{-1}\).</div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>
          <strong>Find critical points:</strong> Set \(P(1-\ln P) = 0\).<br>
          Since \(P > 0\), we need \(1 - \ln P = 0 \Rightarrow \ln P = 1 \Rightarrow P = e\).<br>
          Also \(P = 0\) is a boundary (not in domain since \(P > 0\)).
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>
          <strong>Sign analysis:</strong><br>
          — For \(0 < P < e\): \(\ln P < 1\), so \(1-\ln P > 0\), and \(P > 0\), so \(dP/dt > 0\) ↑<br>
          — For \(P > e\): \(\ln P > 1\), so \(1-\ln P < 0\), so \(dP/dt < 0\) ↓
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>
          <strong>Classification:</strong> At \(P=e\): arrows point toward it from both sides → <strong>Stable equilibrium</strong>.
          <div class=&quot;step-why&quot;>Solutions starting above or below \(e\) converge to \(e\) as \(t\to\infty\).</div>
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>
          <strong>Solve the IVP:</strong> \(\dfrac{dP}{dt} = P(1-\ln P)\), \(P(0)=e^{-1}\).<br>
          Separate: \(\dfrac{dP}{P(1-\ln P)} = dt\).<br>
          Let \(u = 1-\ln P\), then \(du = -\frac{1}{P}dP\), so \(\frac{dP}{P} = -du\).<br>
          Integral: \(\displaystyle\int \frac{-du}{u} = \int dt \Rightarrow -\ln|u| = t + C\).<br>
          So \(\ln|1-\ln P| = -t - C\), i.e. \(1-\ln P = Ae^{-t}\).<br>
          IC: \(P(0)=e^{-1}\) → \(\ln(e^{-1})=-1\) → \(1-(-1)=2=A\).<br>
          Thus \(1-\ln P = 2e^{-t}\) → \(\ln P = 1-2e^{-t}\).
          <div class=&quot;step-why&quot;>Therefore \(P(t) = e^{1-2e^{-t}}\).</div>
        </div>
      </div>
      <div class=&quot;answer&quot;>Answer: \(P(t) = e^{1-2e^{-t}}\)</div>
    </div>
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 3.1</div>
      <p>Sketch the phase line for \(y' = y^2 - 4y\) and classify all equilibria.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(y^2-4y = y(y-4)=0 \Rightarrow y=0, y=4\).<br>
          Sign test: \((-\infty,0)\): \(y<0, y-4<0\), product \(>0\) ↑. \((0,4)\): \(y>0, y-4<0\), product \(<0\) ↓. \((4,\infty)\): both \(>0\), product \(>0\) ↑.<br>
          \(y=0\): arrows away on left, toward on right → <strong>semi-stable</strong>.<br>
          Wait, reconsider: left of 0 arrows go UP (toward 0), right of 0 between 0 and 4 go DOWN (toward 0). So \(y=0\) is <strong>semi-stable</strong>.<br>
          \(y=4\): arrows go down from left (0 to 4) and up from right → <strong>unstable</strong>.
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 3.2</div>
      <p>For \(y' = (y-1)(y-2)(y-3)\), find all equilibria and classify their stability.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Roots: \(y = 1, 2, 3\). Sign test in each interval:<br>
          \(y < 1\): \((-)(-)(-) = -\) ↓. \(1 < y < 2\): \((+)(-)(-) = +\) ↑. \(2 < y < 3\): \((+)(+)(-) = -\) ↓. \(y > 3\): \((+)(+)(+) = +\) ↑.<br>
          \(y=1\): left ↓, right ↑ → <strong>unstable</strong>. \(y=2\): left ↑, right ↓ → <strong>stable</strong>. \(y=3\): left ↓, right ↑ → <strong>unstable</strong>.
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Phase Line Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>STABLE (attractor/sink)</span>
        \(f'(y^*) < 0\) at equilibrium, OR arrows both point IN
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>UNSTABLE (repeller/source)</span>
        \(f'(y^*) > 0\) at equilibrium, OR arrows both point OUT
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SEMI-STABLE</span>
        \(f'(y^*) = 0\) at equilibrium; arrow in from one side, out from other
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SKETCH RULE</span>
        Solutions starting above a stable equilibrium decrease toward it; below, increase toward it.
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 4: SEP VARIABLES -->
<div id=&quot;sep-var&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>4</div>
  Separation of Variables
</div>

<div class=&quot;topic-section&quot;>
  <h2>4. Separation of Variables</h2>

  <h3>When to Use It</h3>
  <p>Use SV when the ODE can be written as \(g(y)\,dy = h(x)\,dx\) — the \(y\) side can be completely separated from the \(x\) side. Both linear and nonlinear ODEs can be separable.</p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>GENERAL PROCEDURE</strong>
    \[\frac{dy}{dx} = \frac{h(x)}{g(y)} \implies g(y)\,dy = h(x)\,dx \implies \int g(y)\,dy = \int h(x)\,dx + C\]
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ THE &quot;+C&quot; CRIME</strong>
    One constant on one side is sufficient. Writing \(\int g\,dy = \int h\,dx + C_1 + C_2\) and combining them is correct; writing no constant is wrong and loses points every time.
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 4.1 — Gompertz (continued)
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(dP/dt = P(1-\ln P)\), \(P(0)=e^{-1}\). (We did this above using substitution — here is the full detail.)</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Rewrite: \(\dfrac{dP}{P(1-\ln P)} = dt\). Let \(u=1-\ln P \Rightarrow du = -\frac{dP}{P}\), so \(\dfrac{dP}{P} = -du\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Substitute: \(\displaystyle\int \frac{-du}{u} = \int dt \Rightarrow -\ln|u|=t+C\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Solve for \(u\): \(|u|=e^{-t-C}=e^{-C}e^{-t}\). Set \(A=\pm e^{-C}\) → \(1-\ln P = Ae^{-t}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>Apply IC: \(t=0, P=e^{-1}\) → \(1-\ln(e^{-1})=1-(-1)=2=A\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;>\(1-\ln P = 2e^{-t} \Rightarrow \ln P = 1-2e^{-t} \Rightarrow \boxed{P(t)=e^{1-2e^{-t}}}\)</div>
      </div>
    </div>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 4.2 — Standard Separable IVP
      <span class=&quot;difficulty&quot;>EASY</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y' = y\cos(t)\), \(y(0)=3\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Separate: \(\dfrac{dy}{y} = \cos(t)\,dt\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Integrate: \(\ln|y| = \sin(t) + C\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Exponentiate: \(y = Ae^{\sin(t)}\), \(A = \pm e^C\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>IC: \(y(0)=3 \Rightarrow 3=Ae^0=A\). Answer: \(y=3e^{\sin t}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = 3e^{\sin t}\)</div>
    </div>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 4.3 — Tricky Separable (cos/y form)
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y' = \dfrac{\cos t}{y}\), \(y(0)=2\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Separate: \(y\,dy = \cos(t)\,dt\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Integrate: \(\dfrac{y^2}{2} = \sin(t) + C\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>IC: \(y(0)=2 \Rightarrow \frac{4}{2}=0+C \Rightarrow C=2\). So \(\frac{y^2}{2}=\sin(t)+2\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>Explicit form: \(y = \sqrt{2\sin(t)+4}\) (taking positive root since \(y(0)=2>0\)).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = \sqrt{2\sin t + 4}\)</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 5: INTEGRATING FACTOR -->
<div id=&quot;ifm&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>5</div>
  Integrating Factor Method
</div>

<div class=&quot;topic-section&quot;>
  <h2>5. Integrating Factor Method (IFM)</h2>

  <h3>When to Use</h3>
  <p>Use IFM when the ODE is <strong>linear first-order</strong>: \(y' + P(x)y = Q(x)\). This cannot be separated (because both \(x\) and \(y\) terms are mixed), but it has a systematic algebraic solution.</p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>THE FOUR-STEP RECIPE</strong>
    <strong>Step 1:</strong> Write in standard form: \(y' + P(x)\,y = Q(x)\)<br>
    <strong>Step 2:</strong> Compute integrating factor: \(\mu(x) = e^{\int P(x)\,dx}\)<br>
    <strong>Step 3:</strong> Multiply both sides by \(\mu\): \(\frac{d}{dx}[\mu y] = \mu Q(x)\)<br>
    <strong>Step 4:</strong> Integrate both sides: \(\mu y = \int \mu Q\,dx + C\), then solve for \(y\)
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ TOP MISTAKES WITH IFM</strong>
    1. Not getting the ODE into standard form first (dividing by the coefficient of \(y'\)!).<br>
    2. Computing \(\mu\) wrong — you want \(e^{\int P\,dx}\), not \(e^{\int y\,dx}\) or anything else.<br>
    3. Forgetting that \(\mu(x)y' + \mu(x)P(x)y = \frac{d}{dx}[\mu y]\) is the key identity.<br>
    4. Including \(+C\) in the exponent when computing \(\mu\) (don't — drop any constant from the \(\mu\) computation).
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 5.1 — From S26 Exam 1, Problem 4(a)
      <span class=&quot;difficulty&quot;>EASY-MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y' + 4y = 6e^{2x} + 8\), \(y(0)=8\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Already in standard form. \(P(x)=4\), \(Q(x)=6e^{2x}+8\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>\(\mu = e^{\int 4\,dx} = e^{4x}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Multiply: \(\dfrac{d}{dx}[e^{4x}y] = e^{4x}(6e^{2x}+8) = 6e^{6x}+8e^{4x}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>Integrate: \(e^{4x}y = e^{6x} + 2e^{4x} + C\).<br>
        Divide by \(e^{4x}\): \(y = e^{2x} + 2 + Ce^{-4x}\).
        </div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;>IC: \(y(0)=8 \Rightarrow 1+2+C=8 \Rightarrow C=5\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(x) = e^{2x} + 2 + 5e^{-4x}\)</div>
    </div>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 5.2 — Variable Coefficient (S26 Exam 1, 4b)
      <span class=&quot;difficulty&quot;>HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y' + \dfrac{y}{t} = \dfrac{2e^{2t}}{t}\), \(t>0\), \(y(1)=\tfrac{1}{2}e^2\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Standard form with \(P(t) = 1/t\), \(Q(t)=2e^{2t}/t\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>\(\mu = e^{\int (1/t)\,dt} = e^{\ln t} = t\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Multiply: \(\dfrac{d}{dt}[ty] = t \cdot \dfrac{2e^{2t}}{t} = 2e^{2t}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>Integrate: \(ty = e^{2t} + C \Rightarrow y = \dfrac{e^{2t}}{t} + \dfrac{C}{t}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;>IC: \(y(1)=e^2+C=\tfrac{1}{2}e^2 \Rightarrow C = -\tfrac{1}{2}e^2\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = \dfrac{e^{2t}}{t} - \dfrac{e^2}{2t}\)</div>
    </div>
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 5.1</div>
      <p>Solve \(y' - 2y = e^{3x}\), \(y(0) = 1\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(\mu = e^{-2x}\). Multiply: \((e^{-2x}y)' = e^{x}\). Integrate: \(e^{-2x}y = e^x + C \Rightarrow y = e^{3x}+Ce^{2x}\).<br>
          IC: \(y(0)=1+C=1 \Rightarrow C=0\). Answer: \(y = e^{3x}\).
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 5.2</div>
      <p>Solve \(xy' + 2y = x^2 - x + 1\), \(y(1) = \tfrac{1}{2}\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Divide by \(x\): \(y' + \frac{2}{x}y = x - 1 + \frac{1}{x}\).<br>
          \(\mu = e^{2\ln x} = x^2\). \((x^2 y)' = x^3 - x^2 + x\).<br>
          Integrate: \(x^2 y = \frac{x^4}{4} - \frac{x^3}{3} + \frac{x^2}{2} + C\).<br>
          \(y = \frac{x^2}{4} - \frac{x}{3} + \frac{1}{2} + \frac{C}{x^2}\).<br>
          IC: \(\frac{1}{4}-\frac{1}{3}+\frac{1}{2}+C = \frac{1}{2} \Rightarrow C = \frac{1}{12}\).<br>
          \(y = \frac{x^2}{4} - \frac{x}{3} + \frac{1}{2} + \frac{1}{12x^2}\).
        </div>
      </details>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 6: MUC 1ST ORDER -->
<div id=&quot;muc1&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>6</div>
  Method of Undetermined Coefficients (1st Order)
</div>

<div class=&quot;topic-section&quot;>
  <h2>6. MUC for First-Order Linear ODEs</h2>
  <p>For \(y' + ay = g(x)\) where \(a\) is a constant, you can guess a particular solution \(y_p\) based on the form of \(g(x)\), then add the homogeneous solution \(y_h = Ce^{-ax}\).</p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>GUESS TABLE FOR PARTICULAR SOLUTION</strong>
    <table>
      <tr><th>Form of \(g(x)\)</th><th>Guess for \(y_p\)</th></tr>
      <tr><td>\(ke^{rx}\) (and \(r \neq -a\))</td><td>\(Ae^{rx}\)</td></tr>
      <tr><td>\(ke^{rx}\) (and \(r = -a\), i.e., resonance)</td><td>\(Axe^{rx}\)</td></tr>
      <tr><td>\(k_n x^n + \cdots + k_0\)</td><td>\(A_n x^n + \cdots + A_0\)</td></tr>
      <tr><td>\(k\cos(\beta x)\) or \(k\sin(\beta x)\)</td><td>\(A\cos(\beta x)+B\sin(\beta x)\)</td></tr>
      <tr><td>\(ke^{\alpha x}\cos(\beta x)\) or \(ke^{\alpha x}\sin(\beta x)\)</td><td>\(Ae^{\alpha x}\cos(\beta x)+Be^{\alpha x}\sin(\beta x)\)</td></tr>
      <tr><td>Sums/products: use product of corresponding guesses</td><td></td></tr>
    </table>
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ MODIFICATION RULE (Critical!)</strong>
    If any term in your initial guess is already a solution of the homogeneous equation \(y'+ay=0\), multiply the entire guess by \(x\). This is the source of the &quot;\(Axe^{rx}\)&quot; guess when \(r=-a\).
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 6.1 — MUC with Two Terms
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y' + 4y = 6e^{2x} + 8\), \(y(0)=8\). (This time using MUC instead of IFM — both work!)</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Homogeneous: \(y_h = Ce^{-4x}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Guess for \(6e^{2x}\): Try \(y_{p1} = Ae^{2x}\). Check: \(r=2 \neq -4\), no modification.<br>
        Plug in: \(2Ae^{2x}+4Ae^{2x}=6Ae^{2x}=6e^{2x} \Rightarrow A=1\). So \(y_{p1}=e^{2x}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Guess for \(8\): Try \(y_{p2}=B\). Plug in: \(0+4B=8 \Rightarrow B=2\). So \(y_{p2}=2\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>General: \(y=Ce^{-4x}+e^{2x}+2\). IC: \(y(0)=C+1+2=8 \Rightarrow C=5\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y = 5e^{-4x} + e^{2x} + 2\)</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 7: BERNOULLI -->
<div id=&quot;bernoulli&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>7</div>
  Bernoulli Equations
</div>

<div class=&quot;topic-section&quot;>
  <h2>7. Bernoulli Equations</h2>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>BERNOULLI FORM</strong>
    \[y' + P(x)y = Q(x)y^n, \quad n \neq 0, 1\]
    <strong>Substitution:</strong> \(u = y^{1-n} \Rightarrow u' = (1-n)y^{-n}y'\)<br>
    After substitution, the ODE becomes <strong>linear</strong> in \(u\):
    \[u' + (1-n)P(x)\,u = (1-n)Q(x)\]
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ THE STEPS MOST STUDENTS MISS</strong>
    After substituting, you must solve the linear ODE for \(u\), then back-substitute \(y = u^{1/(1-n)}\). Don't stop at the \(u\) solution!
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 7.1 — Bernoulli IVP (S26 Exam 1, Problem 4c)
      <span class=&quot;difficulty&quot;>HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y' - y = e^t y^2\), \(y(0)=1\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Identify: \(P(t)=-1\), \(Q(t)=e^t\), \(n=2\). Substitution: \(u=y^{1-2}=y^{-1}=1/y\), so \(u'=-y^{-2}y'\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Divide original ODE by \(y^2\): \(\dfrac{y'}{y^2} - \dfrac{1}{y} = e^t\). Note: \(y'/y^2 = -u'\) and \(1/y = u\).<br>
        So: \(-u' - u = e^t \Rightarrow u' + u = -e^t\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Now solve this linear ODE using IFM: \(\mu=e^t\). \((e^tu)'=-e^{2t}\).<br>
        Integrate: \(e^t u = -\tfrac{1}{2}e^{2t}+C \Rightarrow u = -\tfrac{1}{2}e^t + Ce^{-t}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;>Back-sub: \(u=1/y \Rightarrow y = \dfrac{1}{u} = \dfrac{1}{-\frac{1}{2}e^t+Ce^{-t}}\).<br>
        IC: \(y(0)=1 \Rightarrow u(0)=1 \Rightarrow -\tfrac{1}{2}+C=1 \Rightarrow C=\tfrac{3}{2}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>5</div>
        <div class=&quot;step-content&quot;>Final: \(y = \dfrac{1}{\frac{3}{2}e^{-t}-\frac{1}{2}e^t} = \dfrac{2}{3e^{-t}-e^t}\). Multiply top and bottom by \(e^t\): \(y = \dfrac{2e^t}{3-e^{2t}}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = \dfrac{2e^t}{3 - e^{2t}}\)</div>
    </div>
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 7.1</div>
      <p>Solve \(y' + y = y^3\), \(y(0) = 2\). (Bernoulli with \(n=3\))</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          \(n=3\), \(u=y^{-2}\), \(u'=-2y^{-3}y'\). Divide by \(y^3\): \(y^{-3}y'+y^{-2}=1\).<br>
          \(-\frac{1}{2}u'+u=1\) → \(u'-2u=-2\).<br>
          \(\mu=e^{-2t}\). \((e^{-2t}u)'=-2e^{-2t}\). Integrate: \(e^{-2t}u=e^{-2t}+C\) → \(u=1+Ce^{2t}\).<br>
          \(u=1/y^2\): \(y^2=\frac{1}{1+Ce^{2t}}\). IC: \(y(0)=2\) → \(\frac{1}{4}=\frac{1}{1+C}\) → \(C=3\).<br>
          \(\boxed{y=\frac{1}{\sqrt{1+3e^{2t}}}}\) (taking positive root).
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Bernoulli — Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SUBSTITUTION</span>
        \(u = y^{1-n}\), then \(u' + (1-n)P(x)u = (1-n)Q(x)\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>BACK-SUBSTITUTION</span>
        After solving for \(u\): \(y = u^{1/(1-n)}\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>COMMON \(n\) VALUES</span>
        \(n=2\): \(u=y^{-1}\), \(n=3\): \(u=y^{-2}\), \(n=-1\): \(u=y^2\)
      </div>
      <div class=&quot;cs-item&quot;>
        <span class=&quot;cs-label&quot;>SIGN TRAP</span>
        When dividing by \(y^n\), the \(y'\) term becomes \(y^{-n}y' = \frac{-1}{1-n}u'\). Always check the sign!
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 8: MODELING -->
<div id=&quot;modeling&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>8</div>
  Modeling with First-Order DEs
</div>

<div class=&quot;topic-section&quot;>
  <h2>8. Modeling: Newton's Law, Mixing, Logistic Growth</h2>

  <h3>8.1 Newton's Law of Cooling/Warming</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>MODEL</strong>
    \[\frac{dT}{dt} = k(T - T_m), \quad T(0) = T_0\]
    where \(T_m\) = ambient temperature, \(k < 0\) for cooling, \(k > 0\) for warming.<br>
    <strong>Solution:</strong> \(T(t) = T_m + (T_0 - T_m)e^{kt}\)
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 8.1 — Chicken in Room (S26 Exam 1, Problem 3)
      <span class=&quot;difficulty&quot;>MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>\(T(0)=0°C\), room \(T_m=20°C\), \(T(10)=5°C\). Find \(k\) and the time to reach \(15°C\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>IVP:</strong> \(T' = k(T-20)\), \(T(0)=0\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>Solution:</strong> \(T(t)=20+Ce^{kt}\). IC: \(T(0)=20+C=0 \Rightarrow C=-20\). So \(T(t)=20-20e^{kt}\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>Find \(k\):</strong> \(T(10)=5 \Rightarrow 20-20e^{10k}=5 \Rightarrow e^{10k}=\tfrac{3}{4}\).<br>
        \(10k=\ln(3/4) \Rightarrow k=\tfrac{1}{10}\ln\!\left(\tfrac{3}{4}\right)\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>4</div>
        <div class=&quot;step-content&quot;><strong>When \(T=15\)?</strong> \(20-20e^{kt}=15 \Rightarrow e^{kt}=\tfrac{1}{4}\).<br>
        \(kt=\ln(1/4) \Rightarrow t = \dfrac{\ln(1/4)}{k} = \dfrac{\ln(1/4)}{\frac{1}{10}\ln(3/4)} = \dfrac{10\ln(1/4)}{\ln(3/4)}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(t = \dfrac{10\ln(1/4)}{\ln(3/4)} = \dfrac{-40\ln 2}{\ln 3 - 2\ln 2}\) minutes</div>
    </div>
  </div>

  <h3>8.2 Mixing (Tank) Problems</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>MIXING MODEL SETUP</strong>
    Let \(y(t)\) = amount of substance (salt) in the tank at time \(t\).<br>
    \[\frac{dy}{dt} = (\text{rate in}) - (\text{rate out})\]
    \[\text{rate in} = c_{\text{in}} \times r_{\text{in}}, \quad \text{rate out} = \frac{y(t)}{V(t)} \times r_{\text{out}}\]
    \[V(t) = V_0 + (r_{\text{in}} - r_{\text{out}})t\]
    <em>Note: if \(r_{\text{in}} = r_{\text{out}}\), then \(V\) is constant!</em>
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 8.2 — Unequal Flow Rates (S26 Exam 1, Problem 6)
      <span class=&quot;difficulty&quot;>HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Tank: 50 gal, 10 lb salt. Pure water in at 2 gal/min. Solution out at 3 gal/min. (a) IVP, (b) when empty, (c) solve.</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>(a) IVP:</strong> \(r_{\text{in}}=2\), \(r_{\text{out}}=3\), \(c_{\text{in}}=0\).<br>
        \(V(t)=50+(2-3)t=50-t\).<br>
        Rate in: \(0\). Rate out: \(\frac{y}{50-t}\cdot 3\).<br>
        IVP: \(\dfrac{dy}{dt} = -\dfrac{3y}{50-t}\), \(y(0)=10\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>(b) Empty when:</strong> \(V(t)=0 \Rightarrow 50-t=0 \Rightarrow t=50\) min.</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>(c) Solve:</strong> Separate: \(\dfrac{dy}{y} = \dfrac{-3\,dt}{50-t}\).<br>
        \(\ln|y| = 3\ln|50-t| + C \Rightarrow y = A(50-t)^3\).<br>
        IC: \(y(0)=A(50)^3=10 \Rightarrow A=\dfrac{10}{125000}=\dfrac{1}{12500}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y(t) = \dfrac{(50-t)^3}{12500}\), valid for \(0 \le t \le 50\)</div>
    </div>
  </div>

  <h3>8.3 Logistic Growth</h3>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>LOGISTIC MODEL</strong>
    \[\frac{dP}{dt} = kP\left(1 - \frac{P}{K}\right)\]
    where \(K\) = carrying capacity. Equilibria at \(P=0\) (unstable) and \(P=K\) (stable).<br>
    <strong>Solution:</strong> \(P(t) = \dfrac{KP_0}{P_0 + (K-P_0)e^{-kt}}\)
  </div>

  <div class=&quot;practice-grid&quot;>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 8.1</div>
      <p>A tank has 200 L of water with 5 g of salt. Brine (0.1 g/L) flows in at 4 L/min. Well-mixed solution out at 4 L/min. Set up and solve the IVP for \(y(t)\).</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Equal flow rates → volume constant at 200 L. Rate in: \(0.1 \times 4 = 0.4\) g/min. Rate out: \(\frac{y}{200}\times 4 = \frac{y}{50}\) g/min.<br>
          IVP: \(y' = 0.4 - \frac{y}{50}\), \(y(0)=5\).<br>
          Linear: \(y'+\frac{1}{50}y=0.4\). \(\mu=e^{t/50}\).<br>
          \((e^{t/50}y)'=0.4e^{t/50}\). Integrate: \(e^{t/50}y=20e^{t/50}+C\) → \(y=20+Ce^{-t/50}\).<br>
          IC: \(5=20+C\) → \(C=-15\). \(\boxed{y(t)=20-15e^{-t/50}}\). Note: as \(t\to\infty\), \(y\to 20\) g.
        </div>
      </details>
    </div>
    <div class=&quot;practice-item&quot;>
      <div class=&quot;pnum&quot;>PP 8.2 — Decoupled System</div>
      <p>Write the system for two-tank mixing: Tank A has 50 gal, 10 lb salt; Tank B has 50 gal, pure water. Pure water enters A at 2 gal/min; A flows to B at 3 gal/min; B drains out 2 gal/min; B also drains to A at 1 gal/min.</p>
      <details class=&quot;solution&quot;>
        <summary>▶ SHOW SOLUTION</summary>
        <div class=&quot;solution-body&quot;>
          Let \(a(t)\)=salt in A, \(b(t)\)=salt in B. Volumes: \(V_A=50\) (2 in, 1 to B from recirculation + 3 out... check: in=2+1=3, out=3, constant ✓). Similarly check B.<br>
          Tank A: rate in = \(0\cdot2 + \frac{b}{50}\cdot1\); rate out = \(\frac{a}{50}\cdot3\).<br>
          \(a' = \frac{b}{50} - \frac{3a}{50}\).<br>
          Tank B: rate in = \(\frac{a}{50}\cdot3\); rate out = \(\frac{b}{50}\cdot2 + \frac{b}{50}\cdot1 = \frac{3b}{50}\).<br>
          \(b' = \frac{3a}{50} - \frac{3b}{50}\). ICs: \(a(0)=10, b(0)=0\).
        </div>
      </details>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════ SECTION 9: HIGHER ORDER -->
<div id=&quot;higher-order&quot; class=&quot;part-header&quot;>
  <div class=&quot;part-num&quot;>9</div>
  Higher-Order Linear DEs (Chapter 4)
</div>

<div class=&quot;topic-section&quot;>
  <h2>9. Higher-Order Linear DEs</h2>

  <h3>9.1 Preliminary Theory</h3>
  <p>An \(n\)th-order linear ODE has the form:</p>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>GENERAL FORM</strong>
    \[a_n(x)y^{(n)} + a_{n-1}(x)y^{(n-1)} + \cdots + a_1(x)y' + a_0(x)y = g(x)\]
    <strong>Homogeneous:</strong> \(g(x)=0\); &amp;nbsp; <strong>Nonhomogeneous:</strong> \(g(x)\neq0\)<br>
    <strong>General solution:</strong> \(y = y_h + y_p\), where \(y_h\) solves the homogeneous equation and \(y_p\) is any particular solution.
  </div>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>WRONSKIAN (Linear Independence)</strong>
    Two solutions \(y_1, y_2\) are linearly independent on an interval if and only if:
    \[W(y_1, y_2)(x) = \begin{vmatrix} y_1 &amp; y_2 \\ y_1' &amp; y_2' \end{vmatrix} = y_1 y_2' - y_2 y_1' \neq 0\]
    A set of \(n\) independent solutions forms the <strong>fundamental set</strong>.
  </div>

  <h3>9.2 Constant-Coefficient Homogeneous ODEs</h3>
  <p>For \(ay'' + by' + cy = 0\), assume \(y=e^{rx}\). Substitute to get the <strong>characteristic equation</strong>:</p>
  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>CHARACTERISTIC EQUATION &amp; THREE CASES</strong>
    \[ar^2 + br + c = 0\]
    <strong>Case 1 — Real distinct roots</strong> \(r_1 \neq r_2\):<br>
    \[y_h = C_1 e^{r_1 x} + C_2 e^{r_2 x}\]
    <strong>Case 2 — Repeated root</strong> \(r_1 = r_2 = r\):<br>
    \[y_h = C_1 e^{rx} + C_2 x e^{rx} = (C_1 + C_2 x)e^{rx}\]
    <strong>Case 3 — Complex conjugate roots</strong> \(r = \alpha \pm \beta i\):<br>
    \[y_h = e^{\alpha x}(C_1\cos(\beta x) + C_2\sin(\beta x))\]
  </div>

  <div class=&quot;box box-warn&quot;>
    <strong class=&quot;box-label&quot;>⚠ REPEATED ROOTS: Never Write \(C_1 e^{rx} + C_2 e^{rx}\)</strong>
    This is just \((C_1+C_2)e^{rx}\) — a single constant times one function, not a general solution! The second solution for a repeated root is <em>always</em> \(xe^{rx}\).
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 9.1 — Second-Order, Three Cases
      <span class=&quot;difficulty&quot;>EASY-MEDIUM</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Find the general solution: (a) \(y''-5y'+6y=0\), (b) \(y''-4y'+4y=0\), (c) \(y''-4y'+13y=0\).</div>

      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;><strong>(a)</strong> Char. eq.: \(r^2-5r+6=(r-2)(r-3)=0\) → \(r_1=2, r_2=3\) (distinct real).<br>
        \(y = C_1e^{2x}+C_2e^{3x}\)</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;><strong>(b)</strong> Char. eq.: \(r^2-4r+4=(r-2)^2=0\) → \(r=2\) (repeated).<br>
        \(y = (C_1+C_2 x)e^{2x}\)</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;><strong>(c)</strong> Char. eq.: \(r^2-4r+13=0\) → \(r=\frac{4\pm\sqrt{16-52}}{2}=\frac{4\pm\sqrt{-36}}{2}=2\pm 3i\).<br>
        \(\alpha=2, \beta=3\). \(y = e^{2x}(C_1\cos(3x)+C_2\sin(3x))\)</div>
      </div>
    </div>
  </div>

  <h3>9.3 Higher-Order (3rd, 4th Order)</h3>
  <p>The same approach extends: find all roots of the characteristic polynomial. Each root gives a corresponding solution family:</p>
  <table>
    <tr><th>Root type</th><th>Multiplicity</th><th>Solutions contributed</th></tr>
    <tr><td>\(r\) (real)</td><td>1</td><td>\(e^{rx}\)</td></tr>
    <tr><td>\(r\) (real)</td><td>\(m\)</td><td>\(e^{rx}, xe^{rx}, x^2e^{rx}, \ldots, x^{m-1}e^{rx}\)</td></tr>
    <tr><td>\(\alpha\pm\beta i\)</td><td>1</td><td>\(e^{\alpha x}\cos(\beta x),\ e^{\alpha x}\sin(\beta x)\)</td></tr>
    <tr><td>\(\alpha\pm\beta i\)</td><td>\(m\)</td><td>\(e^{\alpha x}\cos(\beta x),\ e^{\alpha x}\sin(\beta x),\ xe^{\alpha x}\cos(\beta x),\ \ldots\)</td></tr>
  </table>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 9.2 — Fourth-Order
      <span class=&quot;difficulty&quot;>MEDIUM-HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Find the general solution of \(y^{(4)} - 2y'' + y = 0\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Char. eq.: \(r^4 - 2r^2 + 1 = (r^2-1)^2 = (r-1)^2(r+1)^2 = 0\).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>2</div>
        <div class=&quot;step-content&quot;>Roots: \(r=1\) (mult. 2), \(r=-1\) (mult. 2).</div>
      </div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>3</div>
        <div class=&quot;step-content&quot;>Solutions: \(r=1\) gives \(e^x, xe^x\); \(r=-1\) gives \(e^{-x}, xe^{-x}\).</div>
      </div>
      <div class=&quot;answer&quot;>\(y = C_1e^x + C_2xe^x + C_3e^{-x} + C_4xe^{-x}\)</div>
    </div>
  </div>

  <h3>9.4 Method of Undetermined Coefficients (Higher Order)</h3>
  <p>For nonhomogeneous \(ay'' + by' + cy = g(x)\), find \(y_p\) using the same guess table as first-order, with one important extension:</p>

  <div class=&quot;box box-formula&quot;>
    <strong class=&quot;box-label&quot;>MODIFICATION RULE (Higher Order)</strong>
    If a term in the initial guess for \(y_p\) duplicates any solution in \(y_h\), multiply the <strong>entire</strong> guessed form by \(x^m\), where \(m\) is the smallest positive integer that eliminates the duplication.
  </div>

  <div class=&quot;worked&quot;>
    <div class=&quot;worked-header&quot;>
      WORKED EXAMPLE 9.3 — MUC with Modification
      <span class=&quot;difficulty&quot;>HARD</span>
    </div>
    <div class=&quot;worked-body&quot;>
      <div class=&quot;problem&quot;>Solve \(y'' - 3y' + 2y = e^{2x}\).</div>
      <div class=&quot;step&quot;>
        <div class=&quot;step-num&quot;>1</div>
        <div class=&quot;step-content&quot;>Char. eq.: \(r^2-3r+2=(r-1)(r-2)=0\) → \(r=1, r=2\).<br>
        \(y_h = C_1e^x + C_2e^{2x}\).</div>
      </div>
