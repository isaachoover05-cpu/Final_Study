<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&amp;family=Bebas+Neue&amp;display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #f78166;
  --accent2: #58a6ff;
  --accent3: #3fb950;
  --accent4: #d2a8ff;
  --accent5: #ffa657;
  --warn: #f0883e;
  --danger: #ff7b72;
  --code-bg: #161b22;
  --highlight: rgba(247,129,102,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 15px;
  line-height: 1.75;
}

/* ── HEADER ── */
.hero {
  background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 50%, #0d1117 100%);
  border-bottom: 2px solid var(--accent);
  padding: 60px 40px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 40px,
    rgba(247,129,102,0.03) 40px,
    rgba(247,129,102,0.03) 41px
  );
}
.hero-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(42px, 7vw, 80px);
  letter-spacing: 3px;
  color: #fff;
  line-height: 1;
  margin-bottom: 12px;
}
.hero h1 span { color: var(--accent); }
.hero-sub {
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  font-size: 13px;
  margin-top: 10px;
}
.hero-badges {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
}
.badge {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.badge.hot { border-color: var(--accent); color: var(--accent); }

/* ── NAV ── */
.toc-wrapper {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.toc-inner {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.toc-inner::-webkit-scrollbar { display: none; }
.toc-inner a {
  display: block;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.toc-inner a:hover { color: var(--accent); border-bottom-color: var(--accent); }

/* ── LAYOUT ── */
.main { max-width: 1000px; margin: 0 auto; padding: 0 30px 80px; }

/* ── SECTIONS ── */
.section {
  margin-top: 60px;
  border-top: 1px solid var(--border);
  padding-top: 40px;
}
.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 30px;
}
.section-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  color: var(--accent);
  line-height: 1;
  opacity: 0.5;
}
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1px;
  color: #fff;
}
.section-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

h2 { font-size: 22px; color: var(--accent2); margin: 32px 0 12px; font-family: 'Libre Baskerville', serif; }
h3 { font-size: 18px; color: var(--accent5); margin: 24px 0 10px; }
h4 { font-size: 15px; color: var(--accent3); margin: 18px 0 8px; font-style: italic; }
p { margin-bottom: 12px; }

/* ── CODE BLOCKS ── */
pre {
  background: #0a0e13;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  border-radius: 6px;
  padding: 20px;
  overflow-x: auto;
  margin: 16px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: #cdd9e5;
}
code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-size: 12px;
  color: var(--accent5);
}
pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }

/* ── SYNTAX COLORS ── */
.kw { color: #ff7b72; }
.ty { color: #79c0ff; }
.fn { color: #d2a8ff; }
.st { color: #a5d6ff; }
.cm { color: #8b949e; font-style: italic; }
.nm { color: #ffa657; }
.op { color: #ff7b72; }
.bo { color: #56d364; }

/* ── CALLOUT BOXES ── */
.callout {
  border-radius: 6px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
}
.callout.warn { background: rgba(240,136,62,0.08); border-color: var(--warn); }
.callout.danger { background: rgba(255,123,114,0.08); border-color: var(--danger); }
.callout.info { background: rgba(88,166,255,0.08); border-color: var(--accent2); }
.callout.good { background: rgba(63,185,80,0.08); border-color: var(--accent3); }
.callout.purple { background: rgba(210,168,255,0.08); border-color: var(--accent4); }
.callout-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
}
.callout.warn .callout-title { color: var(--warn); }
.callout.danger .callout-title { color: var(--danger); }
.callout.info .callout-title { color: var(--accent2); }
.callout.good .callout-title { color: var(--accent3); }
.callout.purple .callout-title { color: var(--accent4); }

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; margin: 16px 0; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: var(--surface2);
  color: var(--accent2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 2px solid var(--accent2);
}
tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tbody tr:hover { background: var(--surface2); }
td code { font-size: 11px; }

/* ── TOPIC CARDS ── */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin: 20px 0;
}
.topic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  transition: border-color 0.2s;
}
.topic-card:hover { border-color: var(--accent2); }
.topic-card .tc-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.tc-high { color: var(--accent); }
.tc-med { color: var(--accent5); }
.tc-low { color: var(--accent3); }
.topic-card .tc-title { font-size: 16px; font-weight: 700; color: #fff; }
.topic-card .tc-desc { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

/* ── PRACTICE PROBLEMS ── */
.problem-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 16px 0;
  overflow: hidden;
}
.problem-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);

.problem-num {

.diff-med { background: rgba(255,166,87,0.15); color: var(--accent5); }
.diff-hard { background: rgba(255,123,114,0.15); color: var(--danger); }
.problem-body { padding: 16px; }
.problem-prompt { margin-bottom: 12px; }
details.solution {
  margin-top: 12px;
  border-top: 1px dashed var(--border);
  padding-top: 12px;
}
details.solution summary {
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent3);
  list-style: none;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
details.solution summary::before {
  content: '▶';
  font-size: 9px;
  transition: transform 0.2s;
}
details[open].solution summary::before { transform: rotate(90deg); }
details.solution .sol-body { margin-top: 12px; }

/* ── CHEAT SHEET ── */
.cheat-sheet {
  background: linear-gradient(135deg, var(--surface) 0%, #1a1f2e 100%);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 24px;
  margin: 24px 0;
}
.cheat-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 16px;
}
.cheat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.cheat-item {

.cheat-item strong { color: var(--accent2); display: block; margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

/* ── UML DIAGRAM ── */
.uml-box {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: #0a0e13;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  display: inline-block;
  margin: 8px;
  min-width: 180px;
  vertical-align: top;
}
.uml-name {
  color: var(--accent2);
  font-weight: 700;
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 8px;
}
.uml-section { border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 8px; }
.uml-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.uml-pub { color: var(--accent3); }
.uml-priv { color: var(--danger); }
.uml-prot { color: var(--accent5); }
.uml-interface { color: var(--accent4); font-style: italic; font-size: 10px; }
.uml-abstract { font-style: italic; }
.uml-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
.uml-arrow { color: var(--muted); font-size: 24px; line-height: 1; align-self: center; padding: 8px; }

/* ── STEP WALKTHROUGH ── */
.steps { list-style: none; }
.steps li {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
  align-items: flex-start;
}
.step-num {
  background: var(--accent);
  color: #000;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  min-width: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  margin-top: 2px;
}
.step-content { flex: 1; }

/* ── COMPLEXITY TABLE ── */
.complexity-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
}
.o1 { background: rgba(63,185,80,0.15); color: #3fb950; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {

<script>

(function(){
  function deb(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms);};}
  function lines(ta,el){var n=ta.value.split('\n').length,s='';for(var i=1;i<=Math.max(n,8);i++)s+=i+'\n';el.textContent=s;}
  function initCed(w,k){
    var ta=w.querySelector('.ced-textarea'),el=w.querySelector('.ced-lines'),cb=w.querySelector('.ced-clear-btn'),si=w.querySelector('.ced-saved-indicator');
    var sv=localStorage.getItem(k);if(sv)ta.value=sv;lines(ta,el);
    ta.addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();var s=this.selectionStart,en=this.selectionEnd;this.value=this.value.slice(0,s)+'    '+this.value.slice(en);this.selectionStart=this.selectionEnd=s+4;lines(ta,el);}});
    var save=deb(function(){localStorage.setItem(k,ta.value);si.classList.add('visible');setTimeout(function(){si.classList.remove('visible');},1500);},600);
    ta.addEventListener('input',function(){lines(ta,el);save();});
    ta.addEventListener('scroll',function(){el.scrollTop=ta.scrollTop;});
    cb.addEventListener('click',function(){if(!ta.value||confirm('Clear your code?')){ta.value='';localStorage.removeItem(k);lines(ta,el);}});
  }
  function initAns(w,k){
    var ta=w.querySelector('.ans-textarea');var sv=localStorage.getItem(k);if(sv)ta.value=sv;
    ta.addEventListener('input',function(){localStorage.setItem(k,ta.value);});
  }
  document.addEventListener('DOMContentLoaded',function(){
    document.querySelectorAll('.ced-wrap').forEach(function(w){initCed(w,w.dataset.key);});
    document.querySelectorAll('.ans-wrap[data-key]').forEach(function(w){initAns(w,w.dataset.key);});
  });
})();
(function(){
var G=&quot;csci200&quot;,PS=&quot;.problem-box&quot;,TS=&quot;.problem-num&quot;,IDS=[&quot;s0&quot;, &quot;s1&quot;, &quot;s2&quot;, &quot;s3&quot;, &quot;s4&quot;, &quot;s5&quot;, &quot;s6&quot;, &quot;s7&quot;, &quot;s8&quot;, &quot;s9&quot;, &quot;s10&quot;, &quot;s11&quot;, &quot;s12&quot;, &quot;s13&quot;, &quot;s14&quot;, &quot;s15&quot;, &quot;s16&quot;, &quot;s17&quot;],SL={&quot;s0&quot;: &quot;Exam Blueprint&quot;, &quot;s1&quot;: &quot;Structs&quot;, &quot;s2&quot;: &quot;Big Three&quot;, &quot;s3&quot;: &quot;Templates&quot;, &quot;s4&quot;: &quot;Inheritance&quot;, &quot;s5&quot;: &quot;Compile Poly&quot;, &quot;s6&quot;: &quot;Runtime Poly&quot;, &quot;s7&quot;: &quot;SOLID&quot;, &quot;s8&quot;: &quot;Arrays&quot;, &quot;s9&quot;: &quot;Linked Lists&quot;, &quot;s10&quot;: &quot;Exceptions&quot;, &quot;s11&quot;: &quot;Sorting&quot;, &quot;s12&quot;: &quot;Recursion&quot;, &quot;s13&quot;: &quot;Searching&quot;, &quot;s14&quot;: &quot;2D/BFS/DFS&quot;, &quot;s15&quot;: &quot;Func Ptrs&quot;, &quot;s16&quot;: &quot;Big-O&quot;, &quot;s17&quot;: &quot;Exam Tips&quot;},COL=&quot;#f78166&quot;;
var ST=[{k:&quot;none&quot;,dot:&quot;●&quot;,txt:&quot;Not studied&quot;,bg:&quot;#1c1c1c22&quot;,fg:&quot;#888&quot;,bd:&quot;#ccc&quot;},{k:&quot;confident&quot;,dot:&quot;✓&quot;,txt:&quot;Confident&quot;,bg:&quot;#d1f5e0&quot;,fg:&quot;#1a5c38&quot;,bd:&quot;#5dbf88&quot;},{k:&quot;needs-work&quot;,dot:&quot;⚠&quot;,txt:&quot;Needs work&quot;,bg:&quot;#fffbe6&quot;,fg:&quot;#7a5500&quot;,bd:&quot;#d4a017&quot;}];
var probs=[],sb,sbBody,bmCount,collapsed=false;
document.addEventListener(&quot;click&quot;,function(e){var a=e.target.closest('a[href^=&quot;#&quot;]');if(!a)return;var h=a.getAttribute(&quot;href&quot;);if(!h||h===&quot;#&quot;)return;var t=document.querySelector(h);if(t){e.preventDefault();t.scrollIntoView({behavior:&quot;smooth&quot;});}},true);
function getS(id){return localStorage.getItem(&quot;ss_&quot;+G+&quot;_&quot;+id)||&quot;none&quot;;}
function setS(id,k){localStorage.setItem(&quot;ss_&quot;+G+&quot;_&quot;+id,k);refreshBar();try{window.parent.postMessage({t:&quot;su&quot;,g:G},&quot;*&quot;);}catch(e){}}
function getBM(pid){return localStorage.getItem(&quot;bm_&quot;+G+&quot;_&quot;+pid)===&quot;1&quot;;}
function setBM(pid,v){if(v)localStorage.setItem(&quot;bm_&quot;+G+&quot;_&quot;+pid,&quot;1&quot;);else localStorage.removeItem(&quot;bm_&quot;+G+&quot;_&quot;+pid);renderSidebar();}
function findSect(el){var c=el;while(c){if(c.id&amp;&amp;SL[c.id])return SL[c.id];c=c.parentElement;}return &quot;&quot;;}
function makeChip(id){
  var b=document.createElement(&quot;button&quot;);b.className=&quot;sc&quot;;b.dataset.section=id;applyS(b,getS(id));
  b.addEventListener(&quot;click&quot;,function(e){e.preventDefault();e.stopPropagation();var cur=this.dataset.s,idx=ST.findIndex(function(s){return s.k===cur;}),nxt=ST[(idx+1)%ST.length];setS(id,nxt.k);applyS(this,nxt.k);});
  return b;
}
function applyS(b,k){var s=ST.find(function(x){return x.k===k;})||ST[0];b.dataset.s=s.k;b.textContent=s.dot+&quot; &quot;+s.txt;b.style.background=s.bg;b.style.color=s.fg;b.style.borderColor=s.bd;}
function makeBmBtn(prob){
  var b=document.createElement(&quot;button&quot;);b.className=&quot;bm-btn&quot;+(getBM(prob.id)?&quot; active&quot;:&quot;&quot;);b.title=&quot;Bookmark&quot;;b.textContent=&quot;🔖&quot;;
  b.addEventListener(&quot;click&quot;,function(e){e.preventDefault();e.stopPropagation();var a=this.classList.toggle(&quot;active&quot;);setBM(prob.id,a);});
  return b;
}
function esc(s){return s.replace(/&amp;/g,&quot;&amp;amp;&quot;).replace(/</g,&quot;&amp;lt;&quot;).replace(/>/g,&quot;&amp;gt;&quot;);}
function refreshBar(){
  var c={none:0,confident:0,&quot;needs-work&quot;:0};
  IDS.forEach(function(id){var k=getS(id);c[k]=(c[k]||0)+1;});
  var tot=IDS.length||1;
  var cp=document.getElementById(&quot;__spb-c&quot;),np=document.getElementById(&quot;__spb-n&quot;);
  var sc=document.getElementById(&quot;__spb-sc&quot;),sn=document.getElementById(&quot;__spb-sn&quot;),su=document.getElementById(&quot;__spb-su&quot;);
  if(cp)cp.style.width=(c.confident/tot*100)+&quot;%&quot;;if(np)np.style.width=(c[&quot;needs-work&quot;]/tot*100)+&quot;%&quot;;
  if(sc)sc.textContent=c.confident+&quot; confident&quot;;if(sn)sn.textContent=c[&quot;needs-work&quot;]+&quot; needs work&quot;;if(su)su.textContent=c.none+&quot; not studied&quot;;
}
function buildBar(){
  var bar=document.createElement(&quot;div&quot;);bar.id=&quot;__spb&quot;;
  bar.innerHTML='<span class=&quot;spb-label&quot;>Progress</span><div class=&quot;spb-track&quot;><div class=&quot;spb-c&quot; id=&quot;__spb-c&quot; style=&quot;width:0%&quot;></div><div class=&quot;spb-n&quot; id=&quot;__spb-n&quot; style=&quot;width:0%&quot;></div></div><div class=&quot;spb-stats&quot;><span class=&quot;spb-stat&quot;><span class=&quot;spb-dot&quot; style=&quot;background:#3fb950&quot;></span><span id=&quot;__spb-sc&quot;>0 confident</span></span><span class=&quot;spb-stat&quot;><span class=&quot;spb-dot&quot; style=&quot;background:#d4a017&quot;></span><span id=&quot;__spb-sn&quot;>0 needs work</span></span><span class=&quot;spb-stat&quot;><span class=&quot;spb-dot&quot; style=&quot;background:#444&quot;></span><span id=&quot;__spb-su&quot;>0 not studied</span></span></div>';
  var nav=document.querySelector('nav,.toc-bar,.toc-wrapper,#toc-sidebar');
  if(nav&amp;&amp;nav.nextSibling)nav.parentNode.insertBefore(bar,nav.nextSibling);else document.body.insertBefore(bar,document.body.firstChild);
  refreshBar();
}
function injectChips(){
  IDS.forEach(function(id){
    var el=document.getElementById(id);if(!el)return;var tgt=null;
    if(el.classList.contains(&quot;part-header&quot;))tgt=el;
    else if(el.querySelector(&quot;.section-title&quot;))tgt=el.querySelector(&quot;.section-title&quot;);
    else if(el.querySelector(&quot;.topic-header h2&quot;))tgt=el.querySelector(&quot;.topic-header h2&quot;);
    else if(el.querySelector(&quot;.chapter-title&quot;))tgt=el.querySelector(&quot;.chapter-title&quot;);
    else if(el.querySelector(&quot;h2&quot;))tgt=el.querySelector(&quot;h2&quot;);
    else tgt=el.querySelector(&quot;h1,h2,h3,h4&quot;);
    if(!tgt)return;tgt.appendChild(makeChip(id));
  });
}
function discoverProbs(){
  var els=document.querySelectorAll(PS);
  els.forEach(function(el,idx){
    var pid=&quot;prob_&quot;+idx;el.dataset.probId=pid;
    var te=el.querySelector(TS),lbl=te?te.textContent.trim().slice(0,60):&quot;Problem &quot;+(idx+1);
    var sect=findSect(el);
    probs.push({id:pid,label:lbl,section:sect,el:el});
    var inj=te||el.querySelector(&quot;h2,h3,.problem-header,.example-header,.worked-header,.practice-header&quot;);
    if(inj)inj.appendChild(makeBmBtn(probs[probs.length-1]));
  });
}
function renderSidebar(){
  var bm=probs.filter(function(p){return getBM(p.id);});
  if(bmCount)bmCount.textContent=bm.length;
  if(!sbBody)return;
  sbBody.innerHTML=&quot;&quot;;
  if(!bm.length){
    var e=document.createElement(&quot;div&quot;);e.id=&quot;bm-empty&quot;;
    e.innerHTML=&quot;🔖<br>No bookmarks yet<br><span style='color:#2a3a4a;font-size:9px'>Click 🔖 on any practice problem</span>&quot;;
    sbBody.appendChild(e);return;
  }
  bm.forEach(function(prob){
    var item=document.createElement(&quot;div&quot;);item.className=&quot;bm-item&quot;;
    item.innerHTML='<div class=&quot;bm-item-dot&quot;></div><div class=&quot;bm-item-text&quot;><div class=&quot;bm-item-label&quot;>'+esc(prob.label)+'</div>'+(prob.section?'<div class=&quot;bm-item-sect&quot;>'+esc(prob.section)+'</div>':'')+' </div><button class=&quot;bm-item-rm&quot; title=&quot;Remove&quot;>✕</button>';
    item.querySelector(&quot;.bm-item-text&quot;).addEventListener(&quot;click&quot;,function(){
      prob.el.scrollIntoView({behavior:&quot;smooth&quot;,block:&quot;start&quot;});
      prob.el.style.transition=&quot;box-shadow .3s&quot;;prob.el.style.boxShadow=&quot;0 0 0 3px &quot;+COL+&quot;88&quot;;
      setTimeout(function(){prob.el.style.boxShadow=&quot;&quot;;},1400);
    });
    item.querySelector(&quot;.bm-item-rm&quot;).addEventListener(&quot;click&quot;,function(e){
      e.stopPropagation();setBM(prob.id,false);
      var btn=prob.el.querySelector(&quot;.bm-btn&quot;);if(btn)btn.classList.remove(&quot;active&quot;);
    });
    sbBody.appendChild(item);
  });
}
function buildSidebar(){
  sb=document.createElement(&quot;div&quot;);sb.id=&quot;bm-sidebar&quot;;
  var drag=document.createElement(&quot;div&quot;);drag.id=&quot;bm-drag&quot;;
  drag.innerHTML='<div class=&quot;bm-grip&quot;><span></span><span></span><span></span></div><div id=&quot;bm-title&quot;>🔖 Bookmarks <span id=&quot;bm-count&quot;>0</span></div><button id=&quot;bm-collapse&quot;>−</button>';
  sb.appendChild(drag);sbBody=document.createElement(&quot;div&quot;);sbBody.id=&quot;bm-body&quot;;sb.appendChild(sbBody);
  document.body.appendChild(sb);
  bmCount=document.getElementById(&quot;bm-count&quot;);
  document.getElementById(&quot;bm-collapse&quot;).addEventListener(&quot;click&quot;,function(){
    collapsed=!collapsed;sb.classList.toggle(&quot;collapsed&quot;,collapsed);this.textContent=collapsed?&quot;+&quot;:&quot;−&quot;;
  });
  try{var pos=JSON.parse(localStorage.getItem(&quot;bm_pos_&quot;+G)||&quot;null&quot;);if(pos){sb.style.top=pos.top;sb.style.left=pos.left;sb.style.right=&quot;auto&quot;;}}catch(e){}
  var dr=false,ox=0,oy=0;
  drag.addEventListener(&quot;mousedown&quot;,function(e){dr=true;var r=sb.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;e.preventDefault();});
  document.addEventListener(&quot;mousemove&quot;,function(e){if(!dr)return;var x=Math.max(0,Math.min(window.innerWidth-sb.offsetWidth,e.clientX-ox)),y=Math.max(0,Math.min(window.innerHeight-38,e.clientY-oy));sb.style.left=x+&quot;px&quot;;sb.style.top=y+&quot;px&quot;;sb.style.right=&quot;auto&quot;;});
  document.addEventListener(&quot;mouseup&quot;,function(){if(!dr)return;dr=false;try{localStorage.setItem(&quot;bm_pos_&quot;+G,JSON.stringify({top:sb.style.top,left:sb.style.left}));}catch(e){}});
  drag.addEventListener(&quot;touchstart&quot;,function(e){var t=e.touches[0];dr=true;var r=sb.getBoundingClientRect();ox=t.clientX-r.left;oy=t.clientY-r.top;},{passive:true});
  document.addEventListener(&quot;touchmove&quot;,function(e){if(!dr)return;var t=e.touches[0],x=Math.max(0,Math.min(window.innerWidth-sb.offsetWidth,t.clientX-ox)),y=Math.max(0,Math.min(window.innerHeight-38,t.clientY-oy));sb.style.left=x+&quot;px&quot;;sb.style.top=y+&quot;px&quot;;sb.style.right=&quot;auto&quot;;},{passive:true});
  document.addEventListener(&quot;touchend&quot;,function(){dr=false;});
  renderSidebar();
}
function init(){buildBar();injectChips();discoverProbs();buildSidebar();}
if(document.readyState===&quot;loading&quot;)document.addEventListener(&quot;DOMContentLoaded&quot;,init);else init();
})();
</script>

  <div class=&quot;tbl-wrap&quot;>
  <table>

    <tbody>
      <tr><td>1</td><td><strong>Object Slicing</strong> — storing derived by value into base loses polymorphism</td><td>Always store polymorphic objects as <code>Base*</code> pointers</td></tr>
      <tr><td>2</td><td><strong>No virtual destructor</strong> when class has virtual methods</td><td>If any function is virtual, make destructor virtual too</td></tr>
      <tr><td>3</td><td><strong>Missing base case</strong> in recursion → infinite loop / stack overflow</td><td>Always write base case first, test small input</td></tr>
      <tr><td>4</td><td><strong>Binary search on unsorted data</strong> → wrong results</td><td>Binary search requires sorted input — state this assumption</td></tr>
      <tr><td>5</td><td><strong>Dangling pointer</strong> — using pointer after <code>delete</code></td><td>Set pointer to <code>nullptr</code> immediately after <code>delete</code></td></tr>
      <tr><td>6</td><td><strong>Memory leak</strong> in linked list — not deleting all nodes</td><td>Walk list with temp pointer, delete each node</td></tr>

<div class=&quot;section&quot; id=&quot;s1&quot;>

    <div class=&quot;section-num&quot;>01</div>
    <div class=&quot;section-title&quot;>Structs</div>
  </div>

  <p>A <strong>struct</strong> is a user-defined data type that groups related variables together. It's like a lightweight class that defaults to <code>public</code> access. In CSCI 200, structs appear in the final exam review as the classic <em>Point/distance</em> problem (Question 1).</p>

  <h2>Syntax &amp;amp; Anatomy</h2>
<pre><span class=&quot;kw&quot;>struct</span> <span class=&quot;ty&quot;>Point</span> {
    <span class=&quot;ty&quot;>double</span> x;   <span class=&quot;cm&quot;>// data members — public by default</span>
    <span class=&quot;ty&quot;>double</span> y;
};  <span class=&quot;cm&quot;>// ← don't forget the semicolon!</span></pre>

  <div class=&quot;callout warn&quot;>
    <div class=&quot;callout-title&quot;>⚠️ Common Mistake</div>
    Forgetting the semicolon after the closing brace <code>};</code> of a struct/class definition causes a cryptic compiler error. It <em>always</em> needs one.
  </div>

  <h2>The Node Pattern (Used Everywhere)</h2>
  <p>The struct pattern appears again and again as the <strong>Node</strong> in linked lists and trees:</p>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>struct</span> <span class=&quot;ty&quot;>Node</span> {
    <span class=&quot;ty&quot;>T</span> value;
    <span class=&quot;ty&quot;>Node</span>* next;

    <span class=&quot;cm&quot;>// Constructor for convenience</span>
    <span class=&quot;ty&quot;>Node</span>(<span class=&quot;ty&quot;>T</span> val) : value(val), next(<span class=&quot;kw&quot;>nullptr</span>) {}
};</pre>

  <h2>Final Exam Review Q1 — Solved</h2>
  <p>Create a <code>Point</code> struct, write a <code>distance</code> function, read 4 doubles, print distance to 4 decimal places.</p>
<pre><span class=&quot;kw&quot;>#include</span> <span class=&quot;st&quot;>&amp;lt;iostream&amp;gt;</span>
<span class=&quot;kw&quot;>#include</span> <span class=&quot;st&quot;>&amp;lt;cmath&amp;gt;</span>
<span class=&quot;kw&quot;>#include</span> <span class=&quot;st&quot;>&amp;lt;iomanip&amp;gt;</span>
<span class=&quot;kw&quot;>using namespace</span> <span class=&quot;ty&quot;>std</span>;

<span class=&quot;kw&quot;>struct</span> <span class=&quot;ty&quot;>Point</span> {
    <span class=&quot;ty&quot;>double</span> x;
    <span class=&quot;ty&quot;>double</span> y;
};

<span class=&quot;cm&quot;>// Euclidean distance: sqrt((x2-x1)² + (y2-y1)²)</span>
<span class=&quot;ty&quot;>double</span> <span class=&quot;fn&quot;>distance</span>(<span class=&quot;ty&quot;>Point</span> a, <span class=&quot;ty&quot;>Point</span> b) {
    <span class=&quot;ty&quot;>double</span> dx = b.x - a.x;
    <span class=&quot;ty&quot;>double</span> dy = b.y - a.y;
    <span class=&quot;kw&quot;>return</span> <span class=&quot;fn&quot;>sqrt</span>(dx*dx + dy*dy);
}

<span class=&quot;ty&quot;>int</span> <span class=&quot;fn&quot;>main</span>() {
    <span class=&quot;ty&quot;>Point</span> a, b;
    <span class=&quot;nm&quot;>cin</span> >> a.x >> a.y >> b.x >> b.y;
    <span class=&quot;nm&quot;>cout</span> << <span class=&quot;fn&quot;>fixed</span> << <span class=&quot;fn&quot;>setprecision</span>(<span class=&quot;nm&quot;>4</span>)
         << <span class=&quot;fn&quot;>distance</span>(a, b) << <span class=&quot;nm&quot;>endl</span>;
    <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>0</span>;
}</pre>

     SECTION 2: THE BIG THREE
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s2&quot;>
  <div class=&quot;section-sub&quot;>Section 02</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>02</div>
    <div class=&quot;section-title&quot;>The Big Three</div>
  </div>

  <p>The <strong>Rule of Three</strong> says: if a class needs <em>any one</em> of these three special member functions, it almost certainly needs all three. This is because classes that manage <em>dynamic memory</em> (pointer to heap) need custom behavior, not the default shallow copy.</p>

  <div class=&quot;callout info&quot;>
    <div class=&quot;callout-title&quot;>💡 When Do You Need the Big Three?</div>
    Ask: &quot;Does my class have a pointer data member that it owns (allocated with <code>new</code>)?&quot; If yes → implement all three. Linked lists, dynamic arrays, any heap-allocated resource.
  </div>

  <h2>The Three Members</h2>

  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Member</th><th>Signature</th><th>When Called</th></tr></thead>
    <tbody>
      <tr><td><strong>Destructor</strong></td><td><code>~ClassName()</code></td><td>Object goes out of scope or <code>delete</code> is called</td></tr>
      <tr><td><strong>Copy Constructor</strong></td><td><code>ClassName(const ClassName&amp;amp; rhs)</code></td><td>Pass by value, initialize from existing object: <code>Foo b = a;</code></td></tr>
      <tr><td><strong>Copy Assignment</strong></td><td><code>ClassName&amp;amp; operator=(const ClassName&amp;amp; rhs)</code></td><td>Assignment after both objects exist: <code>b = a;</code></td></tr>
    </tbody>
  </table>
  </div>

  <h2>Shallow vs Deep Copy</h2>
  <div class=&quot;two-col&quot;>
    <div>
      <h3>🚫 Shallow Copy (default)</h3>
      <p>Copies the <em>pointer value</em> — both objects point to the same heap data. Deleting one corrupts the other. <strong>Double-free error!</strong></p>
<pre><span class=&quot;cm&quot;>// Default compiler behavior — DANGEROUS</span>
<span class=&quot;ty&quot;>int</span>* _data = rhs._data; <span class=&quot;cm&quot;>// same address!</span></pre>
    </div>
    <div>
      <h3>✅ Deep Copy (correct)</h3>
      <p>Allocates <em>new</em> memory and copies the <em>contents</em>. Each object owns its own heap data.</p>
<pre><span class=&quot;ty&quot;>int</span>* _data = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>int</span>[_size]; <span class=&quot;cm&quot;>// new alloc</span>
<span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i=<span class=&quot;nm&quot;>0</span>; i&amp;lt;_size; i++)
    _data[i] = rhs._data[i]; <span class=&quot;cm&quot;>// copy contents</span></pre>
    </div>
  </div>

  <h2>Complete Template — Warehouse&amp;lt;T&amp;gt;</h2>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Warehouse</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;cm&quot;>// Constructor</span>
    <span class=&quot;fn&quot;>Warehouse</span>(<span class=&quot;ty&quot;>int</span> capacity) : _capacity(capacity), _size(<span class=&quot;nm&quot;>0</span>) {
        _items = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>T</span>[_capacity];
    }

    <span class=&quot;cm&quot;>// ── BIG THREE ──────────────────────────────────────</span>

    <span class=&quot;cm&quot;>// 1. Destructor — free all heap memory</span>
    ~<span class=&quot;fn&quot;>Warehouse</span>() {
        <span class=&quot;kw&quot;>delete</span>[] _items;   <span class=&quot;cm&quot;>// delete[] for arrays!</span>
        _items = <span class=&quot;kw&quot;>nullptr</span>; <span class=&quot;cm&quot;>// prevent dangling pointer</span>
    }

    <span class=&quot;cm&quot;>// 2. Copy Constructor — deep copy</span>
    <span class=&quot;fn&quot;>Warehouse</span>(<span class=&quot;kw&quot;>const</span> <span class=&quot;ty&quot;>Warehouse</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;&amp;amp; rhs)
        : _capacity(rhs._capacity), _size(rhs._size) {
        _items = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>T</span>[_capacity];           <span class=&quot;cm&quot;>// NEW allocation</span>
        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; _size; i++)
            _items[i] = rhs._items[i];        <span class=&quot;cm&quot;>// copy contents</span>
    }

    <span class=&quot;cm&quot;>// 3. Copy Assignment Operator — deep copy + self-check</span>
    <span class=&quot;ty&quot;>Warehouse</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;&amp;amp; <span class=&quot;kw&quot;>operator</span>=(<span class=&quot;kw&quot;>const</span> <span class=&quot;ty&quot;>Warehouse</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;&amp;amp; rhs) {
        <span class=&quot;kw&quot;>if</span>(<span class=&quot;kw&quot;>this</span> == &amp;amp;rhs) <span class=&quot;kw&quot;>return</span> *<span class=&quot;kw&quot;>this</span>; <span class=&quot;cm&quot;>// SELF-ASSIGNMENT GUARD!</span>
        <span class=&quot;kw&quot;>delete</span>[] _items;                 <span class=&quot;cm&quot;>// free OLD memory</span>
        _capacity = rhs._capacity;
        _size = rhs._size;
        _items = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>T</span>[_capacity];        <span class=&quot;cm&quot;>// new allocation</span>
        <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; _size; i++)
            _items[i] = rhs._items[i];
        <span class=&quot;kw&quot;>return</span> *<span class=&quot;kw&quot;>this</span>;                    <span class=&quot;cm&quot;>// return reference to self</span>
    }

<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>T</span>* _items;
    <span class=&quot;ty&quot;>int</span> _capacity;
    <span class=&quot;ty&quot;>int</span> _size;
};</pre>

  <div class=&quot;callout danger&quot;>
    <div class=&quot;callout-title&quot;>🚨 Critical: Copy Assignment Must</div>
    <ol>
      <li>Check for self-assignment: <code>if(this == &amp;amp;rhs) return *this;</code></li>
      <li>Delete old memory BEFORE allocating new memory</li>
      <li>Return <code>*this</code> (reference to current object)</li>
    </ol>
  </div>

  <h2>When Each Is Called — Trace</h2>
<pre><span class=&quot;ty&quot;>Warehouse</span>&amp;lt;<span class=&quot;ty&quot;>int</span>&amp;gt; a(<span class=&quot;nm&quot;>10</span>);       <span class=&quot;cm&quot;>// constructor called</span>
<span class=&quot;ty&quot;>Warehouse</span>&amp;lt;<span class=&quot;ty&quot;>int</span>&amp;gt; b = a;      <span class=&quot;cm&quot;>// COPY CONSTRUCTOR (b is new)</span>
<span class=&quot;ty&quot;>Warehouse</span>&amp;lt;<span class=&quot;ty&quot;>int</span>&amp;gt; c(<span class=&quot;nm&quot;>5</span>);
c = a;                      <span class=&quot;cm&quot;>// COPY ASSIGNMENT (c already exists)</span>
<span class=&quot;cm&quot;>// end of scope → destructors for c, b, a (reverse order)</span></pre>

  <div class=&quot;problem-box&quot;>
    <div class=&quot;problem-header&quot;>
      <span class=&quot;problem-num&quot;>PRACTICE 2.1</span>
      <span class=&quot;difficulty diff-hard&quot;>Hard</span>
    </div>
    <div class=&quot;problem-body&quot;>
      <div class=&quot;problem-prompt&quot;>
        Given this class, identify what's wrong and fix it:
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Buffer</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>Buffer</span>(<span class=&quot;ty&quot;>int</span> n) { _data = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>int</span>[n]; _n = n; }
    ~<span class=&quot;fn&quot;>Buffer</span>() { <span class=&quot;kw&quot;>delete</span>[] _data; }
<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>int</span>* _data; <span class=&quot;ty&quot;>int</span> _n;
};</pre>
      </div>
<div class=&quot;ced-wrap&quot; data-key=&quot;ced_csci200_prob4&quot;><div class=&quot;ced-toolbar&quot;><div class=&quot;ced-toolbar-left&quot;><span>✎ Your Solution</span><span class=&quot;ced-lang-badge&quot;>C++</span></div><div class=&quot;ced-toolbar-right&quot;><button class=&quot;ced-btn ced-clear-btn&quot;>✕ Clear</button><span class=&quot;ced-saved-indicator&quot;>✓ Saved</span></div></div><div class=&quot;ced-body&quot;><div class=&quot;ced-lines&quot;>1</div><textarea class=&quot;ced-textarea&quot; placeholder=&quot;// Write your C++ solution here...&quot; spellcheck=&quot;false&quot;></textarea></div></div>
      <details class=&quot;solution&quot;>
        <summary>Show Solution</summary>
        <div class=&quot;sol-body&quot;>
          <p><strong>Problem:</strong> Class has pointer data + destructor but is missing a Copy Constructor and Copy Assignment Operator. The default compiler-generated ones do a shallow copy, causing double-free when both objects are destroyed.</p>
          <p><strong>Fix:</strong> Add copy constructor and copy assignment exactly as shown in the Warehouse example above. This is the Big Three violation pattern — if you have one, you need all three.</p>
        </div>
      </details>
    </div>
  </div>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ BIG THREE QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Destructor</strong><code>~Name() { delete[] _ptr; _ptr = nullptr; }</code></div>
      <div class=&quot;cheat-item&quot;><strong>Copy Ctor trigger</strong><code>Foo b = a;</code> or pass by value</div>
      <div class=&quot;cheat-item&quot;><strong>Copy Assign trigger</strong><code>b = a;</code> where b already exists</div>
      <div class=&quot;cheat-item&quot;><strong>Self-assign guard</strong><code>if(this == &amp;rhs) return *this;</code></div>
      <div class=&quot;cheat-item&quot;><strong>delete vs delete[]</strong>Array → <code>delete[]</code>; single → <code>delete</code></div>
      <div class=&quot;cheat-item&quot;><strong>return type of =</strong><code>ClassName&amp;amp;</code> (return <code>*this</code>)</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     SECTION 3: TEMPLATES
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s3&quot;>
  <div class=&quot;section-sub&quot;>Section 03</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>03</div>
    <div class=&quot;section-title&quot;>Templates</div>
  </div>

  <p>Templates let you write code once and have it work for any data type. They're the C++ mechanism for <em>parametric polymorphism</em> — the type is a parameter that's resolved at compile time.</p>

  <h2>Function Templates</h2>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;ty&quot;>T</span> <span class=&quot;fn&quot;>myMax</span>(<span class=&quot;ty&quot;>T</span> a, <span class=&quot;ty&quot;>T</span> b) {
    <span class=&quot;kw&quot;>return</span> (a > b) ? a : b;
}

<span class=&quot;cm&quot;>// Usage — compiler generates correct version:</span>
<span class=&quot;nm&quot;>myMax</span>(<span class=&quot;nm&quot;>3</span>, <span class=&quot;nm&quot;>5</span>);          <span class=&quot;cm&quot;>// T = int</span>
<span class=&quot;nm&quot;>myMax</span>(<span class=&quot;nm&quot;>3.14</span>, <span class=&quot;nm&quot;>2.72</span>);   <span class=&quot;cm&quot;>// T = double</span>
<span class=&quot;nm&quot;>myMax</span>(<span class=&quot;st&quot;>'a'</span>, <span class=&quot;st&quot;>'z'</span>);    <span class=&quot;cm&quot;>// T = char</span></pre>

  <h2>Class Templates</h2>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Box</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>Box</span>(<span class=&quot;ty&quot;>T</span> val) : _val(val) {}
    <span class=&quot;ty&quot;>T</span> <span class=&quot;fn&quot;>get</span>() <span class=&quot;kw&quot;>const</span> { <span class=&quot;kw&quot;>return</span> _val; }
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>set</span>(<span class=&quot;ty&quot;>T</span> val) { _val = val; }
<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>T</span> _val;
};

<span class=&quot;cm&quot;>// Instantiation — must specify type in angle brackets:</span>
<span class=&quot;ty&quot;>Box</span>&amp;lt;<span class=&quot;ty&quot;>int</span>&amp;gt;    intBox(<span class=&quot;nm&quot;>42</span>);
<span class=&quot;ty&quot;>Box</span>&amp;lt;<span class=&quot;ty&quot;>string</span>&amp;gt; strBox(<span class=&quot;st&quot;>&quot;hello&quot;</span>);</pre>

  <div class=&quot;callout warn&quot;>
    <div class=&quot;callout-title&quot;>⚠️ Template Implementation Location</div>
    Template definitions must be in the <strong>.h header file</strong>, not split across .h and .cpp. The compiler needs to see the full template definition at the point of instantiation. If you put it in a .cpp, you'll get linker errors.
  </div>

  <h2>Multiple Template Parameters</h2>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>Key</span>, <span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>Value</span>&amp;gt;
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Pair</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;ty&quot;>Key</span>   first;
    <span class=&quot;ty&quot;>Value</span> second;
    <span class=&quot;fn&quot;>Pair</span>(<span class=&quot;ty&quot;>Key</span> k, <span class=&quot;ty&quot;>Value</span> v) : first(k), second(v) {}
};</pre>

  <h2>Templated LinkedList (Exam Relevant)</h2>
<pre><span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>struct</span> <span class=&quot;ty&quot;>Node</span> {
    <span class=&quot;ty&quot;>T</span>      value;
    <span class=&quot;ty&quot;>Node</span>*  next;
    <span class=&quot;fn&quot;>Node</span>(<span class=&quot;ty&quot;>T</span> v) : value(v), next(<span class=&quot;kw&quot;>nullptr</span>) {}
};

<span class=&quot;kw&quot;>template</span>&amp;lt;<span class=&quot;kw&quot;>typename</span> <span class=&quot;ty&quot;>T</span>&amp;gt;
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>LinkedList</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>LinkedList</span>() : _head(<span class=&quot;kw&quot;>nullptr</span>), _size(<span class=&quot;nm&quot;>0</span>) {}
    <span class=&quot;cm&quot;>// ... see Section 9 for full implementation</span>
<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>Node</span>&amp;lt;<span class=&quot;ty&quot;>T</span>&amp;gt;* _head;
    <span class=&quot;ty&quot;>int</span> _size;
};</pre>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ TEMPLATES QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Function template</strong><code>template&amp;lt;typename T&amp;gt; T f(T a);</code></div>
      <div class=&quot;cheat-item&quot;><strong>Class template</strong><code>template&amp;lt;typename T&amp;gt; class C {...};</code></div>
      <div class=&quot;cheat-item&quot;><strong>Instantiation</strong><code>C&amp;lt;int&amp;gt; obj;</code> or auto-deduced for functions</div>
      <div class=&quot;cheat-item&quot;><strong>Location rule</strong>Everything in .h — never split to .cpp</div>
      <div class=&quot;cheat-item&quot;><strong>Outside-class method</strong><code>template&amp;lt;typename T&amp;gt; T C&amp;lt;T&amp;gt;::method() {...}</code></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     SECTION 4: INHERITANCE &amp; UML
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s4&quot;>
  <div class=&quot;section-sub&quot;>Section 04</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>04</div>
    <div class=&quot;section-title&quot;>Inheritance &amp;amp; UML</div>
  </div>

  <p>Inheritance models an <strong>is-a</strong> relationship. A derived class inherits data members and member functions from its base class, extending or specializing behavior. This is one of the pillars of object-oriented design.</p>

  <h2>Syntax</h2>
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Animal</span> {              <span class=&quot;cm&quot;>// Base class</span>
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>Animal</span>(<span class=&quot;ty&quot;>string</span> name) : _name(name) {}
    <span class=&quot;kw&quot;>virtual</span> ~<span class=&quot;fn&quot;>Animal</span>() {}    <span class=&quot;cm&quot;>// ALWAYS virtual if subclassed!</span>
    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>getName</span>() <span class=&quot;kw&quot;>const</span> { <span class=&quot;kw&quot;>return</span> _name; }
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>speak</span>() { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;...&quot;</span>; }
<span class=&quot;kw&quot;>protected</span>:
    <span class=&quot;ty&quot;>string</span> _name;           <span class=&quot;cm&quot;>// accessible by derived classes</span>
};

<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Dog</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Animal</span> { <span class=&quot;cm&quot;>// Derived class</span>
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>Dog</span>(<span class=&quot;ty&quot;>string</span> name) : <span class=&quot;fn&quot;>Animal</span>(name) {}  <span class=&quot;cm&quot;>// chain to base ctor</span>
    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>speak</span>() <span class=&quot;kw&quot;>override</span> { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;Woof!&quot;</span>; }
};</pre>

  <h2>Access Modifier Inheritance Table</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Base Member Access</th><th>public inheritance</th><th>protected inheritance</th><th>private inheritance</th></tr></thead>
    <tbody>
      <tr><td><strong>public</strong></td><td>public</td><td>protected</td><td>private</td></tr>
      <tr><td><strong>protected</strong></td><td>protected</td><td>protected</td><td>private</td></tr>
      <tr><td><strong>private</strong></td><td>not inherited</td><td>not inherited</td><td>not inherited</td></tr>
    </tbody>
  </table>
  </div>

  <div class=&quot;callout info&quot;>
    <div class=&quot;callout-title&quot;>💡 Access Specifier Summary</div>
    <ul>
      <li><code>+</code> public — accessible by everyone</li>
      <li><code>#</code> protected — accessible by class itself and derived classes</li>
      <li><code>-</code> private — accessible only by the class itself</li>
    </ul>
    Most inheritance in CSCI 200 is <code>public</code> inheritance (models is-a).
  </div>

  <h2>UML Class Diagram Notation</h2>

    <div class=&quot;uml-box&quot;>
      <div class=&quot;uml-interface&quot;>&amp;lt;&amp;lt;interface&amp;gt;&amp;gt;</div>
      <div class=&quot;uml-name&quot;>Animal</div>

  <h2>Final Review Q6–Q8 — Library/Book UML to Code</h2>
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Book</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;cm&quot;>// Default ctor: The C++ Programming Language, Bjarne Stroustrup, 1986</span>
    <span class=&quot;fn&quot;>Book</span>() : _title(<span class=&quot;st&quot;>&quot;The C++ Programming Language&quot;</span>),
              _author(<span class=&quot;st&quot;>&quot;Bjarne Stroustrup&quot;</span>),
              _publicationYear(<span class=&quot;nm&quot;>1986</span>) {}

    <span class=&quot;fn&quot;>Book</span>(<span class=&quot;ty&quot;>string</span> title, <span class=&quot;ty&quot;>string</span> author, <span class=&quot;ty&quot;>int</span> year)
        : _title(title), _author(author), _publicationYear(year) {}

    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>getAuthor</span>() <span class=&quot;kw&quot;>const</span>          { <span class=&quot;kw&quot;>return</span> _author; }
    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>getTitle</span>()  <span class=&quot;kw&quot;>const</span>          { <span class=&quot;kw&quot;>return</span> _title; }
    <span class=&quot;ty&quot;>int</span>    <span class=&quot;fn&quot;>getPublicationYear</span>() <span class=&quot;kw&quot;>const</span> { <span class=&quot;kw&quot;>return</span> _publicationYear; }

<span class=&quot;kw&quot;>private</span>:
    <span class=&quot;ty&quot;>string</span> _author;
    <span class=&quot;ty&quot;>string</span> _title;
    <span class=&quot;ty&quot;>int</span>    _publicationYear;
};</pre>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ INHERITANCE QUICK REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Is-a relationship</strong>Dog is-a Animal → use inheritance</div>
      <div class=&quot;cheat-item&quot;><strong>Has-a relationship</strong>Library has-a Book → use composition</div>
      <div class=&quot;cheat-item&quot;><strong>Chain constructors</strong><code>Derived(args) : Base(baseArgs) {}</code></div>
      <div class=&quot;cheat-item&quot;><strong>UML open arrow</strong>△ means inherits from</div>
      <div class=&quot;cheat-item&quot;><strong>virtual destructor</strong>Always add when class is subclassed</div>
      <div class=&quot;cheat-item&quot;><strong>protected</strong>Child can access; outsider cannot</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     SECTION 5: COMPILE-TIME POLYMORPHISM
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s5&quot;>
  <div class=&quot;section-sub&quot;>Section 05</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>05</div>
    <div class=&quot;section-title&quot;>Compile-Time Polymorphism</div>
  </div>

  <p>Compile-time polymorphism means the exact function to call is resolved <em>at compile time</em>, not runtime. There are three types:</p>

  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th>Type</th><th>Mechanism</th><th>Example</th></tr></thead>
    <tbody>
      <tr><td><strong>Ad-hoc</strong></td><td>Function overloading</td><td>Same name, different parameter types</td></tr>
      <tr><td><strong>Parametric</strong></td><td>Templates</td><td><code>template&amp;lt;T&amp;gt;</code> resolved at compile time</td></tr>
      <tr><td><strong>Subtype</strong> (compile-time)</td><td>Object slicing</td><td>Derived stored as Base value — loses derived behavior</td></tr>
    </tbody>
  </table>
  </div>

  <h2>Function Overloading (Ad-hoc)</h2>
<pre><span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>print</span>(<span class=&quot;ty&quot;>int</span> x)    { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;int: &quot;</span> &amp;lt;&amp;lt; x; }
<span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>print</span>(<span class=&quot;ty&quot;>double</span> x) { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;double: &quot;</span> &amp;lt;&amp;lt; x; }
<span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>print</span>(<span class=&quot;ty&quot;>string</span> x) { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;string: &quot;</span> &amp;lt;&amp;lt; x; }

<span class=&quot;cm&quot;>// Compiler picks the right one based on argument type</span>
<span class=&quot;fn&quot;>print</span>(<span class=&quot;nm&quot;>42</span>);       <span class=&quot;cm&quot;>// calls print(int)</span>
<span class=&quot;fn&quot;>print</span>(<span class=&quot;nm&quot;>3.14</span>);    <span class=&quot;cm&quot;>// calls print(double)</span></pre>

  <h2>Object Slicing — The Danger</h2>
  <div class=&quot;callout danger&quot;>
    <div class=&quot;callout-title&quot;>🚨 Object Slicing — Most Common Exam Trap</div>
    When a derived object is assigned to a <em>base by value</em>, the derived portion is &quot;sliced off.&quot; Virtual function dispatch won't work.
  </div>
<pre><span class=&quot;ty&quot;>Animal</span> a = <span class=&quot;ty&quot;>Dog</span>(<span class=&quot;st&quot;>&quot;Rex&quot;</span>);  <span class=&quot;cm&quot;>// ⚠️ SLICING — Dog part lost!</span>
a.<span class=&quot;fn&quot;>speak</span>();              <span class=&quot;cm&quot;>// calls Animal::speak(), NOT Dog::speak()</span>

<span class=&quot;cm&quot;>// Correct: use a pointer or reference</span>
<span class=&quot;ty&quot;>Animal</span>* a = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Dog</span>(<span class=&quot;st&quot;>&quot;Rex&quot;</span>);  <span class=&quot;cm&quot;>// ✓ No slicing</span>
a-><span class=&quot;fn&quot;>speak</span>();                  <span class=&quot;cm&quot;>// calls Dog::speak() ← virtual dispatch</span></pre>

  <h2>Trace Output Practice</h2>
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Shape</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>draw</span>()          { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Shape&quot;</span>; }    <span class=&quot;cm&quot;>// NOT virtual</span>
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>area</span>()  { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;S.area&quot;</span>; }
};
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Circle</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Shape</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>draw</span>() <span class=&quot;kw&quot;>override</span> { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Circle&quot;</span>; }  <span class=&quot;cm&quot;>// doesn't override — not virtual</span>
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>area</span>() <span class=&quot;kw&quot;>override</span> { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;C.area&quot;</span>; }
};

<span class=&quot;ty&quot;>Shape</span>* s = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Circle</span>();
s-><span class=&quot;fn&quot;>draw</span>();  <span class=&quot;cm&quot;>// outputs: &quot;Shape&quot;   ← NOT virtual, uses static type</span>
s-><span class=&quot;fn&quot;>area</span>();  <span class=&quot;cm&quot;>// outputs: &quot;C.area&quot;  ← virtual, uses dynamic type</span></pre>

  <div class=&quot;cheat-sheet&quot;>
    <div class=&quot;cheat-title&quot;>⚡ COMPILE-TIME POLYMORPHISM REFERENCE</div>
    <div class=&quot;cheat-grid&quot;>
      <div class=&quot;cheat-item&quot;><strong>Ad-hoc (overloading)</strong>Same name, different params — compiler picks at compile time</div>
      <div class=&quot;cheat-item&quot;><strong>Parametric (templates)</strong>Type parameter T — instantiated at compile time</div>
      <div class=&quot;cheat-item&quot;><strong>Object slicing</strong>Store derived as base VALUE → loses derived behavior</div>
      <div class=&quot;cheat-item&quot;><strong>Fix for slicing</strong>Use <code>Base*</code> pointer or <code>Base&amp;amp;</code> reference</div>
      <div class=&quot;cheat-item&quot;><strong>Non-virtual + pointer</strong>Uses static (declared) type — compile time</div>
      <div class=&quot;cheat-item&quot;><strong>Virtual + pointer</strong>Uses dynamic (actual) type — runtime</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     SECTION 6: RUNTIME POLYMORPHISM
═══════════════════════════════════════════════════════ -->
<div class=&quot;section&quot; id=&quot;s6&quot;>
  <div class=&quot;section-sub&quot;>Section 06</div>
  <div class=&quot;section-header&quot;>
    <div class=&quot;section-num&quot;>06</div>
    <div class=&quot;section-title&quot;>Runtime Polymorphism</div>
  </div>

  <p>Runtime polymorphism means function dispatch happens <em>at runtime</em> based on the object's <em>actual</em> type. This is achieved through <strong>virtual functions</strong> and enables you to write code that works on base class pointers but calls derived class behavior automatically.</p>

  <h2>The <code>virtual</code> Keyword Chain</h2>
<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Base</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>foo</span>() { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Base&quot;</span>; } <span class=&quot;cm&quot;>// virtual — enables override</span>
    <span class=&quot;kw&quot;>virtual</span> ~<span class=&quot;fn&quot;>Base</span>() {}  <span class=&quot;cm&quot;>// virtual destructor — REQUIRED when subclassed</span>
};
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Derived</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Base</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>foo</span>() <span class=&quot;kw&quot;>override</span> { cout &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;Derived&quot;</span>; } <span class=&quot;cm&quot;>// override — compiler checks</span>
    ~<span class=&quot;fn&quot;>Derived</span>() {}
};</pre>

  <h2>Abstract Classes vs Interfaces</h2>
  <div class=&quot;tbl-wrap&quot;>
  <table>
    <thead><tr><th></th><th>Abstract Class</th><th>Interface (in C++)</th></tr></thead>
    <tbody>
      <tr><td><strong>Definition</strong></td><td>Class with at least one pure virtual method</td><td>Abstract class with ONLY pure virtual methods (no data)</td></tr>
      <tr><td><strong>Pure virtual syntax</strong></td><td><code>virtual T f() = 0;</code></td><td><code>virtual T f() = 0;</code></td></tr>
      <tr><td><strong>Can instantiate?</strong></td><td>❌ No</td><td>❌ No</td></tr>
      <tr><td><strong>Data members?</strong></td><td>✅ Yes</td><td>❌ No (convention)</td></tr>
      <tr><td><strong>UML notation</strong></td><td><em>Italic class name</em></td><td><code>&amp;lt;&amp;lt;interface&amp;gt;&amp;gt;</code></td></tr>
    </tbody>
  </table>
  </div>

<pre><span class=&quot;cm&quot;>// Interface example (pure virtual only)</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>IQuackBehavior</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>quack</span>() = <span class=&quot;nm&quot;>0</span>;  <span class=&quot;cm&quot;>// pure virtual = 0</span>
    <span class=&quot;kw&quot;>virtual</span> ~<span class=&quot;fn&quot;>IQuackBehavior</span>() {} <span class=&quot;cm&quot;>// virtual destructor</span>
};</pre>

  <h2>Final Review Q9–Q11 — Duck Pond (Complete Solution)</h2>
  <p>This is the most important runtime polymorphism example on the final:</p>
<pre><span class=&quot;kw&quot;>#include</span> <span class=&quot;st&quot;>&amp;lt;iostream&amp;gt;</span>
<span class=&quot;kw&quot;>#include</span> <span class=&quot;st&quot;>&amp;lt;vector&amp;gt;</span>
<span class=&quot;kw&quot;>using namespace</span> <span class=&quot;ty&quot;>std</span>;

<span class=&quot;cm&quot;>// ── QUACK BEHAVIOR INTERFACE ─────────────────────────</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>QuackBehavior</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>quack</span>() = <span class=&quot;nm&quot;>0</span>;
    <span class=&quot;kw&quot;>virtual</span> ~<span class=&quot;fn&quot;>QuackBehavior</span>() {}
};

<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Quack</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>QuackBehavior</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>quack</span>() <span class=&quot;kw&quot;>override</span> { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;quack&quot;</span>; }
};

<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Mute</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>QuackBehavior</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>quack</span>() <span class=&quot;kw&quot;>override</span> { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;&quot;</span>; }
};

<span class=&quot;cm&quot;>// ── DUCK BASE CLASS ───────────────────────────────────</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>Duck</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>Duck</span>() : _qb(<span class=&quot;kw&quot;>nullptr</span>) { <span class=&quot;fn&quot;>setQuackBehavior</span>(); }
    <span class=&quot;kw&quot;>virtual</span> ~<span class=&quot;fn&quot;>Duck</span>() { <span class=&quot;kw&quot;>delete</span> _qb; }

    <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>quack</span>() { <span class=&quot;kw&quot;>return</span> _qb-><span class=&quot;fn&quot;>quack</span>(); }

<span class=&quot;kw&quot;>protected</span>:
    <span class=&quot;ty&quot;>QuackBehavior</span>* _qb;
    <span class=&quot;kw&quot;>virtual</span> <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setQuackBehavior</span>() = <span class=&quot;nm&quot;>0</span>; <span class=&quot;cm&quot;>// pure virtual — subclass must set _qb</span>
};

<span class=&quot;cm&quot;>// ── CONCRETE DUCK TYPES ───────────────────────────────</span>
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>MallardDuck</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Duck</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>MallardDuck</span>() : <span class=&quot;fn&quot;>Duck</span>() {}
<span class=&quot;kw&quot;>protected</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setQuackBehavior</span>() <span class=&quot;kw&quot;>override</span> { _qb = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Quack</span>(); }
};

<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>DecoyDuck</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>Duck</span> {
<span class=&quot;kw&quot;>public</span>:
    <span class=&quot;fn&quot;>DecoyDuck</span>() : <span class=&quot;fn&quot;>Duck</span>() {}
<span class=&quot;kw&quot;>protected</span>:
    <span class=&quot;kw&quot;>void</span> <span class=&quot;fn&quot;>setQuackBehavior</span>() <span class=&quot;kw&quot;>override</span> { _qb = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>Mute</span>(); }
};

<span class=&quot;cm&quot;>// ── DUCK POND: Q11 ────────────────────────────────────</span>
<span class=&quot;kw&quot;>int</span> <span class=&quot;fn&quot;>main</span>() {
    vector&amp;lt;<span class=&quot;ty&quot;>Duck</span>*&amp;gt; pond;

    <span class=&quot;cm&quot;>// Odd-indexed ducks are decoys, even-indexed are mallards</span>
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>int</span> i = <span class=&quot;nm&quot;>0</span>; i &amp;lt; <span class=&quot;nm&quot;>10</span>; i++) {
        <span class=&quot;kw&quot;>if</span>(i % <span class=&quot;nm&quot;>2</span> == <span class=&quot;nm&quot;>0</span>)
            pond.<span class=&quot;fn&quot;>push_back</span>(<span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>MallardDuck</span>()); <span class=&quot;cm&quot;>// even → mallard</span>
        <span class=&quot;kw&quot;>else</span>
            pond.<span class=&quot;fn&quot;>push_back</span>(<span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>DecoyDuck</span>());   <span class=&quot;cm&quot;>// odd → decoy</span>
    }

    <span class=&quot;cm&quot;>// Make each duck quack — runtime polymorphism!</span>
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>Duck</span>* d : pond) {
        cout &amp;lt;&amp;lt; d-><span class=&quot;fn&quot;>quack</span>() &amp;lt;&amp;lt; <span class=&quot;st&quot;>&quot;\n&quot;</span>;
    }

    <span class=&quot;cm&quot;>// Clean up memory</span>
    <span class=&quot;kw&quot;>for</span>(<span class=&quot;ty&quot;>Duck</span>* d : pond) {
        <span class=&quot;kw&quot;>delete</span> d;
    }
    pond.<span class=&quot;fn&quot;>clear</span>();

    <span class=&quot;kw&quot;>return</span> <span class=&quot;nm&quot;>0</span>;
}
<span class=&quot;cm&quot;>/* Output:
   quack  (0 = mallard)
          (1 = decoy, mute)
   quack  (2 = mallard)
   ...    */</span></pre>

  <div class=&quot;callout good&quot;>
    <div class=&quot;callout-title&quot;>✅ Why Virtual Destructor Matters Here</div>
    When you <code>delete d</code> through a <code>Duck*</code> pointer, the virtual destructor ensures the <em>derived class destructor</em> runs first (freeing <code>_qb</code>), then the base. Without it, the derived destructor is never called → memory leak.
  </div>

  <div class=&quot;problem-box&quot;>

    </div>

<pre><span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>A</span> { <span class=&quot;kw&quot;>public</span>: <span class=&quot;kw&quot;>virtual</span> <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>f</span>() { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;A&quot;</span>; } };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>B</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>A</span> { <span class=&quot;kw&quot;>public</span>: <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>f</span>() <span class=&quot;kw&quot;>override</span> { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;B&quot;</span>; } };
<span class=&quot;kw&quot;>class</span> <span class=&quot;ty&quot;>C</span> : <span class=&quot;kw&quot;>public</span> <span class=&quot;ty&quot;>B</span> { <span class=&quot;kw&quot;>public</span>: <span class=&quot;ty&quot;>string</span> <span class=&quot;fn&quot;>f</span>() <span class=&quot;kw&quot;>override</span> { <span class=&quot;kw&quot;>return</span> <span class=&quot;st&quot;>&quot;C&quot;</span>; } };

<span class=&quot;ty&quot;>A</span>* x = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>B</span>();
<span class=&quot;ty&quot;>A</span>* y = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>C</span>();
<span class=&quot;ty&quot;>B</span>* z = <span class=&quot;kw&quot;>new</span> <span class=&quot;ty&quot;>C</span>();
cout &amp;lt;&amp;lt; x-><span class=&quot;fn&quot;>f</span>() &amp;lt;&amp;lt; y-><span class=&quot;fn&quot;>f</span>() &amp;lt;&amp;lt; z-><span class=&quot;fn&quot;>f</span>();</pre>
