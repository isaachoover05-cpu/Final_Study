      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Dep. sources</div>Diamond shape; never deactivated in Thévenin/superposition</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Energy conservation</div>$\sum p = 0$ (sum over all elements)</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 3 ══════════════════════════ -->
<section id=&quot;t3&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t3&quot;>Topic 3</span>
    <h2>Kirchhoff's Laws (KCL &amp;amp; KVL)</h2>
  </div>

  <h3>Why These Laws Are Everything</h3>
  <p>KCL and KVL are the foundation of <em>every</em> circuit analysis technique. Node-voltage, mesh-current, Thévenin — they all reduce to applying KCL and KVL systematically.</p>

  <h3>Kirchhoff's Current Law (KCL)</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>KCL — Conservation of Charge</div>
    $$\sum_{k} i_k = 0 \quad \text{at any node}$$
    <p style=&quot;margin-top:10px;font-size:.9rem&quot;>Equivalently: $\sum i_{in} = \sum i_{out}$ at any node.</p>
  </div>
  <p>With $n$ nodes in a circuit you can write $n-1$ <em>independent</em> KCL equations. The $n^{th}$ is always a linear combination of the others.</p>

  <h3>Kirchhoff's Voltage Law (KVL)</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>KVL — Conservation of Energy</div>
    $$\sum_{k} v_k = 0 \quad \text{around any closed loop}$$
    <p style=&quot;margin-top:10px;font-size:.9rem&quot;>Convention: when traversing a loop clockwise, a voltage <em>drop</em> (going $+\to-$) is positive; a voltage <em>rise</em> (going $-\to+$) is negative.</p>
  </div>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ KVL Sign Convention — The Most Common Error</strong>
    Be consistent: pick <em>one</em> traversal direction and stick to it. A common error is flipping direction halfway through a loop. Write out all signs before plugging in numbers.
  </div>

  <h3>Worked Example 1 — KCL at Multiple Nodes</h3>
  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 3.1: Three-node KCL <span class=&quot;diff&quot;>Easy</span></div>
    <div class=&quot;example-body&quot;>
      <p>A node has currents: $i_1 = 2\,\text{A}$ entering, $i_2 = 5\,\text{A}$ entering, $i_3$ leaving. Find $i_3$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>KCL: $\sum i_{in} = \sum i_{out}$ → $i_1 + i_2 = i_3$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$i_3 = 2 + 5 = 7\,\text{A}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 3.2: KVL to find unknown resistance <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>A series loop: 10 V source, $R_1=2\,\Omega$, $R_2=3\,\Omega$, and unknown $R$. KCL gives $i = 1\,\text{A}$. Find $R$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Apply KVL clockwise (start at + of source): $-10 + v_{R_1} + v_{R_2} + v_R = 0$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Substitute Ohm's law: $-10 + i(2) + i(3) + iR = 0$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$-10 + 1(2+3+R) = 0 \Rightarrow R = 5\,\Omega$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 3.3: Combined KCL + KVL — two loops <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Circuit: 20 V source in series with $4\,\Omega$, connected to a parallel combination of $6\,\Omega$ and $12\,\Omega$. Find all branch currents.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Label: $i_s$ = total current from source, $i_1$ = current through $6\,\Omega$, $i_2$ = current through $12\,\Omega$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>KCL at top node: $i_s = i_1 + i_2$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Voltage across parallel combination: $v_p = 6i_1 = 12i_2$ → $i_1 = 2i_2$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>KVL outer loop: $-20 + 4i_s + v_p = 0$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>Substitute: $i_s = 3i_2$ and $v_p = 12i_2$: $-20 + 4(3i_2) + 12i_2 = 0 \Rightarrow 24i_2 = 20 \Rightarrow i_2 = 5/6\,\text{A}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>6</div><div class=&quot;step-content&quot;>$i_1 = 2i_2 = 5/3\,\text{A}$; $i_s = 3i_2 = 5/2\,\text{A}$</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 3.1</h4>
    <p>At a node, four currents meet: $i_1 = 3\,\text{A}$ entering, $i_2 = -1\,\text{A}$ entering (i.e., 1 A leaving), $i_3 = 4\,\text{A}$ leaving. Find $i_4$ (direction unknown).</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      KCL: $\sum i_{in} = \sum i_{out}$. Currents in: $3 + (-1) = 2\,\text{A}$ net in. Wait — let's use algebraic form: $i_1 - i_2 - i_3 + i_4 = 0$. Actually, define entering positive: $+i_1 - i_2 - i_3 + i_4 = 0$. Given $i_1=3$, $i_2=-1$ (so $-(-1)=+1$ as entering… let me use $\sum_{entering} = \sum_{leaving}$). In: $i_1 = 3$ A. Out: $i_3 = 4$ A; $i_2 = 1$ A leaving (since it was stated as $-1$ A entering). Net: $3 = 4 + 1 + i_4$? → $i_4 = -2\,\text{A}$, meaning $i_4 = 2\,\text{A}$ <em>entering</em>.
    </div>
  </div>

  <div class=&quot;practice&quot;>
    <h4>Practice 3.2</h4>
    <p>A loop contains: a 12 V battery, a 5 V battery (opposing), a $3\,\Omega$ resistor with $i = 1\,\text{A}$ through it, and a $4\,\Omega$ resistor. Use KVL to find the current $i$ through the loop (they are in series).</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      KVL (clockwise): $-12 + 5 + i(3) + i(4) = 0$ (if opposing battery is &quot;rise&quot; of 5 V against our direction). Wait — opposing means if 12 V drives clockwise, 5 V opposes (acts as a drop): $-12 + i(3) + 5 + i(4) = 0$ → $7i = 7$ → $i = 1\,\text{A}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 3 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>KCL</div>$\sum i = 0$ at node; $\sum i_{in} = \sum i_{out}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>KVL</div>$\sum v = 0$ around loop</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>KVL sign</div>Drop (+$\to$−) positive; Rise (−$\to$+) negative</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Independent eqs.</div>KCL: $n-1$; KVL: $b-n+1$ (where $b$=branches)</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 4 ══════════════════════════ -->
<section id=&quot;t4&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t4&quot;>Topic 4</span>
    <h2>Series/Parallel Resistors &amp;amp; Voltage/Current Division</h2>
  </div>

  <h3>Series Resistors</h3>
  <p>Elements in series share the <strong>same current</strong>. Resistors add directly.</p>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Series Combination</div>
    $$R_{eq} = R_1 + R_2 + \cdots + R_n$$
    $$\text{Voltage Division: } v_k = v_s \cdot \frac{R_k}{R_1+R_2+\cdots+R_n}$$
  </div>

  <h3>Parallel Resistors</h3>
  <p>Elements in parallel share the <strong>same voltage</strong>. Resistors combine reciprocally.</p>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Parallel Combination</div>
    $$\frac{1}{R_{eq}} = \frac{1}{R_1} + \frac{1}{R_2} + \cdots + \frac{1}{R_n}$$
    $$\text{Two resistors: } R_{eq} = \frac{R_1 R_2}{R_1+R_2} \quad \text{(product over sum)}$$
    $$\text{Current Division (2 resistors): } i_1 = i_s \cdot \frac{R_2}{R_1+R_2}$$
  </div>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ Voltage vs. Current Division — Don't Mix Them Up!</strong>
    Voltage division: the fraction has the <em>desired resistor in the numerator</em>.<br>
    Current division for 2 resistors: the fraction has the <em>OTHER resistor in the numerator</em>. (Larger R draws less current → this makes physical sense.)
  </div>

  <h3>General Current Division</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>General Current Division (using conductances)</div>
    $$i_k = i_s \cdot \frac{G_k}{G_1+G_2+\cdots+G_n} = i_s \cdot \frac{1/R_k}{\sum 1/R_j}$$
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 4.1: Voltage division with load <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>A voltage divider: $v_s = 100\,\text{V}$, $R_1 = 25\,\text{k}\Omega$ (top), $R_2 = 100\,\text{k}\Omega$ (bottom). Find $v_o$ (a) without load, (b) with $R_L = 150\,\text{k}\Omega$ across $R_2$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;><strong>No load:</strong> $v_o = 100 \cdot \frac{100}{25+100} = 100 \cdot \frac{100}{125} = 80\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;><strong>With load:</strong> $R_2 \| R_L = \frac{100 \times 150}{100+150} = \frac{15000}{250} = 60\,\text{k}\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>New $v_o = 100 \cdot \frac{60}{25+60} = 100 \cdot \frac{60}{85} \approx 70.6\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>The load reduced the output voltage from 80 V to 70.6 V — this is called &quot;loading effect.&quot;</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 4.2: Mixed series-parallel with current division <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Find current $i_{10}$ through a $10\,\Omega$ resistor in a circuit where $v_s = 120\,\text{V}$ drives a network: $5\,\Omega$ in series with a parallel combination of $10\,\Omega$ and $40\,\Omega$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Parallel equivalent: $R_p = \frac{10 \times 40}{10+40} = 8\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Total resistance: $R_T = 5 + 8 = 13\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Source current: $i_s = 120/13 \approx 9.23\,\text{A}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>Current division (2-resistor): $i_{10} = i_s \cdot \frac{40}{10+40} = 9.23 \times 0.8 = 7.38\,\text{A}$</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 4.1</h4>
    <p>Three resistors $R_1=6\,\Omega$, $R_2=3\,\Omega$, $R_3=2\,\Omega$ are connected in parallel. Find $R_{eq}$ and the voltage across them if total current supplied is $5\,\text{A}$.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      $\frac{1}{R_{eq}} = \frac{1}{6}+\frac{1}{3}+\frac{1}{2} = \frac{1+2+3}{6} = 1\,\text{S}$ → $R_{eq} = 1\,\Omega$.<br>
      $v = i_s \cdot R_{eq} = 5 \times 1 = 5\,\text{V}$.
    </div>
  </div>

  <div class=&quot;practice&quot;>
    <h4>Practice 4.2</h4>
    <p>A 24 V source drives four resistors: $R_1=8\,\Omega$ in series with a parallel combination of $R_2=12\,\Omega$, $R_3=6\,\Omega$, and $R_4=4\,\Omega$. Find the current through $R_3$.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      Parallel combo: $\frac{1}{R_p} = \frac{1}{12}+\frac{1}{6}+\frac{1}{4} = \frac{1+2+3}{12} = \frac{6}{12}$ → $R_p = 2\,\Omega$.<br>
      $R_T = 8+2 = 10\,\Omega$. $i_s = 24/10 = 2.4\,\text{A}$.<br>
      Voltage across parallel: $v_p = i_s \cdot R_p = 2.4 \times 2 = 4.8\,\text{V}$.<br>
      $i_3 = v_p/R_3 = 4.8/6 = 0.8\,\text{A}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 4 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Series R</div>$R_{eq}=R_1+R_2+\ldots$; same $i$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Parallel R</div>$1/R_{eq}=1/R_1+1/R_2+\ldots$; same $v$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>2-Parallel</div>$R_{eq}=R_1R_2/(R_1+R_2)$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Voltage div</div>$v_k = v_s\cdot R_k/R_{total}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Current div (2R)</div>$i_1 = i_s\cdot R_2/(R_1+R_2)$ — OTHER R in numerator</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Memory trick</div>Series: same current &quot;flows through&quot; • Parallel: same voltage &quot;drops across&quot;</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 5 ══════════════════════════ -->
<section id=&quot;t5&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num&quot;>Topic 5</span>
    <h2>Measurements &amp;amp; Delta–Wye Transformations</h2>
  </div>

  <h3>Wheatstone Bridge</h3>
  <p>Used to measure an unknown resistance $R_x$ with high precision. Balance condition ($i_g = 0$):</p>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Wheatstone Bridge Balance</div>
    $$R_1 R_x = R_2 R_3 \quad \Rightarrow \quad R_x = \frac{R_2 R_3}{R_1}$$
  </div>

  <h3>Delta–Wye (Δ–Y) Transformation</h3>
  <p>When resistors form a triangle (Δ) or T-shape (Y), normal series/parallel reduction fails. Use the Δ–Y transform to convert:</p>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Δ → Y Conversion (Delta to Wye)</div>
    $$R_1 = \frac{R_b R_c}{R_a+R_b+R_c}, \quad R_2 = \frac{R_a R_c}{R_a+R_b+R_c}, \quad R_3 = \frac{R_a R_b}{R_a+R_b+R_c}$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>Mnemonic: each Y resistor = product of the two Δ resistors adjacent to that node, divided by the sum of all three Δ resistors.</p>
  </div>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Y → Δ Conversion (Wye to Delta)</div>
    $$R_a = \frac{R_1 R_2 + R_2 R_3 + R_1 R_3}{R_1}, \quad R_b = \frac{R_1 R_2 + R_2 R_3 + R_1 R_3}{R_2}, \quad R_c = \frac{R_1 R_2 + R_2 R_3 + R_1 R_3}{R_3}$$
  </div>
  <div class=&quot;callout tip&quot;>
    <strong>💡 Special Case: Balanced Networks</strong>
    If all three Δ resistors are equal ($R_\Delta$), then each Y resistor $R_Y = R_\Delta/3$. Conversely if each Y is $R_Y$, then $R_\Delta = 3R_Y$.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 5.1: Find equivalent resistance using Δ→Y <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>A bridge circuit has: outer Δ with $R_a = 5\,\Omega$, $R_b = 10\,\Omega$, $R_c = 20\,\Omega$. Convert and find $R_T$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Sum: $R_a+R_b+R_c = 35\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$R_1 = \frac{10 \times 20}{35} = \frac{200}{35} = 5.71\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$R_2 = \frac{5 \times 20}{35} = \frac{100}{35} = 2.86\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$R_3 = \frac{5 \times 10}{35} = \frac{50}{35} = 1.43\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>Redraw circuit with Y network, identify new series/parallel combinations, and simplify normally.</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 5 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Wheatstone balance</div>$R_x = R_2 R_3 / R_1$ when $i_g=0$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Δ→Y</div>$R_Y = $ (product of adjacent Δ) / (sum of all Δ)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Y→Δ</div>$R_\Delta = \sum(R_Y \text{ products}) / R_Y^{\text{opposite}}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Balanced</div>$R_Y = R_\Delta/3$ (all equal)</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 6 ══════════════════════════ -->
<section id=&quot;t6&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t2&quot;>Topic 6</span>
    <h2>Node-Voltage Method</h2>
  </div>

  <h3>The Systematic Approach</h3>
  <p>Node-voltage is one of the two <em>systematic</em> circuit analysis methods. It treats node voltages as unknowns and applies KCL at each essential node.</p>

  <div class=&quot;callout info&quot;>
    <strong>📋 Node-Voltage Procedure (5 Steps)</strong>
    <ol style=&quot;padding-left:20px;line-height:2&quot;>
      <li>Identify all <strong>essential nodes</strong>. Count them as $n_e$.</li>
      <li>Select a <strong>reference node</strong> (ground, $v=0$). Label the remaining $n_e-1$ nodes as $v_1, v_2, \ldots$</li>
      <li>Write a <strong>KCL equation at each non-reference node</strong>: $\sum_{out} \frac{v_n - v_{neighbor}}{R} = \sum I_{in\,from\,sources}$</li>
      <li>Handle special cases: <strong>supernodes</strong> when a voltage source connects two non-reference nodes.</li>
      <li>Solve the system of equations.</li>
    </ol>
  </div>

  <h3>KCL at a Node — Standard Form</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>KCL at node $v_1$ (all currents leaving = 0)</div>
    $$\frac{v_1 - v_2}{R_a} + \frac{v_1 - 0}{R_b} + \frac{v_1 - v_3}{R_c} - I_s = 0$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>Note: current source $I_s$ entering node contributes $-I_s$ to the &quot;currents leaving&quot; sum.</p>
  </div>

  <h3>Supernodes</h3>
  <div class=&quot;callout warn&quot;>
    <strong>⚠ Supernode — When to Use It</strong>
    When an <em>independent or dependent</em> voltage source connects two non-reference nodes, you cannot directly write KCL at either node (unknown current through the voltage source). Instead: (1) enclose both nodes in a &quot;supernode&quot;, (2) write KCL for the supernode (external currents only), and (3) write the <em>constraint equation</em> from the voltage source: $v_a - v_b = V_s$.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 6.1: Basic node-voltage, no dependent sources <span class=&quot;diff&quot;>Easy</span></div>
    <div class=&quot;example-body&quot;>
      <p>Circuit has nodes $a, b$ and reference. $V_s = 20\,\text{V}$ between ref and $a$, $10\,\Omega$ between $a$ and $b$, $5\,\Omega$ from $b$ to ref, $2\,\text{A}$ source from ref to $b$. Find $v_a, v_b$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Node $a$: $v_a = 20\,\text{V}$ (directly constrained by voltage source).</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Node $b$: KCL. Currents leaving: $\frac{v_b - v_a}{10} + \frac{v_b}{5}$. Current entering from source: $+2$.<br>$\frac{v_b-20}{10}+\frac{v_b}{5} - 2 = 0$... wait, source enters so $= +2$... Actually: $\frac{v_b-20}{10}+\frac{v_b}{5} = 2$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Multiply by 10: $(v_b-20) + 2v_b = 20$ → $3v_b = 40$ → $v_b = 40/3 \approx 13.33\,\text{V}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 6.2: Supernode <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Circuit: nodes $v_1$, $v_2$, ref. 7 V source between $v_1$ and $v_2$ (+ at $v_1$), $2\,\Omega$ from $v_1$ to ref, $4\,\Omega$ from $v_2$ to ref, $3\,\text{A}$ source from ref to $v_1$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Create supernode enclosing $v_1$ and $v_2$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Constraint: $v_1 - v_2 = 7$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>KCL at supernode (currents leaving): $\frac{v_1}{2}+\frac{v_2}{4} = 3$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>Substitute $v_1 = v_2 + 7$: $\frac{v_2+7}{2}+\frac{v_2}{4} = 3$ → multiply by 4: $2(v_2+7)+v_2 = 12$ → $3v_2 = -2$ → $v_2 = -2/3\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>$v_1 = -2/3 + 7 = 19/3\,\text{V}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 6.3: Dependent source <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Node $v_1$ connected to ref through $10\,\Omega$, to node $v_2$ through $5\,\Omega$. Dependent current source $0.1v_1$ from ref to $v_2$. $v_2$ to ref through $20\,\Omega$. External $4\,\text{A}$ enters $v_1$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>KCL at $v_1$: $\frac{v_1}{10}+\frac{v_1-v_2}{5} = 4$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>KCL at $v_2$: $\frac{v_2-v_1}{5}+\frac{v_2}{20} = 0.1v_1$ (dependent source puts $0.1v_1$ entering $v_2$)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Eq1×10: $v_1 + 2(v_1-v_2) = 40$ → $3v_1 - 2v_2 = 40$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>Eq2×20: $4(v_2-v_1) + v_2 = 2v_1$ → $5v_2 = 6v_1$ → $v_2 = 1.2v_1$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>Substitute: $3v_1 - 2(1.2v_1) = 40$ → $0.6v_1 = 40$ → $v_1 = 66.7\,\text{V}$; $v_2 = 80\,\text{V}$</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 6.1</h4>
    <p>Use node-voltage method: $10\,\text{V}$ source from ref to $v_1$; $5\,\Omega$ between $v_1$ and $v_2$; $4\,\Omega$ from $v_2$ to ref; $2\,\text{A}$ current source from $v_2$ to ref. Find the power supplied by the 2 A source.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      $v_1 = 10\,\text{V}$ (constrained by source).<br>
      KCL at $v_2$: $\frac{v_2-10}{5}+\frac{v_2}{4} = -2$ (current source leaves, so $-2$ on left or $+2$ on right).<br>
      Let me write currents leaving $v_2$ = current sources entering: $\frac{v_2-10}{5}+\frac{v_2}{4} = -2$<br>
      Actually: $\frac{v_2-10}{5}+\frac{v_2}{4}+2 = 0$<br>
      Multiply by 20: $4(v_2-10)+5v_2+40 = 0$ → $9v_2 = 0$ → $v_2 = 0$.<br>
      Power from 2 A source: $p = v_2 \cdot i = 0 \times 2 = 0\,\text{W}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 6 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Unknowns</div>$n_e - 1$ node voltages</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>KCL form</div>$\sum$(currents leaving node) = 0; or $\sum$ leaving = $\sum$ entering</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Supernode</div>V-source between 2 nodes → KCL around both + constraint eq.</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Dep. source</div>Write constraint eq. for controlling variable in terms of node voltages</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Preferred when</div>Many current sources; asking for voltages</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Tip</div>Ground (ref) node = most connections, reduces equations</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 7 ══════════════════════════ -->
<section id=&quot;t7&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t3&quot;>Topic 7</span>
    <h2>Mesh-Current Method</h2>
  </div>

  <h3>The Systematic Approach</h3>
  <p>Mesh-current assigns a circulating current to each mesh (window) of the circuit, then applies KVL to each mesh. It is dual to node-voltage.</p>

  <div class=&quot;callout info&quot;>
    <strong>📋 Mesh-Current Procedure (5 Steps)</strong>
    <ol style=&quot;padding-left:20px;line-height:2&quot;>
      <li>Identify all <strong>meshes</strong>. Count them as $m$.</li>
      <li>Assign a <strong>mesh current</strong> to each mesh (convention: clockwise is positive).</li>
      <li>Write a <strong>KVL equation for each mesh</strong>. For shared resistors, include both mesh currents.</li>
      <li>Handle special cases: <strong>supermeshes</strong> when a current source is shared between two meshes.</li>
      <li>Solve the system of equations.</li>
    </ol>
  </div>

  <h3>KVL for a Mesh — Standard Form</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>KVL for Mesh 1 (clockwise traversal)</div>
    $$-V_s + R_a(i_1) + R_b(i_1 - i_2) + R_c(i_1 - i_3) = 0$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>Shared resistor: the voltage across it = $R \times (\text{mesh}_1 - \text{adjacent mesh})$. No need to assign separate polarities for resistors.</p>
  </div>

  <h3>Supermeshes</h3>
  <div class=&quot;callout warn&quot;>
    <strong>⚠ Supermesh — When to Use It</strong>
    When a current source is shared between two meshes, you cannot apply KVL directly (the voltage across an ideal current source is unknown). Solution: (1) merge the two meshes into a supermesh, (2) write KVL for the supermesh (omit the branch with the current source), and (3) write the <em>constraint equation</em>: $i_a - i_b = I_s$ (or $i_b - i_a = I_s$ depending on direction).
  </div>

  <h3>Worked Examples</h3>
  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 7.1: Two-mesh circuit <span class=&quot;diff&quot;>Easy</span></div>
    <div class=&quot;example-body&quot;>
      <p>Mesh 1 (left): 10 V source, $2\,\Omega$, $4\,\Omega$ (shared with mesh 2). Mesh 2 (right): $4\,\Omega$ (shared), $6\,\Omega$, $3\,\text{A}$ source (upward, in mesh 2 only). Find $i_1, i_2$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Current source in mesh 2 only: $i_2 = 3\,\text{A}$ (current source defines mesh current directly).</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>KVL mesh 1 (CW): $-10 + 2i_1 + 4(i_1-i_2) = 0$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$-10 + 2i_1 + 4i_1 - 12 = 0$ → $6i_1 = 22$ → $i_1 = 11/3\,\text{A}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 7.2: Supermesh <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Three meshes. $5\,\text{A}$ source shared between mesh 1 and mesh 2 (current flows from mesh 2 to mesh 1 through the source branch). $R_1=2\,\Omega$, $R_2=4\,\Omega$, $R_3=6\,\Omega$, $V_s=20\,\text{V}$ in mesh 3.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Constraint: $i_1 - i_2 = 5\,\text{A}$ (mesh 1 minus mesh 2 = source value, since source points from 2 to 1).</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>KVL for supermesh (meshes 1+2 combined, skip current source branch): write sum of all other voltage drops.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Use constraint to eliminate one variable; solve system.</div></div>
      </div>
    </div>
  </div>

  <h3>Node-Voltage vs. Mesh-Current — Choosing the Right Method</h3>
  <table>
    <tr><th>Use Node-Voltage when...</th><th>Use Mesh-Current when...</th></tr>
    <tr><td>Many current sources (each defines a node voltage directly)</td><td>Many voltage sources (each defines a mesh current directly)</td></tr>
    <tr><td>Asking for a voltage as the final answer</td><td>Asking for a current as the final answer</td></tr>
    <tr><td>Fewer essential nodes than meshes</td><td>Fewer meshes than essential nodes</td></tr>
    <tr><td>Supernodes appear (voltage sources between non-reference nodes)</td><td>Supermeshes appear (current sources between two meshes)</td></tr>
  </table>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 7.1</h4>
    <p>Use mesh analysis: $v_s = 30\,\text{V}$, $R_1=5\,\Omega$ (mesh 1 only), $R_2=10\,\Omega$ (shared), $R_3=8\,\Omega$ (mesh 2 only). Find $i_1$ and $i_2$.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      Mesh 1: $-30 + 5i_1 + 10(i_1-i_2) = 0$ → $15i_1 - 10i_2 = 30$ ...(1)<br>
      Mesh 2: $10(i_2-i_1) + 8i_2 = 0$ → $-10i_1 + 18i_2 = 0$ ...(2)<br>
      From (2): $i_1 = 1.8i_2$. Sub into (1): $15(1.8i_2) - 10i_2 = 30$ → $27i_2 - 10i_2 = 30$ → $i_2 = 30/17 \approx 1.76\,\text{A}$.<br>
      $i_1 = 1.8 \times 30/17 = 54/17 \approx 3.18\,\text{A}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 7 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Unknowns</div>$m$ mesh currents</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>KVL form</div>Shared R: $R(i_{mesh} - i_{adj})$; own R: $R \cdot i_{mesh}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Supermesh</div>I-source shared between meshes → KVL around both + constraint $i_a - i_b = I_s$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>I-source (unshared)</div>Directly sets mesh current $i = I_s$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Dep. source</div>Write constraint in terms of mesh currents, add as extra equation</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Preferred when</div>Planar circuits with many voltage sources</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 8 ══════════════════════════ -->
<section id=&quot;t8&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t4&quot;>Topic 8</span>
    <h2>Thévenin &amp;amp; Norton Equivalent Circuits</h2>
  </div>

  <h3>The Core Idea</h3>
  <p>Any linear circuit seen from two terminals $a$–$b$ can be replaced with a simple equivalent. This is enormously useful for analyzing load behavior and maximum power transfer.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Thévenin Equivalent</div>
    $$V_{Th} = v_{oc} \quad \text{(open-circuit voltage at }a\text{–}b\text{)}$$
    $$R_{Th} = \frac{v_{oc}}{i_{sc}} = \frac{V_{Th}}{I_N}$$
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Norton Equivalent</div>
    $$I_N = i_{sc} \quad \text{(short-circuit current through }a\text{–}b\text{)}$$
    $$R_N = R_{Th}$$
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Source Transformation (Thévenin ↔ Norton)</div>
    $$V_{Th} = I_N \cdot R_{Th} \qquad I_N = \frac{V_{Th}}{R_{Th}}$$
  </div>

  <h3>Three Techniques for Finding $R_{Th}$</h3>
  <table>
    <tr><th>Technique</th><th>When to Use</th><th>Steps</th></tr>
    <tr><td><strong>Technique 1:</strong> $v_{oc}$/$i_{sc}$</td><td>Any circuit (independent + dependent sources)</td><td>1) Find $v_{oc}$. 2) Short terminals, find $i_{sc}$. 3) $R_{Th} = v_{oc}/i_{sc}$.</td></tr>
    <tr><td><strong>Technique 2:</strong> Deactivate sources</td><td>Independent sources ONLY (no dependent)</td><td>1) Find $v_{oc}$. 2) Zero all independent sources (V→short, I→open). 3) $R_{Th} = R_{ab}$.</td></tr>
    <tr><td><strong>Technique 3:</strong> Test source</td><td>Networks with dependent sources (especially when $v_{oc} = 0$)</td><td>1) Zero all independent sources. 2) Apply test $v_t$ (or $i_t$) at terminals. 3) $R_{Th} = v_t/i_t$.</td></tr>
  </table>

  <div class=&quot;callout danger&quot;>
    <strong>⚠ The Most Common Thévenin Mistake</strong>
    Using Technique 2 (deactivate sources) when there are <em>dependent</em> sources present. Technique 2 <strong>only works with independent sources</strong>. If dependent sources exist, use Technique 1 or 3.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 8.1: Thévenin — independent sources only (Technique 2) <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Circuit: 25 V source in series with $5\,\Omega$, connected to a node. From that node: $20\,\Omega$ to terminal $a$; $2\,\text{A}$ source from terminal $b$ (ref) to node. Find $V_{Th}$ and $R_{Th}$ at $a$–$b$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;><strong>Find $V_{Th}$ (open circuit):</strong> With terminals open, use node-voltage or KVL to find $v_{ab}$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Label node between $5\,\Omega$ and $20\,\Omega$ as $v_1$. KCL: $\frac{v_1-25}{5}+\frac{v_1-0}{20}+2=0$ (2A source sends current away from node... depends on direction).</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$\frac{v_1-25}{5}+\frac{v_1}{20} = -2$ → multiply by 20: $4(v_1-25)+v_1 = -40$ → $5v_1=60$ → $v_1=12\,\text{V}$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$V_{Th} = v_{ab} = v_1 = 12\,\text{V}$ (voltage at node $a$ relative to $b=0$)... actually $V_{Th} = v_1 - 0 = v_1$ only if no element between $v_1$ and $a$. With $20\,\Omega$ in series and open terminals: $i_{20\Omega} = 0$, so $V_{Th} = v_1 = 12\,\text{V}$. Wait: need to check if $a$ is at the other end of $20\,\Omega$. If so, with no load: no current through $20\,\Omega$, so $v_a = v_1 = 12\,\text{V}$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;><strong>Find $R_{Th}$:</strong> Deactivate sources (25V → short, 2A → open). $R_{Th} = 20 \| 5 = \frac{20\times5}{25} = 4\,\Omega$.</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 8.2: Thévenin with dependent source (Technique 1) <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Circuit has a VCCS $\alpha v_x$ and independent sources. After finding $V_{Th} = v_{oc}$, short the terminals and find $i_{sc}$, then $R_{Th} = V_{Th}/I_N$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Open terminals → analyze normally to find $v_{oc}$ using node/mesh analysis. Track the controlling variable $v_x$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Short terminals → different circuit topology. Re-analyze. Find $i_{sc}$ (current flowing from $a$ to $b$ through the short).</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$R_{Th} = v_{oc}/i_{sc}$. Note: $R_{Th}$ can be <em>negative</em> if the circuit has dependent sources! This is physically valid.</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 8.1</h4>
    <p>Find the Thévenin equivalent at terminals $a$–$b$: 30 V source in series with $6\,\Omega$, then a node. From node: $3\,\Omega$ to terminal $a$; $12\,\Omega$ from node to ref; terminal $b$ = ref.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      <strong>$V_{Th}$:</strong> Open circuit means no current through $3\,\Omega$. So node voltage: $v_n = 30 \times \frac{12}{6+12} = 20\,\text{V}$. $V_{Th} = v_n = 20\,\text{V}$ (no drop across $3\,\Omega$ with open terminals).<br><br>
      <strong>$R_{Th}$:</strong> Deactivate 30V source (short). $R_{Th} = 3 + (6\|12) = 3 + 4 = 7\,\Omega$.
    </div>
  </div>

  <div class=&quot;practice&quot;>
    <h4>Practice 8.2</h4>
    <p>Convert the Norton equivalent ($I_N = 5\,\text{A}$, $R_N = 4\,\Omega$) to Thévenin form, then find the power delivered to a $6\,\Omega$ load.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      $V_{Th} = I_N \times R_N = 5 \times 4 = 20\,\text{V}$, $R_{Th} = 4\,\Omega$.<br>
      With $R_L = 6\,\Omega$: $i = 20/(4+6) = 2\,\text{A}$.<br>
      $p_L = i^2 R_L = 4 \times 6 = 24\,\text{W}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 8 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$V_{Th}$</div>Open-circuit voltage at $a$–$b$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$I_N$</div>Short-circuit current from $a$ to $b$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$R_{Th}$</div>$v_{oc}/i_{sc}$ = $R_{ab}$ (no dep. sources)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Source xform</div>$V_{Th}=I_N R_{Th}$; same $R$ in both</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Tech 2 warning</div>ONLY for independent sources!</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Dep. source</div>Must use Tech 1 or test source (Tech 3)</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 9 ══════════════════════════ -->
<section id=&quot;t9&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num&quot;>Topic 9</span>
    <h2>Maximum Power Transfer &amp;amp; Superposition</h2>
  </div>

  <h3>Maximum Power Transfer</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Maximum Power Transfer Theorem</div>
    $$R_L = R_{Th} \quad \Rightarrow \quad P_{max} = \frac{V_{Th}^2}{4R_{Th}}$$
  </div>
  <p>Maximum power is delivered to a load when $R_L = R_{Th}$. At this point, exactly half the total power from the source is delivered to the load (50% efficiency).</p>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ Max Power vs. Max Efficiency</strong>
    $R_L = R_{Th}$ maximizes power to the load, but the efficiency is only 50% (equal power is wasted in $R_{Th}$). In power systems, max efficiency (not max power) is usually the goal. In communications/RF, max power transfer is often prioritized.
  </div>

  <h3>Superposition Principle</h3>
  <div class=&quot;callout info&quot;>
    <strong>📋 Superposition Procedure</strong>
    <ol style=&quot;padding-left:20px;line-height:2&quot;>
      <li>For each independent source, analyze the circuit with <em>only that source active</em>. Zero all others (V→short, I→open).</li>
      <li>Find the partial response (voltage or current of interest).</li>
      <li>Repeat for every independent source.</li>
      <li>Sum all partial responses: $x_{total} = x_1 + x_2 + \cdots$</li>
    </ol>
    <strong>Dependent sources are NEVER deactivated.</strong>
  </div>

  <div class=&quot;callout danger&quot;>
    <strong>⚠ Superposition Does NOT Apply to Power</strong>
    $p \neq p_1 + p_2$ because power is quadratic ($p = i^2 R$ or $v^2/R$). You must find the total current/voltage first, then compute power. Never add partial powers.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 9.1: Superposition with two sources <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Find $v_o$ using superposition. Circuit: 12V source, 3A source, $R_1=4\,\Omega$, $R_2=6\,\Omega$, $R_3=2\,\Omega$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;><strong>Source 1 (12V only, 3A → open):</strong> Analyze circuit. Find $v_o^{(1)}$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;><strong>Source 2 (3A only, 12V → short):</strong> Analyze circuit. Find $v_o^{(2)}$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$v_o = v_o^{(1)} + v_o^{(2)}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 9.2: Max power transfer — find $R_L$ and $P_{max}$ <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>A circuit reduces to $V_{Th} = 16\,\text{V}$, $R_{Th} = 4\,\Omega$. A variable resistor $R_L$ is the load. Find max power to load.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$R_L = R_{Th} = 4\,\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$P_{max} = \frac{V_{Th}^2}{4R_{Th}} = \frac{16^2}{4 \times 4} = \frac{256}{16} = 16\,\text{W}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 9 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Max power cond.</div>$R_L = R_{Th}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$P_{max}$</div>$V_{Th}^2 / (4R_{Th})$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Superposition</div>One source at a time; sum partial responses</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Deactivate</div>V-source → short; I-source → open</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Never deactivate</div>Dependent sources!</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Power</div>Find total $i$ or $v$ first, THEN compute $p$</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 10 ══════════════════════════ -->
<section id=&quot;t10&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t2&quot;>Topic 10</span>
    <h2>Op-Amp Applications</h2>
  </div>

  <h3>Ideal Op-Amp Assumptions</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Ideal Op-Amp Golden Rules</div>
    $$v_p = v_n \quad \text{(virtual short: inputs at same voltage)}$$
    $$i_p = i_n = 0 \quad \text{(no current into input terminals)}$$
  </div>
  <p>These two rules let you analyze any op-amp circuit using KCL/KVL. Apply KCL at the inverting node ($v_n$) is almost always the key step.</p>

  <h3>Non-Inverting Amplifier</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Non-Inverting Amplifier</div>
    $$\frac{v_o}{v_i} = 1 + \frac{R_f}{R_1}$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>Gain $\geq 1$ always. When $R_f = 0$ (short) or $R_1 = \infty$ (open): unity gain buffer, $v_o = v_i$.</p>
  </div>

  <h3>Inverting Amplifier</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Inverting Amplifier</div>
    $$\frac{v_o}{v_i} = -\frac{R_f}{R_1}$$
  </div>

  <h3>Summing Amplifier</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Summing (Inverting) Amplifier</div>
    $$v_o = -R_f\left(\frac{v_a}{R_a} + \frac{v_b}{R_b} + \frac{v_c}{R_c}\right)$$
  </div>

  <h3>Difference Amplifier</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Difference Amplifier (all equal R)</div>
    $$v_o = \frac{R_f}{R_1}(v_b - v_a) \quad \text{(amplifies the difference)}$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>For equal gain: $R_1 = R_3$ and $R_f = R_2$ (matching condition).</p>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 10.1: Non-inverting amp with given gain <span class=&quot;diff&quot;>Easy</span></div>
    <div class=&quot;example-body&quot;>
      <p>Design a non-inverting amplifier with gain = 6 using $R_1 = 10\,\text{k}\Omega$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$G = 1 + R_f/R_1 = 6$ → $R_f/R_1 = 5$ → $R_f = 5 \times 10 = 50\,\text{k}\Omega$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 10.2: Summing amplifier <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Summing amp: $R_a = R_b = 10\,\text{k}\Omega$, $R_f = 20\,\text{k}\Omega$, $v_a = 0.1\,\text{V}$, $v_b = 0.25\,\text{V}$. Find $v_o$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$v_o = -R_f\left(\frac{v_a}{R_a}+\frac{v_b}{R_b}\right) = -20\left(\frac{0.1}{10}+\frac{0.25}{10}\right)$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$v_o = -20(0.01 + 0.025) = -20(0.035) = -0.7\,\text{V}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 10 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Golden rules</div>$v_p = v_n$; $i_p = i_n = 0$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Non-inverting</div>$G = 1+R_f/R_1 \geq 1$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Inverting</div>$G = -R_f/R_1$ (negative = phase inversion)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Unity buffer</div>$v_o = v_i$ ($R_f=0$ or $R_1=\infty$)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Summing amp</div>$v_o = -R_f\sum(v_k/R_k)$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Diff amp</div>$v_o = (R_f/R_1)(v_+ - v_-)$</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 11 ══════════════════════════ -->
<section id=&quot;t11&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t3&quot;>Topic 11</span>
    <h2>Inductors &amp;amp; Capacitors</h2>
  </div>

  <h3>The Two Memory Elements</h3>
  <p>Unlike resistors, inductors and capacitors <em>store energy</em>. This gives circuits memory — the response depends on past history. Their defining property: they oppose instantaneous changes.</p>

  <table>
    <tr><th>Property</th><th>Inductor (L)</th><th>Capacitor (C)</th></tr>
    <tr><td>Units</td><td>Henry [H]</td><td>Farad [F]</td></tr>
    <tr><td>Stores</td><td>Magnetic energy; via current</td><td>Electric energy; via voltage</td></tr>
    <tr><td>v-i relation</td><td>$v = L\frac{di}{dt}$</td><td>$i = C\frac{dv}{dt}$</td></tr>
    <tr><td>i from v</td><td>$i(t) = \frac{1}{L}\int_{-\infty}^t v\,d\tau + i(t_0)$</td><td>$v(t) = \frac{1}{C}\int_{-\infty}^t i\,d\tau + v(t_0)$</td></tr>
    <tr><td>DC steady state</td><td>Short circuit ($v=0$, constant $i$)</td><td>Open circuit ($i=0$, constant $v$)</td></tr>
    <tr><td>Cannot jump</td><td>Current $i_L(0^-) = i_L(0^+)$</td><td>Voltage $v_C(0^-) = v_C(0^+)$</td></tr>
    <tr><td>Energy stored</td><td>$w = \frac{1}{2}Li^2$</td><td>$w = \frac{1}{2}Cv^2$</td></tr>
    <tr><td>Series combo</td><td>$L_{eq} = L_1+L_2+\ldots$ (like R series)</td><td>$\frac{1}{C_{eq}} = \frac{1}{C_1}+\frac{1}{C_2}+\ldots$ (like R parallel)</td></tr>
    <tr><td>Parallel combo</td><td>$\frac{1}{L_{eq}} = \frac{1}{L_1}+\frac{1}{L_2}+\ldots$ (like R parallel)</td><td>$C_{eq} = C_1+C_2+\ldots$ (like R series)</td></tr>
  </table>

  <div class=&quot;callout danger&quot;>
    <strong>⚠ THE Most Important Rule for All Transient Problems</strong>
    $i_L$ and $v_C$ cannot change instantaneously. This continuity condition is your bridge between $t &amp;lt; 0$ and $t \geq 0$: $i_L(0^-) = i_L(0^+)$ and $v_C(0^-) = v_C(0^+)$.
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Power &amp; Energy</div>
    $$p_L = Li\frac{di}{dt} = \frac{d}{dt}\left(\frac{1}{2}Li^2\right) \qquad p_C = Cv\frac{dv}{dt} = \frac{d}{dt}\left(\frac{1}{2}Cv^2\right)$$
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 11.1: Find inductor voltage and energy <span class=&quot;diff&quot;>Easy</span></div>
    <div class=&quot;example-body&quot;>
      <p>$L = 100\,\text{mH}$. Current $i(t) = 4e^{-5t}\,\text{A}$ for $t \geq 0$. Find $v(t)$, $p(t)$, $w(t)$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$v = L\frac{di}{dt} = 0.1 \times 4(-5)e^{-5t} = -2e^{-5t}\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$p = vi = (-2e^{-5t})(4e^{-5t}) = -8e^{-10t}\,\text{W}$ (negative → inductor releasing energy)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$w = \frac{1}{2}Li^2 = \frac{1}{2}(0.1)(4e^{-5t})^2 = 0.8e^{-10t}\,\text{J}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 11 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Inductor v-i</div>$v = L\,di/dt$; DC → short</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Capacitor v-i</div>$i = C\,dv/dt$; DC → open</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Energy L</div>$w = \frac{1}{2}Li^2$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Energy C</div>$w = \frac{1}{2}Cv^2$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Continuity</div>$i_L(0^-)=i_L(0^+)$; $v_C(0^-)=v_C(0^+)$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Series C</div>$1/C_{eq}=\sum 1/C_k$ (like parallel R)</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 12 ══════════════════════════ -->
<section id=&quot;t12&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t4&quot;>Topic 12</span>
    <h2>Magnetically Coupled Circuits &amp;amp; Mutual Inductance</h2>
  </div>

  <h3>Mutual Inductance</h3>
  <p>When two coils are magnetically coupled, current in one induces a voltage in the other. This is the principle behind transformers, inductive charging, and electric motors.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Mutual Inductance Equations</div>
    $$v_1 = L_1\frac{di_1}{dt} \pm M\frac{di_2}{dt} \qquad v_2 = L_2\frac{di_2}{dt} \pm M\frac{di_1}{dt}$$
    $$\text{Coefficient of coupling: } k = \frac{M}{\sqrt{L_1 L_2}}, \quad 0 \leq k \leq 1$$
    $$\text{Energy: } w = \frac{1}{2}L_1 i_1^2 + \frac{1}{2}L_2 i_2^2 \pm M i_1 i_2$$
  </div>

  <h3>Dot Convention — 3 Rules</h3>
  <div class=&quot;callout info&quot;>
    <strong>📋 Dot Convention (for determining ± sign)</strong>
    <ol style=&quot;padding-left:20px;line-height:2.2&quot;>
      <li>When the <strong>reference current enters the dotted terminal</strong> of one coil, the mutually induced voltage in the other coil is <strong>positive at its dotted terminal</strong>.</li>
      <li>When the <strong>reference current enters the undotted terminal</strong> of one coil, the mutually induced voltage in the other coil is <strong>negative at its dotted terminal</strong>.</li>
      <li>In mesh equations: if mesh current enters dot of coil, mutual term in the KVL of the other mesh is <strong>positive</strong> (adds to self-induced). Otherwise negative.</li>
    </ol>
  </div>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ The Dot Convention Is Where Students Lose the Most Points</strong>
    Draw the circuit, identify both dots, trace the mesh current direction relative to each dot. Slow down and be methodical. The sign error propagates everywhere.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 12.1: Write mesh equations for coupled inductors <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Two coupled coils: $L_1$, $L_2$, $M$. Mesh 1 current $i_1$ enters the dot of coil 1. Mesh 2 current $i_2$ enters the undotted terminal of coil 2. $R_1$ and $R_2$ are in respective meshes.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>Self-induced voltages: $L_1 di_1/dt$ in mesh 1, $L_2 di_2/dt$ in mesh 2. (These always have the same sign as the resistor terms.)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Mutual voltage in mesh 1 due to $i_2$: $i_2$ enters undotted terminal of coil 2 → induced voltage in coil 1 is negative at dot. Since mesh 1 traces coil 1 from dot (+), this means the mutual term <strong>opposes</strong>: $-M di_2/dt$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>Mutual voltage in mesh 2 due to $i_1$: $i_1$ enters dot of coil 1 → induced voltage in coil 2 is positive at dot. Mesh 2 enters undotted terminal, so polarity is inverted: $-M di_1/dt$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>Full equations:
          Mesh 1: $R_1 i_1 + L_1 \frac{di_1}{dt} - M\frac{di_2}{dt} = v_s$
          Mesh 2: $R_2 i_2 + L_2 \frac{di_2}{dt} - M\frac{di_1}{dt} = 0$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 12 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Mutual voltage</div>$v_{mutual} = \pm M\,di_{other}/dt$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Coupling coeff.</div>$k = M/\sqrt{L_1 L_2}$ ($0 \leq k \leq 1$)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Dot rule</div>Current in dot → $+$ at other coil's dot</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Energy</div>$w = \frac{1}{2}L_1i_1^2 \pm Mi_1i_2 + \frac{1}{2}L_2i_2^2$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Max coupling</div>$k=1$ → ideal transformer</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Analysis method</div>Always use mesh analysis for coupled inductors</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 13 ══════════════════════════ -->
<section id=&quot;t13&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num&quot;>Topic 13</span>
    <h2>First-Order Circuits — Transient Response (RC &amp;amp; RL)</h2>
  </div>

  <h3>Natural Response</h3>
  <p>The <strong>natural response</strong> is due solely to energy initially stored in the inductor/capacitor — no external sources for $t \geq 0$.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Natural Response</div>
    $$x(t) = X_0\, e^{-t/\tau}, \quad t \geq 0$$
    $$\text{RL: } \tau = \frac{L}{R_{eq}} \qquad \text{RC: } \tau = R_{eq}C$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>$x(t)$ = $i_L(t)$ for RL; $v_C(t)$ for RC. $X_0$ = initial value. $R_{eq}$ = Thévenin resistance seen by L or C.</p>
  </div>

  <h3>Step Response</h3>
  <p>The <strong>step response</strong> occurs when a DC source is suddenly switched into the circuit at $t=0$, while the element has zero initial stored energy.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Step Response (zero initial conditions)</div>
    $$x(t) = X_F(1 - e^{-t/\tau}), \quad t \geq 0$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>$X_F$ = final (steady-state) value: L → short circuit; C → open circuit at $t = \infty$.</p>
  </div>

  <h3>Time Constant $\tau$ — Key Interpretation</h3>
  <table>
    <tr><th>Time</th><th>$e^{-t/\tau}$ value</th><th>% of initial remaining</th></tr>
    <tr><td>$t = \tau$</td><td>$e^{-1} \approx 0.368$</td><td>36.8%</td></tr>
    <tr><td>$t = 2\tau$</td><td>$e^{-2} \approx 0.135$</td><td>13.5%</td></tr>
    <tr><td>$t = 5\tau$</td><td>$e^{-5} \approx 0.0067$</td><td>~0% (considered &quot;fully settled&quot;)</td></tr>
  </table>

  <div class=&quot;callout tip&quot;>
    <strong>💡 Rule of Thumb</strong>
    After 5 time constants ($5\tau$), the transient is essentially over and the circuit is in DC steady state. This is when you'd treat inductors as shorts and capacitors as opens.
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 13.1: Natural response of RL circuit <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Switch open at $t=0$ after being closed a long time. $I_s = 12\,\text{A}$, $R_1 = 3\,\Omega$, $R_2 = 6\,\Omega$, $L = 2\,\text{H}$. Find $i_L(t)$, $i_0(t)$, $v_0(t)$ for $t \geq 0^+$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;><strong>$t &amp;lt; 0$:</strong> Switch closed, DC steady state → L is short circuit. $i_L(0^-) = I_s \times \frac{R_2}{R_1+R_2} = 12 \times \frac{6}{9} = 8\,\text{A}$ (current divider)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;><strong>Initial condition:</strong> $i_L(0^+) = i_L(0^-) = 8\,\text{A}$ (cannot jump)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;><strong>$t \geq 0$:</strong> Switch open removes current source. $R_{eq}$ seen by L = $R_1 + R_2 = 9\,\Omega$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$\tau = L/R_{eq} = 2/9\,\text{s}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>$i_L(t) = 8e^{-9t/2}\,\text{A} = 8e^{-4.5t}\,\text{A}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>6</div><div class=&quot;step-content&quot;>$v_0(t) = R_2 \cdot i_L(t) = 6 \times 8e^{-4.5t} = 48e^{-4.5t}\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>7</div><div class=&quot;step-content&quot;>$i_0(t) = v_0/R_2 = i_L(t)$ (they're in series here) — check direction carefully.</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 13.2: Step response of RC circuit <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Switch in position $x$ a long time, moves to $y$ at $t=0$. Position $y$: 90V source, $180\,\text{k}\Omega$, $60\,\text{k}\Omega$, $C = 0.1\,\mu\text{F}$. Initial $v_C = 0$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$v_C(0^-) = 0$ (from problem statement). $v_C(0^+) = 0$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>Final value: DC → C is open. $v_C(\infty) = 90 \times \frac{60}{180+60} = 22.5\,\text{V}$ (voltage divider)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$R_{eq}$ seen by C (with sources active): Thévenin → deactivate source: $R_{eq} = 180\|60 = \frac{180\times60}{240} = 45\,\text{k}\Omega$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$\tau = R_{eq}C = 45{,}000 \times 0.1\times10^{-6} = 4.5\,\text{ms}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>$v_C(t) = 22.5(1-e^{-t/4.5\times10^{-3}})\,\text{V}$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 13 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Natural response</div>$x(t) = X_0 e^{-t/\tau}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Step response</div>$x(t) = X_F(1-e^{-t/\tau})$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>RL time const.</div>$\tau = L/R_{eq}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>RC time const.</div>$\tau = R_{eq}C$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Settled at</div>$5\tau$: effectively $x(\infty)$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Steady state</div>$t\to\infty$: L→short, C→open</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 14 ══════════════════════════ -->
<section id=&quot;t14&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t2&quot;>Topic 14</span>
    <h2>General Solution for First-Order Circuits</h2>
  </div>

  <h3>The Master Formula — Use This Always</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>General First-Order Response (covers both natural AND step response)</div>
    $$\boxed{x(t) = x_F + \bigl[x(t_0) - x_F\bigr]\,e^{-(t-t_0)/\tau}, \quad t \geq t_0}$$
    <p style=&quot;margin-top:10px;font-size:.9rem&quot;>
      $x_F = x(\infty)$ = final (steady-state) value at $t \to \infty$<br>
      $x(t_0)$ = initial value at the moment of switching<br>
      $\tau$ = time constant (from the circuit <em>after</em> switching)
    </p>
  </div>

  <div class=&quot;callout tip&quot;>
    <strong>💡 Why This Formula Is So Powerful</strong>
    Natural response: $x_F = 0$ → reduces to $x(t) = x(t_0)e^{-(t-t_0)/\tau}$. ✓<br>
    Step response from zero: $x(t_0) = 0$ → reduces to $x_F(1-e^{-(t-t_0)/\tau})$. ✓<br>
    Any other initial condition: use the full formula. It always works.
  </div>

  <div class=&quot;callout info&quot;>
    <strong>📋 Complete 5-Step Procedure for General Solution</strong>
    <ol style=&quot;padding-left:20px;line-height:2&quot;>
      <li><strong>Identify variable:</strong> $i_L$ for RL, $v_C$ for RC (the one that can't jump).</li>
      <li><strong>Find $x(t_0)$ = initial value:</strong> Analyze circuit <em>before</em> switching (DC: L→short, C→open). Use $x(t_0^-) = x(t_0^+)$.</li>
      <li><strong>Find $x_F$ = final value:</strong> Analyze circuit <em>after</em> switching at $t \to \infty$ (DC: L→short, C→open again).</li>
      <li><strong>Find $\tau$:</strong> Find $R_{eq}$ seen by L or C in the circuit <em>after</em> switching (deactivate independent sources). $\tau = L/R_{eq}$ or $\tau = R_{eq}C$.</li>
      <li><strong>Write $x(t)$:</strong> Plug into master formula. Then use simple circuit analysis to find any other requested quantities.</li>
    </ol>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 14.1: General solution — both initial energy AND sources <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Switch open a long time, closes at $t=0$. Before switching: $v_C = 40\,\text{V}$. After switching: $V_{Th} = 10\,\text{V}$, $R_{Th} = 5\,\text{k}\Omega$, $C = 200\,\mu\text{F}$. Find $v_C(t)$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$x(t_0) = v_C(0^+) = v_C(0^-) = 40\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$x_F = V_{Th} = 10\,\text{V}$ (DC steady state: C→open, so $v_C(\infty) = V_{Th}$)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$\tau = R_{Th}C = 5000 \times 200\times10^{-6} = 1\,\text{s}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$v_C(t) = 10 + (40-10)e^{-t} = 10 + 30e^{-t}\,\text{V}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>Check: $v_C(0) = 10+30 = 40\,\text{V}$ ✓; $v_C(\infty) = 10\,\text{V}$ ✓</div></div>
      </div>
    </div>
  </div>

  <h3>Practice Problems</h3>
  <div class=&quot;practice&quot;>
    <h4>Practice 14.1</h4>
    <p>Switch closes at $t=0$. Initial $i_L(0) = 2\,\text{A}$. After switching: 20V source, $R_{eq}=4\,\Omega$ (seen by L), $L=8\,\text{H}$. Find $i_L(t)$ and $i_L(t=2\,\text{s})$.</p>
    <button class=&quot;solution-toggle&quot; onclick=&quot;this.nextElementSibling.classList.toggle('open')&quot;>Show Solution</button>
    <div class=&quot;solution&quot;>
      $x(t_0) = 2\,\text{A}$.<br>
      $x_F = 20/4 = 5\,\text{A}$ (L→short at DC, full source voltage across $R_{eq}$).<br>
      $\tau = L/R_{eq} = 8/4 = 2\,\text{s}$.<br>
      $i_L(t) = 5 + (2-5)e^{-t/2} = 5 - 3e^{-t/2}\,\text{A}$.<br>
      At $t=2$: $i_L(2) = 5 - 3e^{-1} = 5 - 3(0.368) = 5 - 1.104 = 3.9\,\text{A}$.
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 14 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Master formula</div>$x(t) = x_F + [x_0-x_F]e^{-(t-t_0)/\tau}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$x_0$</div>Initial value (from pre-switch DC analysis)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$x_F$</div>Final value (post-switch DC: L→short, C→open)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$\tau$</div>$R_{Th}$ seen by L or C in post-switch circuit</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Verify</div>Plug $t=0$: get $x_0$ ✓; $t\to\infty$: get $x_F$ ✓</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Other vars</div>Find $i_L$ or $v_C$ first, then use Ohm/KVL for the rest</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 15 ══════════════════════════ -->
<section id=&quot;t15&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t3&quot;>Topic 15</span>
    <h2>RLC / Second-Order Circuits</h2>
  </div>

  <h3>Why Second Order?</h3>
  <p>When both L and C are present, the circuit response is governed by a second-order ODE, and the behavior depends on the damping — it can oscillate!</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Standard Second-Order ODE (series RLC)</div>
    $$\frac{d^2x}{dt^2} + 2\alpha\frac{dx}{dt} + \omega_0^2\, x = \omega_0^2\, x_F$$
    $$\alpha = \frac{R}{2L} \quad (\text{series RLC}) \qquad \omega_0 = \frac{1}{\sqrt{LC}} \quad (\text{resonant frequency})$$
    $$\alpha = \frac{1}{2RC} \quad (\text{parallel RLC})$$
  </div>

  <h3>Three Cases of Damping</h3>
  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Characteristic roots</div>
    $$s_{1,2} = -\alpha \pm \sqrt{\alpha^2 - \omega_0^2}$$
  </div>

  <table>
    <tr><th>Condition</th><th>Type</th><th>Response form</th><th>Behavior</th></tr>
    <tr><td>$\alpha > \omega_0$</td><td><strong>Overdamped</strong></td><td>$x(t) = A_1 e^{s_1 t} + A_2 e^{s_2 t}$</td><td>Decays exponentially, no oscillation</td></tr>
    <tr><td>$\alpha = \omega_0$</td><td><strong>Critically damped</strong></td><td>$x(t) = (A_1 + A_2 t)e^{-\alpha t}$</td><td>Fastest decay without oscillation</td></tr>
    <tr><td>$\alpha &amp;lt; \omega_0$</td><td><strong>Underdamped</strong></td><td>$x(t) = e^{-\alpha t}(B_1\cos\omega_d t + B_2\sin\omega_d t)$</td><td>Oscillates with decaying amplitude</td></tr>
  </table>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Damped natural frequency (underdamped case)</div>
    $$\omega_d = \sqrt{\omega_0^2 - \alpha^2}$$
  </div>

  <div class=&quot;callout info&quot;>
    <strong>📋 Solving for Constants A₁, A₂ (or B₁, B₂)</strong>
    Always need two initial conditions:
    <ol style=&quot;padding-left:20px;line-height:1.8&quot;>
      <li>$x(0^+)$ — from continuity of $i_L$ and $v_C$</li>
      <li>$\frac{dx}{dt}\big|_{0^+}$ — found from circuit equations at $t=0^+$ (substitute $i_L(0^+)$ and $v_C(0^+)$ into element equations)</li>
    </ol>
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 15.1: Series RLC — overdamped natural response <span class=&quot;diff hard&quot;>Hard</span></div>
    <div class=&quot;example-body&quot;>
      <p>Series RLC: $R = 10\,\Omega$, $L = 1\,\text{H}$, $C = 1/40\,\text{F}$. No source, initial $i(0) = 2\,\text{A}$, $v_C(0) = 0$. Find $i(t)$.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$\alpha = R/2L = 10/2 = 5\,\text{rad/s}$; $\omega_0 = 1/\sqrt{LC} = 1/\sqrt{1/40} = \sqrt{40} \approx 6.32\,\text{rad/s}$... wait: $\omega_0 = \sqrt{40} \approx 6.32 > \alpha = 5$? Let me recalculate: $\sqrt{40} = 2\sqrt{10} \approx 6.32$. So $\alpha &amp;lt; \omega_0$? Underdamped. Let's use $L=1$, $C=1/4$: $\omega_0 = 1/\sqrt{1/4} = 2 &amp;lt; \alpha=5$. Overdamped.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$s_{1,2} = -5 \pm \sqrt{25-4} = -5 \pm \sqrt{21}$: $s_1 = -5+4.58 = -0.42$; $s_2 = -5-4.58 = -9.58$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$i(t) = A_1 e^{-0.42t} + A_2 e^{-9.58t}$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>IC1: $i(0) = A_1+A_2 = 2$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>IC2: $\frac{di}{dt}\big|_0 = v_L(0)/L$. KVL at $t=0^+$: $v_L = -R\cdot i - v_C = -10(2)-0 = -20\,\text{V}$. So $di/dt|_0 = -20/1 = -20$.</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>6</div><div class=&quot;step-content&quot;>$-0.42A_1 - 9.58A_2 = -20$. With $A_1+A_2=2$: solve system → $A_1 = 1.92$, $A_2 = 0.076$.</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 15 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Series $\alpha$</div>$R/2L$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Parallel $\alpha$</div>$1/2RC$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>$\omega_0$</div>$1/\sqrt{LC}$ (both series &amp; parallel)</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Overdamped</div>$\alpha > \omega_0$: two real exponentials</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Critically</div>$\alpha = \omega_0$: $(A_1+A_2t)e^{-\alpha t}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Underdamped</div>$\alpha &amp;lt; \omega_0$: oscillating, $\omega_d=\sqrt{\omega_0^2-\alpha^2}$</div>
    </div>
  </div>
</section>

<!-- ══════════════════════════ TOPIC 16 ══════════════════════════ -->
<section id=&quot;t16&quot; class=&quot;topic&quot;>
  <div class=&quot;topic-header&quot;>
    <span class=&quot;topic-num t4&quot;>Topic 16</span>
    <h2>Complex Numbers &amp;amp; Sinusoidal Sources</h2>
  </div>

  <h3>Why Sinusoidal Signals?</h3>
  <p>In LTI (linear time-invariant) systems, a sinusoidal input produces a sinusoidal output at the same frequency — only amplitude and phase change. This is the fundamental reason AC analysis is so powerful.</p>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Sinusoidal Signal</div>
    $$v(t) = V_m\cos(\omega t + \phi)$$
    $$V_m = \text{amplitude} \quad \omega = \text{angular frequency [rad/s]} \quad \phi = \text{phase [rad or °]}$$
    $$f = \omega/2\pi \text{ [Hz]} \qquad T = 1/f = 2\pi/\omega \text{ [s]}$$
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>RMS Value for Sinusoids</div>
    $$V_{rms} = \frac{V_m}{\sqrt{2}} \approx 0.707\,V_m \qquad I_{rms} = \frac{I_m}{\sqrt{2}}$$
    <p style=&quot;margin-top:8px;font-size:.85rem&quot;>This is what a voltmeter or ammeter reads. The US power grid is 120 V<sub>rms</sub> = 170 V peak.</p>
  </div>

  <h3>Complex Numbers Review</h3>
  <table>
    <tr><th>Form</th><th>Expression</th><th>When to use</th></tr>
    <tr><td>Rectangular</td><td>$z = a + jb$</td><td>Addition/subtraction</td></tr>
    <tr><td>Polar</td><td>$z = r\angle\theta$</td><td>Multiplication/division</td></tr>
    <tr><td>Exponential</td><td>$z = r e^{j\theta}$</td><td>Derivations, proofs</td></tr>
  </table>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Key Conversions</div>
    $$r = \sqrt{a^2+b^2}, \quad \theta = \arctan(b/a) \quad \text{(watch quadrant!)}$$
    $$a = r\cos\theta, \quad b = r\sin\theta$$
    $$e^{j\theta} = \cos\theta + j\sin\theta \quad \text{(Euler's identity)}$$
    $$j = \sqrt{-1}, \quad j^2 = -1, \quad 1/j = -j, \quad j = 1\angle 90°$$
  </div>

  <div class=&quot;callout warn&quot;>
    <strong>⚠ Arctan Quadrant Error</strong>
    $\arctan(b/a)$ only gives the correct angle in Q1 and Q4. For Q2 and Q3, add $180°$ to the calculator result. Always sketch the complex number to verify the quadrant.
  </div>

  <div class=&quot;formula-box&quot;>
    <div class=&quot;f-label&quot;>Operations in Polar Form</div>
    $$z_1 \cdot z_2 = r_1 r_2 \angle(\theta_1+\theta_2)$$
    $$\frac{z_1}{z_2} = \frac{r_1}{r_2}\angle(\theta_1-\theta_2)$$
  </div>

  <div class=&quot;example&quot;>
    <div class=&quot;example-header&quot;>Example 16.1: Convert and compute <span class=&quot;diff med&quot;>Medium</span></div>
    <div class=&quot;example-body&quot;>
      <p>Given $A = 2+j5$ and $B = 4-j6$, find $A(A+B)$ in polar form.</p>
      <div class=&quot;steps&quot;>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>1</div><div class=&quot;step-content&quot;>$A+B = (2+4)+j(5-6) = 6-j1$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>2</div><div class=&quot;step-content&quot;>$A(A+B) = (2+j5)(6-j) = 12 - 2j + 30j - 5j^2 = 12 + 28j + 5 = 17+j28$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>3</div><div class=&quot;step-content&quot;>$|17+j28| = \sqrt{17^2+28^2} = \sqrt{289+784} = \sqrt{1073} \approx 32.76$</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>4</div><div class=&quot;step-content&quot;>$\angle = \arctan(28/17) = \arctan(1.647) \approx 58.7°$ (Q1, correct)</div></div>
        <div class=&quot;step&quot;><div class=&quot;step-n&quot;>5</div><div class=&quot;step-content&quot;>$A(A+B) \approx 32.76\angle 58.7°$</div></div>
      </div>
    </div>
  </div>

  <div class=&quot;cheatsheet&quot;>
    <h3>⚡ Topic 16 Quick Reference</h3>
    <div class=&quot;cs-grid&quot;>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Sinusoid</div>$V_m\cos(\omega t + \phi)$; $\omega=2\pi f$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>RMS</div>$V_{rms} = V_m/\sqrt{2}$</div>
      <div class=&quot;cs-item&quot;><div class=&quot;cs-name&quot;>Rect→Polar</div>$r=\sqrt{a^2+b^2}$; $\theta=\arctan(b/a)$ (+quadrant check)</div>
